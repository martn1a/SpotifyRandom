    }

    /**
     * Build the HTML for the genre filter section using collapsible cluster accordions.
     * Each cluster (Rock, Electronic, etc.) has:
     *   - A toggle zone (left ~80%) that opens/closes the cluster
     *   - An "All +" button (right ~20%) that selects all subgenres at once
     * Subgenres with fewer than MIN_GENRE_ALBUMS albums are hidden (always show if selected).
     * Clusters with ≥1 selected genre start open so the user sees their active filters.
     */
    const MIN_GENRE_ALBUMS = 5; // minimum albums a genre must have to appear as a chip

    function buildGenreFilterHTML() {
      if (!allAlbums.length) {
        return `<div class="genre-empty">Load your library first — genres will appear here.</div>`;
      }
      if (state.genresLoading) {
        return `<div class="genre-loading">Fetching artist genres…</div>`;
      }
      if (!allGenres.length) {
        return `<div class="genre-empty">No genre data found for your library.</div>`;
      }

      // Count how many albums carry each genre tag
      const genreAlbumCount = {};
      for (const album of allAlbums)
        for (const g of (album._genres || []))
          genreAlbumCount[g] = (genreAlbumCount[g] || 0) + 1;

      // Group genres into clusters; filter to ≥ MIN_GENRE_ALBUMS (always keep selected)
      const sel = state.filters.genres;
      const clusterMap = new Map(GENRE_CLUSTERS.map(c => [c.id, { ...c, genres: [] }]));
      clusterMap.set('other', { id: 'other', label: 'Other', icon: '🏷', genres: [] });
      for (const g of allGenres) {
        const count = genreAlbumCount[g] || 0;
        if (count >= MIN_GENRE_ALBUMS || sel.includes(g)) {
          clusterMap.get(clusterOf(g)).genres.push(g);
        }
      }

      // Selected summary bar
      const selectedBar = sel.length === 0 ? '' : `
        <div class="genre-selected-bar visible" id="genreSelectedBar">
          ${sel.map(g => `
            <span class="genre-selected-pill" data-remove="${escHtml(g)}">
              ${escHtml(g)}<span class="genre-selected-pill-x">×</span>
            </span>`).join('')}
          <button class="genre-clear-all" id="genreClearAll" type="button">Clear all</button>
        </div>`;

      // Build cluster accordions (skip clusters with no visible genres)
      const clusters = [...clusterMap.values()].filter(c => c.genres.length > 0);
      const lanes = clusters.map(c => {
        const selInCluster  = c.genres.filter(g => sel.includes(g));
        const selCount      = selInCluster.length;
        const allSelected   = selCount === c.genres.length && c.genres.length > 0;
        const someSelected  = selCount > 0 && !allSelected;
        // Start open if any genre in this cluster is selected
        const isOpen        = selCount > 0;

        const allBtnClass   = allSelected ? 'genre-cluster-all all-selected'
                            : someSelected ? 'genre-cluster-all some-selected'
                            : 'genre-cluster-all';
        const allBtnLabel   = allSelected ? '✓ Alle' : '+ Alle';

        const chips = c.genres.map(g => {
          const count      = genreAlbumCount[g] || 0;
          const isSelected = sel.includes(g);
          return `<button class="glchip${isSelected ? ' selected' : ''}" data-genre="${escHtml(g)}" title="${count} albums">${escHtml(g)}</button>`;
        }).join('');

        return `
          <div class="genre-cluster" data-cluster="${c.id}">
            <div class="genre-cluster-header">
              <div class="genre-cluster-toggle" data-cluster-toggle="${c.id}">
                <span class="genre-cluster-arrow${isOpen ? ' open' : ''}">▼</span>
                <span class="genre-cluster-icon">${c.icon}</span>
                <span class="genre-cluster-label">${c.label}</span>
                <span class="genre-cluster-badge${selCount ? ' visible' : ''}" id="badge_${c.id}">${selCount}</span>
              </div>
              <button class="${allBtnClass}" data-cluster-all="${c.id}" id="allbtn_${c.id}"
                title="${allSelected ? 'Deselect all ' + c.label : 'Select all ' + c.label} genres">
                ${allBtnLabel}
              </button>
            </div>
            <div class="genre-cluster-body${isOpen ? ' open' : ''}" id="body_${c.id}">
              <div class="genre-cluster-chips" id="lane_${c.id}">${chips}</div>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="genre-search-wrap">
          <span class="genre-search-icon">⌕</span>
          <input class="genre-search" type="search" id="genreSearch"
            placeholder="Search genres…" autocomplete="off" autocorrect="off"
            spellcheck="false" value="">
          <button class="genre-search-clear" id="genreSearchClear" type="button" aria-label="Clear search">×</button>
        </div>
        <div id="genreSearchResults" style="display:none;"></div>
        ${selectedBar}
        <div class="genre-lanes" id="genreLanes">${lanes}</div>`;
    }

    /** Re-render only the genre panel contents without rebuilding the whole UI. */
    function refreshGenrePanel() {
      const section = document.getElementById('genreFilterSection');
      if (!section) return;
      // Only replace the body content within the sub-accordion, not the header
      const body = section.querySelector('.filter-section-body');
      if (body) {
        body.innerHTML = buildGenreFilterHTML();
      } else {
        // Fallback if sub-accordion structure not yet rendered
        section.innerHTML = buildGenreFilterHTML();
      }
      attachGenreEvents();
    }

    /**
     * Build the HTML for the Library Coverage panel.
     * Shows % of library ever queued via AlbumPick + three stat rows
     * with CTAs that pre-filter the pick to unheard / long-ago albums.
     */
    function buildCoverageHTML() {
      if (!allAlbums.length) {
        return `<div class="coverage-empty">Load your library first — the overview will appear here.</div>`;
      }

      const s   = getCoverageStats();
      const bar = Math.max(2, s.coveragePct);

      // ── Decade distribution (Roon library view inspiration) ───────────
      const decades = ['pre-70s','70s','80s','90s','00s','10s','20s'];
      const decadeCount = {};
      for (const album of allAlbums) {
        const d = decadeOf(releaseYear(album));
        decadeCount[d] = (decadeCount[d] || 0) + 1;
      }
      const maxDecadeCount = Math.max(...Object.values(decadeCount), 1);

      // ── Top 5 genres by album count ───────────────────────────────────
      const genreCount = {};
      for (const album of allAlbums)
        for (const g of (album._genres || []))
          genreCount[g] = (genreCount[g] || 0) + 1;
      const topGenres = Object.entries(genreCount)
        .sort((a,b) => b[1] - a[1]).slice(0, 5);
      const maxGenreCount = topGenres[0]?.[1] || 1;

      // ── Library freshness: when albums were added to Spotify library ──
      const oneYearAgo   = Date.now() - 365  * 86400000;
      const threeYearsAgo = Date.now() - 3 * 365 * 86400000;
      let fresh = 0, medium = 0, old = 0;
      for (const album of allAlbums) {
        const added = album._added_at ? new Date(album._added_at).getTime() : 0;
        if      (added > oneYearAgo)    fresh++;
        else if (added > threeYearsAgo) medium++;
        else                            old++;
      }
      const total = allAlbums.length;
      const freshPct  = Math.round(fresh  / total * 100);
      const mediumPct = Math.round(medium / total * 100);
      const oldPct    = Math.max(0, 100 - freshPct - mediumPct);

      return `
        <div class="coverage-top">
          <span class="coverage-pct">${s.coveragePct}%</span>
          <span class="coverage-pct-label">queued via AlbumPick</span>
        </div>
        <div class="coverage-bar-bg">
          <div class="coverage-bar-fill" style="width:${bar}%"></div>
        </div>

        <div class="coverage-stat-row">
          <div class="coverage-stat-info">
            <span class="coverage-stat-icon">○</span>
            <div class="coverage-stat-text">
              <div class="coverage-stat-label">${s.neverHeard} never played</div>
              <div class="coverage-stat-sub">Never queued via AlbumPick</div>
            </div>
          </div>
          ${s.neverHeard > 0
            ? `<button class="btn-coverage" data-coverage="unheard">Play now →</button>`
            : `<span style="font-size:10px;color:var(--green);">✓ all heard</span>`}
        </div>

        <div class="coverage-stat-row">
          <div class="coverage-stat-info">
            <span class="coverage-stat-icon">◑</span>
            <div class="coverage-stat-text">
              <div class="coverage-stat-label">${s.longAgo} not heard in 6+ months</div>
              <div class="coverage-stat-sub">Last played over 6 months ago</div>
            </div>
          </div>
          ${s.longAgo > 0
            ? `<button class="btn-coverage" data-coverage="longAgo">Play now →</button>`
            : `<span style="font-size:10px;color:var(--text-dim);">–</span>`}
        </div>

        <div class="coverage-stat-row">
          <div class="coverage-stat-info">
            <span class="coverage-stat-icon">●</span>
            <div class="coverage-stat-text">
              <div class="coverage-stat-label">${s.recent} played in last 6 months</div>
              <div class="coverage-stat-sub">Recently queued via AlbumPick</div>
            </div>
          </div>
        </div>

        <!-- ── Library Breakdown: Decade Distribution ── -->
        ${decades.some(d => decadeCount[d]) ? `
        <div class="overview-section">
          <div class="overview-title">Decade Distribution</div>
          ${decades.map(d => {
            const count = decadeCount[d] || 0;
            if (!count) return '';
            const pct = Math.max(3, Math.round(count / maxDecadeCount * 100));
            return `
              <div class="decade-bar-row">
                <span class="decade-bar-label">${d}</span>
                <div class="decade-bar-track">
                  <div class="decade-bar-fill" style="width:${pct}%"></div>
                </div>
                <span class="decade-bar-count">${count}</span>
              </div>`;
          }).join('')}
        </div>` : ''}

        <!-- ── Library Breakdown: Top Genres ── -->
        ${topGenres.length ? `
        <div class="overview-section">
          <div class="overview-title">Top Genres</div>
          <div class="top-genres-list">
            ${topGenres.map(([genre, count]) => {
              const pct = Math.max(4, Math.round(count / maxGenreCount * 100));
              return `
                <div class="top-genre-row">
                  <span class="top-genre-name">${escHtml(genre)}</span>
                  <div class="top-genre-track">
                    <div class="top-genre-fill" style="width:${pct}%"></div>
                  </div>
                  <span class="top-genre-count">${count}</span>
                </div>`;
            }).join('')}
          </div>
        </div>` : ''}

        <!-- ── Library Freshness (when albums were added) ── -->
        <div class="overview-section">
          <div class="overview-title">Library Freshness</div>
          <div class="freshness-bar">
            <div class="freshness-seg" style="width:${freshPct}%;background:var(--green);opacity:.8;"></div>
            <div class="freshness-seg" style="width:${mediumPct}%;background:var(--green);opacity:.4;"></div>
            <div class="freshness-seg" style="width:${oldPct}%;background:var(--border2);"></div>
          </div>
          <div class="freshness-legend">
            <span class="freshness-legend-item">
              <span class="freshness-dot" style="background:var(--green);opacity:.8;"></span>
              <1 yr (${fresh})
            </span>
            <span class="freshness-legend-item">
              <span class="freshness-dot" style="background:var(--green);opacity:.4;"></span>
              1–3 yr (${medium})
            </span>
            <span class="freshness-legend-item">
              <span class="freshness-dot" style="background:var(--border2);"></span>
              3+ yr (${old})
            </span>
          </div>
        </div>

        <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn-coverage" id="exportHistoryBtn">Export history</button>
          <button class="btn-coverage" id="importHistoryBtn">Import history</button>
          <button class="btn-coverage" id="deleteAllDataBtn" style="border-color:rgba(232,67,67,.4);color:var(--error);">Delete all data</button>
        </div>
      `;
    }

    /** Re-render only the coverage panel body (e.g. after queuing). */
    function refreshCoveragePanel() {
      const body = document.getElementById('coverageBody');
      if (!body) return;
      body.innerHTML = buildCoverageHTML();
      attachCoverageEvents();
    }

    function attachEvents() {
      // Preset buttons — Quick Focus (Roon-style)
      document.querySelectorAll('.preset-btn[data-preset]').forEach(btn => {
        btn.addEventListener('click', () => {
          const name = btn.dataset.preset;
          // Toggle off if already active preset
          if (state.activePreset === name) {
            state.activePreset = null;
            applyPreset('surprise'); // reset on toggle off
          } else {
            applyPreset(name);
          }
        });
      });

      // Filter panel collapse
      document.getElementById('filterToggle').addEventListener('click', () => {
        state.filterOpen = !state.filterOpen;
        document.getElementById('filterArrow').classList.toggle('open', state.filterOpen);
        document.getElementById('filterBody').classList.toggle('open', state.filterOpen);
        saveFiltersToSession();
      });

      // Sub-accordion: each filter section header toggles its own body
      document.querySelectorAll('.filter-section[data-filter]').forEach(section => {
        const key    = section.dataset.filter;
        const header = section.querySelector('.filter-section-header');
        const arrow  = section.querySelector('.filter-section-arrow');
        const body   = section.querySelector('.filter-section-body');
        if (!header || !body) return;
        header.addEventListener('click', () => {
          state.filterSections[key] = !state.filterSections[key];
          arrow?.classList.toggle('open', state.filterSections[key]);
          body.classList.toggle('open', state.filterSections[key]);
          saveFiltersToSession();
        });
      });

      // Coverage panel collapse
      document.getElementById('coverageToggle').addEventListener('click', () => {
        state.coverageOpen = !state.coverageOpen;
        document.getElementById('coverageArrow').classList.toggle('open', state.coverageOpen);
        document.getElementById('coverageBody').classList.toggle('open', state.coverageOpen);
      });

      // Coverage "Play now" buttons (delegated)
      attachCoverageEvents();

      // ── Decade chips: 3-state button cycling ─────────────────────────
      // neutral → included (green) → excluded (red) → neutral
      // Inspired by Roon's Focus inversion: click twice to exclude a decade.
      document.querySelectorAll('.decade-chip-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const d          = btn.dataset.decade;
          const isIncluded = state.filters.decades.includes(d);
          const isExcluded = state.filters.decadesExcluded.includes(d);

          if (!isIncluded && !isExcluded) {
            // neutral → include
            state.filters.decades.push(d);
            btn.className = 'decade-chip-btn included';
            btn.title = 'Click to exclude';
          } else if (isIncluded) {
            // include → exclude
            state.filters.decades = state.filters.decades.filter(x => x !== d);
            state.filters.decadesExcluded.push(d);
            btn.className = 'decade-chip-btn excluded';
            btn.title = 'Click to reset';
          } else {
            // exclude → neutral
            state.filters.decadesExcluded = state.filters.decadesExcluded.filter(x => x !== d);
            btn.className = 'decade-chip-btn';
            btn.title = 'Click to include';
          }
          state.activePreset = null; // manual filter change clears active preset
          updateStatsChip();
          saveFiltersToSession();
        });
      });

      // Keyword filter toggle
      document.getElementById('kwFilter').addEventListener('change', e => {
        state.filters.excludeKeywords = e.target.checked;
        state.activePreset = null;
        updateStatsChip();
        saveFiltersToSession();
      });

      // Duration sliders
      const minSlider = document.getElementById('minDur');
      const maxSlider = document.getElementById('maxDur');
      minSlider.addEventListener('input', e => {
        state.filters.minDurMin = +e.target.value;
        if (state.filters.minDurMin > state.filters.maxDurMin) {
          state.filters.maxDurMin = state.filters.minDurMin;
          maxSlider.value = state.filters.maxDurMin;
          document.getElementById('maxDurVal').textContent = state.filters.maxDurMin;
        }
        document.getElementById('minDurVal').textContent = state.filters.minDurMin;
        state.activePreset = null;
        updateStatsChip();
        saveFiltersToSession();
      });
      maxSlider.addEventListener('input', e => {
        state.filters.maxDurMin = +e.target.value;
        if (state.filters.maxDurMin < state.filters.minDurMin) {
          state.filters.minDurMin = state.filters.maxDurMin;
          minSlider.value = state.filters.minDurMin;
          document.getElementById('minDurVal').textContent = state.filters.minDurMin;
        }
        document.getElementById('maxDurVal').textContent = state.filters.maxDurMin;
        state.activePreset = null;
        updateStatsChip();
        saveFiltersToSession();
      });

      // Album count buttons
      document.getElementById('countSelector').addEventListener('click', e => {
        const btn = e.target.closest('.count-btn');
        if (!btn) return;
        state.albumCount = +btn.dataset.count;
        document.querySelectorAll('.count-btn').forEach(b =>
          b.classList.toggle('active', +b.dataset.count === state.albumCount));
        saveFiltersToSession();
      });

      // Main queue button → now triggers handlePick()
      document.getElementById('queueBtn').addEventListener('click', handlePick);

      // Age filter (radio group)
      document.querySelectorAll('input[name="ageFilter"]').forEach(rb => {
        rb.addEventListener('change', e => {
          state.filters.minAgeMonths = +e.target.value;
          state.activePreset = null;
          updateStatsChip();
          saveFiltersToSession();
        });
      });

      // Queue History filter (radio group — Roon Discovery feature)
      document.querySelectorAll('input[name="queueHistory"]').forEach(rb => {
        rb.addEventListener('change', e => {
          state.filters.queueHistory = e.target.value;
          state.activePreset = null;
          updateStatsChip();
          saveFiltersToSession();
        });
      });

      // Avoid recently played toggle
      const avoidRecentEl = document.getElementById('avoidRecentToggle');
      if (avoidRecentEl) {
        avoidRecentEl.addEventListener('change', e => {
          state.filters.avoidRecent = e.target.checked;
          state.activePreset = null;
          updateStatsChip();
          saveFiltersToSession();
        });
      }

      // Weight-unheard toggle
      const weightUnheardEl = document.getElementById('weightUnheardToggle');
      if (weightUnheardEl) {
        weightUnheardEl.addEventListener('change', e => {
          state.filters.weightUnheard = e.target.checked;
          state.activePreset = null;
          saveFiltersToSession();
        });
      }

      // Clear history button (may not exist if history is empty)
      document.getElementById('clearHistoryBtn')?.addEventListener('click', async () => {
        await clearHistory();
        render();
      });

      // Genre events (may not exist yet if library not loaded)
      attachGenreEvents();
    }

    /**
     * Attach event handlers for the Library Coverage panel CTA buttons.
     * Called after initial render and after refreshCoveragePanel().
     */
    function attachCoverageEvents() {
      const body = document.getElementById('coverageBody');
      if (!body) return;
      body.querySelectorAll('.btn-coverage[data-coverage]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (state.isWorking) return;
          state.coverageFilter = btn.dataset.coverage;  // 'unheard' | 'longAgo'
          await handlePick();
        });
      });

      // Export / Import / Delete-all buttons
      document.getElementById('exportHistoryBtn')?.addEventListener('click', exportHistory);
      document.getElementById('importHistoryBtn')?.addEventListener('click', importHistory);
      document.getElementById('deleteAllDataBtn')?.addEventListener('click', async () => {
        if (!confirm('Delete ALL data (library cache + play history)? This cannot be undone.')) return;
        await deleteAllData();
      });
    }

    function attachGenreEvents() {
      const lanesEl   = document.getElementById('genreLanes');
      const searchEl  = document.getElementById('genreSearch');
      const clearBtn  = document.getElementById('genreSearchClear');
      const resultsEl = document.getElementById('genreSearchResults');
      if (!lanesEl) return;

      // ── Search input ───────────────────────────────────────────────────
      if (searchEl) {
        searchEl.addEventListener('input', e => {
          const q = e.target.value.trim().toLowerCase();
          clearBtn?.classList.toggle('visible', q.length > 0);

          if (!q) {
            resultsEl.style.display = 'none';
            resultsEl.innerHTML = '';
            lanesEl.style.display = '';
            return;
          }

          // Filter all genres by query (show even those below MIN_GENRE_ALBUMS threshold)
          const matches = allGenres.filter(g => g.toLowerCase().includes(q));

          if (matches.length === 0) {
            resultsEl.innerHTML = `<div class="genre-search-noresult">No genres match "${escHtml(q)}"</div>`;
          } else {
            resultsEl.innerHTML = `<div class="genre-search-results" id="genreSearchResultsInner">${
              matches.map(g => {
                const isSelected = state.filters.genres.includes(g);
                return `<button class="glchip${isSelected ? ' selected' : ''}" data-genre="${escHtml(g)}">${escHtml(g)}</button>`;
              }).join('')
            }</div>`;
            resultsEl.querySelector('#genreSearchResultsInner')?.addEventListener('click', e => {
              const chip = e.target.closest('.glchip');
              if (!chip) return;
              _toggleGenreChip(chip.dataset.genre);
            });
          }

          resultsEl.style.display = '';
          lanesEl.style.display = 'none';
        });

        clearBtn?.addEventListener('click', () => {
          searchEl.value = '';
          clearBtn.classList.remove('visible');
          resultsEl.style.display = 'none';
          resultsEl.innerHTML = '';
          lanesEl.style.display = '';
          searchEl.focus();
        });
      }

      // ── Cluster toggle zone (left part of header) — open/close accordion ──
      lanesEl.addEventListener('click', e => {
        // "All" button click — handled separately below, bail early here
        if (e.target.closest('[data-cluster-all]')) return;

        // Chip click
        const chip = e.target.closest('.glchip');
        if (chip) {
          _toggleGenreChip(chip.dataset.genre);
          return;
        }

        // Cluster toggle zone
        const toggle = e.target.closest('[data-cluster-toggle]');
        if (toggle) {
          const cid  = toggle.dataset.clusterToggle;
          const body = document.getElementById('body_' + cid);
          const arr  = toggle.querySelector('.genre-cluster-arrow');
          if (!body) return;
          const open = body.classList.toggle('open');
          arr?.classList.toggle('open', open);
        }
      });

      // ── "All +" button — select/deselect entire cluster ────────────────
      lanesEl.addEventListener('click', e => {
        const btn = e.target.closest('[data-cluster-all]');
        if (!btn) return;
        const cid   = btn.dataset.clusterAll;
        const lane  = document.getElementById('lane_' + cid);
        if (!lane) return;

        // Collect all genre names visible in this cluster lane
        const allChips    = [...lane.querySelectorAll('.glchip')];
        const clusterGenres = allChips.map(c => c.dataset.genre);
        const allSelected = clusterGenres.every(g => state.filters.genres.includes(g));

        if (allSelected) {
          // Deselect all genres in this cluster
          state.filters.genres = state.filters.genres.filter(g => !clusterGenres.includes(g));
          allChips.forEach(c => c.classList.remove('selected'));
        } else {
          // Select all genres in this cluster that aren't already selected
          for (const g of clusterGenres) {
            if (!state.filters.genres.includes(g)) state.filters.genres.push(g);
          }
          allChips.forEach(c => c.classList.add('selected'));
        }

        _syncGenreBadgesAndBar();
        updateStatsChip();
        saveFiltersToSession();
      });

      // ── Clear-all and selected pills ──────────────────────────────────
      _bindGenreClearAll();

      const bar = document.getElementById('genreSelectedBar');
      if (bar) {
        bar.addEventListener('click', e => {
          const pill = e.target.closest('.genre-selected-pill');
          if (!pill) return;
          const g = pill.dataset.remove;
          state.filters.genres = state.filters.genres.filter(x => x !== g);
          document.querySelectorAll(`.glchip[data-genre="${CSS.escape(g)}"]`)
            .forEach(c => c.classList.remove('selected'));
          _syncGenreBadgesAndBar();
          updateStatsChip();
        });
      }
    }

    /**
     * Toggle a genre on/off by name.
     * Updates state, syncs the chip in lanes AND in search results (if open).
     */
    function _toggleGenreChip(g) {
      if (!g) return;
      const isSelected = state.filters.genres.includes(g);
      if (isSelected) {
        state.filters.genres = state.filters.genres.filter(x => x !== g);
      } else {
        state.filters.genres.push(g);
      }
      // Update every rendered chip with this genre (lane + search results can both exist)
      document.querySelectorAll(`.glchip[data-genre="${CSS.escape(g)}"]`)
        .forEach(c => c.classList.toggle('selected', !isSelected));
      _syncGenreBadgesAndBar();
      updateStatsChip();
      saveFiltersToSession();
    }

    function _bindGenreClearAll() {
      document.getElementById('genreClearAll')?.addEventListener('click', () => {
        state.filters.genres = [];
        // Deselect chips in lanes AND in search results panel
        document.querySelectorAll('.glchip.selected').forEach(c => c.classList.remove('selected'));
        _syncGenreBadgesAndBar();
        updateStatsChip();
      });
    }

    /**
     * After any genre selection change: update per-cluster badge counts,
     * "All" button visual state, and re-render the selected-pills summary bar.
     */
    function _syncGenreBadgesAndBar() {
      const sel = state.filters.genres;

      // Update badges and "All" buttons per cluster
      for (const c of [...GENRE_CLUSTERS, { id: 'other' }]) {
        const badge = document.getElementById('badge_' + c.id);
        const lane  = document.getElementById('lane_'  + c.id);
        const allBtn = document.getElementById('allbtn_' + c.id);
        if (!badge || !lane) continue;

        const chips        = [...lane.querySelectorAll('.glchip')];
        const selCount     = chips.filter(ch => sel.includes(ch.dataset.genre)).length;
        const allSelected  = selCount === chips.length && chips.length > 0;
        const someSelected = selCount > 0 && !allSelected;

        badge.textContent = selCount;
        badge.classList.toggle('visible', selCount > 0);

        if (allBtn) {
          allBtn.className = 'genre-cluster-all'
            + (allSelected ? ' all-selected' : someSelected ? ' some-selected' : '');
          allBtn.textContent = allSelected ? '✓ Alle' : '+ Alle';
        }
      }

      // Rebuild selected bar
      const section = document.getElementById('genreFilterSection');
      if (!section) return;
      let bar = document.getElementById('genreSelectedBar');

      if (sel.length === 0) {
        bar?.remove();
        return;
      }

      const newBarHTML = `
        <div class="genre-selected-bar visible" id="genreSelectedBar">
          ${sel.map(g => `
            <span class="genre-selected-pill" data-remove="${escHtml(g)}">
              ${escHtml(g)}<span class="genre-selected-pill-x">×</span>
            </span>`).join('')}
          <button class="genre-clear-all" id="genreClearAll" type="button">Clear all</button>
        </div>`;

      if (bar) {
        bar.outerHTML = newBarHTML;
      } else {
        const lanes = document.getElementById('genreLanes');
        if (lanes) lanes.insertAdjacentHTML('beforebegin', newBarHTML);
      }
      _bindGenreClearAll();
      const newBar = document.getElementById('genreSelectedBar');
      if (newBar) {
        newBar.addEventListener('click', e => {
          const pill = e.target.closest('.genre-selected-pill');
          if (!pill) return;
          _toggleGenreChip(pill.dataset.remove);
        });
      }
    }

    function updateStatsChip() {
      if (!allAlbums.length) return;
      const chip = document.getElementById('statsChip');
      if (!chip) return;
      chip.classList.add('visible');
      const filtered = applyFilters(allAlbums);
      const recentExcluded = state.filters.avoidRecent
        ? allAlbums.length - applyFilters(allAlbums.map(a => ({ ...a }))).length
        : 0;
      // Re-run without avoidRecent to count how many history removes
      let historyNote = '';
      if (state.filters.avoidRecent) {
        const withoutHistory = allAlbums.filter(a => {
          if (state.filters.decades.length > 0 && !state.filters.decades.includes(decadeOf(releaseYear(a)))) return false;
          if (state.filters.excludeKeywords && BLOCKLIST_KEYWORDS.some(kw => (a.name||'').toLowerCase().includes(kw))) return false;
          const dur = albumDurMin(a);
          if (dur < state.filters.minDurMin || dur > state.filters.maxDurMin) return false;
          if (state.filters.genres.length > 0 && !(a._genres||[]).some(g => state.filters.genres.includes(g))) return false;
          if (state.filters.minAgeMonths > 0 && a._added_at) {
            if (new Date(a._added_at).getTime() > Date.now() - state.filters.minAgeMonths * 30 * 86400000) return false;
          }
          return true;
        }).length;
        const excluded = withoutHistory - filtered.length;
        if (excluded > 0) historyNote = ` · ${excluded} recent excluded`;
      }
      chip.textContent = `${allAlbums.length} albums in library · ${filtered.length} match filters${historyNote}`;
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── QUEUE FLOW ───────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Phase 1: Load library (if needed) and pick random albums.
     * Does NOT queue anything — shows albums for review + reroll first.
     */
    async function handlePick() {
      if (state.isWorking) return;
      state.isWorking = true;
      state.phase = 'idle';
      clearStatus();

      try {
        // ── 1. Load library (once) ────────────────────────────────────
        if (allAlbums.length === 0) {
          showProgress('Fetching your library…', 0);
          allAlbums = await fetchAllAlbums((loaded, total) => {
            showProgress(`Fetching library… ${loaded} / ${total}`, loaded / total * 100);
          });
          const btn = document.getElementById('queueBtn');
          if (btn) btn.textContent = '🎲 Pick Albums';
          updateStatsChip();

          // ── 1b. Fetch artist genres ───────────────────────────────
          state.genresLoading = true;
          refreshGenrePanel();

          const totalArtists = new Set(
            allAlbums.flatMap(a => (a.artists || []).map(ar => ar.id))
          ).size;
          showProgress(`Fetching genres… 0 / ${totalArtists} artists`, 0);

          allGenres = await fetchArtistGenres(allAlbums, (done, total) => {
            showProgress(`Fetching genres… ${done} / ${total} artists`, done / total * 100);
          });

          state.genresLoading = false;
          refreshGenrePanel();
          updateStatsChip();

          // ── 1c. Persist to IndexedDB ───────────────────────────
          await saveLibraryCache();
          state.cachedAt = Date.now();
          renderHeader();
        }

        // ── 2. Apply filters + pick ───────────────────────────────────
        let pool = applyFilters(allAlbums);

        // Apply coverage filter if triggered from the coverage panel CTAs.
        // This is applied AFTER regular filters (AND logic), narrowing the
        // pool to only unheard or long-forgotten albums.
        if (state.coverageFilter) {
          const historyMap = getHistoryMap();
          const now        = Date.now();
          const SIX_MONTHS = 180 * 86400000;
          if (state.coverageFilter === 'unheard') {
            pool = pool.filter(a => !historyMap.has(a.id));
          } else if (state.coverageFilter === 'longAgo') {
            pool = pool.filter(a => {
              const lastHeard = historyMap.get(a.id);
              return lastHeard && (now - lastHeard > SIX_MONTHS);
            });
          }
          state.coverageFilter = null;  // consume and clear
        }

        if (pool.length === 0) {
          hideProgress();
          showError('No albums match the current filters. Try removing some filter constraints.');
          state.isWorking = false;
          return;
        }

        const n = Math.min(state.albumCount, pool.length);
        // Use weighted pick when "Prefer unheard" is active
        state.selectedAlbums = state.filters.weightUnheard
          ? weightedPickRandom(pool, n)
          : pickRandom(pool, n);
        state.phase = 'picked';

        hideProgress();
        renderAlbumList(state.selectedAlbums);

      } catch (err) {
        hideProgress();
        showError(err.message || 'An unexpected error occurred.');
      }

      state.isWorking = false;
    }

    /**
     * Phase 2: Queue the currently selected albums.
     * Called by the "Queue These Albums" button in the album list.
     */
    async function queueSelected() {
      if (state.isWorking || !state.selectedAlbums.length) return;
      state.isWorking = true;
      state.phase = 'queuing';

      // Disable the queue-selected button immediately
      const qsBtn = document.getElementById('queueSelectedBtn');
      if (qsBtn) { qsBtn.disabled = true; qsBtn.textContent = 'Queuing…'; }

      try {
        const delay = document.getElementById('browserModeToggle').checked
          ? DELAY_BROWSER_MS
          : DELAY_DESKTOP_MS;

        showProgress('Preparing tracks…', 0);
        const allTracks = [];
        for (const album of state.selectedAlbums) {
          // Fetches additional track pages for albums with > 50 tracks.
          const tracks = await getAlbumTracks(album);
          for (const t of tracks) allTracks.push({ uri: t.uri, album: album.name });
        }

        const total = allTracks.length;
        for (let i = 0; i < total; i++) {
          showProgress(
            `Queuing track ${i + 1} / ${total}  —  ${escHtml(allTracks[i].album)}`,
            (i / total) * 100
          );
          await addToQueue(allTracks[i].uri);
          if (i < total - 1) await sleep(delay);
        }

        // ── Save to play history ──────────────────────────────────────
        // Records these albums as "recently played" so "Avoid recently played"
        // can exclude them on the next pick.
        await appendHistory(state.selectedAlbums);

        // ── Refresh coverage displays ─────────────────────────────────
        // Header badge (heard/total) and coverage panel stats must reflect
        // the newly queued albums immediately, not only after a page reload.
        renderHeader();
        refreshCoveragePanel();

        showProgress('Done!', 100);
        await sleep(400);
        hideProgress();
        const n = state.selectedAlbums.length;
        showSuccess(
          `✓ Added ${total} track${total !== 1 ? 's' : ''} from ` +
          `${n} album${n !== 1 ? 's' : ''} to your Spotify queue.`
        );
        state.phase = 'idle';

        // Re-enable pick button for next round
        const pickBtn = document.getElementById('queueBtn');
        if (pickBtn) pickBtn.disabled = false;
        if (qsBtn) { qsBtn.disabled = false; qsBtn.textContent = '▶ Queue These Albums'; }

      } catch (err) {
        hideProgress();
        showError(err.message || 'An unexpected error occurred.');
        if (qsBtn) { qsBtn.disabled = false; qsBtn.textContent = '▶ Queue These Albums'; }
      }

      state.isWorking = false;
    }

    /** Fisher-Yates partial shuffle: returns k unique items in random order. */
    function pickRandom(arr, k) {
      const copy = [...arr];
      for (let i = 0; i < k; i++) {
        const j = i + Math.floor(Math.random() * (copy.length - i));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy.slice(0, k);
    }

    /**
     * Replace the album at `index` in state.selectedAlbums with a new random
     * pick from the filtered pool (excluding all currently selected albums).
     * Animates the old item out and the new one in.
     */
    function rerollAlbum(index) {
      const pool     = applyFilters(allAlbums);
      const usedIds  = new Set(state.selectedAlbums.map(a => a.id));
      const candidates = pool.filter(a => !usedIds.has(a.id));

      if (candidates.length === 0) {
        // No more candidates — flash the button to indicate failure
        const btn = document.querySelector(`.reroll-btn[data-reroll="${index}"]`);
        if (btn) { btn.textContent = '✕'; setTimeout(() => btn.textContent = '↻', 800); }
        return;
      }

      const newAlbum = pickRandom(candidates, 1)[0];
      state.selectedAlbums[index] = newAlbum;

      // Animate: slide old item out, then replace DOM and slide new one in
      const itemEl = document.querySelector(`.album-item[data-idx="${index}"]`);
      if (!itemEl) { renderAlbumList(state.selectedAlbums); return; }

      itemEl.classList.add('swipe-exit');
      setTimeout(() => {
        // Update the list inner HTML for just this index
        const a       = newAlbum;
        const imgUrl  = a.images?.[0]?.url || '';
        const imgEl   = imgUrl
          ? `<img class="album-art" src="${imgUrl}" alt="" loading="lazy">`
          : `<div class="album-art-placeholder">🎵</div>`;
        const artists = (a.artists || []).map(x => x.name).join(', ');
        const dur     = albumDurMin(a).toFixed(0);
        const tracks  = a.tracks?.total || '?';
        const genres  = (a._genres || []).slice(0, 3).join(' · ');
        const addedLabel = formatAddedAt(a._added_at);

        itemEl.outerHTML = `
          <div class="album-item swipe-enter" data-idx="${index}">
            <span class="album-num" style="font-family:var(--font-mono);">${index + 1}</span>
            ${imgEl}
            <div class="album-info">
              <div class="album-name">${escHtml(a.name)}</div>
              <div class="album-artist">${escHtml(artists)}</div>
              ${genres ? `<div style="font-size:10px;color:var(--text-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(genres)}</div>` : ''}
              ${addedLabel ? `<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">${escHtml(addedLabel)}</div>` : ''}
            </div>
            <div class="album-meta" style="font-family:var(--font-mono);">
              <div>${tracks} tracks</div>
              <div>${dur} min</div>
            </div>
            <button class="reroll-btn" data-reroll="${index}" title="Swap this album" aria-label="Swap album">↻</button>
          </div>`;

        // Re-attach events for the new item
        const newItemEl = document.querySelector(`.album-item[data-idx="${index}"]`);
        if (newItemEl) {
          newItemEl.querySelector('.reroll-btn')?.addEventListener('click', e => {
            if (state.isWorking) return;
            rerollAlbum(+e.currentTarget.dataset.reroll);
          });
          let startX = 0, startY = 0, dragging = false;
          newItemEl.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            dragging = true;
          }, { passive: true });
          newItemEl.addEventListener('touchmove', e => {
            if (!dragging) return;
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;
            if (Math.abs(dy) > Math.abs(dx) + 10) { dragging = false; newItemEl.classList.remove('swipe-ready'); return; }
            if (dx < 0) newItemEl.style.transform = `translateX(${dx}px)`;
            newItemEl.classList.toggle('swipe-ready', dx < -60);
          }, { passive: true });
          newItemEl.addEventListener('touchend', e => {
            if (!dragging) return;
            dragging = false;
            newItemEl.classList.remove('swipe-ready');
            const dx = e.changedTouches[0].clientX - startX;
            if (dx < -60 && !state.isWorking) rerollAlbum(+newItemEl.dataset.idx);
            else newItemEl.style.transform = '';
          }, { passive: true });
        }
      }, 220);
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── UI HELPERS ───────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    function showProgress(text, pct) {
      const wrap = document.getElementById('progressWrap');
      if (!wrap) return;
      wrap.classList.add('visible');
      document.getElementById('progressText').textContent = text;
      const pctEl = document.getElementById('progressPct');
      if (pctEl && pct !== undefined) pctEl.textContent = Math.min(100, Math.round(pct)) + '%';
      const fill = document.getElementById('progressFill');
      if (fill && pct !== undefined) fill.style.width = Math.min(100, pct) + '%';
      const btn = document.getElementById('queueBtn');
      if (btn) btn.disabled = true;
    }

    function hideProgress() {
      const wrap = document.getElementById('progressWrap');
      if (wrap) wrap.classList.remove('visible');
      const btn = document.getElementById('queueBtn');
      if (btn) btn.disabled = false;
    }

    function showSuccess(msg) {
      const el = document.getElementById('statusArea');
      if (!el) return;
      el.className = 'status-area success';
      el.textContent = msg;
    }

    function showError(msg) {
      const el = document.getElementById('statusArea');
      if (el) {
        el.className = 'status-area error';
        el.textContent = msg;
      } else {
        // Fallback: use the global status div (shown on login screen)
        const gs = document.getElementById('globalStatus');
        if (gs) { gs.className = 'show error'; gs.textContent = msg; }
      }
    }

    function clearStatus() {
      const el = document.getElementById('statusArea');
      if (el) { el.className = 'status-area'; el.textContent = ''; }
      const list = document.getElementById('albumList');
      if (list) list.innerHTML = '';
    }

    function renderAlbumList(albums) {
      const list = document.getElementById('albumList');
      if (!list || !albums.length) return;

      // Apply sort (display-only, does not mutate state.selectedAlbums)
      const displayAlbums = sortAlbums(albums);

      const sortChips = [
        { val: 'pick',    label: '🎲 Pick order' },
        { val: 'release', label: '📅 Release' },
        { val: 'added',   label: '🗓 Added' },
        { val: 'duration', label: '⏱ Duration' },
      ].map(s => `<button class="sort-chip ${state.albumSort === s.val ? 'active' : ''}" data-sort="${s.val}">${s.label}</button>`).join('');

      const labelDiv = `
        <div style="margin-bottom:10px;">
          <div class="section-label" style="margin-bottom:8px;">Selected albums · swipe left to swap</div>
          <div class="sort-row">
            <span class="sort-label">Sort:</span>
            ${sortChips}
          </div>
        </div>`;

      const items = displayAlbums.map((a, i) => {
        // slimAlbum stores only a single-entry images array (the thumbnail),
        // so always access index 0 — never 1 or 2.
        const imgUrl  = a.images?.[0]?.url || '';
        const imgEl   = imgUrl
          ? `<img class="album-art" src="${imgUrl}" alt="" loading="lazy">`
          : `<div class="album-art-placeholder">🎵</div>`;
        const artists = (a.artists || []).map(x => x.name).join(', ');
        const dur     = albumDurMin(a).toFixed(0);
        const tracks  = a.tracks?.total || '?';
        const genres  = (a._genres || []).slice(0, 3).join(' · ');
        const addedLabel = formatAddedAt(a._added_at);
        // Use original index in state.selectedAlbums for reroll targeting
        const origIdx = state.selectedAlbums.indexOf(a);
        const idx = origIdx >= 0 ? origIdx : i;

        return `
          <div class="album-item" style="animation-delay:${i * 55}ms" data-idx="${idx}">
            <span class="album-num" style="font-family:var(--font-mono);">${i + 1}</span>
            ${imgEl}
            <div class="album-info">
              <div class="album-name">${escHtml(a.name)}</div>
              <div class="album-artist">${escHtml(artists)}</div>
              ${genres ? `<div style="font-size:10px;color:var(--text-dim);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(genres)}</div>` : ''}
              ${addedLabel ? `<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">${escHtml(addedLabel)}</div>` : ''}
            </div>
            <div class="album-meta" style="font-family:var(--font-mono);">
              <div>${tracks} tracks</div>
              <div>${dur} min</div>
            </div>
            <button class="reroll-btn" data-reroll="${idx}" title="Swap this album" aria-label="Swap album">↻</button>
          </div>`;
      }).join('');

      const queueBtn = `
        <button class="btn btn-primary" id="queueSelectedBtn">
          ▶ Queue These Albums
        </button>`;

      list.innerHTML = labelDiv + `<div class="album-list" id="albumListInner">${items}</div>` + queueBtn;

      // ── Reroll button click ───────────────────────────────
      list.querySelectorAll('.reroll-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          if (state.isWorking) return;
          rerollAlbum(+e.currentTarget.dataset.reroll);
        });
      });

      // ── Swipe-to-reroll (touch) ───────────────────────────
      list.querySelectorAll('.album-item').forEach(item => {
        let startX = 0, startY = 0, dragging = false;
        item.addEventListener('touchstart', e => {
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
          dragging = true;
        }, { passive: true });
        item.addEventListener('touchmove', e => {
          if (!dragging) return;
          const dx = e.touches[0].clientX - startX;
          const dy = e.touches[0].clientY - startY;
          // If mostly vertical, let the page scroll and abort swipe detection
          if (Math.abs(dy) > Math.abs(dx) + 10) { dragging = false; item.classList.remove('swipe-ready'); return; }
          // Live feedback: translate the item as user swipes
          if (dx < 0) item.style.transform = `translateX(${dx}px)`;
          // Visual threshold indicator at 60px
          item.classList.toggle('swipe-ready', dx < -60);
        }, { passive: true });
        item.addEventListener('touchend', e => {
          if (!dragging) return;
          dragging = false;
          item.classList.remove('swipe-ready');
          const dx = e.changedTouches[0].clientX - startX;
          if (dx < -60 && !state.isWorking) {
            // Crossed threshold → reroll
            rerollAlbum(+item.dataset.idx);
          } else {
            // Snap back
            item.style.transform = '';
          }
        }, { passive: true });
      });

      // ── Sort chips ───────────────────────────────────────
      list.querySelectorAll('.sort-chip[data-sort]').forEach(chip => {
        chip.addEventListener('click', () => {
          state.albumSort = chip.dataset.sort;
          // Re-render list with new sort order (albums unchanged in state)
          renderAlbumList(state.selectedAlbums);
        });
      });

      // ── Queue Selected button ─────────────────────────────
      document.getElementById('queueSelectedBtn').addEventListener('click', queueSelected);
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /** Human-readable cache age: "just now", "3 h ago", "2 days ago". */
    function formatAge(ms) {
      const s = Math.floor(ms / 1000);
      if (s < 60)   return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60)   return `${m} min ago`;
      const h = Math.floor(m / 60);
      if (h < 24)   return `${h} h ago`;
      const d = Math.floor(h / 24);
      return `${d} day${d !== 1 ? 's' : ''} ago`;
    }

    /** Human-readable "in library since" label from an ISO date string.
     *  Returns e.g. "In library for 3 years" or "Added 2 months ago". */
    function formatAddedAt(isoStr) {
      if (!isoStr) return '';
      const ms = Date.now() - new Date(isoStr).getTime();
      if (ms < 0) return '';
      const days   = Math.floor(ms / 86400000);
      const months = Math.floor(days / 30.44);
      const years  = Math.floor(days / 365.25);
      if (years >= 1)  return `In library for ${years} year${years !== 1 ? 's' : ''}`;
      if (months >= 1) return `Added ${months} month${months !== 1 ? 's' : ''} ago`;
      if (days >= 1)   return `Added ${days} day${days !== 1 ? 's' : ''} ago`;
      return 'Added today';
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── BOOT ─────────────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    (async function boot() {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      const oState = params.get('state');
      const oError = params.get('error');

      if (oError) {
        window.history.replaceState({}, '', window.location.pathname);
        render();
        showError('Spotify authorization was denied: ' + oError);
        return;
      }

      if (code && oState) {
        // If Chrome restores this tab after a restart, the URL may still contain
        // the ?code=&state= params from a previous OAuth callback. Spotify auth
        // codes are single-use — re-submitting them causes "invalid_grant".
        // Guard: if we already have a refresh token, the code was already
        // exchanged successfully on a previous load. Just clean the URL.
        if (isLoggedIn()) {
          window.history.replaceState({}, '', window.location.pathname);
        } else {
          try {
            await handleCallback(code, oState);
          } catch (err) {
            // Clean the URL even on failure so a page refresh doesn't loop
            window.history.replaceState({}, '', window.location.pathname);
            render();
            showError(err.message);
            return;
          }
        }
      }

      // ── One-time migration from legacy localStorage cache ─────────────
      // If the user had data in the old albumpick_library_v1 / albumpick_history_v1
      // keys, import it into IndexedDB and then remove the old keys so this
      // code path only runs once.
      await _migrateFromLocalStorage();

      // Populate in-memory historyCache + allAlbums/allGenres from IndexedDB
      // before the first render, so genre chips and history counts are correct
      // on the very first paint.
      if (isLoggedIn()) {
        await Promise.all([
          loadLibraryCache(),
          loadHistory(),
        ]);

        // Restore filter state from sessionStorage (survives page refreshes
        // within the same session — inspired by Roon's Bookmark feature).
        restoreFiltersFromSession();

        // Request persistent storage so the browser won't evict IndexedDB data
        // under storage pressure. Non-blocking; result is logged but not required.
        if (navigator.storage && navigator.storage.persist) {
          navigator.storage.persist().then(granted => {
            if (granted) console.log('AlbumPick: persistent storage granted');
            else console.log('AlbumPick: persistent storage denied — data may be evicted');
          }).catch(() => {});
        }
      }

      render();
    })();

    /**
     * One-time migration: copy legacy localStorage data into IndexedDB.
     * Safe to call on every boot — it's a no-op if the old keys are absent.
     */
    async function _migrateFromLocalStorage() {
      try {
        // ── Library ──────────────────────────────────────────────────────
        const rawLib = localStorage.getItem('albumpick_library_v1');
        if (rawLib) {
          const parsed = JSON.parse(rawLib);
          if (parsed?.albums?.length) {
            const db = await getDb();
            // Only write if IDB is currently empty to avoid overwriting fresh data
            const existing = await db.get('library', 'main');
            if (!existing) {
              await db.put('library', {
                cachedAt: parsed.cachedAt || Date.now(),
                genres:   parsed.genres   || [],
                albums:   parsed.albums,
              }, 'main');
            }
          }
          localStorage.removeItem('albumpick_library_v1');
        }

        // ── History ───────────────────────────────────────────────────────
        const rawHist = localStorage.getItem('albumpick_history_v1');
        if (rawHist) {
          const entries = JSON.parse(rawHist);
          if (Array.isArray(entries) && entries.length) {
            const db  = await getDb();
            const tx  = db.transaction('history', 'readwrite');
            // Import ALL entries — no pruning. History is kept permanently
            // for coverage stats and queue-history filters.
            await Promise.all(
              entries
                .filter(e => e.id && e.queuedAt)
                .map(e => tx.store.put({ id: e.id, name: e.name || '', queuedAt: e.queuedAt }))
            );
            await tx.done;
          }
          localStorage.removeItem('albumpick_history_v1');
        }
      } catch (e) {
        // Migration errors are non-fatal — old data simply won't be imported
        console.warn('AlbumPick: localStorage migration failed', e);
      }
    }
  </script>

  <!-- ═══════════════════════════════════════════════════════════════════
       PWA BOOTSTRAP
       Runs after the page loads. Does two things:
         1. Injects the Web App Manifest so Chrome recognises this as a
            PWA and opens it without browser chrome in standalone mode.
         2. Registers a Service Worker (sw.js, same directory) which
            Chrome requires to show the install banner. Without sw.js the
            app still opens standalone when added manually via the
            three-dot menu, but the proactive install banner won't appear.
       ═══════════════════════════════════════════════════════════════════ -->
  <script>
  (function bootstrapPWA() {

    // ── 1. Web App Manifest ────────────────────────────────────────────
    // Inline SVG icon: music note on dark rounded background.
    // No separate image file needed.
    const iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"><rect width="512" height="512" rx="80" fill="#0d0c0b"/><path d="M336 128v160c0 26.5-21.5 48-48 48s-48-21.5-48-48 21.5-48 48-48c10.6 0 20.4 3.4 28.4 9.2V156.8l-128 32v134.4c0 26.5-21.5 48-48 48s-48-21.5-48-48 21.5-48 48-48c10.6 0 20.4 3.4 28.4 9.2V120L336 78.1z" fill="#1DB954"/></svg>';
    const iconDataUrl = 'data:image/svg+xml;base64,' + btoa(iconSvg);

    const manifestData = {
      name:             'AlbumPick',
      short_name:       'AlbumPick',
      description:      'Random album picker for your Spotify library',
      start_url:        './',
      scope:            './',
      display:          'standalone',
      background_color: '#0d0c0b',
      theme_color:      '#1DB954',
      orientation:      'portrait-primary',
      icons: [
        { src: iconDataUrl, sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
        { src: iconDataUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
      ]
    };

    // Inject manifest as a Blob URL. Same origin as the page, so Chrome
    // accepts it — no separate manifest.json file required on the server.
    try {
      const blob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
      document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
    } catch (e) {
      console.warn('AlbumPick PWA: manifest injection failed', e);
    }

    // ── 2. Service Worker ──────────────────────────────────────────────
    // sw.js must exist in the same directory as index.html on GitHub Pages.
    // It is a pass-through SW (no offline caching) — its sole purpose is
    // to satisfy Chrome's PWA installability check so the install banner
    // appears automatically.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg  => console.log('AlbumPick PWA: SW registered, scope:', reg.scope))
          .catch(err => console.warn('AlbumPick PWA: SW registration failed —',
            'make sure sw.js is in the same folder as index.html.', err));
      });
    }

  })();
  </script>
