// ── Library state
const libState={
  search:'',
  activeCluster:null,   // null = All, string = über-genre id
  activeSubGenres:[],   // selected sub-genre strings
  albumTypes:[],        // 'album','single','compilation' — empty = all
  sortMode:'added',     // 'added'|'az'|'release'|'duration'
  page:1,
  PAGE_SIZE:50,
};

/** Build over-genre counts from current library */
function _buildClusterCounts(){
  const counts=new Map();
  for(const a of allAlbums){
    const gs=a._genres||[];
    const clusters=new Set(gs.map(g=>clusterOf(g)));
    clusters.delete('other');
    for(const c of clusters){counts.set(c,(counts.get(c)||0)+1);}
  }
  return counts;
}

/** Get sub-genres for a cluster id, sorted by count */
function _subGenresForCluster(clusterId){
  const cluster=GENRE_CLUSTERS.find(c=>c.id===clusterId);if(!cluster)return[];
  const counts=new Map();
  for(const a of allAlbums){
    for(const g of(a._genres||[])){
      if(cluster.kw.some(k=>g.toLowerCase().includes(k))){
        counts.set(g,(counts.get(g)||0)+1);
      }
    }
  }
  return [...counts.entries()].sort((a,b)=>b[1]-a[1]).map(([g,n])=>({genre:g,count:n}));
}

/** Detect album_group / album_type from album name heuristics (Spotify doesn't return type in saved albums) */
function _guessAlbumType(a){
  const n=(a.name||'').toLowerCase();
  const t=a.tracks?.total||a.tracks?.items?.length||0;
  if(n.includes(' - single')||n.includes('(single)')||(t&&t<=3))return'single';
  if(n.includes('compilation')||n.includes(' - ep')||n.includes('(compilation)'))return'compilation';
  return'album';
}

/** Apply all library filters and return sorted albums */
function _applyLibFilters(){
  const q=libState.search.toLowerCase();
  let result=allAlbums.filter(a=>{
    // text search
    if(q&&!a.name.toLowerCase().includes(q)&&!(a.artists||[]).some(ar=>ar.name.toLowerCase().includes(q)))return false;
    // genre cluster filter
    if(libState.activeCluster){
      const ag=a._genres||[];const ac=new Set(ag.map(g=>clusterOf(g)));
      if(!ac.has(libState.activeCluster))return false;
    }
    // sub-genre filter
    if(libState.activeSubGenres.length>0){
      const ag=a._genres||[];
      if(!libState.activeSubGenres.some(sg=>ag.includes(sg)))return false;
    }
    // album type (AND with genre)
    if(libState.albumTypes.length>0){
      if(!libState.albumTypes.includes(_guessAlbumType(a)))return false;
    }
    return true;
  });
  // sort
  if(libState.sortMode==='az'){result.sort((a,b)=>a.name.localeCompare(b.name));}
  else if(libState.sortMode==='release'){result.sort((a,b)=>releaseYear(b)-releaseYear(a));}
  else if(libState.sortMode==='duration'){result.sort((a,b)=>albumDurMin(b)-albumDurMin(a));}
  else{// added (recently added first)
    result.sort((a,b)=>{const ta=a._added_at?new Date(a._added_at).getTime():0;const tb=b._added_at?new Date(b._added_at).getTime():0;return tb-ta;});
  }
  return result;
}

/** Render the album grid portion */
function _renderLibGrid(container,albums){
  const content=container.querySelector('#libContent');if(!content)return;
  const total=albums.length;const show=albums.slice(0,libState.page*libState.PAGE_SIZE);

    const lm=content.querySelector('.lib-load-more');if(lm)lm.remove();return;

  grid.innerHTML=show.map((a,i)=>{
    const art=getArt(a,'md')||getArt(a,'lg');const artist=(a.artists||[]).map(ar=>ar.name).join(', ');
    return`<div class="alb-grid-item" data-libid="${esc(a.id)}" style="animation-delay:${Math.min(i*15,300)}ms">
      ${art?`<img class="alb-grid-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="alb-grid-art-ph">🎵</div>`}
      <div class="alb-grid-info"><div class="alb-grid-name">${esc(a.name)}</div><div class="alb-grid-artist">${esc(artist)}</div></div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.alb-grid-item').forEach(item=>item.addEventListener('click',()=>{const a=allAlbums.find(x=>x.id===item.dataset.libid);if(a)openAlbumDetail(a);}));
  // Load more button

  }else if(lm){lm.remove();}
}

  if(libState.sortMode!=='added'){
    const lbl={az:'A–Z',release:'Release Year',duration:'Duration'}[libState.sortMode]||libState.sortMode;
    chips.push({label:`↕ ${lbl}`,cls:'sort-chip',action:()=>{libState.sortMode='added';libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }

  const count=chips.length;
  if(count>0){
    btn.classList.add('has-filters');
    btn.innerHTML=`⚙ Filter <span class="lib-filter-badge">${count}</span>`;
  }else{
    btn.classList.remove('has-filters');
    btn.innerHTML='⚙ Filter';
  }

  if(!chips.length){row.style.display='none';row.innerHTML='';return;}
  row.style.display='flex';
  row.innerHTML=chips.map((c,i)=>`<button class="lib-active-chip ${c.cls}" data-chipidx="${i}">${esc(c.label)} <span class="x">✕</span></button>`).join('');
  row.querySelectorAll('[data-chipidx]').forEach(b=>b.addEventListener('click',()=>chips[+b.dataset.chipidx].action()));
}

/** Open the filter bottom sheet */
function _openLibSheet(panel){
  const clusterCounts=_buildClusterCounts();
  const sheetBg=document.createElement('div');
  sheetBg.className='lib-sheet-bg';
  const sheet=document.createElement('div');
  sheet.className='lib-sheet';

  function _buildSheetHTML(){
    const genreChips=GENRE_CLUSTERS.map(c=>{
      const cnt=clusterCounts.get(c.id)||0;if(!cnt)return'';
      const active=libState.activeCluster===c.id;
      return`<button class="lib-genre-chip${active?' active':''}" data-shcluster="${c.id}"><span class="chip-icon">${c.icon}</span>${c.label}<span class="chip-cnt">${cnt}</span></button>`;
    }).join('');

    let subHTML='';
    if(libState.activeCluster){
      const subs=_subGenresForCluster(libState.activeCluster).slice(0,30);
      if(subs.length){
        subHTML=`<div class="lib-subgenre-wrap">${subs.map(({genre,count})=>`<button class="lib-subgenre-chip${libState.activeSubGenres.includes(genre)?' active':''}" data-shsubgenre="${esc(genre)}">${esc(genre)}<span class="chip-cnt" style="font-size:9px;opacity:.5;margin-left:3px">${count}</span></button>`).join('')}</div>`;
      }
    }

    const typeChips=['album','single','compilation'].map(t=>{
      const lbl={album:'Album',single:'Single / EP',compilation:'Compilation'}[t];
      return`<button class="lib-type-chip${libState.albumTypes.includes(t)?' active':''}" data-shtype="${t}">${lbl}</button>`;
    }).join('');

    const sortChips=[['added','Recently Added'],['az','A–Z'],['release','Release Year'],['duration','Duration']].map(([v,l])=>`<button class="lib-sort-chip${libState.sortMode===v?' active':''}" data-shsort="${v}">${l}</button>`).join('');

    return`
      <div class="lib-sheet-handle"></div>
      <div class="lib-sheet-header">
        <span class="lib-sheet-title">Filter & Sort</span>
        <button class="lib-sheet-reset" id="sheetReset">Reset all</button>
      </div>
      <div class="lib-sheet-body">
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">Genre</div>
          <div class="lib-genre-wrap">${genreChips}</div>
          ${subHTML}
        </div>
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">Type</div>
          <div class="lib-type-chips">${typeChips}</div>
        </div>
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">Sort</div>
          <div class="lib-sort-chips">${sortChips}</div>
        </div>
      </div>`;
  }

  function refreshSheet(){sheet.innerHTML=_buildSheetHTML();attachSheetEvents();}

  function closeSheet(){
    sheetBg.style.animation='fadein .18s ease reverse';
    sheet.style.animation='slideup .18s cubic-bezier(.32,1,.56,1) reverse';
    setTimeout(()=>sheetBg.remove(),180);
    _renderLibActiveChips(panel);
    const albums=_applyLibFilters();_renderLibGrid(panel,albums);
  }

  function attachSheetEvents(){
    sheet.querySelector('#sheetReset')?.addEventListener('click',()=>{
      libState.activeCluster=null;libState.activeSubGenres=[];libState.albumTypes=[];libState.sortMode='added';libState.page=1;
      refreshSheet();
    });
    sheet.querySelectorAll('[data-shcluster]').forEach(b=>b.addEventListener('click',()=>{
      const id=b.dataset.shcluster;
      if(libState.activeCluster===id){libState.activeCluster=null;libState.activeSubGenres=[];}
      else{libState.activeCluster=id;libState.activeSubGenres=[];}
      libState.page=1;refreshSheet();
    }));
    sheet.querySelectorAll('[data-shsubgenre]').forEach(b=>b.addEventListener('click',()=>{
      const g=b.dataset.shsubgenre;
      const idx=libState.activeSubGenres.indexOf(g);
      if(idx>=0)libState.activeSubGenres.splice(idx,1);else libState.activeSubGenres.push(g);
      libState.page=1;refreshSheet();
    }));
    sheet.querySelectorAll('[data-shtype]').forEach(b=>b.addEventListener('click',()=>{
      const t=b.dataset.shtype;const idx=libState.albumTypes.indexOf(t);
      if(idx>=0)libState.albumTypes.splice(idx,1);else libState.albumTypes.push(t);
      libState.page=1;refreshSheet();
    }));
    sheet.querySelectorAll('[data-shsort]').forEach(b=>b.addEventListener('click',()=>{
      libState.sortMode=b.dataset.shsort;libState.page=1;refreshSheet();
    }));
  }

  sheet.innerHTML=_buildSheetHTML();
  attachSheetEvents();
  sheetBg.appendChild(sheet);
  document.body.appendChild(sheetBg);
  sheetBg.addEventListener('click',e=>{if(e.target===sheetBg)closeSheet();});

  // Swipe-down-to-close
  let startY=0,dragging=false;
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dragging=true;},{passive:true});
  sheet.addEventListener('touchmove',e=>{if(!dragging)return;const dy=e.touches[0].clientY-startY;if(dy>0)sheet.style.transform=`translateY(${dy}px)`;},{passive:true});
  sheet.addEventListener('touchend',e=>{if(!dragging)return;dragging=false;const dy=e.changedTouches[0].clientY-startY;if(dy>80)closeSheet();else sheet.style.transform='';},{passive:true});
}

/**
 * PHASE 3: Find albums not played for N+ days, prioritising formerly-frequent ones.
 * @param {number} thresholdDays  default 90
 * @returns {Array} albums sorted by staleness
 */
async function getRediscoveryAlbums(thresholdDays=90){
  await HistoryProvider.load();
  const hm=HistoryProvider.getMap();
  const threshold=thresholdDays*86400000;
  return allAlbums
    .filter(a=>{const lh=hm.get(a.id);return lh&&(Date.now()-lh>threshold);})
    .sort((a,b)=>(hm.get(a.id)||0)-(hm.get(b.id)||0));
}

/**
 * PHASE 3: Build über-genre cluster data: {cluster, genres[], albums[]}.
 * @param {number} minAlbums  min albums to include a cluster
 */
function _buildGenreClusters(minAlbums=4){
  const genreAlbums=new Map();
  for(const album of allAlbums){
    for(const g of(album._genres||[])){
      if(!genreAlbums.has(g))genreAlbums.set(g,new Set());
      genreAlbums.get(g).add(album);
    }
  }
  const clusterMap=new Map(GENRE_CLUSTERS.map(c=>([c.id,{cluster:c,genres:[],albumSet:new Set()}])));
  clusterMap.set('other',{cluster:{id:'other',label:'Other',icon:'🏷'},genres:[],albumSet:new Set()});
  for(const[genre,albums]of genreAlbums){
    const cid=clusterOf(genre);
    const entry=clusterMap.get(cid)||clusterMap.get('other');
    entry.genres.push(genre);
    for(const a of albums)entry.albumSet.add(a);
  }
  const result=[];
  for(const[,entry]of clusterMap){
    if(entry.albumSet.size<minAlbums)continue;
    result.push({cluster:entry.cluster,genres:entry.genres,albums:[...entry.albumSet]});
  }
  const order=GENRE_CLUSTERS.map(c=>c.id);
  result.sort((a,b)=>{const ia=order.indexOf(a.cluster.id),ib=order.indexOf(b.cluster.id);if(ia<0&&ib<0)return 0;if(ia<0)return 1;if(ib<0)return-1;return ia-ib;});
  return result;
}

/**
 * PHASE 3: Build a 2×2 collage card for a sub-genre.
 */
function _buildSubGenreMixCard(genre,albums,cluster){
  const shuffled=[...albums].sort(()=>Math.random()-.5).slice(0,4);
  const cells=shuffled.map(a=>{const url=getArt(a,'md')||getArt(a,'sm');return url?`<div class="gmix-collage-cell"><img src="${esc(url)}" alt="" loading="lazy"></div>`:`<div class="gmix-collage-cell gmix-collage-ph">${cluster?.icon||'🎵'}</div>`;});
  while(cells.length<4)cells.push(`<div class="gmix-collage-cell gmix-collage-ph">${cluster?.icon||'🎵'}</div>`);
  return`<div class="gmix-card" data-subgenre="${esc(genre)}">
    <div class="gmix-collage">${cells.join('')}<div class="gmix-overlay"><span class="gmix-overlay-label">${esc(genre)}</span></div></div>
    <div class="gmix-genre-name">${esc(genre)}</div>
    <div class="gmix-album-count">${albums.length} albums</div>
  </div>`;
}

/**
 * PHASE 3: Build a 2×2 collage card for an entire cluster (fallback).
 */
function _buildGenreMixCard(clusterData){
  const{cluster,albums}=clusterData;
  const shuffled=[...albums].sort(()=>Math.random()-.5).slice(0,4);
  const cells=shuffled.map(a=>{const url=getArt(a,'md')||getArt(a,'sm');return url?`<div class="gmix-collage-cell"><img src="${esc(url)}" alt="" loading="lazy"></div>`:`<div class="gmix-collage-cell gmix-collage-ph">${cluster.icon||'🎵'}</div>`;});
  while(cells.length<4)cells.push(`<div class="gmix-collage-cell gmix-collage-ph">${cluster.icon||'🎵'}</div>`);
  return`<div class="gmix-card" data-cluster-id="${esc(cluster.id)}">
    <div class="gmix-collage">${cells.join('')}<div class="gmix-overlay"><span class="gmix-overlay-icon">${cluster.icon||'🎵'}</span><span class="gmix-overlay-label">${esc(cluster.label)}</span></div></div>
    <div class="gmix-genre-name">${esc(cluster.label)}</div>
    <div class="gmix-album-count">${albums.length} albums</div>
  </div>`;
}

/**
 * PHASE 3: Build a rediscovery carousel card with "Last played X ago" badge.
 */
function _buildRediscoverCard(album,lastPlayedMs){
  const art=getArt(album,'md')||getArt(album,'lg');
  const artist=(album.artists||[]).map(a=>a.name).join(', ');
  const diff=Date.now()-lastPlayedMs;
  const days=Math.round(diff/86400000);
  const badge=days>=365?`${Math.floor(days/365)}yr ago`:days>=30?`${Math.floor(days/30)}mo ago`:`${days}d ago`;
  return`<div class="rediscover-card" data-redid="${esc(album.id)}">
    <div class="rediscover-art-wrap">
      ${art?`<img class="rediscover-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="rediscover-art-ph">🎵</div>`}
      <div class="rediscover-badge">${esc(badge)}</div>
    </div>
    <div class="rediscover-name">${esc(album.name)}</div>
    <div class="rediscover-artist">${esc(artist)}</div>
  </div>`;
}

/**
 * PHASE 3: Open a full-screen genre detail overlay.
 * Shows all albums in the cluster/sub-genre + random pick button.
 */
function openGenreDetail(clusterData){
  const{cluster,genres,albums}=clusterData;
  const overlay=document.createElement('div');
  overlay.className='genre-detail-bg';

  const albumGrid=()=>albums
    .slice().sort((a,b)=>a.name.localeCompare(b.name))
    .map(a=>{
      const art=getArt(a,'md');const artist=(a.artists||[]).map(ar=>ar.name).join(', ');
      return`<div class="genre-alb-card" data-albid="${esc(a.id)}">
        <div class="genre-alb-art-wrap">${art?`<img class="genre-alb-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="genre-alb-art-ph">🎵</div>`}</div>
        <div class="genre-alb-name">${esc(a.name)}</div>
        <div class="genre-alb-artist">${esc(artist)}</div>
      </div>`;
    }).join('');

  overlay.innerHTML=`<div class="genre-detail">
    <div class="genre-detail-hdr">
      <button class="genre-detail-back" id="gdBack">‹</button>
      <div>
        <div class="genre-detail-title">${cluster.icon||''} ${esc(cluster.label)}</div>
        <div class="genre-detail-meta">${albums.length} albums · ${genres.length} genre${genres.length!==1?'s':''}</div>
      </div>
    </div>
    <div class="genre-detail-actions">
      <button class="genre-pick-btn" id="gdPickBtn">🎲 Pick random</button>
      <div class="genre-pick-result" id="gdPickResult"><span style="font-size:12px;color:var(--text-dim)">Tap to pick a random album</span></div>
    </div>
    <div class="genre-detail-scroll">
      <div class="genre-album-grid" id="gdGrid">${albumGrid()}</div>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#gdBack').addEventListener('click',()=>overlay.remove());
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});

  overlay.querySelector('#gdPickBtn').addEventListener('click',()=>{
    const pick=albums[Math.floor(Math.random()*albums.length)];
    const art=getArt(pick,'sm')||getArt(pick,'md');
    const artist=(pick.artists||[]).map(a=>a.name).join(', ');
    overlay.querySelector('#gdPickResult').innerHTML=`<div class="genre-pick-now">
      ${art?`<img class="genre-pick-art" src="${esc(art)}" alt="">`:`<div class="genre-pick-art-ph">🎵</div>`}
      <div class="genre-pick-info">
        <div class="genre-pick-name">${esc(pick.name)}</div>
        <div class="genre-pick-artist">${esc(artist)}</div>
      </div>
    </div>`;
    overlay.querySelectorAll('.genre-alb-card').forEach(c=>{c.style.opacity=c.dataset.albid===pick.id?'1':'0.4';});
  });

  overlay.querySelector('#gdGrid').addEventListener('click',e=>{
    const card=e.target.closest('.genre-alb-card[data-albid]');
    if(!card)return;
    const a=allAlbums.find(x=>x.id===card.dataset.albid);
    if(a)openAlbumDetail(a);
  });
}

/**
 * PHASE 3: Render the full Discover tab — Rediscover carousel + Genre Mix carousels.
 * @param {HTMLElement} panel
 */
function renderDiscoverCarousels(panel){
  const hm=HistoryProvider.getMap();
  const hasGenres=allAlbums.some(a=>a._genres&&a._genres.length>0);

  // ── Header
  const hdr=document.createElement('div');
  hdr.className='disc-header';
  hdr.innerHTML=`<div class="disc-header-title">Discover</div>
    <div class="disc-header-sub">Explore your library by genre · revisit forgotten favourites</div>`;
  panel.appendChild(hdr);

  // ── Rediscover carousel (albums not played in 90+ days)
  const redAlbums=allAlbums
    .filter(a=>{const lh=hm.get(a.id);return lh&&(Date.now()-lh>90*86400000);})
    .sort((a,b)=>(hm.get(a.id)||0)-(hm.get(b.id)||0))
    .slice(0,40);

  if(redAlbums.length){
    const sec=document.createElement('div');sec.className='disc-section';
    const cards=redAlbums.map(a=>_buildRediscoverCard(a,hm.get(a.id))).join('');
    sec.innerHTML=`<div class="disc-section-hdr">
        <span class="disc-section-title"><span class="disc-section-icon">🕰️</span>Rediscover</span>
        <span class="disc-section-sub">${redAlbums.length} albums waiting</span>
      </div>
      <div class="carousel-wrap"><div class="carousel-track" id="redTrack">${cards}</div></div>`;
    panel.appendChild(sec);
    sec.querySelector('#redTrack').addEventListener('click',e=>{
      const c=e.target.closest('.rediscover-card[data-redid]');
      if(!c)return;const a=allAlbums.find(x=>x.id===c.dataset.redid);if(a)openAlbumDetail(a);
    });
  }

  // ── Genre Mix carousels — one per über-genre cluster
  if(!hasGenres){
    const el=document.createElement('div');el.className='disc-empty';
    el.innerHTML=`<div class="disc-empty-icon">🎵</div><div class="disc-empty-title">Genres loading…</div>
      <div class="disc-empty-sub">Genre mixes will appear once the background genre fetch completes. This can take a few minutes on large libraries.</div>`;
    panel.appendChild(el);return;
  }

  const clusters=_buildGenreClusters(4);
  if(!clusters.length){
    const el=document.createElement('div');el.className='disc-empty';
    el.innerHTML=`<div class="disc-empty-icon">🎸</div><div class="disc-empty-title">No genre clusters found</div>
      <div class="disc-empty-sub">Re-sync your library from the Profile tab to load genre data.</div>`;
    panel.appendChild(el);return;
  }

  for(const cd of clusters){
    const sec=document.createElement('div');sec.className='disc-section';
    // Build sub-genre cards — one card per sub-genre, sorted by album count
    const subGenres=cd.genres
      .map(g=>({genre:g,albums:allAlbums.filter(a=>(a._genres||[]).includes(g))}))
      .filter(sg=>sg.albums.length>=2)
      .sort((a,b)=>b.albums.length-a.albums.length)
      .slice(0,12);
    const mixCards=subGenres.length
      ?subGenres.map(sg=>_buildSubGenreMixCard(sg.genre,sg.albums,cd.cluster)).join('')
      :_buildGenreMixCard(cd);
    const trackId=`gmix_${cd.cluster.id}`;
    sec.innerHTML=`<div class="disc-section-hdr">
        <span class="disc-section-title"><span class="disc-section-icon">${cd.cluster.icon||'🎵'}</span>${esc(cd.cluster.label)}</span>
        <span class="disc-section-sub">${cd.albums.length} albums</span>
      </div>
      <div class="carousel-wrap"><div class="carousel-track" id="${trackId}">${mixCards}</div></div>`;
    panel.appendChild(sec);
    sec.querySelector('#'+trackId).addEventListener('click',e=>{
      const sg=e.target.closest('[data-subgenre]');
      if(sg){
        const genre=sg.dataset.subgenre;
        openGenreDetail({cluster:{id:cd.cluster.id,label:genre,icon:cd.cluster.icon},genres:[genre],albums:allAlbums.filter(a=>(a._genres||[]).includes(genre))});
        return;
      }
      const cc=e.target.closest('[data-cluster-id]');
      if(cc)openGenreDetail(cd);
    });
  }
}

/**
 * PHASE 3: Build a reusable horizontal carousel HTML string.
 * @param {string} title   section heading
 * @param {Array}  albums  albums to render
 * @param {string} [icon]  optional emoji

    <div class="carousel-wrap"><div class="carousel-track">${albums.slice(0,30).map(a=>_carCard(a,null)).join('')}</div></div>
  </div>`;
}
