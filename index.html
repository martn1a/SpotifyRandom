function buildCoverageHTML(cvg){
  const total=cvg.recent+cvg.longAgo+cvg.neverHeard||1;
  const fb=`<div class="freshness-bar"><div class="fresh-seg" style="flex:${cvg.recent/total};background:#4a90d9"></div><div class="fresh-seg" style="flex:${cvg.longAgo/total};background:#d4a574"></div><div class="fresh-seg" style="flex:${cvg.neverHeard/total};background:var(--border2)"></div></div><div class="fresh-legend"><div class="fresh-item"><div class="fresh-dot" style="background:#4a90d9"></div>Queued recently (${cvg.recent})</div><div class="fresh-item"><div class="fresh-dot" style="background:#d4a574"></div>Long ago (${cvg.longAgo})</div><div class="fresh-item"><div class="fresh-dot" style="background:var(--border3)"></div>Never heard (${cvg.neverHeard})</div></div>`;
  const body=`<div class="clps-inner"><div class="cvg-top"><span class="cvg-pct">${cvg.pct}%</span><span class="cvg-lbl">discovered</span></div>${fb}<div class="cvg-stat"><div class="cvg-stat-left"><span class="cvg-stat-icon">✦</span><div><div class="cvg-stat-lbl">Never heard</div><div class="cvg-stat-sub">${cvg.neverHeard} albums</div></div></div><button class="btn btn-sm" data-cvgfilter="unheard">Pick these</button></div><div class="cvg-stat"><div class="cvg-stat-left"><span class="cvg-stat-icon">🕰️</span><div><div class="cvg-stat-lbl">Heard long ago</div><div class="cvg-stat-sub">${cvg.longAgo} albums (6+ months)</div></div></div><button class="btn btn-sm" data-cvgfilter="longAgo">Pick these</button></div>${buildLibOv()}</div>`;
  return`<div class="card section"><div class="clps-trg" id="cvgTrg"><span style="font-family:var(--font-h);font-size:15px;font-weight:600">Library Coverage</span><span class="clps-arr${state.coverageOpen?' open':''}">▼</span></div><div class="clps-body${state.coverageOpen?' open':''}" id="cvgBody">${body}</div></div>`;
}

function buildLibOv(){
  if(!allAlbums.length)return'';
  const dc={};for(const a of allAlbums){const d=decadeOf(releaseYear(a));dc[d]=(dc[d]||0)+1;}
  const mxd=Math.max(...Object.values(dc));
  const decRows=['pre-70s','70s','80s','90s','00s','10s','20s'].filter(d=>dc[d]).map(d=>`<div class="bar-row"><span class="bar-lbl">${d}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(dc[d]/mxd*100)}%"></div></div><span class="bar-cnt">${dc[d]}</span></div>`).join('');
  const gc={};for(const a of allAlbums)for(const g of(a._genres||[]))gc[g]=(gc[g]||0)+1;
  const topG=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,7);const mxg=topG[0]?.[1]||1;
  const gRows=topG.map(([g,n])=>`<div class="bar-row"><span class="bar-lbl" style="width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g)}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/mxg*100)}%"></div></div><span class="bar-cnt">${n}</span></div>`).join('');
  return`<div class="ov-section"><p class="ov-title">By Decade</p>${decRows}</div>${topG.length?`<div class="ov-section"><p class="ov-title">Top Genres</p>${gRows}</div>`:''}`;
}

function buildAlbumListHTML(){
  const sorted=sortAlbums(state.selectedAlbums);
  const items=sorted.map((a,di)=>{
    const idx=state.selectedAlbums.indexOf(a);
    const art=getArt(a,'md');const artist=(a.artists||[]).map(ar=>ar.name).join(', ');
    const dur=Math.round(albumDurMin(a));const trk=a.tracks?.total||a.tracks?.items?.length||'?';
    const yr=releaseYear(a)||'';const addLbl=formatAddedAt(a._added_at);
    const gLbl=(a._genres||[]).slice(0,2).join(' · ');
    const lh=HistoryProvider.getMap().get(a.id);const heard=lh?(Date.now()-lh>180*86400000?'🕰️':'✓'):'';
    return`<div class="album-item" data-idx="${idx}"><span class="alb-num">${di+1}</span><div class="alb-art-wrap">${art?`<img src="${esc(art)}" alt="" loading="lazy">`:'<div class="alb-art-ph">🎵</div>'}</div><div class="alb-info"><div class="alb-name">${esc(a.name)}</div><div class="alb-artist">${esc(artist)}</div><div class="alb-meta">${yr?yr+' · ':''}${trk} tracks · ${dur} min ${heard}</div>${gLbl?`<div class="alb-meta" style="opacity:.7">${esc(gLbl)}</div>`:''}${addLbl?`<div class="alb-meta">${esc(addLbl)}</div>`:''}</div><button class="reroll-btn" data-reroll="${idx}" title="Swap this album">↻</button></div>`;
  }).join('');
  let status='';
  if(state.phase==='queuing')status=`<div class="status-msg inf" id="queueStatus">Queueing albums…</div>`;
  else if(state.phase==='done')status=`<div class="status-msg ok">✓ Albums queued in Spotify!</div>`;
  else if(state.phase==='error')status=`<div class="status-msg err" id="queueStatus">Error queueing albums</div>`;
  return`<div class="section" id="albumListWrap">${status}<div class="album-list" id="albumListInner">${items}</div>${state.phase!=='queuing'?`<button class="btn btn-primary btn-full queue-sel-btn" id="queueSelBtn" style="margin-top:12px;height:52px;font-size:14px;font-family:var(--font-h);font-weight:700;border-radius:var(--r-xl)">▶ Queue These Albums</button>`:''}</div>`;
}

function attachPickerEvents(panel){
  panel=panel||document.getElementById('tab-picker');if(!panel)return;
  const fa=state.filters;
  panel.querySelector('#fetchLibBtn')?.addEventListener('click',()=>handleRefresh());
  panel.querySelectorAll('.preset-btn[data-preset]').forEach(b=>b.addEventListener('click',e=>{
    // Don't trigger preset if user clicked the delete button inside
    if(e.target.dataset.delPreset)return;
    const id=b.dataset.preset;
    if(b.dataset.custom){
      // Apply custom preset
      const p=loadCustomPresets().find(x=>x.id===id);
      if(p){Object.assign(state.filters,JSON.parse(JSON.stringify(p.filters)));state.albumCount=p.albumCount||1;state.activePreset=id;saveSession();renderPickerContent(true);}
    } else {
      applyPreset(id);
    }
  }));
  // Delete custom preset
  panel.querySelectorAll('[data-del-preset]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();if(confirm('Delete this preset?'))deleteCustomPreset(b.dataset.delPreset);}));
  // Save current filters as preset
  panel.querySelector('#savePresetBtn')?.addEventListener('click',()=>openSavePresetDialog());
  panel.querySelectorAll('.count-btn[data-count]').forEach(b=>b.addEventListener('click',()=>{state.albumCount=+b.dataset.count;panel.querySelectorAll('.count-btn').forEach(x=>x.classList.toggle('active',+x.dataset.count===state.albumCount));saveSession();}));
  panel.querySelector('#queueBtn')?.addEventListener('click',handlePick);
  panel.querySelector('#queueSelBtn')?.addEventListener('click',handleQueue);
  panel.querySelector('#filtersTrg')?.addEventListener('click',()=>{state.filterOpen=!state.filterOpen;panel.querySelector('#filtersBody')?.classList.toggle('open',state.filterOpen);panel.querySelector('#filtersTrg .clps-arr')?.classList.toggle('open',state.filterOpen);saveSession();});
  panel.querySelectorAll('.fsub-trg[data-fsub]').forEach(t=>t.addEventListener('click',()=>{const id=t.dataset.fsub;const o=!state.filterSections[id];state.filterSections[id]=o;panel.querySelector(`#fsub-body-${id}`)?.classList.toggle('open',o);panel.querySelector(`#fsub-arr-${id}`)?.classList.toggle('open',o);saveSession();}));
  panel.querySelectorAll('.dec-chip[data-decade]').forEach(b=>b.addEventListener('click',()=>{const d=b.dataset.decade;const inc=fa.decades.includes(d),exc=fa.decadesExcl.includes(d);if(!inc&&!exc){fa.decades.push(d);b.classList.add('inc');b.title='Click to exclude';}else if(inc){fa.decades=fa.decades.filter(x=>x!==d);fa.decadesExcl.push(d);b.classList.replace('inc','exc');b.title='Click to reset';}else{fa.decadesExcl=fa.decadesExcl.filter(x=>x!==d);b.classList.remove('exc');b.title='Click to include';}state.activePreset=null;saveSession();}));
  panel.querySelectorAll('.gc-chip[data-cluster]').forEach(b=>b.addEventListener('click',e=>{
    // If user tapped the expand arrow, toggle expansion only
    if(e.target.dataset.expandCluster){e.stopPropagation();return;}
    const c=b.dataset.cluster;const i=fa.clusters.indexOf(c);if(i>=0)fa.clusters.splice(i,1);else fa.clusters.push(c);b.classList.toggle('active',fa.clusters.includes(c));state.activePreset=null;saveSession();
  }));
  // Expand/collapse cluster sub-genres
  panel.querySelectorAll('[data-expand-cluster]').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();const c=btn.dataset.expandCluster;
    if(state.expandedClusters.has(c))state.expandedClusters.delete(c);else state.expandedClusters.add(c);
    renderPickerContent();
  }));
  // Sub-genre chips
  panel.querySelectorAll('.sgchip[data-subgenre]').forEach(b=>b.addEventListener('click',()=>{
    const g=b.dataset.subgenre;const i=fa.genres.indexOf(g);if(i>=0)fa.genres.splice(i,1);else fa.genres.push(g);
    b.classList.toggle('sel',fa.genres.includes(g));state.activePreset=null;saveSession();renderPickerContent();
  }));
  const gs=panel.querySelector('#genreSearch');
  if(gs)gs.addEventListener('input',()=>{const q=gs.value.trim().toLowerCase();const res=panel.querySelector('#genreResults');if(!res)return;if(!q){res.innerHTML='';return;}const m=allGenres.filter(g=>g.toLowerCase().includes(q)).slice(0,30);res.innerHTML=m.map(g=>`<button class="gsr-chip${fa.genres.includes(g)?' sel':''}" data-genre="${esc(g)}">${esc(g)}</button>`).join('');res.querySelectorAll('.gsr-chip[data-genre]').forEach(b=>b.addEventListener('click',()=>{const g=b.dataset.genre;const i=fa.genres.indexOf(g);if(i>=0)fa.genres.splice(i,1);else fa.genres.push(g);b.classList.toggle('sel',fa.genres.includes(g));state.activePreset=null;saveSession();renderPickerContent();}));});
  panel.querySelectorAll('[data-remove-genre]').forEach(b=>b.addEventListener('click',()=>{fa.genres=fa.genres.filter(g=>g!==b.dataset.removeGenre);state.activePreset=null;saveSession();renderPickerContent();}));
  ['avoidRecentToggle','weightUnheardToggle','kwFilterToggle','browserModeToggle'].forEach(id=>{panel.querySelector('#'+id)?.addEventListener('change',e=>{if(id==='avoidRecentToggle')fa.avoidRecent=e.target.checked;if(id==='weightUnheardToggle')fa.weightUnheard=e.target.checked;if(id==='kwFilterToggle')fa.excludeKW=e.target.checked;if(id==='browserModeToggle')state.browserMode=e.target.checked;state.activePreset=null;saveSession();});});
  const minS=panel.querySelector('#minDur'),maxS=panel.querySelector('#maxDur');
  if(minS)minS.addEventListener('input',e=>{fa.minDur=+e.target.value;if(fa.minDur>fa.maxDur){fa.maxDur=fa.minDur;if(maxS)maxS.value=fa.maxDur;const el=panel.querySelector('#maxDurVal');if(el)el.textContent=fa.maxDur;}const el=panel.querySelector('#minDurVal');if(el)el.textContent=fa.minDur;state.activePreset=null;saveSession();});
  if(maxS)maxS.addEventListener('input',e=>{fa.maxDur=+e.target.value;if(fa.maxDur<fa.minDur){fa.minDur=fa.maxDur;if(minS)minS.value=fa.minDur;const el=panel.querySelector('#minDurVal');if(el)el.textContent=fa.minDur;}const el=panel.querySelector('#maxDurVal');if(el)el.textContent=fa.maxDur;state.activePreset=null;saveSession();});
  panel.querySelectorAll('input[name="ageFilter"]').forEach(r=>r.addEventListener('change',e=>{fa.minAgeMonths=+e.target.value;state.activePreset=null;saveSession();}));
  panel.querySelectorAll('input[name="queueHistory"]').forEach(r=>r.addEventListener('change',e=>{fa.queueHistory=e.target.value;state.activePreset=null;saveSession();}));
  // Phase 5: radar source filter
  panel.querySelectorAll('input[name="radarSource"]').forEach(r=>r.addEventListener('change',e=>{fa.radarSource=e.target.value;state.activePreset=null;saveSession();}));
  panel.querySelector('#cvgTrg')?.addEventListener('click',()=>{state.coverageOpen=!state.coverageOpen;panel.querySelector('#cvgBody')?.classList.toggle('open',state.coverageOpen);panel.querySelector('#cvgTrg .clps-arr')?.classList.toggle('open',state.coverageOpen);});
  panel.querySelectorAll('[data-cvgfilter]').forEach(b=>b.addEventListener('click',()=>{state.coverageFilter=b.dataset.cvgfilter;handlePick();}));

  attachAlbumListEvents(panel);
}

function attachAlbumListEvents(panel){
  panel=panel||document.getElementById('tab-picker');if(!panel)return;
  panel.querySelectorAll('.reroll-btn[data-reroll]').forEach(b=>b.addEventListener('click',e=>{if(state.isWorking)return;rerollAlbum(+e.currentTarget.dataset.reroll);}));
  panel.querySelectorAll('.album-item[data-idx]').forEach(item=>{
    let sx=0,sy=0,dr=false;
    item.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dr=true;},{passive:true});
    item.addEventListener('touchmove',e=>{if(!dr)return;const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(Math.abs(dy)>Math.abs(dx)+10){dr=false;item.classList.remove('swipe-ready');item.style.transform='';return;}if(dx<0)item.style.transform=`translateX(${dx}px)`;item.classList.toggle('swipe-ready',dx<-60);},{passive:true});
    item.addEventListener('touchend',e=>{if(!dr)return;dr=false;item.classList.remove('swipe-ready');const dx=e.changedTouches[0].clientX-sx;if(dx<-60&&!state.isWorking)rerollAlbum(+item.dataset.idx);else item.style.transform='';},{passive:true});
  });
}

async function handlePick(){
  if(state.isWorking||!allAlbums.length)return;
  state.isWorking=true;renderPickerContent();
  let pool=applyFilters(allAlbums);const hm=HistoryProvider.getMap();const now=Date.now();
  if(state.coverageFilter==='unheard'){pool=pool.filter(a=>!hm.has(a.id));state.coverageFilter=null;}
  else if(state.coverageFilter==='longAgo'){pool=pool.filter(a=>{const lh=hm.get(a.id);return!lh||now-lh>180*86400000;});state.coverageFilter=null;}
  if(!pool.length){state.isWorking=false;state.phase='idle';renderPickerContent();const p=document.getElementById('tab-picker');if(p){const m=document.createElement('div');m.className='status-msg err';m.textContent='No albums match the current filters. Try relaxing your criteria.';const b=p.querySelector('#queueBtn');if(b)b.insertAdjacentElement('beforebegin',m);setTimeout(()=>m.remove(),4000);}return;}
  state.selectedAlbums=state.filters.weightUnheard?weightedPick(pool,state.albumCount):plainPick(pool,state.albumCount);
  state.phase='picked';state.isWorking=false;renderPickerContent(true);
}

async function rerollAlbum(idx){
  if(state.isWorking)return;
  const pool=applyFilters(allAlbums).filter(a=>!state.selectedAlbums.includes(a));if(!pool.length)return;
  const[rep]=state.filters.weightUnheard?weightedPick(pool,1):plainPick(pool,1);
  const item=document.querySelector(`.album-item[data-idx="${idx}"]`);
  if(item){item.classList.add('swipe-exit');await sleep(200);}
  state.selectedAlbums[idx]=rep;
  const wrap=document.getElementById('albumListWrap');
  if(wrap){wrap.outerHTML=buildAlbumListHTML();const panel=document.getElementById('tab-picker');attachAlbumListEvents(panel);document.getElementById('queueSelBtn')?.addEventListener('click',handleQueue);const ni=document.querySelector(`.album-item[data-idx="${idx}"]`);if(ni)ni.classList.add('swipe-enter');}
}

async function handleQueue(){
  if(state.isWorking||!state.selectedAlbums.length)return;
  state.isWorking=true;state.phase='queuing';renderPickerContent();
  const delay=state.browserMode?DELAY_BROWSER_MS:DELAY_DESKTOP_MS;
  try{
    for(const album of state.selectedAlbums){
      const el=document.getElementById('queueStatus');if(el)el.textContent=`Queueing "${album.name}"…`;
      const tracks=await SpotifyAPI.getAlbumTracks(album);
      for(const t of tracks){await SpotifyAPI.addToQueue(t.uri);await sleep(delay);}
      await HistoryProvider.log(album.id,album.name);
    }
    state.phase='done';
  }catch(err){const el=document.getElementById('queueStatus');if(el)el.textContent=err.message;state.phase='error';}
  finally{state.isWorking=false;renderPickerContent();renderHdrBadge();}
}

async function handleRefresh(){
  if(state.isWorking)return;
  state.isWorking=true;state.loadingLibrary=true;state.phase='idle';state.selectedAlbums=[];
  renderPickerContent();
  try{
    allAlbums=await SpotifyAPI.fetchAllAlbums((loaded,total)=>{const el=document.getElementById('fetchProgress');if(el)el.textContent=`Fetching library… ${loaded} / ${total}`;});
    // Phase 6B: mark all fetched library albums as _inLibrary=true
    for(const a of allAlbums)a._inLibrary=true;
    state.cachedAt=Date.now();await Cache.saveLibrary();
    const syncBtn=document.getElementById('syncBtn');if(syncBtn)syncBtn.style.display='';
    renderHdrBadge();state.loadingLibrary=false;state.genresLoading=true;renderPickerContent();
    allGenres=await SpotifyAPI.fetchArtistGenres(allAlbums,(loaded,total)=>{['genreProgressWrap','genreProgressInner'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=`Genres… ${loaded} / ${total}`;});});
    state.genresLoading=false;await Cache.saveLibrary();
    
    // Reset browser tab so genre chips re-build with new data
    const lp=document.getElementById('tab-browser');if(lp)delete lp.dataset.libBuilt;
    renderPickerContent();
  }catch(err){
    state.loadingLibrary=false;state.genresLoading=false;
    const p=document.getElementById('tab-picker');if(p){const m=document.createElement('div');m.className='status-msg err';m.textContent=err.message;p.prepend(m);}
  }finally{state.isWorking=false;renderPickerContent();}
}

function openAlbumDetail(album){
  const art=getArt(album,'lg');const artist=(album.artists||[]).map(a=>a.name).join(', ');
  const yr=releaseYear(album)||'';const trk=album.tracks?.total||album.tracks?.items?.length||'?';
  const dur=Math.round(albumDurMin(album));const genres=(album._genres||[]).slice(0,4).join(' · ');
  const lh=HistoryProvider.getMap().get(album.id);const heard=lh?`Last queued ${formatAge(Date.now()-lh)}`:'Never queued';
  const modal=document.createElement('div');modal.className='modal-bg';
  modal.innerHTML=`<div class="modal"><div class="modal-handle"></div><div class="modal-body">${art?`<img class="modal-art" src="${esc(art)}" alt="">`:`<div class="modal-art-ph">🎵</div>`}<div class="modal-title">${esc(album.name)}</div><div class="modal-artist">${esc(artist)}</div><div class="modal-meta">${yr?yr+' · ':''}${trk} tracks · ${dur} min${genres?' · '+esc(genres):''}<br><span style="color:var(--blue)">${heard}</span></div><div class="modal-actions"><button class="btn btn-primary" id="mdlQueue">▶ Queue Album</button><div class="modal-actions-row2"><button class="btn" id="mdlSaveLater">🕐 Save for Later</button><button class="btn" id="mdlClose">Close</button></div></div></div></div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
  modal.querySelector('#mdlClose').addEventListener('click',()=>modal.remove());
  modal.querySelector('#mdlSaveLater').addEventListener('click',async()=>{
    const btn=modal.querySelector('#mdlSaveLater');btn.disabled=true;
    const alreadyIn=await ListenLater.has(album.id);
    if(alreadyIn){await ListenLater.remove(album.id);btn.textContent='🕐 Saved (tap to remove)';btn.textContent='Removed';_toast('Removed from Listen Later.');}
    else{await ListenLater.add(album);btn.textContent='✓ Saved!';_toast(`"${album.name}" saved for later.`);}
    setTimeout(()=>modal.remove(),1000);
  });
  // Check if already in listen later
  ListenLater.has(album.id).then(has=>{const b=modal.querySelector('#mdlSaveLater');if(b&&has)b.textContent='✓ Already saved';});
  modal.querySelector('#mdlQueue').addEventListener('click',async()=>{
    const btn=modal.querySelector('#mdlQueue');btn.disabled=true;btn.textContent='Queueing…';
    try{const delay=state.browserMode?DELAY_BROWSER_MS:DELAY_DESKTOP_MS;const tracks=await SpotifyAPI.getAlbumTracks(album);for(const t of tracks){await SpotifyAPI.addToQueue(t.uri);await sleep(delay);}await HistoryProvider.log(album.id,album.name);btn.textContent='✓ Queued!';setTimeout(()=>modal.remove(),1500);}
    catch(err){btn.disabled=false;btn.textContent='▶ Queue Album';alert(err.message);}
  });

/** Compute current and longest listening streak (days with ≥1 play). */
function _computeStreaks(){
  const dates=new Set();
  for(const[,t]of HistoryProvider.getMap()){
    const d=new Date(t);dates.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
  }
  if(!dates.size)return{currentStreak:0,longestStreak:0};
  const sorted=[...dates].sort();
  let longest=1,cur=1;
  for(let i=1;i<sorted.length;i++){
    const prev=new Date(sorted[i-1].replace(/-/g,'/')),curr=new Date(sorted[i].replace(/-/g,'/'));
    const diff=(curr-prev)/86400000;
    if(diff===1){cur++;longest=Math.max(longest,cur);}else{cur=1;}
  }
  // Check if streak extends to today/yesterday
  const lastDate=new Date(sorted[sorted.length-1].replace(/-/g,'/'));
  const today=new Date();today.setHours(0,0,0,0);
  const diffToday=(today-lastDate)/86400000;
  if(diffToday>1)cur=0;
  return{currentStreak:cur,longestStreak:longest};
}

}

// ═══════════════════════════════════════════════════════════════════
async function migrateFromLegacy(){
  try{
    const rawLib=localStorage.getItem('albumpick_library_v1');
    if(rawLib){const p=JSON.parse(rawLib);if(p?.albums?.length){const db=await DB.getDb();const ex=await db.get('library','main');if(!ex)await db.put('library',{cachedAt:p.cachedAt||Date.now(),genres:p.genres||[],albums:p.albums},'main');}localStorage.removeItem('albumpick_library_v1');}
    const rawHist=localStorage.getItem('albumpick_history_v1');
    if(rawHist){const e=JSON.parse(rawHist);if(Array.isArray(e)&&e.length){const db=await DB.getDb();const tx=db.transaction('history','readwrite');await Promise.all(e.filter(x=>x.id&&x.queuedAt).map(x=>tx.store.put({id:x.id,name:x.name||'',queuedAt:x.queuedAt})));await tx.done;}localStorage.removeItem('albumpick_history_v1');}
  }catch(e){console.warn('Legacy migration failed',e);}
}

(async function boot(){
  // Request persistent storage early
  navigator.storage?.persist?.().then(g=>console.log('Persistent storage:',g?'granted':'denied')).catch(()=>{});

  const params=new URLSearchParams(window.location.search);
  const code=params.get('code'),oState=params.get('state'),oError=params.get('error');

  if(oError){window.history.replaceState({},'',window.location.pathname);render();return;}

  if(code&&oState){
    if(Auth.isLoggedIn()){window.history.replaceState({},'',window.location.pathname);}
    else{try{await Auth.handleCallback(code,oState);}catch(err){window.history.replaceState({},'',window.location.pathname);render();document.getElementById('app').innerHTML+=`<div style="position:fixed;top:16px;left:16px;right:16px;background:rgba(217,83,74,.12);border:1px solid rgba(217,83,74,.3);color:#d95349;padding:12px 16px;border-radius:10px;font-size:13px;z-index:999">${esc(err.message)}</div>`;return;}}
  }

  await migrateFromLegacy();

  if(Auth.isLoggedIn()){
    await Promise.all([Cache.loadLibrary(),HistoryProvider.load(),HomeLayout.load()]);
    restoreSession();
    // Show sync button if library loaded
    if(allAlbums.length){const syncBtn=document.getElementById('syncBtn');if(syncBtn)syncBtn.style.display='';}
  }

  render();

  // Start Now Playing polling (every 15s while app is open)
  if(Auth.isLoggedIn()){
    pollNowPlaying();
    _npTimer=setInterval(pollNowPlaying,15000);
  }

  // Register service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW registration failed',e));
  }
})();

  return `<div class="car-card" data-carid="${esc(a.id)}">

/** Helper: attach click handlers to .car-card elements in a container */
function _attachCarouselClicks(container){

/** PHASE 2: Return albums added to library in last N days */
function getNewInLibrary(days=30){
  const cutoff=Date.now()-days*86400000;
  return allAlbums
    .filter(a=>a._added_at&&new Date(a._added_at).getTime()>cutoff)
    .sort((a,b)=>new Date(b._added_at).getTime()-new Date(a._added_at).getTime());
}

/** PHASE 2: Return albums not heard in >90 days (rediscover candidates) */
function getRediscoverAlbums(maxDays=90){
  const hm=HistoryProvider.getMap();const now=Date.now();const threshold=maxDays*86400000;
  return allAlbums
    .filter(a=>{const lh=hm.get(a.id);return lh&&(now-lh>threshold);})
    .sort((a,b)=>{
      const la=hm.get(a.id)||0,lb=hm.get(b.id)||0;
      return la-lb; // oldest-heard first
    });
}

/** PHASE 2: Build top albums list from combined sources.
 * @param {'4w'|'6m'|'all'|'app30d'|'appAll'} timeRange */
async function getTopAlbums(timeRange){
  const hm=HistoryProvider.getMap();const now=Date.now();
  let cutoff=0;
  if(timeRange==='app30d')cutoff=now-30*86400000;
  // Map history entries to albums
  const scored=new Map();
  for(const[id,queuedAt]of hm){
    if(cutoff&&queuedAt<cutoff)continue;
    const a=allAlbums.find(x=>x.id===id);if(!a)continue;
    const prev=scored.get(id)||{album:a,playCount:0,source:'app',lastPlayed:0};
    prev.playCount++;prev.lastPlayed=Math.max(prev.lastPlayed,queuedAt);
    scored.set(id,prev);
  }
  if(timeRange==='4w'||timeRange==='6m'||timeRange==='all'){
    // Fetch Spotify top tracks and map to albums
    try{
      const tRange=timeRange==='4w'?'short_term':timeRange==='6m'?'medium_term':'long_term';
      const data=await SpotifyAPI.get(`https://api.spotify.com/v1/me/top/tracks?limit=50&time_range=${tRange}`);
      for(const track of(data.items||[])){
        const albId=track.album?.id;if(!albId)continue;
        const a=allAlbums.find(x=>x.id===albId);if(!a)continue;
        const prev=scored.get(albId)||{album:a,playCount:0,source:'spotify',lastPlayed:0};
        prev.playCount++;if(prev.source==='app')prev.source='both';else prev.source='spotify';
        scored.set(albId,prev);
      }
    }catch(e){/* API not available, fall back to app history only */}
  }
  return [...scored.values()].sort((a,b)=>b.playCount-a.playCount).slice(0,30);
}

/** Fisher-Yates shuffle — returns new shuffled array, does not mutate */
function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

  const onKey=e=>{if(e.key==='Escape'){bg.remove();document.removeEventListener('keydown',onKey);}};

}

/** Deterministic seeded random (0–1) for daily pick */
function seededRandom(seed){const x=Math.sin(seed+1)*10000;return x-Math.floor(x);}

/** Daily Pick: deterministic per-day, prefers unheard albums added in last 12 months */
function loadDailyPick(){
  if(!allAlbums.length)return null;
  const hm=HistoryProvider.getMap();
  const oneYearAgo=Date.now()-365*86400000;
  const unheardRecent=allAlbums.filter(a=>{
    const addedOk=a._added_at&&new Date(a._added_at).getTime()>oneYearAgo;
    return addedOk&&!hm.has(a.id);
  });
  const pool=unheardRecent.length>0?unheardRecent:allAlbums;
  const seed=Math.floor(Date.now()/86400000);
  return pool[Math.floor(seededRandom(seed)*pool.length)];
}

/** Forgotten Gems: added 6+ months ago, never played — shuffled, max 15 */
function loadForgottenGems(){
  if(!allAlbums.length)return[];
  const hm=HistoryProvider.getMap();
  const sixMonthsAgo=Date.now()-6*30*86400000;
  const forgotten=allAlbums.filter(a=>{
    if(!a._added_at)return false;
    return new Date(a._added_at).getTime()<sixMonthsAgo&&!hm.has(a.id);
  });
  return shuffleArray(forgotten).slice(0,15);
}

/** On This Day: albums whose release_date matches today's month+day (any year) */
function loadOnThisDayAlbums(){
  if(!allAlbums.length)return[];
  const now=new Date();
  const todayM=now.getMonth()+1;
  const todayD=now.getDate();
  return allAlbums.filter(a=>{
    if(!a.release_date||a.release_date.length<10)return false;
    const parts=a.release_date.split('-');
    return parseInt(parts[1],10)===todayM&&parseInt(parts[2],10)===todayD;
  });
}

/** QID-005: Because You Played — unheard albums in same genre cluster as last queued */
function loadBecauseYouPlayed(){
  const last=getLastPlayedAlbum();
  if(!last)return{albums:[],refName:''};
  const hm=HistoryProvider.getMap();
  const firstGenre=(last._genres||[])[0];
  if(!firstGenre)return{albums:[],refName:''};
  const cluster=clusterOf(firstGenre);
  if(cluster==='other')return{albums:[],refName:''};
  const pool=allAlbums.filter(a=>{
    if(hm.has(a.id))return false; // already heard
    if(a.id===last.id)return false;
    const gs=a._genres||[];
    return gs.some(g=>clusterOf(g)===cluster);
  });
  if(pool.length<=3)return{albums:[],refName:''};
  return{albums:shuffleArray(pool).slice(0,10),refName:last.name};
}

/** Same Artist, Different Album — unheard albums by same artist(s) as current Random Pick */
function loadSameArtistAlbums(referenceAlbum){
  if(!referenceAlbum)return{albums:[],artistName:''};
  const hm=HistoryProvider.getMap();
  const artistIds=new Set((referenceAlbum.artists||[]).map(ar=>ar.id));
  const artistName=(referenceAlbum.artists||[])[0]?.name||'';
  const pool=allAlbums.filter(a=>{
    if(a.id===referenceAlbum.id)return false;
    if(hm.has(a.id))return false;
    return(a.artists||[]).some(ar=>artistIds.has(ar.id));
  });
  return{albums:shuffleArray(pool),artistName};
}

/** Added This Month, Last Year — albums added ±2 weeks around same month last year */
function loadAddedThisMonthLastYear(){
  if(!allAlbums.length)return[];
  const now=new Date();
  const targetStart=new Date(now.getFullYear()-1,now.getMonth()-1,now.getDate()).getTime();
  const targetEnd  =new Date(now.getFullYear()-1,now.getMonth()+1,now.getDate()).getTime();
  const pool=allAlbums.filter(a=>{
    if(!a._added_at)return false;
    const t=new Date(a._added_at).getTime();
    return t>=targetStart&&t<=targetEnd;
  });
  return shuffleArray(pool).slice(0,10);
}

/** Decade Roulette — 3 random unheard albums per decade */
function loadDecadeRoulette(){
  const hm=HistoryProvider.getMap();
  const DEC_ORDER=['pre-70s','70s','80s','90s','00s','10s','20s'];
  const byDecade={};
  for(const a of allAlbums){
    const d=decadeOf(releaseYear(a));
    if(!byDecade[d])byDecade[d]=[];
    byDecade[d].push(a);
  }
  const result=[];
  for(const dec of DEC_ORDER){
    const pool=(byDecade[dec]||[]);
    if(pool.length<3)continue;
    const picks=shuffleArray(pool).slice(0,3);
    result.push({decade:dec,albums:picks});
  }
  return result;
}

/** Almost Heard Everything — artists where 70%+ of their library albums are heard, show the rest */
function loadAlmostHeardEverything(){
  const hm=HistoryProvider.getMap();
  // Build per-artist album map
  const artistAlbums=new Map();
  for(const a of allAlbums){
    for(const ar of(a.artists||[])){
      if(!artistAlbums.has(ar.id))artistAlbums.set(ar.id,{name:ar.name,albums:[]});
      artistAlbums.get(ar.id).albums.push(a);
    }
  }
  const result=[];
  for(const[,{name,albums}]of artistAlbums){
    if(albums.length<2)continue; // need at least 2 to be meaningful
    const heard=albums.filter(a=>hm.has(a.id)).length;
    const pct=heard/albums.length;
    if(pct>=0.7&&pct<1.0){
      const missing=albums.filter(a=>!hm.has(a.id));
      if(missing.length>0)result.push({artistName:name,missing,heardPct:Math.round(pct*100),total:albums.length});
    }
  }
  // Sort by completion desc, take top 5 artists, flatten missing albums
  result.sort((a,b)=>b.heardPct-a.heardPct);
  return result.slice(0,5);
}

// ── Library state
const libState={
  search:'',
  activeCluster:null,   // null = All, string = über-genre id
  activeSubGenres:[],   // selected sub-genre strings
  albumTypes:[],        // 'album','single','compilation' — empty = all
  sortMode:'added',     // 'added'|'az'|'release'|'duration'|'mostplayed'|'lastplayed'
  page:1,
  PAGE_SIZE:50,
  // Phase 7B filters
  yearMin:1950,         // release year range
  yearMax:new Date().getFullYear(),
  moods:[],             // mood keys: energetic/relaxed/dark/uplifting/melancholic/focused
  heardStatus:'all',    // 'all'|'unheard'|'heard'
  addedWithin:'all',    // 'all'|'month'|'6months'|'year'
};

// Phase 7B: Mood → Genre mapping
const MOOD_TO_GENRES={
  energetic:['Electronic','Dance','Hip-Hop','Rock','Pop','Funk'],
  relaxed:['Jazz','Ambient','Lo-Fi','Soul','Classical','Indie','Folk'],
  dark:['Metal','Industrial','Dark Ambient','Trip-Hop','Synthwave','Goth'],
  uplifting:['Pop','Indie Pop','Indie Rock','Soul','R&B','Funk','Gospel'],
  melancholic:['Indie','Alternative','Emo','Singer-Songwriter','Blues','Soul'],
  focused:['Ambient','Post-Rock','Minimal','Classical','Lo-Fi Hip-Hop','Electronic'],
};
const MOOD_LABELS={energetic:'⚡ Energetic',relaxed:'😌 Relaxed',dark:'🌑 Dark',uplifting:'☀️ Uplifting',melancholic:'💧 Melancholic',focused:'🎯 Focused'};

/** Build over-genre counts from current library */
function _buildClusterCounts(){
  const counts=new Map();
  for(const a of allAlbums){
    const gs=a._genres||[];
    const clusters=new Set(gs.map(g=>clusterOf(g)));
    clusters.delete('other');
    for(const c of clusters){counts.set(c,(counts.get(c)||0)+1);}
  }
  return counts;
}

/** Get sub-genres for a cluster id, sorted by count */
function _subGenresForCluster(clusterId){
  const cluster=GENRE_CLUSTERS.find(c=>c.id===clusterId);if(!cluster)return[];
  const counts=new Map();
  for(const a of allAlbums){
    for(const g of(a._genres||[])){
      if(cluster.kw.some(k=>g.toLowerCase().includes(k))){
        counts.set(g,(counts.get(g)||0)+1);
      }
    }
  }
  return [...counts.entries()].sort((a,b)=>b[1]-a[1]).map(([g,n])=>({genre:g,count:n}));
}

/** Detect album_group / album_type from album name heuristics (Spotify doesn't return type in saved albums) */
function _guessAlbumType(a){
  const n=(a.name||'').toLowerCase();
  const t=a.tracks?.total||a.tracks?.items?.length||0;
  if(n.includes(' - single')||n.includes('(single)')||(t&&t<=3))return'single';
  if(n.includes('compilation')||n.includes(' - ep')||n.includes('(compilation)'))return'compilation';
  return'album';
}

/** Apply all library filters and return sorted albums */
function _applyLibFilters(){
  const q=libState.search.toLowerCase();
  const now=Date.now();
  const histMap=HistoryProvider.getMap();
  // Mood → genre expansion
  let moodGenres=null;
  if(libState.moods.length>0){
    moodGenres=new Set();
    for(const m of libState.moods)(MOOD_TO_GENRES[m]||[]).forEach(g=>moodGenres.add(g.toLowerCase()));
  }
  // addedWithin cutoff
  let addedCutoff=0;
  if(libState.addedWithin==='month')addedCutoff=now-30*86400000;
  else if(libState.addedWithin==='6months')addedCutoff=now-180*86400000;
  else if(libState.addedWithin==='year')addedCutoff=now-365*86400000;

  let result=allAlbums.filter(a=>{
    // text search
    if(q&&!a.name.toLowerCase().includes(q)&&!(a.artists||[]).some(ar=>ar.name.toLowerCase().includes(q)))return false;
    // genre cluster filter
    if(libState.activeCluster){
      const ag=a._genres||[];const ac=new Set(ag.map(g=>clusterOf(g)));
      if(!ac.has(libState.activeCluster))return false;
    }
    // sub-genre filter
    if(libState.activeSubGenres.length>0){
      const ag=a._genres||[];
      if(!libState.activeSubGenres.some(sg=>ag.includes(sg)))return false;
    }
    // album type
    if(libState.albumTypes.length>0){
      if(!libState.albumTypes.includes(_guessAlbumType(a)))return false;
    }
    // Phase 7B: year range
    const yr=releaseYear(a);
    if(yr&&(yr<libState.yearMin||yr>libState.yearMax))return false;
    // Phase 7B: mood (OR match against genres)
    if(moodGenres){
      const ag=(a._genres||[]).map(g=>g.toLowerCase());
      if(!ag.some(g=>moodGenres.has(g)))return false;
    }
    // Phase 7B: heard status
    if(libState.heardStatus==='heard'&&!histMap.has(a.id))return false;
    if(libState.heardStatus==='unheard'&&histMap.has(a.id))return false;
    // Phase 7B: added within
    if(addedCutoff>0){
      const addedMs=a._added_at?new Date(a._added_at).getTime():0;
      if(addedMs<addedCutoff)return false;
    }
    return true;
  });
  // sort
  if(libState.sortMode==='az'){result.sort((a,b)=>a.name.localeCompare(b.name));}
  else if(libState.sortMode==='za'){result.sort((a,b)=>b.name.localeCompare(a.name));}
  else if(libState.sortMode==='release'){result.sort((a,b)=>releaseYear(b)-releaseYear(a));}
  else if(libState.sortMode==='oldest'){result.sort((a,b)=>releaseYear(a)-releaseYear(b));}
  else if(libState.sortMode==='duration'){result.sort((a,b)=>albumDurMin(b)-albumDurMin(a));}
  else if(libState.sortMode==='mostplayed'){
    result.sort((a,b)=>{
      // count plays from histMap (value is last-played timestamp, use presence for count)
      const pa=histMap.has(a.id)?1:0;const pb=histMap.has(b.id)?1:0;
      return pb-pa;
    });
  }
  else if(libState.sortMode==='lastplayed'){
    result.sort((a,b)=>{
      const ta=histMap.get(a.id)||0;const tb=histMap.get(b.id)||0;
      if(!ta&&!tb)return 0;if(!ta)return 1;if(!tb)return-1;return tb-ta;
    });
  }
  else{// added (recently added first)
    result.sort((a,b)=>{const ta=a._added_at?new Date(a._added_at).getTime():0;const tb=b._added_at?new Date(b._added_at).getTime():0;return tb-ta;});
  }
  return result;
}

/** Render the album grid portion */
function _renderLibGrid(container,albums){
  const content=container.querySelector('#libContent');if(!content)return;
  const total=albums.length;const show=albums.slice(0,libState.page*libState.PAGE_SIZE);
  const countEl=content.querySelector('.lib-count');if(countEl)countEl.textContent=`${total} album${total!==1?'s':''}`;
  const grid=content.querySelector('#libGrid2');if(!grid)return;
  if(!show.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text-dim)">${allAlbums.length?'No albums match your filters':'Library not loaded — go to Picker to sync.'}</div>`;
    const lm=content.querySelector('.lib-load-more');if(lm)lm.remove();return;
  }
  grid.innerHTML=show.map((a,i)=>{
    const art=getArt(a,'md')||getArt(a,'lg');const artist=(a.artists||[]).map(ar=>ar.name).join(', ');
    return`<div class="alb-grid-item" data-libid="${esc(a.id)}" style="animation-delay:${Math.min(i*15,300)}ms">
      ${art?`<img class="alb-grid-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="alb-grid-art-ph">🎵</div>`}
      <div class="alb-grid-info"><div class="alb-grid-name">${esc(a.name)}</div><div class="alb-grid-artist">${esc(artist)}</div></div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.alb-grid-item').forEach(item=>item.addEventListener('click',()=>{const a=allAlbums.find(x=>x.id===item.dataset.libid);if(a)openAlbumDetail(a);}));
  // Load more button
  let lm=content.querySelector('.lib-load-more');
  if(show.length<total){
    if(!lm){lm=document.createElement('button');lm.className='lib-load-more';lm.textContent=`Load more (${total-show.length} remaining)`;lm.addEventListener('click',()=>{libState.page++;_renderLibGrid(container,albums);});content.appendChild(lm);}
    else{lm.textContent=`Load more (${total-show.length} remaining)`;}
  }else if(lm){lm.remove();}
}

/** Render the compact active-filter chips below the search bar */
function _renderLibActiveChips(panel){
  const row=panel.querySelector('#libActiveChips');
  // Filter btn lives in brw-header (parent of .lib-view-container)
  const btn=panel.querySelector('#libFilterBtn')||panel.closest('.tab-panel')?.querySelector('#brwFilterBtn');
  if(!row)return;

  const chips=[];
  if(libState.activeCluster){
    const c=GENRE_CLUSTERS.find(x=>x.id===libState.activeCluster);
    if(c)chips.push({label:`${c.icon} ${c.label}`,cls:'',action:()=>{libState.activeCluster=null;libState.activeSubGenres=[];libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  for(const g of libState.activeSubGenres){
    chips.push({label:g,cls:'',action:()=>{libState.activeSubGenres=libState.activeSubGenres.filter(x=>x!==g);libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  for(const t of libState.albumTypes){
    const lbl={album:'Album',single:'Single / EP',compilation:'Compilation'}[t]||t;
    chips.push({label:lbl,cls:'type-chip',action:()=>{libState.albumTypes=libState.albumTypes.filter(x=>x!==t);libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  if(libState.sortMode!=='added'){
    const lbl={az:'A–Z',za:'Z–A',release:'Newest',oldest:'Oldest',duration:'Duration',mostplayed:'Most Played',lastplayed:'Last Played'}[libState.sortMode]||libState.sortMode;
    chips.push({label:`↕ ${lbl}`,cls:'sort-chip',action:()=>{libState.sortMode='added';libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  // Phase 7B chips
  const curYear=new Date().getFullYear();
  if(libState.yearMin!==1950||libState.yearMax!==curYear){
    chips.push({label:`📅 ${libState.yearMin}–${libState.yearMax}`,cls:'',action:()=>{libState.yearMin=1950;libState.yearMax=curYear;libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  for(const m of libState.moods){
    chips.push({label:MOOD_LABELS[m]||m,cls:'',action:()=>{libState.moods=libState.moods.filter(x=>x!==m);libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  if(libState.heardStatus!=='all'){
    const lbl={heard:'👂 Heard',unheard:'🆕 Unheard'}[libState.heardStatus];
    chips.push({label:lbl,cls:'type-chip',action:()=>{libState.heardStatus='all';libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  if(libState.addedWithin!=='all'){
    const lbl={month:'Added: Month',['6months']:'Added: 6 Mo',year:'Added: Year'}[libState.addedWithin];
    chips.push({label:lbl,cls:'sort-chip',action:()=>{libState.addedWithin='all';libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }

  const count=chips.length;
  if(count>0){
    btn.classList.add('has-filters');
    btn.innerHTML=`⚙ Filter <span class="lib-filter-badge">${count}</span>`;
  }else{
    btn.classList.remove('has-filters');
    btn.innerHTML='⚙ Filter';
  }

  if(!chips.length){row.style.display='none';row.innerHTML='';return;}
  row.style.display='flex';
  row.innerHTML=chips.map((c,i)=>`<button class="lib-active-chip ${c.cls}" data-chipidx="${i}">${esc(c.label)} <span class="x">✕</span></button>`).join('');
  row.querySelectorAll('[data-chipidx]').forEach(b=>b.addEventListener('click',()=>chips[+b.dataset.chipidx].action()));
}

/** Open the filter bottom sheet */

  sheet.className='lib-sheet';

    const genreChips=GENRE_CLUSTERS.map(c=>{

      const active=libState.activeCluster===c.id;
      return`<button class="lib-genre-chip${active?' active':''}" data-shcluster="${c.id}"><span class="chip-icon">${c.icon}</span>${c.label}<span class="chip-cnt">${cnt}</span></button>`;
    }).join('');

    const sortChips=[['added','Recently Added'],['release','Newest First'],['oldest','Oldest First'],['az','A–Z'],['za','Z–A'],['mostplayed','Most Played'],['lastplayed','Last Played']].map(([v,l])=>`<button class="lib-sort-chip${libState.sortMode===v?' active':''}" data-shsort="${v}">${l}</button>`).join('');

    // Phase 7B: Year range
    const yearHTML=`<div class="lib-sh-range-wrap">
      <div class="lib-sh-range-row"><span class="lib-sh-range-lbl">Von</span><input type="range" min="1950" max="${curYear}" value="${libState.yearMin}" data-shyear="min"><span class="lib-sh-range-val" id="shYearMinVal">${libState.yearMin}</span></div>
      <div class="lib-sh-range-row"><span class="lib-sh-range-lbl">Bis</span><input type="range" min="1950" max="${curYear}" value="${libState.yearMax}" data-shyear="max"><span class="lib-sh-range-val" id="shYearMaxVal">${libState.yearMax}</span></div>
    </div>`;

    // Phase 7B: Mood chips
    const moodHTML=Object.entries(MOOD_LABELS).map(([k,l])=>`<button class="lib-mood-chip${libState.moods.includes(k)?' active':''}" data-shmood="${k}">${l}</button>`).join('');

    // Phase 7B: Heard status radios
    const heardHTML=[['all','Alle'],['unheard','🆕 Ungehört'],['heard','👂 Gehört']].map(([v,l])=>`<label class="lib-sh-radio-row"><input type="radio" name="shheard" value="${v}"${libState.heardStatus===v?' checked':''}><span>${l}</span></label>`).join('');

    // Phase 7B: Added within radios
    const addedHTML=[['all','Alles'],['month','Letzter Monat'],['6months','Letzte 6 Monate'],['year','Letztes Jahr']].map(([v,l])=>`<label class="lib-sh-radio-row"><input type="radio" name="shadded" value="${v}"${libState.addedWithin===v?' checked':''}><span>${l}</span></label>`).join('');

    return`

          <div class="lib-sh-sec-title">📅 Erscheinungsjahr</div>
          ${yearHTML}

        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">😊 Stimmung</div>
          <div class="lib-mood-chips">${moodHTML}</div>
        </div>
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">🎸 Genre</div>
          <div class="lib-genre-wrap">${genreChips}</div>
          ${subHTML}

        <div class="lib-sh-sec">

  function refreshSheet(){sheet.innerHTML=_buildSheetHTML();attachSheetEvents();}

  function closeSheet(){
    sheetBg.style.animation='fadein .18s ease reverse';
    sheet.style.animation='slideup .18s cubic-bezier(.32,1,.56,1) reverse';
    setTimeout(()=>sheetBg.remove(),180);
    _renderLibActiveChips(panel);
    const albums=_applyLibFilters();_renderLibGrid(panel,albums);
  }

  function attachSheetEvents(){
    const curYear=new Date().getFullYear();
    sheet.querySelector('#sheetReset')?.addEventListener('click',()=>{
      libState.activeCluster=null;libState.activeSubGenres=[];libState.albumTypes=[];libState.sortMode='added';libState.page=1;
      libState.yearMin=1950;libState.yearMax=curYear;libState.moods=[];libState.heardStatus='all';libState.addedWithin='all';
      refreshSheet();
    });
    sheet.querySelectorAll('[data-shcluster]').forEach(b=>b.addEventListener('click',()=>{
      const id=b.dataset.shcluster;
      if(libState.activeCluster===id){libState.activeCluster=null;libState.activeSubGenres=[];}
      else{libState.activeCluster=id;libState.activeSubGenres=[];}
      libState.page=1;refreshSheet();
    }));
    sheet.querySelectorAll('[data-shsubgenre]').forEach(b=>b.addEventListener('click',()=>{
      const g=b.dataset.shsubgenre;
      const idx=libState.activeSubGenres.indexOf(g);
      if(idx>=0)libState.activeSubGenres.splice(idx,1);else libState.activeSubGenres.push(g);
      libState.page=1;refreshSheet();
    }));
    sheet.querySelectorAll('[data-shtype]').forEach(b=>b.addEventListener('click',()=>{
      const t=b.dataset.shtype;const idx=libState.albumTypes.indexOf(t);
      if(idx>=0)libState.albumTypes.splice(idx,1);else libState.albumTypes.push(t);
      libState.page=1;refreshSheet();
    }));
    sheet.querySelectorAll('[data-shsort]').forEach(b=>b.addEventListener('click',()=>{
      libState.sortMode=b.dataset.shsort;libState.page=1;refreshSheet();
    }));
    // Phase 7B events
    sheet.querySelectorAll('[data-shyear]').forEach(inp=>inp.addEventListener('input',()=>{
      const v=+inp.value;
      if(inp.dataset.shyear==='min'){
        libState.yearMin=Math.min(v,libState.yearMax);
        const el=sheet.querySelector('#shYearMinVal');if(el)el.textContent=libState.yearMin;
        inp.value=libState.yearMin;
      } else {
        libState.yearMax=Math.max(v,libState.yearMin);
        const el=sheet.querySelector('#shYearMaxVal');if(el)el.textContent=libState.yearMax;
        inp.value=libState.yearMax;
      }
      libState.page=1;
    }));
    sheet.querySelectorAll('[data-shmood]').forEach(b=>b.addEventListener('click',()=>{
      const m=b.dataset.shmood;const idx=libState.moods.indexOf(m);
      if(idx>=0)libState.moods.splice(idx,1);else libState.moods.push(m);
      libState.page=1;b.classList.toggle('active',libState.moods.includes(m));
    }));
    sheet.querySelectorAll('input[name=shheard]').forEach(r=>r.addEventListener('change',()=>{
      libState.heardStatus=r.value;libState.page=1;
    }));
    sheet.querySelectorAll('input[name=shadded]').forEach(r=>r.addEventListener('change',()=>{
      libState.addedWithin=r.value;libState.page=1;
    }));
  }

  sheet.innerHTML=_buildSheetHTML();
  attachSheetEvents();
  sheetBg.appendChild(sheet);
  document.body.appendChild(sheetBg);
  sheetBg.addEventListener('click',e=>{if(e.target===sheetBg)closeSheet();});

  // Swipe-down-to-close
  let startY=0,dragging=false;
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dragging=true;},{passive:true});
  sheet.addEventListener('touchmove',e=>{if(!dragging)return;const dy=e.touches[0].clientY-startY;if(dy>0)sheet.style.transform=`translateY(${dy}px)`;},{passive:true});
  sheet.addEventListener('touchend',e=>{if(!dragging)return;dragging=false;const dy=e.changedTouches[0].clientY-startY;if(dy>80)closeSheet();else sheet.style.transform='';},{passive:true});
}

// ── Listen Later sort state ────────────────────────────────────────
const llState={sort:'date'}; // 'date' | 'artist' | 'name'

/** PHASE 4: Render Listen Later management view inside Library tab.
 *  Sort by: date added, artist, album name.
 *  Actions: Play, Queue, Remove. */
async function renderListenLaterView(container){
  container.innerHTML='<div style="text-align:center;padding:32px"><span style="color:var(--text-dim)">Loading…</span></div>';
  let items=[];
  try{items=await ListenLater.getAll();}catch(e){container.innerHTML='<div class="ll-empty"><div class="ll-empty-icon">⚠️</div><div class="ll-empty-title">Could not load list</div></div>';return;}

  // Sort
  const sorted=[...items];
  if(llState.sort==='date')sorted.sort((a,b)=>b.addedAt-a.addedAt);
  else if(llState.sort==='artist')sorted.sort((a,b)=>(a.artist||'').localeCompare(b.artist||''));
  else if(llState.sort==='name')sorted.sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  container.innerHTML='';

  // Sort chips
  const sortRow=document.createElement('div');sortRow.className='ll-sort-row';
  [['date','Date added'],['artist','Artist'],['name','Album name']].forEach(([k,l])=>{
    const c=document.createElement('button');c.className='ll-sort-chip'+(llState.sort===k?' active':'');
    c.textContent=l;c.addEventListener('click',()=>{llState.sort=k;renderListenLaterView(container);});
    sortRow.appendChild(c);
  });
  container.appendChild(sortRow);

  if(!sorted.length){
    const emp=document.createElement('div');emp.className='ll-empty';
    emp.innerHTML='<div class="ll-empty-icon">🕐</div><div class="ll-empty-title">Nothing saved yet</div><div style="font-size:12px;margin-top:6px">Tap "Save for later" on any album to add it here.</div>';
    container.appendChild(emp);return;
  }

  const countEl=document.createElement('div');
  countEl.style.cssText='font-size:11px;color:var(--text-dim);margin-bottom:8px;padding:0 2px';
  countEl.textContent=`${sorted.length} album${sorted.length!==1?'s':''}`;
  container.appendChild(countEl);

  const listEl=document.createElement('div');listEl.className='card';
  for(const item of sorted){
    const row=document.createElement('div');row.className='ll-item';
    const addedLbl=item.addedAt?`Added ${_formatShortDate(item.addedAt)}`:'';
    const artHTML=item.art
      ?`<img class="ll-art" src="${esc(item.art)}" alt="" loading="lazy">`
      :`<div class="ll-art-ph">🎵</div>`;
    row.innerHTML=`${artHTML}<div class="ll-info"><div class="ll-name">${esc(item.name||'')}</div><div class="ll-artist">${esc(item.artist||'')}</div>${addedLbl?`<div class="ll-date">${addedLbl}</div>`:''}</div><div class="ll-actions"><button class="ll-btn ll-btn-play" data-ll-play="${esc(item.id)}" title="Queue & play">▶ Play</button><button class="ll-btn ll-btn-remove" data-ll-remove="${esc(item.id)}" title="Remove">✕</button></div>`;
    listEl.appendChild(row);
  }
  container.appendChild(listEl);

  // Events
  listEl.addEventListener('click',async e=>{
    const playBtn=e.target.closest('[data-ll-play]');
    const remBtn=e.target.closest('[data-ll-remove]');
    if(playBtn){
      const id=playBtn.dataset.llPlay;
      const item=items.find(x=>x.id===id);if(!item)return;
      const album=item.albumRef||allAlbums.find(a=>a.id===id);
      if(!album){_toast('Album not in library — please re-sync.',true);return;}
      playBtn.disabled=true;playBtn.textContent='…';
      try{
        const delay=state.browserMode?DELAY_BROWSER_MS:DELAY_DESKTOP_MS;
        const tracks=await SpotifyAPI.getAlbumTracks(album);
        for(const t of tracks){await SpotifyAPI.addToQueue(t.uri);await sleep(delay);}
        await HistoryProvider.log(album.id,album.name);
        playBtn.textContent='✓';_toast(`Queued "${album.name}"`);
        renderHdrBadge();
      }catch(err){playBtn.disabled=false;playBtn.textContent='▶ Play';_toast(err.message,true);}
    }
    if(remBtn){
      const id=remBtn.dataset.llRemove;
      await ListenLater.remove(id);
      renderListenLaterView(container);
    }
  });
}

/** PHASE 4: Full-text search across albums, artists, genres.
 *  Real-time results as user types with 200ms debounce. */
let _srchScope='all'; // 'all' | 'albums' | 'artists' | 'genres'
let _srchTimer=null;

function renderSearchView(container, initialQuery){
  container.innerHTML='';

  const inputWrap=document.createElement('div');inputWrap.className='srch-input-wrap';
  inputWrap.innerHTML=`<span class="srch-icon">🔍</span><input class="srch-input" id="srchInput" type="search" placeholder="Search albums, artists, genres…" autocomplete="off" spellcheck="false" value="${esc(initialQuery||'')}"><button class="srch-clear${initialQuery?' vis':''}" id="srchClear">✕</button>`;
  container.appendChild(inputWrap);

  // Scope tabs
  const tabsEl=document.createElement('div');tabsEl.className='srch-tabs';
  [['all','All'],['albums','Albums'],['artists','Artists'],['genres','Genres']].forEach(([k,l])=>{
    const b=document.createElement('button');b.className='srch-tab'+(_srchScope===k?' active':'');
    b.textContent=l;b.addEventListener('click',()=>{_srchScope=k;tabsEl.querySelectorAll('.srch-tab').forEach(x=>x.classList.toggle('active',x.textContent===l));_doSearch();});
    tabsEl.appendChild(b);
  });
  container.appendChild(tabsEl);

  const resultsEl=document.createElement('div');resultsEl.id='srchResults';container.appendChild(resultsEl);

  const inp=container.querySelector('#srchInput');
  const clearBtn=container.querySelector('#srchClear');

  inp.addEventListener('input',()=>{
    clearBtn.classList.toggle('vis',inp.value.length>0);
    clearTimeout(_srchTimer);_srchTimer=setTimeout(_doSearch,200);
  });
  clearBtn.addEventListener('click',()=>{inp.value='';clearBtn.classList.remove('vis');_renderSearchResults(resultsEl,'',_srchScope);inp.focus();});

  function _doSearch(){_renderSearchResults(resultsEl,inp.value.trim(),_srchScope);}

  // Initial render
  if(initialQuery){_renderSearchResults(resultsEl,initialQuery,_srchScope);}
  else{_renderSearchPlaceholder(resultsEl);}

  // Focus input
  setTimeout(()=>inp.focus(),80);
}

function _renderSearchPlaceholder(el){
  el.innerHTML=`<div class="srch-empty"><div class="srch-empty-icon">🔍</div><div style="font-size:14px;color:var(--text-mid);font-weight:500;margin-bottom:6px">Search your library</div><div style="font-size:12px;color:var(--text-dim)">Albums · Artists · Genres</div></div>`;
}

function _renderSearchResults(el,q,scope){
  if(!q){_renderSearchPlaceholder(el);return;}
  if(!allAlbums.length){el.innerHTML=`<div class="srch-empty"><div class="srch-empty-icon">📚</div><div style="font-size:14px;color:var(--text-mid)">Library not loaded</div></div>`;return;}

  const ql=q.toLowerCase();
  const results=[];

  // Match albums by title
  if(scope==='all'||scope==='albums'){
    for(const a of allAlbums){
      if(a.name.toLowerCase().includes(ql)){
        results.push({type:'album',score:a.name.toLowerCase().startsWith(ql)?2:1,album:a,label:a.name,sub:(a.artists||[]).map(x=>x.name).join(', ')});
      }
    }
  }

  // Match by artist name (collect unique artists, link to albums)
  if(scope==='all'||scope==='artists'){
    const artistMap=new Map();
    for(const a of allAlbums){
      for(const ar of(a.artists||[])){
        if(ar.name.toLowerCase().includes(ql)){
          if(!artistMap.has(ar.id))artistMap.set(ar.id,{name:ar.name,albums:[],id:ar.id});
          artistMap.get(ar.id).albums.push(a);
        }
      }
    }
    for(const[,ar]of artistMap){
      results.push({type:'artist',score:ar.name.toLowerCase().startsWith(ql)?3:1.5,label:ar.name,sub:`${ar.albums.length} album${ar.albums.length!==1?'s':''}`,art:ar.albums[0]?getArt(ar.albums[0],'sm'):null,albums:ar.albums});
    }
  }

  // Match by genre
  if(scope==='all'||scope==='genres'){
    const genreMap=new Map();
    for(const a of allAlbums){
      for(const g of(a._genres||[])){
        if(g.toLowerCase().includes(ql)){
          if(!genreMap.has(g))genreMap.set(g,[]);
          genreMap.get(g).push(a);
        }
      }
    }
    for(const[g,albums]of genreMap){
      results.push({type:'genre',score:g.toLowerCase().startsWith(ql)?2.5:1,label:g,sub:`${albums.length} album${albums.length!==1?'s':''}`,albums});
    }
  }

  results.sort((a,b)=>b.score-a.score||a.label.localeCompare(b.label));

  if(!results.length){
    el.innerHTML=`<div class="srch-empty"><div class="srch-empty-icon">🔍</div><div style="font-size:14px;color:var(--text-mid)">No results for "${esc(q)}"</div></div>`;
    return;
  }

  const count=document.createElement('div');count.className='srch-result-count';count.textContent=`${results.length} result${results.length!==1?'s':''}`;
  el.innerHTML='';el.appendChild(count);

  const list=document.createElement('div');
  for(const r of results.slice(0,80)){
    const item=document.createElement('div');item.className='srch-item';
    const hl=(s)=>s.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<span class="srch-hl">$1</span>');
    let artHTML='',badge='';
    if(r.type==='album'){const art=getArt(r.album,'sm');artHTML=art?`<img class="srch-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="srch-art-ph">🎵</div>`;badge=`<span class="srch-badge">Album</span>`;}
    else if(r.type==='artist'){artHTML=r.art?`<img class="srch-art" src="${esc(r.art)}" alt="" loading="lazy">`:`<div class="srch-art-ph">👤</div>`;badge=`<span class="srch-badge">Artist</span>`;}
    else if(r.type==='genre'){artHTML=`<div class="srch-art-ph">🏷</div>`;badge=`<span class="srch-badge">Genre</span>`;}
    item.innerHTML=`${artHTML}<div class="srch-info"><div class="srch-name">${hl(esc(r.label))}</div><div class="srch-sub">${esc(r.sub||'')}</div></div>${badge}`;
    item.addEventListener('click',()=>{
      if(r.type==='album')openAlbumDetail(r.album);
      else if(r.type==='artist'||r.type==='genre'){
        const albums=r.albums||[];
        if(!albums.length)return;
        openPlaylistModal(r.label,albums,r.type==='artist'?'👤':'🏷');
      }
    });
    list.appendChild(item);
  }
  el.appendChild(list);
}

/** Helper: format a Unix-ms timestamp as a short date string. */
function _formatShortDate(ms){
  const d=new Date(ms);const now=new Date();
  const diffMs=now-d;const diffDays=Math.floor(diffMs/86400000);
  if(diffDays===0)return'today';if(diffDays===1)return'yesterday';
  if(diffDays<7)return`${diffDays} days ago`;
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:d.getFullYear()!==now.getFullYear()?'numeric':undefined});
}

async function addToListenLater(album){await ListenLater.add(album);}
