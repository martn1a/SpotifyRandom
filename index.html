<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Album Discovery</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#1e1e1e;--surface:#252525;--surface2:#2c2c2c;--surface3:#343434;
      --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--border3:rgba(255,255,255,.20);
      --text:#f0ede8;--text-mid:#a8a4a0;--text-dim:#686460;
      --blue:#4a90d9;--blue-dk:#357ab8;--blue-glow:rgba(74,144,217,.13);
      --warm:#d4a574;--error:#d95349;
      --font-h:'Outfit',-apple-system,sans-serif;--font-b:'DM Sans',-apple-system,sans-serif;
      --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;--r-f:9999px;
      --sh-sm:0 2px 8px rgba(0,0,0,.40);--sh-md:0 4px 20px rgba(0,0,0,.50);--sh-lg:0 8px 40px rgba(0,0,0,.65);
      --tab-h:64px;--hdr-h:52px;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;
      line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.8px;color:var(--text-mid)}
    /* App Shell */
    #app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
    #appHdr{height:var(--hdr-h);display:flex;align-items:center;justify-content:space-between;
      padding:0 16px;border-bottom:1px solid var(--border);background:rgba(26,26,26,.94);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;z-index:50}
    .logo{font-family:var(--font-h);font-size:19px;font-weight:700;letter-spacing:-.3px;user-select:none}
    .logo span{color:var(--blue)}
    .hdr-right{display:flex;align-items:center;gap:10px}
    .hdr-badge{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:5px}
    .hdr-badge-bar{width:32px;height:3px;background:var(--border2);border-radius:var(--r-f);overflow:hidden}
    .hdr-badge-fill{height:100%;background:var(--blue);border-radius:var(--r-f)}
    #tabContent{flex:1;overflow:hidden;position:relative}
    .tab-panel{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
      padding:16px 16px calc(var(--tab-h) + 16px);display:none;
      -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
    .tab-panel.active{display:block}
    /* Tab Bar */
    #tabBar{height:var(--tab-h);display:flex;align-items:stretch;border-top:1px solid var(--border);
      background:rgba(22,22,22,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      flex-shrink:0;z-index:50;padding-bottom:env(safe-area-inset-bottom,0)}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;border:none;background:none;cursor:pointer;color:var(--text-dim);
      font-family:var(--font-b);font-size:10px;font-weight:500;letter-spacing:.2px;transition:color .15s;
      -webkit-tap-highlight-color:transparent;padding:0 4px}
    .tab-icon{font-size:20px;line-height:1;transition:transform .15s}
    .tab-btn:active .tab-icon{transform:scale(.86)}
    .tab-btn.active{color:var(--blue)}
    /* Components */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm)}
    .section{margin-bottom:14px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
      padding:11px 20px;border:1px solid var(--border2);background:transparent;color:var(--text-mid);
      font-family:var(--font-b);font-size:13px;font-weight:500;border-radius:var(--r-f);cursor:pointer;
      letter-spacing:.2px;min-height:44px;transition:border-color .15s,background .15s,color .15s;white-space:nowrap}
    .btn:hover{border-color:var(--border3);color:var(--text)}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;box-shadow:0 2px 16px rgba(74,144,217,.28)}
    .btn-primary:hover{background:#5a9fe8;border-color:#5a9fe8}
    .btn-primary:active{background:var(--blue-dk)}
    .btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-danger{border-color:rgba(217,83,74,.35);color:var(--error)}
    .btn-danger:hover{background:rgba(217,83,74,.1);border-color:var(--error)}
    .btn-full{width:100%}
    .btn-sm{padding:8px 14px;font-size:12px;min-height:36px}
    /* Collapse */
    .clps-trg{display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;cursor:pointer;user-select:none;min-height:50px;transition:background .15s}
    .clps-trg:hover{background:var(--surface2)}
    .clps-arr{color:var(--text-dim);font-size:10px;transition:transform .22s;flex-shrink:0}
    .clps-arr.open{transform:rotate(180deg)}
    .clps-body{border-top:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height .3s ease}
    .clps-body.open{max-height:3000px}
    .clps-inner{padding:16px}
    /* Filter sub-sections */
    .fsub{border-bottom:1px solid var(--border)}
    .fsub:last-child{border-bottom:none}
    .fsub-trg{display:flex;align-items:center;justify-content:space-between;padding:11px 0;cursor:pointer;user-select:none}
    .fsub-trg:active{opacity:.7}
    .fsub-arr{font-size:9px;color:var(--text-dim);transition:transform .22s}
    .fsub-arr.open{transform:rotate(180deg)}
    .fsub-body{display:none;padding-bottom:14px}
    .fsub-body.open{display:block}
    /* Toggles */
    .tgl-row{display:flex;align-items:center;justify-content:space-between;min-height:46px;gap:12px}
    .tgl-info{flex:1;min-width:0}
    .tgl-title{font-size:13px;color:var(--text)}
    .tgl-sub{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.4}
    .tgl-sw{position:relative;width:44px;height:26px;flex-shrink:0}
    .tgl-sw input{opacity:0;width:0;height:0;position:absolute}
    .tgl-track{position:absolute;inset:0;background:var(--surface3);border-radius:13px;transition:background .2s;cursor:pointer}
    .tgl-track::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;
      background:rgba(255,255,255,.28);border-radius:50%;transition:transform .2s,background .2s}
    .tgl-sw input:checked+.tgl-track{background:var(--blue)}
    .tgl-sw input:checked+.tgl-track::after{transform:translateX(18px);background:#fff}
    /* Sliders */
    input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;
      background:var(--border2);border-radius:var(--r-f);outline:none;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;
      background:var(--blue);border-radius:50%;cursor:pointer;box-shadow:0 0 0 4px var(--blue-glow)}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;background:var(--blue);border:none;border-radius:50%}
    /* Radio chips */
    .rchip{position:relative}
    .rchip input{position:absolute;opacity:0;width:0;height:0}
    .rchip label{display:flex;align-items:center;justify-content:center;height:38px;
      border:1px solid var(--border2);border-radius:var(--r-f);cursor:pointer;
      font-size:11px;font-weight:600;color:var(--text-dim);font-family:var(--font-b);
      transition:all .15s;text-align:center;line-height:1.3;padding:0 4px}
    .rchip label:active{transform:scale(.96)}
    .rchip input:checked+label{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    /* Presets */
    .presets-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
    .presets-row::-webkit-scrollbar{display:none}
    .preset-btn{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:9px 15px;
      border:1px solid var(--border2);border-radius:var(--r-f);background:var(--surface);
      color:var(--text-mid);font-family:var(--font-b);font-size:12px;font-weight:600;
      cursor:pointer;white-space:nowrap;transition:all .15s;min-height:40px;box-shadow:var(--sh-sm)}
    .preset-btn:hover{border-color:var(--blue);color:var(--text)}
    .preset-btn:active{transform:scale(.96)}
    .preset-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    /* Count buttons */
    .count-row{display:flex;align-items:center;gap:8px}
    .count-lbl{font-size:11px;color:var(--text-dim);white-space:nowrap}
    .count-btns{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
    .count-btns::-webkit-scrollbar{display:none}
    .count-btn{display:flex;align-items:center;justify-content:center;min-width:42px;height:42px;
      padding:0 10px;border:1px solid var(--border2);border-radius:var(--r-f);background:none;
      color:var(--text-dim);font-family:var(--font-b);font-size:13px;font-weight:600;
      cursor:pointer;transition:all .15s;flex-shrink:0}
    .count-btn:active{transform:scale(.92)}
    .count-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    /* Decade grid */
    .dec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
    .dec-chip{display:flex;align-items:center;justify-content:center;height:38px;
      border:1px solid var(--border2);border-radius:var(--r-f);font-size:11px;font-weight:600;
      font-family:var(--font-b);color:var(--text-dim);background:none;cursor:pointer;transition:all .15s}
    .dec-chip:active{transform:scale(.94)}
    .dec-chip.inc{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .dec-chip.exc{border-color:var(--error);color:var(--error);background:rgba(217,83,74,.08)}
    .dec-hint{font-size:10px;color:var(--text-dim);margin-top:6px;text-align:center}
    /* Genre cluster */
    .gc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px}
    .gc-chip{display:flex;align-items:center;gap:6px;padding:9px 12px;
      border:1px solid var(--border2);border-radius:var(--r-md);font-size:12px;font-weight:500;
      color:var(--text-mid);background:none;cursor:pointer;transition:all .15s;font-family:var(--font-b)}
    .gc-chip:active{transform:scale(.96)}
    .gc-chip.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .gc-icon{font-size:14px;flex-shrink:0}
    /* Genre search */
    .gsearch-wrap{position:relative;margin-top:10px}
    .gsearch{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-f);
      color:var(--text);font-family:var(--font-b);font-size:13px;padding:10px 14px 10px 36px;
      outline:none;-webkit-appearance:none;transition:border-color .15s,box-shadow .15s}
    .gsearch::placeholder{color:var(--text-dim)}
    .gsearch:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
    .gsearch-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-dim);pointer-events:none}
    .gsearch-results{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .gsr-chip{padding:5px 11px;border:1px solid var(--border2);border-radius:var(--r-f);
      font-size:11px;font-weight:500;color:var(--text-dim);background:none;cursor:pointer;
      font-family:var(--font-b);transition:all .12s}
    .gsr-chip.sel{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .genre-progress{font-size:11px;color:var(--text-dim);text-align:center;padding:6px 0}
    /* Sort */
    .sort-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
    .sort-row::-webkit-scrollbar{display:none}
    .sort-lbl{font-size:11px;color:var(--text-dim);flex-shrink:0}
    .sort-chip{padding:5px 12px;border:1px solid var(--border2);border-radius:var(--r-f);
      background:none;font-size:11px;font-weight:500;color:var(--text-dim);cursor:pointer;
      font-family:var(--font-b);transition:all .12s;flex-shrink:0;white-space:nowrap}
    .sort-chip.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    /* Album items */
    .album-list{display:flex;flex-direction:column;gap:2px}
    .album-item{display:flex;align-items:center;gap:11px;padding:10px 12px;
      border-radius:var(--r-md);background:var(--surface);border:1px solid var(--border);
      transition:transform .15s,opacity .15s;will-change:transform;
      touch-action:pan-y;position:relative;overflow:hidden;
      animation:fadeUp .2s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .album-list .album-item:nth-child(1){animation-delay:0ms}
    .album-list .album-item:nth-child(2){animation-delay:45ms}
    .album-list .album-item:nth-child(3){animation-delay:90ms}
    .album-list .album-item:nth-child(4){animation-delay:135ms}
    .album-list .album-item:nth-child(5){animation-delay:175ms}
    .album-list .album-item:nth-child(n+6){animation-delay:210ms}
    .album-item.swipe-ready{border-left:3px solid var(--error)!important;transform:scale(.985)}
    @keyframes slideOutLeft{to{transform:translateX(-110%);opacity:0}}
    @keyframes slideInRight{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
    .album-item.swipe-exit{animation:slideOutLeft .2s ease forwards}
    .album-item.swipe-enter{animation:slideInRight .22s ease forwards!important}
    .alb-num{font-size:10px;color:var(--text-dim);width:14px;text-align:right;flex-shrink:0}
    .alb-art-wrap{width:72px;height:72px;flex-shrink:0;border-radius:var(--r-sm);overflow:hidden;background:var(--surface3);box-shadow:var(--sh-sm)}
    .alb-art-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .alb-art-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px}
    .alb-info{flex:1;min-width:0}
    .alb-name{font-family:var(--font-h);font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;line-height:1.2}
    .alb-artist{font-size:11px;color:var(--text-mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .alb-meta{font-size:10px;color:var(--text-dim);margin-top:2px;line-height:1.5}
    .reroll-btn{width:32px;height:32px;border:1px solid var(--border2);border-radius:var(--r-f);
      background:none;color:var(--text-dim);font-size:17px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
    .reroll-btn:hover{border-color:var(--blue);color:var(--blue)}
    .reroll-btn:active{transform:scale(.86)}
    /* Coverage */
    .cvg-top{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
    .cvg-pct{font-family:var(--font-h);font-size:38px;font-weight:700;color:var(--blue);line-height:1}
    .cvg-lbl{font-size:11px;color:var(--text-dim)}
    .freshness-bar{display:flex;height:6px;border-radius:var(--r-f);overflow:hidden;gap:1px;margin:10px 0 6px}
    .fresh-seg{height:100%;border-radius:1px;transition:flex .6s ease}
    .fresh-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}
    .fresh-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-dim)}
    .fresh-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .cvg-stat{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-top:1px solid var(--border)}
    .cvg-stat-left{display:flex;align-items:center;gap:10px}
    .cvg-stat-icon{font-size:16px;opacity:.7}
    .cvg-stat-lbl{font-size:12px;color:var(--text)}
    .cvg-stat-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
    .ov-section{margin-top:14px;border-top:1px solid var(--border);padding-top:14px}
    .ov-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-mid);font-weight:700;margin-bottom:10px}
    .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .bar-lbl{font-size:10px;color:var(--text-dim);width:46px;flex-shrink:0}
    .bar-track{flex:1;height:4px;background:var(--border2);border-radius:var(--r-f);overflow:hidden}
    .bar-fill{height:100%;background:var(--blue);border-radius:var(--r-f);opacity:.7;transition:width .6s ease}
    .bar-cnt{font-size:10px;color:var(--text-dim);width:28px;text-align:right;flex-shrink:0}
    /* Stats */
    .stats-info{font-size:11px;color:var(--text-dim);text-align:center;padding:8px 0 4px}
    /* Modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;animation:fadein .2s ease}
    @keyframes fadein{from{opacity:0}to{opacity:1}}
    .modal{width:100%;max-height:82dvh;background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;
      overflow-y:auto;animation:slideup .25s ease;border:1px solid var(--border2);border-bottom:none}
    @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
    .modal-handle{width:36px;height:4px;background:var(--border3);border-radius:var(--r-f);margin:12px auto 14px}
    .modal-body{padding:0 20px 32px}
    .modal-art{width:150px;height:150px;border-radius:var(--r-lg);object-fit:cover;box-shadow:var(--sh-lg);margin:0 auto 16px;display:block}
    .modal-art-ph{width:150px;height:150px;border-radius:var(--r-lg);background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 16px}
    .modal-title{font-family:var(--font-h);font-size:21px;font-weight:700;text-align:center;margin-bottom:4px}
    .modal-artist{font-size:14px;color:var(--text-mid);text-align:center;margin-bottom:4px}
    .modal-meta{font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:20px;line-height:1.7}
    .modal-actions{display:flex;gap:10px}
    .modal-actions .btn{flex:1}
    /* Library tab */
    .lib-filter{position:sticky;top:-16px;margin:-16px -16px 12px;padding:10px 16px;
      background:rgba(30,30,30,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);z-index:10}
    .lib-srch-wrap{position:relative}
    .lib-srch{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-f);
      color:var(--text);font-family:var(--font-b);font-size:13px;padding:10px 14px 10px 36px;
      outline:none;-webkit-appearance:none;transition:border-color .15s}
    .lib-srch:focus{border-color:var(--blue)}
    .lib-srch::placeholder{color:var(--text-dim)}
    .lib-srch-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-dim);pointer-events:none}
    .alb-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .alb-grid-item{cursor:pointer;border-radius:var(--r-md);overflow:hidden;background:var(--surface);
      border:1px solid var(--border);box-shadow:var(--sh-sm);transition:transform .15s;
      -webkit-tap-highlight-color:transparent;animation:fadeUp .2s ease both}
    .alb-grid-item:active{transform:scale(.96)}
    .alb-grid-art{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface3);display:block}
    .alb-grid-art-ph{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--surface3);font-size:32px}
    .alb-grid-info{padding:8px 10px 10px}
    .alb-grid-name{font-family:var(--font-h);font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
    .alb-grid-artist{font-size:11px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* Profile tab */
    .prof-user{display:flex;align-items:center;gap:14px;padding:16px;
      background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px}
    .prof-avi{width:56px;height:56px;border-radius:50%;background:var(--surface3);overflow:hidden;flex-shrink:0}
    .prof-avi img{width:100%;height:100%;object-fit:cover}
    .prof-name{font-family:var(--font-h);font-size:18px;font-weight:700}
    .prof-sub{font-size:12px;color:var(--text-dim);margin-top:2px}

<!-- Minimal idb wrapper (inlined, no CDN) -->
<script>
(function(g){'use strict';
  function wp(r){return new Promise(function(res,rej){r.onsuccess=function(){res(r.result);};r.onerror=function(){rej(r.error);};});}
  function wt(tx){return new Promise(function(res,rej){tx.oncomplete=function(){res();};tx.onerror=function(){rej(tx.error);};tx.onabort=function(){rej(tx.error||new DOMException('AbortError'));};});}
  function ws(store){return{put:function(v,k){return wp(k!==undefined?store.put(v,k):store.put(v));},get:function(k){return wp(store.get(k));},delete:function(k){return wp(store.delete(k));},getAll:function(){return wp(store.getAll());},clear:function(){return wp(store.clear());}}}
  function wd(db){return{_db:db,get objectStoreNames(){return db.objectStoreNames;},get:function(s,k){var tx=db.transaction(s,'readonly');return wp(tx.objectStore(s).get(k));},put:function(s,v,k){var tx=db.transaction(s,'readwrite');if(k!==undefined)tx.objectStore(s).put(v,k);else tx.objectStore(s).put(v);return wt(tx);},delete:function(s,k){var tx=db.transaction(s,'readwrite');tx.objectStore(s).delete(k);return wt(tx);},getAll:function(s){var tx=db.transaction(s,'readonly');return wp(tx.objectStore(s).getAll());},clear:function(s){var tx=db.transaction(s,'readwrite');tx.objectStore(s).clear();return wt(tx);},transaction:function(s,m){var tx=db.transaction(s,m||'readonly');var store=ws(tx.objectStore(s));return{store:store,done:wt(tx)};}};};
  g.idb={openDB:function(name,version,opts){return new Promise(function(res,rej){var req=indexedDB.open(name,version);req.onupgradeneeded=function(e){var db=e.target.result;if(opts&&opts.upgrade)opts.upgrade({objectStoreNames:db.objectStoreNames,createObjectStore:function(n,o){return db.createObjectStore(n,o);}});};req.onsuccess=function(){res(wd(req.result));};req.onerror=function(){rej(req.error);};});}}
})(typeof self!=='undefined'?self:this);
</script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// SECTION 1 — CONFIG  (edit these two lines for your deployment)
// ═══════════════════════════════════════════════════════════════════
const CLIENT_ID    = 'ed48e32b12fd4b01ad0dbdf383cb3ff6';
const REDIRECT_URI = 'https://martn1a.github.io/SpotifyRandom/';
const SCOPES = 'user-library-read user-read-playback-state user-modify-playback-state user-read-private';
const DELAY_DESKTOP_MS = 300;
const DELAY_BROWSER_MS = 5000;
const HISTORY_MAX_AGE_DAYS = 30;
const BLOCKLIST_KW = ['instrumental','remix','edit','live','reprise','version'];
const DB_NAME = 'albumdiscovery_db';
const DB_VERSION = 2;

const GENRE_CLUSTERS = [
  {id:'electronic',label:'Electronic', icon:'⚡',kw:['electronic','techno','house','ambient','drum and bass','dnb','dubstep','trance','garage','jungle','breakbeat','idm','glitch','downtempo','synthwave','darkwave','edm','electronica','trip-hop','synth','rave','acid','chillout','dub','eurodance','electro','bass music','vaporwave','industrial','noise','minimal techno','tech house','deep house','progressive house']},
  {id:'rock',      label:'Rock',        icon:'🎸',kw:['rock','alternative','grunge','post-rock','shoegaze','progressive','art rock','garage rock','britpop','jangle','psych','kraut','space rock','math rock','stoner rock','desert rock']},
  {id:'punk',      label:'Punk / Indie',icon:'📻',kw:['punk','indie','hardcore','post-hardcore','noise rock','lo-fi','slacker','college rock','emo','screamo','post-punk','new wave','coldwave']},
  {id:'metal',     label:'Metal',       icon:'🤘',kw:['metal','heavy metal','black metal','death metal','doom','thrash','sludge','speed metal','power metal','prog metal','deathcore','metalcore','symphonic metal','folk metal']},
  {id:'hiphop',    label:'Hip-Hop / R&B',icon:'🎤',kw:['hip hop','hip-hop','rap','r&b','soul','neo-soul','funk','trap','grime','boom bap','urban','rhythm and blues','conscious','southern hip hop','east coast','west coast hip hop','drill']},
  {id:'pop',       label:'Pop',         icon:'✨',kw:['pop','dream pop','chamber pop','baroque pop','electropop','hyperpop','bedroom pop','art pop','bubblegum','synth pop','j-pop','k-pop','dance pop','teen pop','sophisti-pop']},
  {id:'jazz',      label:'Jazz / Blues',icon:'🎷',kw:['jazz','blues','swing','bebop','free jazz','latin jazz','soul jazz','gospel','boogie','ragtime','cool jazz','fusion','nu jazz']},
  {id:'classical', label:'Classical',   icon:'🎻',kw:['classical','contemporary classical','chamber','orchestral','opera','choral','minimalism','neo-classical','neoclassical','baroque','romantic','impressionist','avant-garde','new music']},
  {id:'folk',      label:'Folk / World',icon:'🌍',kw:['folk','country','americana','bluegrass','world','reggae','afrobeat','latin','bossa','celtic','singer-songwriter','acoustic','roots','tropicalia','cumbia','salsa','flamenco','afropop','dancehall','calypso','ska','roots reggae','dub reggae']},
];
function clusterOf(g){const gl=g.toLowerCase();for(const c of GENRE_CLUSTERS)if(c.kw.some(k=>gl.includes(k)))return c.id;return'other';}

// ═══════════════════════════════════════════════════════════════════
// SECTION 2 — DATABASE MODULE
// ═══════════════════════════════════════════════════════════════════
const DB=(()=>{
  let _db=null;
  async function getDb(){
    if(_db)return _db;
    _db=await idb.openDB(DB_NAME,DB_VERSION,{upgrade(db){
      if(!db.objectStoreNames.contains('library'))   db.createObjectStore('library');
      if(!db.objectStoreNames.contains('history'))   db.createObjectStore('history',{keyPath:'id'});
      if(!db.objectStoreNames.contains('artist_cache')) db.createObjectStore('artist_cache',{keyPath:'id'});
      if(!db.objectStoreNames.contains('settings'))  db.createObjectStore('settings');          // PHASE 2
      if(!db.objectStoreNames.contains('genre_index'))db.createObjectStore('genre_index');      // PHASE 2
      if(!db.objectStoreNames.contains('listen_later'))db.createObjectStore('listen_later',{keyPath:'id'}); // PHASE 4
    }});
    return _db;
  }
  return{getDb};
})();

// ═══════════════════════════════════════════════════════════════════
// SECTION 3 — HISTORY PROVIDER  (abstraction layer; Phase 5 can add Last.fm)
// ═══════════════════════════════════════════════════════════════════
let historyCache=new Map();
const HistoryProvider={
  async load(){const db=await DB.getDb();const e=await db.getAll('history');historyCache=new Map(e.map(x=>[x.id,x.queuedAt]));},
  getMap(){return historyCache;},
  getRecentIds(){const c=Date.now()-HISTORY_MAX_AGE_DAYS*86400000;const s=new Set();for(const[id,t]of historyCache)if(t>c)s.add(id);return s;},
  async log(id,name){const db=await DB.getDb();const r={id,name,queuedAt:Date.now()};await db.put('history',r);historyCache.set(id,r.queuedAt);},
  async clear(){const db=await DB.getDb();await db.clear('history');historyCache=new Map();},
  export(albums){
    const am=new Map(albums.map(a=>[a.id,a.name]));
    const e=[];for(const[id,t]of historyCache)e.push({id,name:am.get(id)||'',queuedAt:t});
    e.sort((a,b)=>b.queuedAt-a.queuedAt);
    const blob=new Blob([JSON.stringify({version:1,exportedAt:Date.now(),entries:e},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download=`album-history-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  },
  async import(file){
    const p=JSON.parse(await file.text());const entries=Array.isArray(p)?p:(p.entries||[]);
    const db=await DB.getDb();const tx=db.transaction('history','readwrite');let n=0;
    for(const e of entries){if(!e.id||!e.queuedAt)continue;const x=await tx.store.get(e.id);
      if(!x||x.queuedAt<e.queuedAt){await tx.store.put({id:e.id,name:e.name||'',queuedAt:e.queuedAt});historyCache.set(e.id,e.queuedAt);n++;}}
    await tx.done;return n;
  },
  // PHASE 5: async loadLastFm(username){/* fetch scrobbles, merge into historyCache */},
};

// ═══════════════════════════════════════════════════════════════════
// SECTION 4 — CACHE MODULE
// ═══════════════════════════════════════════════════════════════════
const Cache={
  async saveLibrary(){try{const db=await DB.getDb();await db.put('library',{cachedAt:Date.now(),genres:allGenres,albums:allAlbums.map(slimAlbum)},'main');}catch(e){console.warn('Cache write failed',e);}},
  async loadLibrary(){try{const db=await DB.getDb();const r=await db.get('library','main');if(!r?.albums?.length)return false;allAlbums=r.albums;allGenres=r.genres||[];state.cachedAt=r.cachedAt;return true;}catch(e){return false;}},
  async clearAll(){try{const db=await DB.getDb();await Promise.all(['library','history','artist_cache','listen_later'].map(s=>db.clear(s)));}catch(e){}},
};

function slimAlbum(a){return{id:a.id,name:a.name,release_date:a.release_date,_added_at:a._added_at||null,artists:(a.artists||[]).map(ar=>({id:ar.id,name:ar.name})),images:(a.images||[]).slice(0,3),tracks:{total:a.tracks?.total,next:a.tracks?.next||null,items:(a.tracks?.items||[]).map(t=>({uri:t.uri,duration_ms:t.duration_ms}))},_genres:a._genres||[]};}
function getArt(a,sz){const imgs=a.images||[];if(!imgs.length)return null;if(sz==='lg')return imgs[0]?.url;if(sz==='sm')return imgs[imgs.length-1]?.url;return imgs[1]?.url||imgs[0]?.url;}

// ═══════════════════════════════════════════════════════════════════
// SECTION 5 — AUTH MODULE (PKCE)
// ═══════════════════════════════════════════════════════════════════
const Auth={
  isLoggedIn(){return!!localStorage.getItem('spotify_refresh_token');},
  async login(){
    const v=_rand(64),ch=await _chal(v),st=_rand(16);
    localStorage.setItem('pkce_verifier',v);localStorage.setItem('pkce_state',st);
    window.location.href='https://accounts.spotify.com/authorize?'+new URLSearchParams({response_type:'code',client_id:CLIENT_ID,scope:SCOPES,redirect_uri:REDIRECT_URI,state:st,code_challenge_method:'S256',code_challenge:ch});
  },
  async handleCallback(code,rs){
    const ss=localStorage.getItem('pkce_state');if(rs!==ss)throw new Error('State mismatch — please try logging in again.');
    const v=localStorage.getItem('pkce_verifier');
    const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:REDIRECT_URI,client_id:CLIENT_ID,code_verifier:v})});
    if(!res.ok)throw new Error('Token exchange failed: '+await res.text());
    _storeTok(await res.json());window.history.replaceState({},'',window.location.pathname);
  },
  async getToken(){if(Date.now()>Number(localStorage.getItem('spotify_expires_at')||0))await _refresh();return localStorage.getItem('spotify_access_token');},
  logout(){['spotify_access_token','spotify_refresh_token','spotify_expires_at','pkce_verifier','pkce_state'].forEach(k=>localStorage.removeItem(k));allAlbums=[];allGenres=[];state.cachedAt=null;appRendered=false;render();},
};
function _rand(n){const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';const a=crypto.getRandomValues(new Uint8Array(n));return Array.from(a,b=>c[b%c.length]).join('');}
async function _chal(v){const d=new TextEncoder().encode(v);const h=await crypto.subtle.digest('SHA-256',d);return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
async function _refresh(){const rt=localStorage.getItem('spotify_refresh_token');if(!rt)throw new Error('No refresh token.');const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'refresh_token',refresh_token:rt,client_id:CLIENT_ID})});if(!res.ok){Auth.logout();throw new Error('Session expired — please log in again.');}  _storeTok(await res.json());}
function _storeTok({access_token,refresh_token,expires_in}){localStorage.setItem('spotify_access_token',access_token);if(refresh_token)localStorage.setItem('spotify_refresh_token',refresh_token);localStorage.setItem('spotify_expires_at',String(Date.now()+(expires_in-60)*1000));}

// ═══════════════════════════════════════════════════════════════════
// SECTION 6 — SPOTIFY API MODULE
// ═══════════════════════════════════════════════════════════════════
const SpotifyAPI={
  async get(url){const tok=await Auth.getToken();const res=await fetch(url,{headers:{Authorization:'Bearer '+tok}});if(!res.ok){const b=await res.text().catch(()=>'');throw new Error(`Spotify API ${res.status}: ${b||res.statusText}`);}return res.json();},
  async fetchAllAlbums(onProg){const albums=[];let url='https://api.spotify.com/v1/me/albums?limit=50&market=from_token';while(url){const d=await this.get(url);for(const item of d.items){item.album._added_at=item.added_at||null;albums.push(item.album);}url=d.next;onProg(albums.length,d.total);}return albums;},
  async fetchArtistGenres(albums,onProg){
    const idSet=new Set();for(const a of albums)for(const ar of(a.artists||[]))if(ar.id)idSet.add(ar.id);
    const allIds=[...idSet];const gm=new Map();
    const db=await DB.getDb();const cached=await db.getAll('artist_cache');for(const e of cached)gm.set(e.id,e.genres);
    const uncached=allIds.filter(id=>!gm.has(id));let done=allIds.length-uncached.length;onProg(done,allIds.length);
    const fetchOne=async(id)=>{try{const d=await this.get('https://api.spotify.com/v1/artists/'+encodeURIComponent(id));const g=d.genres||[];gm.set(id,g);db.put('artist_cache',{id,genres:g,cachedAt:Date.now()}).catch(()=>{});}catch(e){gm.set(id,[]);}done++;onProg(done,allIds.length);};
    const POOL=5;for(let i=0;i<uncached.length;i+=POOL)await Promise.all(uncached.slice(i,i+POOL).map(fetchOne));
    const gs=new Set();for(const a of albums){const ag=new Set();for(const ar of(a.artists||[]))for(const g of(gm.get(ar.id)||[])){ag.add(g);gs.add(g);}a._genres=[...ag];}
    return[...gs].sort();
  },
  async getAlbumTracks(album){let items=album.tracks?.items||[];let next=album.tracks?.next;while(next){const d=await this.get(next);items=items.concat(d.items);next=d.next;}return items;},
  async addToQueue(uri){const tok=await Auth.getToken();const res=await fetch(`https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(uri)}`,{method:'POST',headers:{Authorization:'Bearer '+tok}});if(res.status===404)throw new Error('No active Spotify device. Start playing something first.');if(res.status===429)throw new Error('Rate limited. Enable Browser client mode for safer queuing.');if(!res.ok&&res.status!==204)throw new Error(`Queue error ${res.status}`);},
  async getCurrentTrack(){try{const d=await this.get('https://api.spotify.com/v1/me/player');if(!d||!d.item)return null;return{name:d.item.name,artist:d.item.artists?.map(a=>a.name).join(', ')||'',artUrl:d.item.album?.images?.[2]?.url||null,isPlaying:d.is_playing};}catch(e){return null;}},
  async getProfile(){try{return await this.get('https://api.spotify.com/v1/me');}catch(e){return null;}},
};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ═══════════════════════════════════════════════════════════════════
// SECTION 7 — FILTER & PICK MODULE
// ═══════════════════════════════════════════════════════════════════
function releaseYear(a){return parseInt((a.release_date||'').slice(0,4),10)||0;}
function decadeOf(y){if(y<1970)return'pre-70s';return String(Math.floor(y/10)*10).slice(2)+'s';}
function albumDurMin(a){return(a.tracks?.items||[]).reduce((s,t)=>s+(t.duration_ms||0),0)/60000;}

function applyFilters(albums){
  const ri=state.filters.avoidRecent?HistoryProvider.getRecentIds():null;
  const hm=(state.filters.queueHistory&&state.filters.queueHistory!=='any')?HistoryProvider.getMap():null;
  const now=Date.now();
  return albums.filter(a=>{
    const d=decadeOf(releaseYear(a));
    if(state.filters.decades.length>0&&!state.filters.decades.includes(d))return false;
    if(state.filters.decadesExcl.length>0&&state.filters.decadesExcl.includes(d))return false;
    if(state.filters.excludeKW){const l=(a.name||'').toLowerCase();if(BLOCKLIST_KW.some(k=>l.includes(k)))return false;}
    const dur=albumDurMin(a);if(dur<state.filters.minDur||dur>state.filters.maxDur)return false;
    if(state.filters.genres.length>0){const ag=a._genres||[];if(!state.filters.genres.some(g=>ag.includes(g)))return false;}
    if(state.filters.clusters.length>0){const ag=a._genres||[];const ac=new Set(ag.map(clusterOf));if(!state.filters.clusters.some(c=>ac.has(c)))return false;}
    if(state.filters.minAgeMonths>0){const addedMs=a._added_at?new Date(a._added_at).getTime():0;if(addedMs>now-state.filters.minAgeMonths*30*86400000)return false;}
    if(ri&&ri.has(a.id))return false;
    if(hm){const lh=hm.get(a.id);if(state.filters.queueHistory==='never'&&lh)return false;if(state.filters.queueHistory==='6m'&&lh&&now-lh<180*86400000)return false;if(state.filters.queueHistory==='1yr'&&lh&&now-lh<365*86400000)return false;}
    return true;
  });
}

function weightedPick(pool,n){
  const hm=HistoryProvider.getMap();const now=Date.now();const SIX=180*86400000,THI=HISTORY_MAX_AGE_DAYS*86400000;
  const w=pool.map(a=>{const lh=hm.get(a.id);const wt=!lh?10:now-lh>SIX?5:now-lh>THI?2:1;return{a,wt};});
  const res=[];const items=[...w];
  for(let i=0;i<Math.min(n,items.length);i++){let tot=0;for(let k=i;k<items.length;k++)tot+=items[k].wt;let r=Math.random()*tot,ch=i;for(let k=i;k<items.length;k++){r-=items[k].wt;if(r<=0){ch=k;break;}}[items[i],items[ch]]=[items[ch],items[i]];res.push(items[i].a);}
  return res;
}
function plainPick(pool,n){const a=[...pool];const r=[];for(let i=0;i<Math.min(n,a.length);i++){const j=i+Math.floor(Math.random()*(a.length-i));[a[i],a[j]]=[a[j],a[i]];r.push(a[i]);}return r;}
function sortAlbums(albums){const s=[...albums];if(state.albumSort==='release')return s.sort((a,b)=>releaseYear(a)-releaseYear(b));if(state.albumSort==='added')return s.sort((a,b)=>(a._added_at||'')<(b._added_at||'')?-1:1);if(state.albumSort==='duration')return s.sort((a,b)=>albumDurMin(a)-albumDurMin(b));return s;}

function getCovStats(){
  if(!allAlbums.length)return{total:0,neverHeard:0,longAgo:0,recent:0,everHeard:0,pct:0};
  const hm=HistoryProvider.getMap();const now=Date.now(),SIX=180*86400000;
  let nh=0,la=0,re=0;for(const a of allAlbums){const lh=hm.get(a.id);if(!lh)nh++;else if(now-lh>SIX)la++;else re++;}
  const ev=allAlbums.length-nh;return{total:allAlbums.length,neverHeard:nh,longAgo:la,recent:re,everHeard:ev,pct:Math.round(ev/allAlbums.length*100)};
}

};

function saveSession(){try{sessionStorage.setItem('ad_s',JSON.stringify({f:state.filters,ac:state.albumCount,as:state.albumSort,ap:state.activePreset,fo:state.filterOpen,fs:state.filterSections,bm:state.browserMode}));}catch(e){}}
function restoreSession(){try{const r=sessionStorage.getItem('ad_s');if(!r)return;const s=JSON.parse(r);if(s.f)Object.assign(state.filters,s.f);if(s.ac)state.albumCount=s.ac;if(s.as)state.albumSort=s.as;if(s.ap!==undefined)state.activePreset=s.ap;if(s.fo!==undefined)state.filterOpen=s.fo;if(s.fs)Object.assign(state.filterSections,s.fs);if(s.bm!==undefined)state.browserMode=s.bm;}catch(e){}}

function applyPreset(name){
  const rst=()=>Object.assign(state.filters,{decades:[],decadesExcl:[],genres:[],clusters:[],excludeKW:false,minAgeMonths:0,avoidRecent:false,weightUnheard:false,minDur:0,maxDur:200,queueHistory:'any'});
  if(name==='surprise'){rst();state.activePreset='surprise';}
  else if(name==='forgotten'){rst();state.filters.excludeKW=true;state.filters.minAgeMonths=12;state.filters.weightUnheard=true;state.filters.queueHistory='never';state.activePreset='forgotten';}
  else if(name==='deepcuts'){rst();state.filters.decades=['70s','80s','90s','00s'];state.filters.excludeKW=true;state.filters.minAgeMonths=6;state.filters.queueHistory='6m';state.activePreset='deepcuts';}
  saveSession();renderPickerContent(true);
}

function formatAge(ms){const s=Math.floor(ms/1000);if(s<60)return'just now';const m=Math.floor(s/60);if(m<60)return`${m} min ago`;const h=Math.floor(m/60);if(h<24)return`${h} h ago`;const d=Math.floor(h/24);return`${d} day${d!==1?'s':''} ago`;}
function formatAddedAt(iso){if(!iso)return'';const ms=Date.now()-new Date(iso).getTime();if(ms<0)return'';const d=Math.floor(ms/86400000),mo=Math.floor(d/30.44),yr=Math.floor(d/365.25);if(yr>=1)return`${yr} yr in library`;if(mo>=1)return`Added ${mo} mo ago`;if(d>=1)return`Added ${d}d ago`;return'Added today';}

function switchTab(name){
  if(state.activeTab===name)return;state.activeTab=name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.dataset.tab===name));

}

  const p=document.getElementById('tab-'+state.activeTab);if(!p)return;

function buildPickerHTML(){

  const filtered=applyFilters(allAlbums);
  const cvg=getCovStats();

  const fa=state.filters;
  const fCount=fa.decades.length+fa.decadesExcl.length+fa.genres.length+fa.clusters.length+(fa.excludeKW?1:0)+(fa.minAgeMonths?1:0)+(fa.queueHistory!=='any'?1:0)+(fa.minDur>0||fa.maxDur<200?1:0);

  const filtersHTML=`<div class="card section"><div class="clps-trg" id="filtersTrg"><div style="display:flex;align-items:center;gap:8px"><span style="font-family:var(--font-h);font-size:15px;font-weight:600">Filters</span>${fCount>0?`<span style="background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:var(--r-f)">${fCount}</span>`:''}</div><span class="clps-arr${state.filterOpen?' open':''}">▼</span></div><div class="clps-body${state.filterOpen?' open':''}" id="filtersBody"><div class="clps-inner">${buildFiltersInner()}</div></div></div>`;
  const cvgHTML=cvg.total?buildCoverageHTML(cvg):'';
  const statsHTML=`<div class="stats-info">${filtered.length} of ${allAlbums.length} albums match · ${syncLbl}${state.genresLoading?` · <span id="genreProgressWrap">Loading genres…</span>`:''}</div>`;
  const pickBtn=`<button class="btn btn-primary btn-full" id="queueBtn" ${state.isWorking?'disabled':''} style="height:52px;font-size:14px;font-weight:700;font-family:var(--font-h);border-radius:var(--r-xl);margin-bottom:12px">${state.isWorking&&state.phase!=='queuing'?'<span class="spinner" style="width:18px;height:18px;border-width:2px"></span> Picking…':'🎲 Pick Albums'}</button>`;
  const albumsHTML=['picked','queuing','done','error'].includes(state.phase)&&state.selectedAlbums.length?buildAlbumListHTML():'';
  const browserModeHTML=`<div class="card section" style="margin-top:14px"><div style="padding:12px 14px"><div class="tgl-row"><div class="tgl-info"><div class="tgl-title">Browser client mode</div><div class="tgl-sub">5 s delay between tracks — reduces rate limits on Spotify Web Player</div></div><label class="tgl-sw" aria-label="Browser client mode"><input type="checkbox" id="browserModeToggle"${state.browserMode?' checked':''}><span class="tgl-track"></span></label></div></div></div>`;
  return presetsHTML+countHTML+filtersHTML+cvgHTML+statsHTML+pickBtn+albumsHTML+browserModeHTML;
}

function buildFiltersInner(){
  const fa=state.filters;
  const ALL_DEC=['pre-70s','70s','80s','90s','00s','10s','20s'];
  const decChips=ALL_DEC.map(d=>{const cl=fa.decades.includes(d)?'inc':fa.decadesExcl.includes(d)?'exc':'';return`<button class="dec-chip ${cl}" data-decade="${d}" title="${cl==='inc'?'Click to exclude':cl==='exc'?'Click to reset':'Click to include'}">${d}</button>`;}).join('');
  const gcChips=GENRE_CLUSTERS.map(c=>`<button class="gc-chip${fa.clusters.includes(c.id)?' active':''}" data-cluster="${c.id}"><span class="gc-icon">${c.icon}</span>${c.label}</button>`).join('');
  const selGenresHTML=fa.genres.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">${fa.genres.map(g=>`<button class="gsr-chip sel" data-remove-genre="${esc(g)}">${esc(g)} ✕</button>`).join('')}</div>`:'';
  const ageOpts=[[0,'Any'],[3,'3+ mo'],[6,'6+ mo'],[12,'1+ yr'],[24,'2+ yr']];
  const ageChips=ageOpts.map(([v,l])=>`<div class="rchip"><input type="radio" name="ageFilter" id="age${v}" value="${v}"${fa.minAgeMonths===v?' checked':''}><label for="age${v}">${l}</label></div>`).join('');
  const qhOpts=[['any','Any'],['never','Never queued'],['6m','Not in 6 mo'],['1yr','Not in 1 yr']];
  const qhChips=qhOpts.map(([v,l])=>`<div class="rchip"><input type="radio" name="queueHistory" id="qh_${v}" value="${v}"${fa.queueHistory===v?' checked':''}><label for="qh_${v}">${l}</label></div>`).join('');
  const mkSub=(id,lbl,open,inner)=>`<div class="fsub"><div class="fsub-trg" data-fsub="${id}"><span class="lbl">${lbl}</span><span class="fsub-arr${open?' open':''}" id="fsub-arr-${id}">▼</span></div><div class="fsub-body${open?' open':''}" id="fsub-body-${id}">${inner}</div></div>`;
  return[
    mkSub('decade','Decade',state.filterSections.decade,`<div class="dec-grid">${decChips}</div><p class="dec-hint">Tap: include (blue) → exclude (red) → reset</p>`),
    mkSub('genre','Genre',state.filterSections.genre,`<div class="gc-grid">${gcChips}</div>${selGenresHTML}<div class="gsearch-wrap"><span class="gsearch-icon">🔍</span><input class="gsearch" id="genreSearch" type="search" placeholder="Search all genres…" autocomplete="off"></div><div class="gsearch-results" id="genreResults"></div>${state.genresLoading?'<p class="genre-progress" id="genreProgressInner">Loading genres…</p>':(!allGenres.length?'<p class="genre-progress">Genres available after library sync</p>':'')}`),
    mkSub('added','Library Age',state.filterSections.added,`<div class="age-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">${ageChips}</div>`),

      <div class="tgl-row" style="padding-bottom:10px"><div class="tgl-info"><div class="tgl-title">Avoid recently queued</div><div class="tgl-sub">Exclude albums queued in the last ${HISTORY_MAX_AGE_DAYS} days</div></div><label class="tgl-sw"><input type="checkbox" id="avoidRecentToggle"${fa.avoidRecent?' checked':''}><span class="tgl-track"></span></label></div>
      <div class="tgl-row" style="padding-bottom:10px"><div class="tgl-info"><div class="tgl-title">Prefer unheard albums</div><div class="tgl-sub">Weighted: unheard 10×, forgotten 5×, recent 1×</div></div><label class="tgl-sw"><input type="checkbox" id="weightUnheardToggle"${fa.weightUnheard?' checked':''}><span class="tgl-track"></span></label></div>
      <div class="tgl-row"><div class="tgl-info"><div class="tgl-title">Exclude remixes &amp; edits</div><div class="tgl-sub">Filter: ${BLOCKLIST_KW.join(', ')}</div></div><label class="tgl-sw"><input type="checkbox" id="kwFilterToggle"${fa.excludeKW?' checked':''}><span class="tgl-track"></span></label></div>
      <p class="lbl" style="margin-top:14px;margin-bottom:8px">Queue History</p>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">${qhChips}</div>`),
    mkSub('duration','Duration',state.filterSections.duration,`

      <p style="font-size:11px;color:var(--text-dim);margin-bottom:8px">Max: <b style="color:var(--text)" id="maxDurVal">${fa.maxDur}</b> min</p>
      <input type="range" id="maxDur" min="0" max="200" value="${fa.maxDur}">`),
  ].join('');
}

function buildCoverageHTML(cvg){
  const total=cvg.recent+cvg.longAgo+cvg.neverHeard||1;
  const fb=`<div class="freshness-bar"><div class="fresh-seg" style="flex:${cvg.recent/total};background:#4a90d9"></div><div class="fresh-seg" style="flex:${cvg.longAgo/total};background:#d4a574"></div><div class="fresh-seg" style="flex:${cvg.neverHeard/total};background:var(--border2)"></div></div><div class="fresh-legend"><div class="fresh-item"><div class="fresh-dot" style="background:#4a90d9"></div>Queued recently (${cvg.recent})</div><div class="fresh-item"><div class="fresh-dot" style="background:#d4a574"></div>Long ago (${cvg.longAgo})</div><div class="fresh-item"><div class="fresh-dot" style="background:var(--border3)"></div>Never heard (${cvg.neverHeard})</div></div>`;
  const body=`<div class="clps-inner"><div class="cvg-top"><span class="cvg-pct">${cvg.pct}%</span><span class="cvg-lbl">discovered</span></div>${fb}<div class="cvg-stat"><div class="cvg-stat-left"><span class="cvg-stat-icon">✦</span><div><div class="cvg-stat-lbl">Never heard</div><div class="cvg-stat-sub">${cvg.neverHeard} albums</div></div></div><button class="btn btn-sm" data-cvgfilter="unheard">Pick these</button></div><div class="cvg-stat"><div class="cvg-stat-left"><span class="cvg-stat-icon">🕰️</span><div><div class="cvg-stat-lbl">Heard long ago</div><div class="cvg-stat-sub">${cvg.longAgo} albums (6+ months)</div></div></div><button class="btn btn-sm" data-cvgfilter="longAgo">Pick these</button></div>${buildLibOv()}</div>`;
  return`<div class="card section"><div class="clps-trg" id="cvgTrg"><span style="font-family:var(--font-h);font-size:15px;font-weight:600">Library Coverage</span><span class="clps-arr${state.coverageOpen?' open':''}">▼</span></div><div class="clps-body${state.coverageOpen?' open':''}" id="cvgBody">${body}</div></div>`;
}

function buildLibOv(){
  if(!allAlbums.length)return'';
  const dc={};for(const a of allAlbums){const d=decadeOf(releaseYear(a));dc[d]=(dc[d]||0)+1;}
  const mxd=Math.max(...Object.values(dc));
  const decRows=['pre-70s','70s','80s','90s','00s','10s','20s'].filter(d=>dc[d]).map(d=>`<div class="bar-row"><span class="bar-lbl">${d}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(dc[d]/mxd*100)}%"></div></div><span class="bar-cnt">${dc[d]}</span></div>`).join('');
  const gc={};for(const a of allAlbums)for(const g of(a._genres||[]))gc[g]=(gc[g]||0)+1;
  const topG=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,7);const mxg=topG[0]?.[1]||1;
  const gRows=topG.map(([g,n])=>`<div class="bar-row"><span class="bar-lbl" style="width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g)}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/mxg*100)}%"></div></div><span class="bar-cnt">${n}</span></div>`).join('');
  return`<div class="ov-section"><p class="ov-title">By Decade</p>${decRows}</div>${topG.length?`<div class="ov-section"><p class="ov-title">Top Genres</p>${gRows}</div>`:''}`;
}

function buildAlbumListHTML(){
  const sorted=sortAlbums(state.selectedAlbums);
  const items=sorted.map((a,di)=>{
    const idx=state.selectedAlbums.indexOf(a);
    const art=getArt(a,'md');const artist=(a.artists||[]).map(ar=>ar.name).join(', ');
    const dur=Math.round(albumDurMin(a));const trk=a.tracks?.total||a.tracks?.items?.length||'?';
    const yr=releaseYear(a)||'';const addLbl=formatAddedAt(a._added_at);
    const gLbl=(a._genres||[]).slice(0,2).join(' · ');
    const lh=HistoryProvider.getMap().get(a.id);const heard=lh?(Date.now()-lh>180*86400000?'🕰️':'✓'):'';
    return`<div class="album-item" data-idx="${idx}"><span class="alb-num">${di+1}</span><div class="alb-art-wrap">${art?`<img src="${esc(art)}" alt="" loading="lazy">`:'<div class="alb-art-ph">🎵</div>'}</div><div class="alb-info"><div class="alb-name">${esc(a.name)}</div><div class="alb-artist">${esc(artist)}</div><div class="alb-meta">${yr?yr+' · ':''}${trk} tracks · ${dur} min ${heard}</div>${gLbl?`<div class="alb-meta" style="opacity:.7">${esc(gLbl)}</div>`:''}${addLbl?`<div class="alb-meta">${esc(addLbl)}</div>`:''}</div><button class="reroll-btn" data-reroll="${idx}" title="Swap this album">↻</button></div>`;
  }).join('');
  let status='';
  if(state.phase==='queuing')status=`<div class="status-msg inf" id="queueStatus">Queueing albums…</div>`;
  else if(state.phase==='done')status=`<div class="status-msg ok">✓ Albums queued in Spotify!</div>`;
  else if(state.phase==='error')status=`<div class="status-msg err" id="queueStatus">Error queueing albums</div>`;
  const sortChips=['pick','release','added','duration'].map(s=>`<button class="sort-chip${state.albumSort===s?' active':''}" data-sort="${s}">${{pick:'Random',release:'Release year',added:'Date added',duration:'Duration'}[s]}</button>`).join('');
  return`<div class="section" id="albumListWrap"><div class="sort-row"><span class="sort-lbl">Sort</span>${sortChips}</div>${status}<div class="album-list" id="albumListInner">${items}</div>${state.phase!=='queuing'?`<button class="btn btn-primary btn-full queue-sel-btn" id="queueSelBtn" style="margin-top:12px;height:52px;font-size:14px;font-family:var(--font-h);font-weight:700;border-radius:var(--r-xl)">▶ Queue These Albums</button>`:''}</div>`;
}

  const gs=panel.querySelector('#genreSearch');
  if(gs)gs.addEventListener('input',()=>{const q=gs.value.trim().toLowerCase();const res=panel.querySelector('#genreResults');if(!res)return;if(!q){res.innerHTML='';return;}const m=allGenres.filter(g=>g.toLowerCase().includes(q)).slice(0,30);res.innerHTML=m.map(g=>`<button class="gsr-chip${fa.genres.includes(g)?' sel':''}" data-genre="${esc(g)}">${esc(g)}</button>`).join('');res.querySelectorAll('.gsr-chip[data-genre]').forEach(b=>b.addEventListener('click',()=>{const g=b.dataset.genre;const i=fa.genres.indexOf(g);if(i>=0)fa.genres.splice(i,1);else fa.genres.push(g);b.classList.toggle('sel',fa.genres.includes(g));state.activePreset=null;saveSession();renderPickerContent();}));});
  panel.querySelectorAll('[data-remove-genre]').forEach(b=>b.addEventListener('click',()=>{fa.genres=fa.genres.filter(g=>g!==b.dataset.removeGenre);state.activePreset=null;saveSession();renderPickerContent();}));
  ['avoidRecentToggle','weightUnheardToggle','kwFilterToggle','browserModeToggle'].forEach(id=>{panel.querySelector('#'+id)?.addEventListener('change',e=>{if(id==='avoidRecentToggle')fa.avoidRecent=e.target.checked;if(id==='weightUnheardToggle')fa.weightUnheard=e.target.checked;if(id==='kwFilterToggle')fa.excludeKW=e.target.checked;if(id==='browserModeToggle')state.browserMode=e.target.checked;state.activePreset=null;saveSession();});});
  const minS=panel.querySelector('#minDur'),maxS=panel.querySelector('#maxDur');
  if(minS)minS.addEventListener('input',e=>{fa.minDur=+e.target.value;if(fa.minDur>fa.maxDur){fa.maxDur=fa.minDur;if(maxS)maxS.value=fa.maxDur;const el=panel.querySelector('#maxDurVal');if(el)el.textContent=fa.maxDur;}const el=panel.querySelector('#minDurVal');if(el)el.textContent=fa.minDur;state.activePreset=null;saveSession();});
  if(maxS)maxS.addEventListener('input',e=>{fa.maxDur=+e.target.value;if(fa.maxDur<fa.minDur){fa.minDur=fa.maxDur;if(minS)minS.value=fa.minDur;const el=panel.querySelector('#minDurVal');if(el)el.textContent=fa.minDur;}const el=panel.querySelector('#maxDurVal');if(el)el.textContent=fa.maxDur;state.activePreset=null;saveSession();});
  panel.querySelectorAll('input[name="ageFilter"]').forEach(r=>r.addEventListener('change',e=>{fa.minAgeMonths=+e.target.value;state.activePreset=null;saveSession();}));
  panel.querySelectorAll('input[name="queueHistory"]').forEach(r=>r.addEventListener('change',e=>{fa.queueHistory=e.target.value;state.activePreset=null;saveSession();}));
  panel.querySelector('#cvgTrg')?.addEventListener('click',()=>{state.coverageOpen=!state.coverageOpen;panel.querySelector('#cvgBody')?.classList.toggle('open',state.coverageOpen);panel.querySelector('#cvgTrg .clps-arr')?.classList.toggle('open',state.coverageOpen);});

function attachAlbumListEvents(panel){
  panel=panel||document.getElementById('tab-picker');if(!panel)return;
  panel.querySelectorAll('.reroll-btn[data-reroll]').forEach(b=>b.addEventListener('click',e=>{if(state.isWorking)return;rerollAlbum(+e.currentTarget.dataset.reroll);}));
  panel.querySelectorAll('.album-item[data-idx]').forEach(item=>{
    let sx=0,sy=0,dr=false;
    item.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;dr=true;},{passive:true});
    item.addEventListener('touchmove',e=>{if(!dr)return;const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(Math.abs(dy)>Math.abs(dx)+10){dr=false;item.classList.remove('swipe-ready');item.style.transform='';return;}if(dx<0)item.style.transform=`translateX(${dx}px)`;item.classList.toggle('swipe-ready',dx<-60);},{passive:true});
    item.addEventListener('touchend',e=>{if(!dr)return;dr=false;item.classList.remove('swipe-ready');const dx=e.changedTouches[0].clientX-sx;if(dx<-60&&!state.isWorking)rerollAlbum(+item.dataset.idx);else item.style.transform='';},{passive:true});
  });
}

async function handlePick(){
  if(state.isWorking||!allAlbums.length)return;
  state.isWorking=true;renderPickerContent();
  let pool=applyFilters(allAlbums);const hm=HistoryProvider.getMap();const now=Date.now();
  if(state.coverageFilter==='unheard'){pool=pool.filter(a=>!hm.has(a.id));state.coverageFilter=null;}
  else if(state.coverageFilter==='longAgo'){pool=pool.filter(a=>{const lh=hm.get(a.id);return!lh||now-lh>180*86400000;});state.coverageFilter=null;}
  if(!pool.length){state.isWorking=false;state.phase='idle';renderPickerContent();const p=document.getElementById('tab-picker');if(p){const m=document.createElement('div');m.className='status-msg err';m.textContent='No albums match the current filters. Try relaxing your criteria.';const b=p.querySelector('#queueBtn');if(b)b.insertAdjacentElement('beforebegin',m);setTimeout(()=>m.remove(),4000);}return;}
  state.selectedAlbums=state.filters.weightUnheard?weightedPick(pool,state.albumCount):plainPick(pool,state.albumCount);
  state.phase='picked';state.isWorking=false;renderPickerContent(true);
}

async function rerollAlbum(idx){
  if(state.isWorking)return;
  const pool=applyFilters(allAlbums).filter(a=>!state.selectedAlbums.includes(a));if(!pool.length)return;
  const[rep]=state.filters.weightUnheard?weightedPick(pool,1):plainPick(pool,1);
  const item=document.querySelector(`.album-item[data-idx="${idx}"]`);
  if(item){item.classList.add('swipe-exit');await sleep(200);}
  state.selectedAlbums[idx]=rep;
  const wrap=document.getElementById('albumListWrap');
  if(wrap){wrap.outerHTML=buildAlbumListHTML();const panel=document.getElementById('tab-picker');attachAlbumListEvents(panel);document.getElementById('queueSelBtn')?.addEventListener('click',handleQueue);const ni=document.querySelector(`.album-item[data-idx="${idx}"]`);if(ni)ni.classList.add('swipe-enter');}
}

async function handleQueue(){
  if(state.isWorking||!state.selectedAlbums.length)return;
  state.isWorking=true;state.phase='queuing';renderPickerContent();
  const delay=state.browserMode?DELAY_BROWSER_MS:DELAY_DESKTOP_MS;
  try{
    for(const album of state.selectedAlbums){
      const el=document.getElementById('queueStatus');if(el)el.textContent=`Queueing "${album.name}"…`;
      const tracks=await SpotifyAPI.getAlbumTracks(album);
      for(const t of tracks){await SpotifyAPI.addToQueue(t.uri);await sleep(delay);}
      await HistoryProvider.log(album.id,album.name);
    }
    state.phase='done';
  }catch(err){const el=document.getElementById('queueStatus');if(el)el.textContent=err.message;state.phase='error';}
  finally{state.isWorking=false;renderPickerContent();renderHdrBadge();}
}

async function handleRefresh(){
  if(state.isWorking)return;
  state.isWorking=true;state.loadingLibrary=true;state.phase='idle';state.selectedAlbums=[];
  renderPickerContent();
  try{
    allAlbums=await SpotifyAPI.fetchAllAlbums((loaded,total)=>{const el=document.getElementById('fetchProgress');if(el)el.textContent=`Fetching library… ${loaded} / ${total}`;});
    state.cachedAt=Date.now();await Cache.saveLibrary();
    const syncBtn=document.getElementById('syncBtn');if(syncBtn)syncBtn.style.display='';
    renderHdrBadge();state.loadingLibrary=false;state.genresLoading=true;renderPickerContent();
    allGenres=await SpotifyAPI.fetchArtistGenres(allAlbums,(loaded,total)=>{['genreProgressWrap','genreProgressInner'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=`Genres… ${loaded} / ${total}`;});});
    state.genresLoading=false;await Cache.saveLibrary();renderPickerContent();
  }catch(err){
    state.loadingLibrary=false;state.genresLoading=false;
    const p=document.getElementById('tab-picker');if(p){const m=document.createElement('div');m.className='status-msg err';m.textContent=err.message;p.prepend(m);}
  }finally{state.isWorking=false;renderPickerContent();}
}

function openAlbumDetail(album){

  const lh=HistoryProvider.getMap().get(album.id);const heard=lh?`Last queued ${formatAge(Date.now()-lh)}`:'Never queued';
  const modal=document.createElement('div');modal.className='modal-bg';
  modal.innerHTML=`<div class="modal"><div class="modal-handle"></div><div class="modal-body">${art?`<img class="modal-art" src="${esc(art)}" alt="">`:`<div class="modal-art-ph">🎵</div>`}<div class="modal-title">${esc(album.name)}</div><div class="modal-artist">${esc(artist)}</div><div class="modal-meta">${yr?yr+' · ':''}${trk} tracks · ${dur} min${genres?' · '+esc(genres):''}<br><span style="color:var(--blue)">${heard}</span></div><div class="modal-actions"><button class="btn btn-primary" id="mdlQueue">▶ Queue Album</button><button class="btn" id="mdlClose">Close</button></div></div></div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
  modal.querySelector('#mdlClose').addEventListener('click',()=>modal.remove());
  modal.querySelector('#mdlQueue').addEventListener('click',async()=>{
    const btn=modal.querySelector('#mdlQueue');btn.disabled=true;btn.textContent='Queueing…';
    try{const delay=state.browserMode?DELAY_BROWSER_MS:DELAY_DESKTOP_MS;const tracks=await SpotifyAPI.getAlbumTracks(album);for(const t of tracks){await SpotifyAPI.addToQueue(t.uri);await sleep(delay);}await HistoryProvider.log(album.id,album.name);btn.textContent='✓ Queued!';setTimeout(()=>modal.remove(),1500);}
    catch(err){btn.disabled=false;btn.textContent='▶ Queue Album';alert(err.message);}
  });
}

// SECTION 16 — LEGACY MIGRATION (from original AlbumPick v3 localStorage)
// ═══════════════════════════════════════════════════════════════════
async function migrateFromLegacy(){
  try{
    const rawLib=localStorage.getItem('albumpick_library_v1');
    if(rawLib){const p=JSON.parse(rawLib);if(p?.albums?.length){const db=await DB.getDb();const ex=await db.get('library','main');if(!ex)await db.put('library',{cachedAt:p.cachedAt||Date.now(),genres:p.genres||[],albums:p.albums},'main');}localStorage.removeItem('albumpick_library_v1');}
    const rawHist=localStorage.getItem('albumpick_history_v1');
    if(rawHist){const e=JSON.parse(rawHist);if(Array.isArray(e)&&e.length){const db=await DB.getDb();const tx=db.transaction('history','readwrite');await Promise.all(e.filter(x=>x.id&&x.queuedAt).map(x=>tx.store.put({id:x.id,name:x.name||'',queuedAt:x.queuedAt})));await tx.done;}localStorage.removeItem('albumpick_history_v1');}
  }catch(e){console.warn('Legacy migration failed',e);}
}

// SECTION 17 — BOOT
// ═══════════════════════════════════════════════════════════════════
(async function boot(){
  // Request persistent storage early
  navigator.storage?.persist?.().then(g=>console.log('Persistent storage:',g?'granted':'denied')).catch(()=>{});

  const params=new URLSearchParams(window.location.search);
  const code=params.get('code'),oState=params.get('state'),oError=params.get('error');

  if(oError){window.history.replaceState({},'',window.location.pathname);render();return;}

  if(code&&oState){
    if(Auth.isLoggedIn()){window.history.replaceState({},'',window.location.pathname);}
    else{try{await Auth.handleCallback(code,oState);}catch(err){window.history.replaceState({},'',window.location.pathname);render();document.getElementById('app').innerHTML+=`<div style="position:fixed;top:16px;left:16px;right:16px;background:rgba(217,83,74,.12);border:1px solid rgba(217,83,74,.3);color:#d95349;padding:12px 16px;border-radius:10px;font-size:13px;z-index:999">${esc(err.message)}</div>`;return;}}
  }

  await migrateFromLegacy();

  if(Auth.isLoggedIn()){
    await Promise.all([Cache.loadLibrary(),HistoryProvider.load()]);
    restoreSession();
    // Show sync button if library loaded
    if(allAlbums.length){const syncBtn=document.getElementById('syncBtn');if(syncBtn)syncBtn.style.display='';}
  }

  render();

  // Start Now Playing polling (every 15s while app is open)
  if(Auth.isLoggedIn()){
    pollNowPlaying();
    _npTimer=setInterval(pollNowPlaying,15000);
  }

  // Register service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW registration failed',e));
  }
})();
