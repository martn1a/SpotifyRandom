/** Helper: attach click handlers to .car-card elements in a container */
function _attachCarouselClicks(container){
  container.querySelectorAll('.car-card[data-carid]').forEach(card=>{
    card.addEventListener('click',()=>{
      const a=allAlbums.find(x=>x.id===card.dataset.carid);
      if(a)openAlbumDetail(a);
    });
  });
}

/** PHASE 2: Return albums added to library in last N days */
function getNewInLibrary(days=30){
  const cutoff=Date.now()-days*86400000;
  return allAlbums
    .filter(a=>a._added_at&&new Date(a._added_at).getTime()>cutoff)
    .sort((a,b)=>new Date(b._added_at).getTime()-new Date(a._added_at).getTime());
}

/** PHASE 2: Return albums not heard in >90 days (rediscover candidates) */
function getRediscoverAlbums(maxDays=90){
  const hm=HistoryProvider.getMap();const now=Date.now();const threshold=maxDays*86400000;
  return allAlbums
    .filter(a=>{const lh=hm.get(a.id);return lh&&(now-lh>threshold);})
    .sort((a,b)=>{
      const la=hm.get(a.id)||0,lb=hm.get(b.id)||0;
      return la-lb; // oldest-heard first
    });
}

/** PHASE 2: Build top albums list from combined sources.
 * @param {'4w'|'6m'|'all'|'app30d'|'appAll'} timeRange */
async function getTopAlbums(timeRange){
  const hm=HistoryProvider.getMap();const now=Date.now();
  let cutoff=0;
  if(timeRange==='app30d')cutoff=now-30*86400000;
  // Map history entries to albums
  const scored=new Map();
  for(const[id,queuedAt]of hm){
    if(cutoff&&queuedAt<cutoff)continue;
    const a=allAlbums.find(x=>x.id===id);if(!a)continue;
    const prev=scored.get(id)||{album:a,playCount:0,source:'app',lastPlayed:0};
    prev.playCount++;prev.lastPlayed=Math.max(prev.lastPlayed,queuedAt);
    scored.set(id,prev);
  }
  if(timeRange==='4w'||timeRange==='6m'||timeRange==='all'){
    // Fetch Spotify top tracks and map to albums
    try{
      const tRange=timeRange==='4w'?'short_term':timeRange==='6m'?'medium_term':'long_term';
      const data=await SpotifyAPI.get(`https://api.spotify.com/v1/me/top/tracks?limit=50&time_range=${tRange}`);
      for(const track of(data.items||[])){
        const albId=track.album?.id;if(!albId)continue;
        const a=allAlbums.find(x=>x.id===albId);if(!a)continue;
        const prev=scored.get(albId)||{album:a,playCount:0,source:'spotify',lastPlayed:0};
        prev.playCount++;if(prev.source==='app')prev.source='both';else prev.source='spotify';
        scored.set(albId,prev);
      }
    }catch(e){/* API not available, fall back to app history only */}
  }
  return [...scored.values()].sort((a,b)=>b.playCount-a.playCount).slice(0,30);
}

    const track=wrap.querySelector('#homeTopCarousel');

        if(!results.length){track.innerHTML='<div class="carousel-empty">No Last.fm data for this period. Try syncing in Profile settings.</div>';return;}
        track.innerHTML=`<div class="carousel-track">${results.map(r=>{

// ── Library state
const libState={
  search:'',
  activeCluster:null,   // null = All, string = über-genre id
  activeSubGenres:[],   // selected sub-genre strings
  albumTypes:[],        // 'album','single','compilation' — empty = all
  sortMode:'added',     // 'added'|'az'|'release'|'duration'
  page:1,
  PAGE_SIZE:50,
};

/** Build over-genre counts from current library */
function _buildClusterCounts(){
  const counts=new Map();
  for(const a of allAlbums){
    const gs=a._genres||[];
    const clusters=new Set(gs.map(g=>clusterOf(g)));
    clusters.delete('other');
    for(const c of clusters){counts.set(c,(counts.get(c)||0)+1);}
  }
  return counts;
}

/** Get sub-genres for a cluster id, sorted by count */
function _subGenresForCluster(clusterId){
  const cluster=GENRE_CLUSTERS.find(c=>c.id===clusterId);if(!cluster)return[];
  const counts=new Map();
  for(const a of allAlbums){
    for(const g of(a._genres||[])){
      if(cluster.kw.some(k=>g.toLowerCase().includes(k))){
        counts.set(g,(counts.get(g)||0)+1);
      }
    }
  }
  return [...counts.entries()].sort((a,b)=>b[1]-a[1]).map(([g,n])=>({genre:g,count:n}));
}

/** Detect album_group / album_type from album name heuristics (Spotify doesn't return type in saved albums) */
function _guessAlbumType(a){
  const n=(a.name||'').toLowerCase();
  const t=a.tracks?.total||a.tracks?.items?.length||0;
  if(n.includes(' - single')||n.includes('(single)')||(t&&t<=3))return'single';
  if(n.includes('compilation')||n.includes(' - ep')||n.includes('(compilation)'))return'compilation';
  return'album';
}

/** Apply all library filters and return sorted albums */
function _applyLibFilters(){
  const q=libState.search.toLowerCase();
  let result=allAlbums.filter(a=>{
    // text search
    if(q&&!a.name.toLowerCase().includes(q)&&!(a.artists||[]).some(ar=>ar.name.toLowerCase().includes(q)))return false;
    // genre cluster filter
    if(libState.activeCluster){
      const ag=a._genres||[];const ac=new Set(ag.map(g=>clusterOf(g)));
      if(!ac.has(libState.activeCluster))return false;
    }
    // sub-genre filter
    if(libState.activeSubGenres.length>0){
      const ag=a._genres||[];
      if(!libState.activeSubGenres.some(sg=>ag.includes(sg)))return false;
    }
    // album type (AND with genre)
    if(libState.albumTypes.length>0){
      if(!libState.albumTypes.includes(_guessAlbumType(a)))return false;
    }
    return true;
  });
  // sort
  if(libState.sortMode==='az'){result.sort((a,b)=>a.name.localeCompare(b.name));}
  else if(libState.sortMode==='release'){result.sort((a,b)=>releaseYear(b)-releaseYear(a));}
  else if(libState.sortMode==='duration'){result.sort((a,b)=>albumDurMin(b)-albumDurMin(a));}
  else{// added (recently added first)
    result.sort((a,b)=>{const ta=a._added_at?new Date(a._added_at).getTime():0;const tb=b._added_at?new Date(b._added_at).getTime():0;return tb-ta;});
  }
  return result;
}

/** Render the album grid portion */
function _renderLibGrid(container,albums){
  const content=container.querySelector('#libContent');if(!content)return;
  const total=albums.length;const show=albums.slice(0,libState.page*libState.PAGE_SIZE);
  const countEl=content.querySelector('.lib-count');if(countEl)countEl.textContent=`${total} album${total!==1?'s':''}`;
  const grid=content.querySelector('#libGrid2');if(!grid)return;
  if(!show.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text-dim)">${allAlbums.length?'No albums match your filters':'Library not loaded — go to Picker to sync.'}</div>`;
    const lm=content.querySelector('.lib-load-more');if(lm)lm.remove();return;
  }
  grid.innerHTML=show.map((a,i)=>{
    const art=getArt(a,'md')||getArt(a,'lg');const artist=(a.artists||[]).map(ar=>ar.name).join(', ');
    return`<div class="alb-grid-item" data-libid="${esc(a.id)}" style="animation-delay:${Math.min(i*15,300)}ms">
      ${art?`<img class="alb-grid-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="alb-grid-art-ph">🎵</div>`}
      <div class="alb-grid-info"><div class="alb-grid-name">${esc(a.name)}</div><div class="alb-grid-artist">${esc(artist)}</div></div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.alb-grid-item').forEach(item=>item.addEventListener('click',()=>{const a=allAlbums.find(x=>x.id===item.dataset.libid);if(a)openAlbumDetail(a);}));
  // Load more button
  let lm=content.querySelector('.lib-load-more');
  if(show.length<total){
    if(!lm){lm=document.createElement('button');lm.className='lib-load-more';lm.textContent=`Load more (${total-show.length} remaining)`;lm.addEventListener('click',()=>{libState.page++;_renderLibGrid(container,albums);});content.appendChild(lm);}
    else{lm.textContent=`Load more (${total-show.length} remaining)`;}
  }else if(lm){lm.remove();}
}

/**
 * PHASE 3: Find albums not played for N+ days, prioritising formerly-frequent ones.
 * @param {number} thresholdDays  default 90
 * @returns {Array} albums sorted by staleness
 */
async function getRediscoveryAlbums(thresholdDays=90){
  await HistoryProvider.load();
  const hm=HistoryProvider.getMap();
  const threshold=thresholdDays*86400000;
  return allAlbums
    .filter(a=>{const lh=hm.get(a.id);return lh&&(Date.now()-lh>threshold);})
    .sort((a,b)=>(hm.get(a.id)||0)-(hm.get(b.id)||0));
}

/**
 * PHASE 3: Build über-genre cluster data: {cluster, genres[], albums[]}.
 * @param {number} minAlbums  min albums to include a cluster
 */
function _buildGenreClusters(minAlbums=4){
  const genreAlbums=new Map();
  for(const album of allAlbums){
    for(const g of(album._genres||[])){
      if(!genreAlbums.has(g))genreAlbums.set(g,new Set());
      genreAlbums.get(g).add(album);
    }
  }
  const clusterMap=new Map(GENRE_CLUSTERS.map(c=>([c.id,{cluster:c,genres:[],albumSet:new Set()}])));
  clusterMap.set('other',{cluster:{id:'other',label:'Other',icon:'🏷'},genres:[],albumSet:new Set()});
  for(const[genre,albums]of genreAlbums){
    const cid=clusterOf(genre);
    const entry=clusterMap.get(cid)||clusterMap.get('other');
    entry.genres.push(genre);
    for(const a of albums)entry.albumSet.add(a);
  }
  const result=[];
  for(const[,entry]of clusterMap){
    if(entry.albumSet.size<minAlbums)continue;
    result.push({cluster:entry.cluster,genres:entry.genres,albums:[...entry.albumSet]});
  }
  const order=GENRE_CLUSTERS.map(c=>c.id);
  result.sort((a,b)=>{const ia=order.indexOf(a.cluster.id),ib=order.indexOf(b.cluster.id);if(ia<0&&ib<0)return 0;if(ia<0)return 1;if(ib<0)return-1;return ia-ib;});
  return result;
}

/**
 * PHASE 3: Render the full Discover tab — Rediscover carousel + Genre Mix carousels.
 * @param {HTMLElement} panel
 */
function renderDiscoverCarousels(panel){
  const hm=HistoryProvider.getMap();
  const hasGenres=allAlbums.some(a=>a._genres&&a._genres.length>0);

  // ── Header
  const hdr=document.createElement('div');
  hdr.className='disc-header';
  hdr.innerHTML=`<div class="disc-header-title">Discover</div>
    <div class="disc-header-sub">Explore your library by genre · revisit forgotten favourites</div>`;
  panel.appendChild(hdr);

  // ── Rediscover carousel (albums not played in 90+ days)
  const redAlbums=allAlbums
    .filter(a=>{const lh=hm.get(a.id);return lh&&(Date.now()-lh>90*86400000);})
    .sort((a,b)=>(hm.get(a.id)||0)-(hm.get(b.id)||0))
    .slice(0,40);

  if(redAlbums.length){
    const sec=document.createElement('div');sec.className='disc-section';
    const cards=redAlbums.map(a=>_buildRediscoverCard(a,hm.get(a.id))).join('');
    sec.innerHTML=`<div class="disc-section-hdr">
        <span class="disc-section-title"><span class="disc-section-icon">🕰️</span>Rediscover</span>
        <span class="disc-section-sub">${redAlbums.length} albums waiting</span>
      </div>
      <div class="carousel-wrap"><div class="carousel-track" id="redTrack">${cards}</div></div>`;
    panel.appendChild(sec);
    sec.querySelector('#redTrack').addEventListener('click',e=>{
      const c=e.target.closest('.rediscover-card[data-redid]');
      if(!c)return;const a=allAlbums.find(x=>x.id===c.dataset.redid);if(a)openAlbumDetail(a);
    });
  }

  // ── Discover Weekly (Spotify Radar) — async inject between Rediscover and Genre Mixes
  const dwSection=document.createElement('div');dwSection.id='discDWSection';
  panel.appendChild(dwSection);
  RadarAPI.getCached('discover_weekly').then(dw=>{
    if(!dw||!dw.tracks?.length)return;
    let showAll=false;
    const renderDW=()=>{
      const tracks=showAll?dw.tracks:dw.tracks.filter(t=>!t.inLibrary);
      if(!tracks.length&&!showAll){dwSection.innerHTML='';return;}
      const cards=tracks.slice(0,30).map(t=>{
        const libA=allAlbums.find(a=>a.id===t.albumId);
        const artUrl=libA?getArt(libA,'md'):null;
        const badge=t.inLibrary?'✓ Lib':'＋ New';
        const badgeColor=t.inLibrary?'var(--blue)':'var(--warm)';
        return`<div class="car-card" data-dw-album="${esc(t.albumId)}">
          <div class="car-art-wrap">${artUrl?`<img class="car-art" src="${esc(artUrl)}" alt="" loading="lazy">`:`<div class="car-art-ph">🎵</div>`}
            <div class="car-badge" style="background:${badgeColor}">${badge}</div></div>
          <div class="car-name">${esc(t.albumName)}</div>
          <div class="car-artist">${esc((t.artists||[]).map(a=>a.name).join(', '))}</div>
        </div>`;
      }).join('');
      dwSection.innerHTML=`<div class="disc-section">
        <div class="disc-section-hdr" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="disc-section-title"><span class="disc-section-icon">🌐</span>Discover Weekly</span>
          <span class="disc-section-sub">via Spotify</span>
          <button class="btn btn-sm" id="dwToggleAll" style="margin-left:auto;font-size:11px;min-height:28px;padding:4px 10px">${showAll?'New only':'Show all'}</button>
          <button class="btn btn-sm" id="dwRefreshBtn" style="font-size:11px;min-height:28px;padding:4px 10px">↻</button>
        </div>
        <div style="font-size:12px;color:var(--text-dim);padding:0 0 8px">Albums based on this week's Discover Weekly tracks</div>
        <div class="carousel-wrap"><div class="carousel-track" id="dwCarTrack">${cards}</div></div>
      </div>`;
      dwSection.querySelector('#dwCarTrack').addEventListener('click',e=>{
        const c=e.target.closest('[data-dw-album]');if(!c)return;
        const albumId=c.dataset.dwAlbum;
        const libA=allAlbums.find(a=>a.id===albumId);
        if(libA){openAlbumDetail(libA);return;}
        const t=dw.tracks.find(x=>x.albumId===albumId);if(!t)return;
        const m=document.createElement('div');m.className='modal-bg';
        m.innerHTML=`<div class="modal"><div class="modal-handle"></div><div class="modal-body">
          <div class="modal-title">${esc(t.albumName)}</div>
          <div class="modal-artist">${esc((t.artists||[]).map(a=>a.name).join(', '))}</div>
          <div class="modal-meta" style="color:var(--warm)">Not in your library</div>
          <div class="modal-actions"><a class="btn btn-primary" href="https://open.spotify.com/album/${esc(albumId)}" target="_blank" rel="noopener" style="text-decoration:none">Open in Spotify ↗</a>
          <button class="btn" id="mdlCloseDW">Close</button></div></div></div>`;
        document.body.appendChild(m);m.addEventListener('click',e2=>{if(e2.target===m)m.remove();});
        m.querySelector('#mdlCloseDW').addEventListener('click',()=>m.remove());
      });
      dwSection.querySelector('#dwToggleAll').addEventListener('click',()=>{showAll=!showAll;renderDW();});
      dwSection.querySelector('#dwRefreshBtn').addEventListener('click',async()=>{
        dwSection.innerHTML='<div style="padding:16px;color:var(--text-dim);font-size:13px">Syncing…</div>';
        await RadarAPI.sync('discover_weekly',true);renderDiscoverTab(panel);
      });
    };
    renderDW();
  }).catch(()=>{});

  // ── Genre Mix carousels — one per über-genre cluster
  if(!hasGenres){
    const el=document.createElement('div');el.className='disc-empty';
    el.innerHTML=`<div class="disc-empty-icon">🎵</div><div class="disc-empty-title">Genres loading…</div>
      <div class="disc-empty-sub">Genre mixes will appear once the background genre fetch completes. This can take a few minutes on large libraries.</div>`;
    panel.appendChild(el);return;
  }

  const clusters=_buildGenreClusters(4);
  if(!clusters.length){
    const el=document.createElement('div');el.className='disc-empty';
    el.innerHTML=`<div class="disc-empty-icon">🎸</div><div class="disc-empty-title">No genre clusters found</div>
      <div class="disc-empty-sub">Re-sync your library from the Profile tab to load genre data.</div>`;
    panel.appendChild(el);return;
  }

  for(const cd of clusters){
    const sec=document.createElement('div');sec.className='disc-section';
    // Build sub-genre cards — one card per sub-genre, sorted by album count
    const subGenres=cd.genres
      .map(g=>({genre:g,albums:allAlbums.filter(a=>(a._genres||[]).includes(g))}))
      .filter(sg=>sg.albums.length>=2)
      .sort((a,b)=>b.albums.length-a.albums.length)
      .slice(0,12);
    const mixCards=subGenres.length
      ?subGenres.map(sg=>_buildSubGenreMixCard(sg.genre,sg.albums,cd.cluster)).join('')
      :_buildGenreMixCard(cd);
    const trackId=`gmix_${cd.cluster.id}`;
    sec.innerHTML=`<div class="disc-section-hdr">
        <span class="disc-section-title"><span class="disc-section-icon">${cd.cluster.icon||'🎵'}</span>${esc(cd.cluster.label)}</span>
        <span class="disc-section-sub">${cd.albums.length} albums</span>
      </div>
      <div class="carousel-wrap"><div class="carousel-track" id="${trackId}">${mixCards}</div></div>`;
    panel.appendChild(sec);
    sec.querySelector('#'+trackId).addEventListener('click',e=>{
      const sg=e.target.closest('[data-subgenre]');
      if(sg){
        const genre=sg.dataset.subgenre;
        openGenreDetail({cluster:{id:cd.cluster.id,label:genre,icon:cd.cluster.icon},genres:[genre],albums:allAlbums.filter(a=>(a._genres||[]).includes(genre))});
        return;
      }
      const cc=e.target.closest('[data-cluster-id]');
      if(cc)openGenreDetail(cd);
    });
  }
}

// ── Listen Later sort state ────────────────────────────────────────
const llState={sort:'date'}; // 'date' | 'artist' | 'name'

/** PHASE 4: Render Listen Later management view inside Library tab.
 *  Sort by: date added, artist, album name.
 *  Actions: Play, Queue, Remove. */
async function renderListenLaterView(container){
  container.innerHTML='<div style="text-align:center;padding:32px"><span style="color:var(--text-dim)">Loading…</span></div>';
  let items=[];
  try{items=await ListenLater.getAll();}catch(e){container.innerHTML='<div class="ll-empty"><div class="ll-empty-icon">⚠️</div><div class="ll-empty-title">Could not load list</div></div>';return;}

  // Sort
  const sorted=[...items];
  if(llState.sort==='date')sorted.sort((a,b)=>b.addedAt-a.addedAt);
  else if(llState.sort==='artist')sorted.sort((a,b)=>(a.artist||'').localeCompare(b.artist||''));
  else if(llState.sort==='name')sorted.sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  container.innerHTML='';

  // Sort chips
  const sortRow=document.createElement('div');sortRow.className='ll-sort-row';
  [['date','Date added'],['artist','Artist'],['name','Album name']].forEach(([k,l])=>{
    const c=document.createElement('button');c.className='ll-sort-chip'+(llState.sort===k?' active':'');
    c.textContent=l;c.addEventListener('click',()=>{llState.sort=k;renderListenLaterView(container);});
    sortRow.appendChild(c);
  });
  container.appendChild(sortRow);

  if(!sorted.length){
    const emp=document.createElement('div');emp.className='ll-empty';
    emp.innerHTML='<div class="ll-empty-icon">🕐</div><div class="ll-empty-title">Nothing saved yet</div><div style="font-size:12px;margin-top:6px">Tap "Save for later" on any album to add it here.</div>';
    container.appendChild(emp);return;
  }

  const countEl=document.createElement('div');
  countEl.style.cssText='font-size:11px;color:var(--text-dim);margin-bottom:8px;padding:0 2px';
  countEl.textContent=`${sorted.length} album${sorted.length!==1?'s':''}`;
  container.appendChild(countEl);

  const listEl=document.createElement('div');listEl.className='card';
  for(const item of sorted){
    const row=document.createElement('div');row.className='ll-item';
    const addedLbl=item.addedAt?`Added ${_formatShortDate(item.addedAt)}`:'';
    const artHTML=item.art
      ?`<img class="ll-art" src="${esc(item.art)}" alt="" loading="lazy">`
      :`<div class="ll-art-ph">🎵</div>`;
    row.innerHTML=`${artHTML}<div class="ll-info"><div class="ll-name">${esc(item.name||'')}</div><div class="ll-artist">${esc(item.artist||'')}</div>${addedLbl?`<div class="ll-date">${addedLbl}</div>`:''}</div><div class="ll-actions"><button class="ll-btn ll-btn-play" data-ll-play="${esc(item.id)}" title="Queue & play">▶ Play</button><button class="ll-btn ll-btn-remove" data-ll-remove="${esc(item.id)}" title="Remove">✕</button></div>`;
    listEl.appendChild(row);
  }
  container.appendChild(listEl);

  // Events
  listEl.addEventListener('click',async e=>{
    const playBtn=e.target.closest('[data-ll-play]');
    const remBtn=e.target.closest('[data-ll-remove]');
    if(playBtn){
      const id=playBtn.dataset.llPlay;
      const item=items.find(x=>x.id===id);if(!item)return;
      const album=item.albumRef||allAlbums.find(a=>a.id===id);
      if(!album){_toast('Album not in library — please re-sync.',true);return;}
      playBtn.disabled=true;playBtn.textContent='…';
      try{
        const delay=state.browserMode?DELAY_BROWSER_MS:DELAY_DESKTOP_MS;
        const tracks=await SpotifyAPI.getAlbumTracks(album);
        for(const t of tracks){await SpotifyAPI.addToQueue(t.uri);await sleep(delay);}
        await HistoryProvider.log(album.id,album.name);
        playBtn.textContent='✓';_toast(`Queued "${album.name}"`);
        renderHdrBadge();
      }catch(err){playBtn.disabled=false;playBtn.textContent='▶ Play';_toast(err.message,true);}
    }
    if(remBtn){
      const id=remBtn.dataset.llRemove;
      await ListenLater.remove(id);
      renderListenLaterView(container);
    }
  });
}

/** PHASE 4: Full-text search across albums, artists, genres.
 *  Real-time results as user types with 200ms debounce. */
let _srchScope='all'; // 'all' | 'albums' | 'artists' | 'genres'
let _srchTimer=null;

function renderSearchView(container, initialQuery){
  container.innerHTML='';

  const inputWrap=document.createElement('div');inputWrap.className='srch-input-wrap';
  inputWrap.innerHTML=`<span class="srch-icon">🔍</span><input class="srch-input" id="srchInput" type="search" placeholder="Search albums, artists, genres…" autocomplete="off" spellcheck="false" value="${esc(initialQuery||'')}"><button class="srch-clear${initialQuery?' vis':''}" id="srchClear">✕</button>`;
  container.appendChild(inputWrap);

  // Scope tabs
  const tabsEl=document.createElement('div');tabsEl.className='srch-tabs';
  [['all','All'],['albums','Albums'],['artists','Artists'],['genres','Genres']].forEach(([k,l])=>{
    const b=document.createElement('button');b.className='srch-tab'+(_srchScope===k?' active':'');
    b.textContent=l;b.addEventListener('click',()=>{_srchScope=k;tabsEl.querySelectorAll('.srch-tab').forEach(x=>x.classList.toggle('active',x.textContent===l));_doSearch();});
    tabsEl.appendChild(b);
  });
  container.appendChild(tabsEl);

  const resultsEl=document.createElement('div');resultsEl.id='srchResults';container.appendChild(resultsEl);

  const inp=container.querySelector('#srchInput');
  const clearBtn=container.querySelector('#srchClear');

  inp.addEventListener('input',()=>{
    clearBtn.classList.toggle('vis',inp.value.length>0);
    clearTimeout(_srchTimer);_srchTimer=setTimeout(_doSearch,200);
  });
  clearBtn.addEventListener('click',()=>{inp.value='';clearBtn.classList.remove('vis');_renderSearchResults(resultsEl,'',_srchScope);inp.focus();});

  function _doSearch(){_renderSearchResults(resultsEl,inp.value.trim(),_srchScope);}

  // Initial render
  if(initialQuery){_renderSearchResults(resultsEl,initialQuery,_srchScope);}
  else{_renderSearchPlaceholder(resultsEl);}

  // Focus input
  setTimeout(()=>inp.focus(),80);
}

function _renderSearchPlaceholder(el){
  el.innerHTML=`<div class="srch-empty"><div class="srch-empty-icon">🔍</div><div style="font-size:14px;color:var(--text-mid);font-weight:500;margin-bottom:6px">Search your library</div><div style="font-size:12px;color:var(--text-dim)">Albums · Artists · Genres</div></div>`;
}

function _renderSearchResults(el,q,scope){
  if(!q){_renderSearchPlaceholder(el);return;}
  if(!allAlbums.length){el.innerHTML=`<div class="srch-empty"><div class="srch-empty-icon">📚</div><div style="font-size:14px;color:var(--text-mid)">Library not loaded</div></div>`;return;}

  const ql=q.toLowerCase();
  const results=[];

  // Match albums by title
  if(scope==='all'||scope==='albums'){
    for(const a of allAlbums){
      if(a.name.toLowerCase().includes(ql)){
        results.push({type:'album',score:a.name.toLowerCase().startsWith(ql)?2:1,album:a,label:a.name,sub:(a.artists||[]).map(x=>x.name).join(', ')});
      }
    }
  }

  // Match by artist name (collect unique artists, link to albums)
  if(scope==='all'||scope==='artists'){
    const artistMap=new Map();
    for(const a of allAlbums){
      for(const ar of(a.artists||[])){
        if(ar.name.toLowerCase().includes(ql)){
          if(!artistMap.has(ar.id))artistMap.set(ar.id,{name:ar.name,albums:[],id:ar.id});
          artistMap.get(ar.id).albums.push(a);
        }
      }
    }
    for(const[,ar]of artistMap){
      results.push({type:'artist',score:ar.name.toLowerCase().startsWith(ql)?3:1.5,label:ar.name,sub:`${ar.albums.length} album${ar.albums.length!==1?'s':''}`,art:ar.albums[0]?getArt(ar.albums[0],'sm'):null,albums:ar.albums});
    }
  }

  // Match by genre
  if(scope==='all'||scope==='genres'){
    const genreMap=new Map();
    for(const a of allAlbums){
      for(const g of(a._genres||[])){
        if(g.toLowerCase().includes(ql)){
          if(!genreMap.has(g))genreMap.set(g,[]);
          genreMap.get(g).push(a);
        }
      }
    }
    for(const[g,albums]of genreMap){
      results.push({type:'genre',score:g.toLowerCase().startsWith(ql)?2.5:1,label:g,sub:`${albums.length} album${albums.length!==1?'s':''}`,albums});
    }
  }

  results.sort((a,b)=>b.score-a.score||a.label.localeCompare(b.label));

  if(!results.length){
    el.innerHTML=`<div class="srch-empty"><div class="srch-empty-icon">🔍</div><div style="font-size:14px;color:var(--text-mid)">No results for "${esc(q)}"</div></div>`;
    return;
  }

  const count=document.createElement('div');count.className='srch-result-count';count.textContent=`${results.length} result${results.length!==1?'s':''}`;
  el.innerHTML='';el.appendChild(count);

  const list=document.createElement('div');
  for(const r of results.slice(0,80)){
    const item=document.createElement('div');item.className='srch-item';
    const hl=(s)=>s.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<span class="srch-hl">$1</span>');
    let artHTML='',badge='';
    if(r.type==='album'){const art=getArt(r.album,'sm');artHTML=art?`<img class="srch-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="srch-art-ph">🎵</div>`;badge=`<span class="srch-badge">Album</span>`;}
    else if(r.type==='artist'){artHTML=r.art?`<img class="srch-art" src="${esc(r.art)}" alt="" loading="lazy">`:`<div class="srch-art-ph">👤</div>`;badge=`<span class="srch-badge">Artist</span>`;}
    else if(r.type==='genre'){artHTML=`<div class="srch-art-ph">🏷</div>`;badge=`<span class="srch-badge">Genre</span>`;}
    item.innerHTML=`${artHTML}<div class="srch-info"><div class="srch-name">${hl(esc(r.label))}</div><div class="srch-sub">${esc(r.sub||'')}</div></div>${badge}`;
    item.addEventListener('click',()=>{
      if(r.type==='album')openAlbumDetail(r.album);
      else if(r.type==='artist'||r.type==='genre'){
        // Jump to discover genre detail
        const albums=r.albums||[];
        if(!albums.length)return;
        const clusterLabel=r.type==='genre'?r.label:r.label;
        openGenreDetail({cluster:{id:'srch_'+r.label,label:clusterLabel,icon:r.type==='artist'?'👤':'🏷'},genres:r.type==='genre'?[r.label]:[],albums,artistFilter:r.type==='artist'?r.label:null});
      }
    });
    list.appendChild(item);
  }
  el.appendChild(list);
}

/** Helper: format a Unix-ms timestamp as a short date string. */
function _formatShortDate(ms){
  const d=new Date(ms);const now=new Date();
  const diffMs=now-d;const diffDays=Math.floor(diffMs/86400000);
  if(diffDays===0)return'today';if(diffDays===1)return'yesterday';
  if(diffDays<7)return`${diffDays} days ago`;
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:d.getFullYear()!==now.getFullYear()?'numeric':undefined});
}

// PHASE 5A — LAST.FM API MODULE
// ═══════════════════════════════════════════════════════════════════
const LASTFM_BASE='https://ws.audioscrobbler.com/2.0/';

const LastFmAPI={
  async isConfigured(){
    const key=await Settings.get('lastfm_api_key','');
    const user=await Settings.get('lastfm_username','');
    return!!(key&&user);
  },
  async getUsername(){return Settings.get('lastfm_username','');},
  async getApiKey(){return Settings.get('lastfm_api_key','');},

  /** Fetch all recent tracks (scrobbles). Paginates through all pages (200/page, 3 concurrent).
   *  @param {function} [onProgress] (loaded, total) callback  */
  async fetchRecentTracks(onProgress){
    const apiKey=await this.getApiKey();
    const user=await this.getUsername();
    if(!apiKey||!user)throw new Error('Last.fm not configured');

    // Get first page to find total
    const db=await DB.getDb();
    const existing=await db.get('lastfm_cache','scrobbles');
    const fromTs=existing?.entries?.length? Math.floor(Math.max(...existing.entries.map(e=>e.timestamp||0))/1000):0;

    const firstUrl=`${LASTFM_BASE}?method=user.getRecentTracks&api_key=${encodeURIComponent(apiKey)}&user=${encodeURIComponent(user)}&limit=200&page=1${fromTs?`&from=${fromTs}`:''}&format=json`;
    let firstData;
    try{const r=await fetch(firstUrl);if(!r.ok)throw new Error('Last.fm API '+r.status);firstData=await r.json();}
    catch(e){throw new Error('Last.fm fetch failed: '+e.message);}
    if(firstData.error)throw new Error('Last.fm error '+firstData.error+': '+firstData.message);

    const totalPages=parseInt(firstData.recenttracks?.['@attr']?.totalPages||'1');
    const totalTracks=parseInt(firstData.recenttracks?.['@attr']?.total||'0');
    const entries=[];

    const parsePage=(data)=>{
      const tracks=data.recenttracks?.track||[];
      for(const t of tracks){
        if(t['@attr']?.nowplaying)continue; // skip now-playing
        const ts=parseInt(t.date?.uts||'0')*1000;
        if(!ts)continue;
        entries.push({albumName:t.album?.['#text']||'',artistName:t.artist?.['#text']||'',timestamp:ts});
      }
    };
    parsePage(firstData);
    if(onProgress)onProgress(entries.length,totalTracks);

    // Paginate remaining pages with concurrency=3
    const CONC=3;
    for(let p=2;p<=totalPages;p+=CONC){
      const batch=[];
      for(let i=0;i<CONC&&p+i<=totalPages;i++){
        const page=p+i;
        batch.push((async()=>{
          let retryDelay=1000;
          for(let attempt=0;attempt<4;attempt++){
            try{
              const url=`${LASTFM_BASE}?method=user.getRecentTracks&api_key=${encodeURIComponent(apiKey)}&user=${encodeURIComponent(user)}&limit=200&page=${page}${fromTs?`&from=${fromTs}`:''}&format=json`;
              const r=await fetch(url);
              if(r.status===429){await sleep(retryDelay);retryDelay*=2;continue;}
              if(!r.ok)throw new Error('HTTP '+r.status);
              const d=await r.json();parsePage(d);
              if(onProgress)onProgress(entries.length,totalTracks);
              return;
            }catch(e){if(attempt===3)console.warn('Last.fm page '+page+' failed',e);}
          }
        })());
      }
      await Promise.all(batch);
    }

    // Merge with existing entries (deduplicate by timestamp+album)
    const merged=existing?.entries||[];
    const existingKeys=new Set(merged.map(e=>`${e.albumName}|${e.timestamp}`));
    for(const e of entries)if(!existingKeys.has(`${e.albumName}|${e.timestamp}`))merged.push(e);
    merged.sort((a,b)=>b.timestamp-a.timestamp);

    const record={fetchedAt:Date.now(),totalPages,entries:merged};
    await db.put('lastfm_cache',record,'scrobbles');
    await Settings.set('lastfm_scrobble_count',merged.length);
    await Settings.set('lastfm_last_sync',Date.now());
    return record;
  },

  /** Fetch top albums for a time range and cache. */
  async fetchTopAlbums(period){
    const apiKey=await this.getApiKey();
    const user=await this.getUsername();
    if(!apiKey||!user)return;
    try{
      const url=`${LASTFM_BASE}?method=user.getTopAlbums&api_key=${encodeURIComponent(apiKey)}&user=${encodeURIComponent(user)}&period=${period}&limit=500&format=json`;
      const r=await fetch(url);if(!r.ok)return;
      const d=await r.json();if(d.error)return;
      const entries=(d.topalbums?.album||[]).map((a,i)=>({albumName:a.name||'',artistName:a.artist?.name||'',playCount:parseInt(a.playcount||'0'),rank:i+1}));
      const db=await DB.getDb();
      await db.put('lastfm_cache',{fetchedAt:Date.now(),entries},`top_albums_${period}`);
    }catch(e){console.warn('fetchTopAlbums failed',e);}
  },
};

// PHASE 5B — SPOTIFY RADAR MODULE
// ═══════════════════════════════════════════════════════════════════
// ── Spotify Playlist ID Parser ──────────────────────────────────────────────
// Accepts: full URI (spotify:playlist:ID), share URL, or raw 22-char ID.
function parsePlaylistId(input){
  if(!input)return null;
  const s=input.trim();
  const uriMatch=s.match(/spotify:playlist:([A-Za-z0-9]+)/);
  if(uriMatch)return uriMatch[1];
  const urlMatch=s.match(/playlist\/([A-Za-z0-9]+)/);
  if(urlMatch)return urlMatch[1];
  if(/^[A-Za-z0-9]{15,30}$/.test(s))return s;
  return null;
}

const RadarAPI={
  getISOWeek(){
    const d=new Date();const day=d.getDay()||7;
    d.setHours(0,0,0,0);d.setDate(d.getDate()+4-day);
    const y=d.getFullYear();
    const week=Math.ceil(((d-new Date(y,0,1))/86400000+1)/7);
    return`${y}-W${String(week).padStart(2,'0')}`;
  },

  async findPlaylistId(type){
    // Priority 1: manually saved ID (most reliable — auto-discovery fails for
    // "Made for You" playlists because /me/playlists never returns them)
    const settingKey=type==='release_radar'?'radar_rr_id':'radar_dw_id';
    const stored=await Settings.get(settingKey,null);
    if(stored){
      const parsed=parsePlaylistId(stored);
      if(parsed)return parsed;
    }

    // Priority 2: scan /me/playlists — works only if user explicitly follows
    // the playlist; rarely matches Release Radar / Discover Weekly in practice
    const nameKeyword=type==='release_radar'?'release radar':'discover weekly';
    const descKeyword=type==='release_radar'?'release':'discover';
    try{
      let url='https://api.spotify.com/v1/me/playlists?limit=50';
      while(url){
        const d=await SpotifyAPI.get(url);
        for(const pl of(d.items||[])){
          if(pl.owner?.id!=='spotify')continue;
          const n=(pl.name||'').toLowerCase();
          const desc=(pl.description||'').toLowerCase();
          if(n.includes(nameKeyword)||desc.includes(descKeyword))return pl.id;
        }
        url=d.next;
      }
    }catch(e){
      if(e.message?.includes('403')){_toast('Re-login required for Radar features',true);return null;}
      console.warn('findPlaylistId /me/playlists failed',e);
    }

    console.warn(`RadarAPI: no playlist ID found for "${type}". Please enter it manually in Settings → Spotify Radar.`);
    return null;
  },

  async fetchPlaylistTracks(playlistId){
    const tracks=[];let url=`https://api.spotify.com/v1/playlists/${encodeURIComponent(playlistId)}/tracks?limit=100`;
    while(url){
      const d=await SpotifyAPI.get(url); // let errors (incl. 403) propagate to sync()'s catch
      tracks.push(...(d.items||[]));url=d.next;
    }
    return tracks;
  },

  async sync(type,force=false){
    try{
      const db=await DB.getDb();
      const cached=await db.get('radar_cache',type);
      const currentWeek=this.getISOWeek();
      // Skip if cached this week and fresh (< 6 hours) — unless force=true (manual button)
      if(!force&&cached&&cached.fetchedWeek===currentWeek&&Date.now()-cached.fetchedAt<6*3600000)return cached;

      const playlistId=await this.findPlaylistId(type);
      if(!playlistId){return null;}

      const rawTracks=await this.fetchPlaylistTracks(playlistId);
      if(!rawTracks)return null;

      // Deduplicate by albumId
      const libSet=new Set(allAlbums.map(a=>a.id));
      const seenAlbums=new Set();const tracks=[];
      for(const item of rawTracks){
        const t=item.track;if(!t||!t.album?.id)continue;
        if(seenAlbums.has(t.album.id))continue;
        seenAlbums.add(t.album.id);
        tracks.push({
          trackId:t.id,trackName:t.name,
          albumId:t.album.id,albumName:t.album.name,
          artists:(t.artists||[]).map(a=>({id:a.id,name:a.name})),
          addedAt:item.added_at||null,
          inLibrary:libSet.has(t.album.id),
        });
      }
      const record={fetchedAt:Date.now(),fetchedWeek:currentWeek,playlistId,tracks};
      await db.put('radar_cache',record,type);
      return record;
    }catch(e){
      if(e.message?.includes('403')){_toast('Re-login required for Radar features',true);}
      else{console.warn('RadarAPI.sync failed for '+type,e);}
      return null;
    }
  },

  async getCached(type){
    try{const db=await DB.getDb();return await db.get('radar_cache',type)||null;}
    catch(e){return null;}
  },
};
