<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AlbumPick v3</title>

  <!-- ── PWA ───────────────────────────────────────────────────── -->
  <!-- Web App Manifest: Chrome reads this to determine display mode,
       app name, and icon when the user adds the app to the home screen.
       href is set dynamically below so the icon can be inlined as a
       data-URI without needing a separate manifest.json file. -->
  <link rel="manifest" id="pwa-manifest">

  <!-- theme-color: colours the Android status bar / browser chrome -->
  <meta name="theme-color" content="#1DB954">

  <!-- Android Chrome: open directly in standalone (no browser bar) -->
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS Safari equivalent -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AlbumPick">

  <!-- iOS home screen icon (SVG music-note on dark rounded background) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'512'%20height%3D'512'%20viewBox%3D'0%200%20512%20512'%3E%3Crect%20width%3D'512'%20height%3D'512'%20rx%3D'80'%20fill%3D'%230d0c0b'%2F%3E%3Cpath%20d%3D'M336%20128v160c0%2026.5-21.5%2048-48%2048s-48-21.5-48-48%2021.5-48%2048-48c10.6%200%2020.4%203.4%2028.4%209.2V156.8l-128%2032v134.4c0%2026.5-21.5%2048-48%2048s-48-21.5-48-48%2021.5-48%2048-48c10.6%200%2020.4%203.4%2028.4%209.2V120L336%2078.1z'%20fill%3D'%231DB954'%2F%3E%3C%2Fsvg%3E">
  <!-- ── /PWA ──────────────────────────────────────────────────── -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #1DB954;
      --green-dark:  #158a3e;
      --green-glow:  rgba(29,185,84,.10);
      --bg:          #0d0c0b;
      --surface:     #141210;
      --surface2:    #1a1816;
      --border:      rgba(255,255,255,.065);
      --border2:     rgba(255,255,255,.10);
      --text:        #e8e6e3;
      --text-dim:    #7a7672;
      --text-mid:    #9e9a96;
      --error:       #e84343;
      --font-serif:  'DM Serif Display', Georgia, 'Times New Roman', serif;
      --font-body:   'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono:   'IBM Plex Mono', 'SF Mono', 'Menlo', monospace;
      --radius-sm:   8px;
      --radius-md:   14px;
      --radius-lg:   20px;
      --radius-full: 9999px;
      --shadow-sm:   0 2px 8px rgba(0,0,0,.45);
      --shadow-md:   0 4px 18px rgba(0,0,0,.55);
      --shadow-lg:   0 8px 36px rgba(0,0,0,.65);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,12,11,.88);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 22px;
      letter-spacing: .5px;
      color: var(--text);
      line-height: 1;
      user-select: none;
      font-style: italic;
    }

    .logo em {
      color: var(--green);
      font-style: normal;
    }

    /* ── BUTTONS ─────────────────────────────────────── */
    .btn {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      padding: 9px 18px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text-mid);
      cursor: pointer;
      border-radius: var(--radius-full);
      letter-spacing: .3px;
      transition: border-color .15s, background .15s, color .15s, box-shadow .15s;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover  { border-color: var(--text-mid); color: var(--text); }
    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: var(--green);
      border-color: var(--green);
      color: #000;
      font-weight: 700;
      box-shadow: 0 2px 12px rgba(29,185,84,.25);
    }
    .btn-primary:hover  { background: #1fdf64; border-color: #1fdf64; box-shadow: 0 2px 16px rgba(29,185,84,.35); }
    .btn-primary:active { background: var(--green-dark); border-color: var(--green-dark); }
    .btn-primary:disabled {
      background: var(--green-dark);
      border-color: var(--green-dark);
      color: rgba(0,0,0,.45);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-ghost-danger {
      border-color: rgba(232,67,67,.4);
      color: var(--error);
      font-size: 12px;
    }
    .btn-ghost-danger:hover { background: rgba(232,67,67,.12); border-color: var(--error); }

    /* ── MAIN ────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 18px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── GLOBAL STATUS ───────────────────────────────── */
    #globalStatus {
      max-width: 480px;
      width: calc(100% - 36px);
      margin: 12px auto 0;
      border-radius: var(--radius-md);
      font-size: 12px;
      padding: 0;
      display: none;
    }
    #globalStatus.show { display: block; padding: 13px 16px; }
    #globalStatus.error {
      background: rgba(232,67,67,.08);
      border: 1px solid rgba(232,67,67,.2);
      color: var(--error);
    }

    /* ── LOGIN SCREEN ────────────────────────────────── */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 60px 24px 48px;
      text-align: center;
    }

    .login-icon {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-md);
      background: var(--surface);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .login-title {
      font-family: var(--font-serif);
      font-size: 44px;
      font-style: italic;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: .5px;
    }

    .login-title span { color: var(--green); }

    .login-sub {
      color: var(--text-mid);
      font-size: 13px;
      line-height: 1.8;
      max-width: 280px;
      font-weight: 300;
    }

    /* ── CARD ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      box-shadow: var(--shadow-md);
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* ── COLLAPSIBLE ─────────────────────────────────── */
    .collapse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 16px;
      cursor: pointer;
      user-select: none;
      min-height: 50px;
    }
    .collapse-header:hover { background: var(--surface2); }

    .collapse-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-mid);
      font-weight: 700;
    }

    .collapse-arrow {
      color: var(--text-dim);
      font-size: 9px;
      transition: transform .22s;
    }
    .collapse-arrow.open { transform: rotate(180deg); }

    .collapse-body {
      border-top: 1px solid var(--border);
      padding: 16px;
      display: none;
    }
    .collapse-body.open { display: block; }

    /* ── FILTER CONTROLS ─────────────────────────────── */
    .filter-section { margin-bottom: 0; }
    .filter-section:last-child { margin-bottom: 0; }

    .filter-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .filter-section:last-child .filter-section-header { border-bottom: none; }
    .filter-section-header:active { opacity: .7; }
    .filter-section-body {
      display: none;
      padding: 12px 0 14px;
    }
    .filter-section-body.open { display: block; }
    .filter-section-arrow {
      color: var(--text-dim);
      font-size: 9px;
      transition: transform .22s;
      flex-shrink: 0;
    }
    .filter-section-arrow.open { transform: rotate(180deg); }

    .filter-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: var(--text-mid);
      margin-bottom: 0;
      display: block;
      font-weight: 700;
    }

    /* ── DISCOVERY PRESETS ───────────────────────────── */
    .presets-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 2px;
    }
    .presets-row::-webkit-scrollbar { display: none; }

    .preset-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-full);
      color: var(--text-mid);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
      min-height: 40px;
    }
    .preset-btn:hover { border-color: var(--green); color: var(--text); background: var(--surface2); }
    .preset-btn:active { transform: scale(.96); }
    .preset-btn.active {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }

    /* ── DECADE CHIPS (button, 3-state: neutral / included / excluded) ── */
    .decade-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .decade-chip-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font-body);
      color: var(--text-dim);
      background: transparent;
      transition: all .15s;
      /* Hint about 3-state via title; set per-chip in JS */
    }
    .decade-chip-btn:active { transform: scale(.94); }
    .decade-chip-btn.included {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
      box-shadow: 0 0 0 1px var(--green);
    }
    .decade-chip-btn.excluded {
      border-color: var(--error);
      color: var(--error);
      background: rgba(232,67,67,.08);
      box-shadow: 0 0 0 1px var(--error);
    }
    /* Hint text shown below the decade grid */
    .decade-hint {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 8px;
      text-align: center;
      font-family: var(--font-mono);
    }

    /* ── QUEUE HISTORY FILTER (in Content & History) ─── */
    .queue-history-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      margin-top: 8px;
    }
    .qh-chip { position: relative; }
    .qh-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
    .qh-chip label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      font-family: var(--font-body);
      transition: all .15s;
      text-align: center;
      line-height: 1.3;
      padding: 0 6px;
    }
    .qh-chip label:active { transform: scale(.96); }
    .qh-chip input:checked + label {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
      box-shadow: 0 0 0 1px var(--green);
    }

    /* ── TOGGLE ROW ──────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 46px;
      gap: 12px;
    }
    .toggle-info { flex: 1; }
    .toggle-title { font-size: 13px; color: var(--text); font-weight: 400; }
    .toggle-sub   { font-size: 10px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border2);
      border-radius: 13px;
      transition: background .2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      background: rgba(255,255,255,.4);
      border-radius: 50%;
      transition: transform .2s, background .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--green); }
    .toggle-switch input:checked + .toggle-track::after {
      transform: translateX(18px);
      background: #fff;
    }

    /* Duration sliders */
    .slider-row { display: flex; flex-direction: column; gap: 10px; }
    .slider-values {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-dim);
    }
    .slider-values b { color: var(--text); font-weight: 400; }
    .range-wrap { display: flex; flex-direction: column; gap: 8px; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border2);
      border-radius: var(--radius-full);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px; height: 24px;
      background: var(--green);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 4px var(--green-glow);
    }
    input[type=range]::-moz-range-thumb {
      width: 24px; height: 24px;
      background: var(--green);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    /* Stats chip */
    .stats-chip {
      display: none;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-dim);
      padding: 10px 0 0;
      text-align: center;
      border-top: 1px solid var(--border);
      margin-top: 14px;
    }
    .stats-chip.visible { display: block; }

    /* ── GENRE SEARCH INPUT ──────────────────────────── */
    .genre-search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .genre-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--text-dim);
      pointer-events: none;
      line-height: 1;
    }
    .genre-search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-full);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 12px;
      padding: 10px 32px 10px 30px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    .genre-search::placeholder { color: var(--text-dim); }
    .genre-search:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 2px var(--green-glow);
    }
    .genre-search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      display: none;
    }
    .genre-search-clear.visible { display: block; }
    .genre-search-clear:hover { color: var(--text); }

    /* Flat search results */
    .genre-search-results {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 180px;
      overflow-y: auto;
      padding-right: 2px;
      scrollbar-width: none;
    }
    .genre-search-results::-webkit-scrollbar { display: none; }
    .genre-search-noresult {
      font-size: 11px;
      color: var(--text-dim);
      padding: 4px 0;
    }

    /* ── GENRE CLUSTERS (accordion, mobile-first) ───── */
    .genre-lanes { display: flex; flex-direction: column; gap: 0; }

    .genre-cluster { border-bottom: 1px solid var(--border); }
    .genre-cluster:last-child { border-bottom: none; }

    /* Row contains the toggle zone (left, most of width) + all-btn (right) */
    .genre-cluster-header {
      display: flex;
      align-items: center;
      min-height: 52px;
    }

    /* Toggle zone: tap to open/close. Takes most of the row width. */
    .genre-cluster-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-height: 52px;
      padding: 8px 0;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .genre-cluster-toggle:active { opacity: .7; }

    .genre-cluster-arrow {
      font-size: 9px;
      color: var(--text-dim);
      transition: transform .22s;
      flex-shrink: 0;
    }
    .genre-cluster-arrow.open { transform: rotate(180deg); }

    .genre-cluster-icon { font-size: 13px; opacity: .8; flex-shrink: 0; }

    .genre-cluster-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-mid);
      font-weight: 700;
      flex: 1;
      min-width: 0;
    }

    .genre-cluster-badge {
      font-size: 9px;
      padding: 2px 7px;
      background: var(--green);
      color: #000;
      border-radius: var(--radius-full);
      font-weight: 700;
      display: none;
      flex-shrink: 0;
    }
    .genre-cluster-badge.visible { display: inline-block; }

    /* "All" button — right-side, clearly separated tap target */
    .genre-cluster-all {
      flex-shrink: 0;
      margin-left: 8px;
      padding: 0 12px;
      height: 36px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-family: var(--font-body);
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      min-width: 44px;
    }
    .genre-cluster-all:hover { border-color: var(--green); color: var(--green); }
    .genre-cluster-all:active { transform: scale(.93); }
    .genre-cluster-all.all-selected {
      background: var(--green);
      border-color: var(--green);
      color: #000;
    }
    .genre-cluster-all.some-selected {
      border-color: var(--green);
      color: var(--green);
    }

    /* Collapsible chip body */
    .genre-cluster-body {
      display: none;
      padding-bottom: 12px;
    }
    .genre-cluster-body.open { display: block; }

    /* Wrap-grid for chips — all visible, no horizontal scroll */
    .genre-cluster-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* Individual genre chip */
    .glchip {
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      height: 30px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 11px;
      font-family: var(--font-body);
      font-weight: 400;
      color: var(--text-dim);
      white-space: nowrap;
      background: transparent;
      transition: border-color .12s, color .12s, background .12s, transform .1s;
      flex-shrink: 0;
      user-select: none;
    }
    .glchip:hover  { border-color: var(--text-mid); color: var(--text); }
    .glchip:active { transform: scale(.94); }
    .glchip.selected {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
      box-shadow: 0 0 0 1px var(--green);
    }

    /* Selected summary bar at top */
    .genre-selected-bar {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .genre-selected-bar.visible { display: flex; }
    .genre-selected-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 8px 0 12px;
      height: 28px;
      background: var(--green);
      color: #000;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-family: var(--font-body);
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: background .12s;
    }
    .genre-selected-pill:hover { background: #1fdf64; }
    .genre-selected-pill-x { font-size: 12px; opacity: .7; line-height: 1; }

    .genre-clear-all {
      font-size: 10px;
      color: var(--text-dim);
      background: none;
      border: none;

  <!-- Minimal idb-compatible wrapper (inlined to avoid CDN dependency).
       Provides the same API surface as idb@8 used by the app:
       idb.openDB(), db.get/put/delete/getAll/clear, db.transaction(). -->
  <script>
  (function(global){
    'use strict';
    function wrap(req) {
      return new Promise(function(resolve, reject) {
        req.onsuccess = function() { resolve(req.result); };
        req.onerror   = function() { reject(req.error); };
      });
    }
    function wrapTx(tx) {
      return new Promise(function(resolve, reject) {
        tx.oncomplete = function() { resolve(); };
        tx.onerror    = function() { reject(tx.error); };
        tx.onabort    = function() { reject(tx.error || new DOMException('AbortError')); };
      });
    }
    function wrapStore(store, done) {
      return {
        put: function(value, key) {
          var req = key !== undefined ? store.put(value, key) : store.put(value);
          return wrap(req);
        },
        get: function(key) { return wrap(store.get(key)); },
        delete: function(key) { return wrap(store.delete(key)); },
        getAll: function() { return wrap(store.getAll()); },
        clear: function() { return wrap(store.clear()); },
      };
    }
    function wrapDb(db) {
      return {
        _db: db,
        get objectStoreNames() { return db.objectStoreNames; },
        get: function(storeName, key) {
          var tx = db.transaction(storeName, 'readonly');
          return wrap(tx.objectStore(storeName).get(key));
        },
        put: function(storeName, value, key) {
          var tx = db.transaction(storeName, 'readwrite');
          if (key !== undefined)
            tx.objectStore(storeName).put(value, key);
          else
            tx.objectStore(storeName).put(value);
          return wrapTx(tx);
        },
        delete: function(storeName, key) {
          var tx = db.transaction(storeName, 'readwrite');
          tx.objectStore(storeName).delete(key);
          return wrapTx(tx);
        },
        getAll: function(storeName) {
          var tx = db.transaction(storeName, 'readonly');
          return wrap(tx.objectStore(storeName).getAll());
        },
        clear: function(storeName) {
          var tx = db.transaction(storeName, 'readwrite');
          tx.objectStore(storeName).clear();
          return wrapTx(tx);
        },
        transaction: function(storeName, mode) {
          var tx    = db.transaction(storeName, mode || 'readonly');
          var store = wrapStore(tx.objectStore(storeName), wrapTx(tx));
          return { store: store, done: wrapTx(tx) };
        },
      };
    }
    global.idb = {
      openDB: function(name, version, opts) {
        return new Promise(function(resolve, reject) {
          var req = indexedDB.open(name, version);
          req.onupgradeneeded = function(e) {
            var db = e.target.result;
            // Provide a thin wrapper with createObjectStore for the upgrade callback
            if (opts && opts.upgrade) {
              opts.upgrade({
                objectStoreNames: db.objectStoreNames,
                createObjectStore: function(n, o) { return db.createObjectStore(n, o); },
              });
            }
          };
          req.onsuccess = function() { resolve(wrapDb(req.result)); };
          req.onerror   = function() { reject(req.error); };
        });
      }
    };
  })(typeof self !== 'undefined' ? self : this);

      { id: 'hiphop',     label: 'Hip-Hop / R&B', icon: '🎤',
        keywords: ['hip hop', 'hip-hop', 'rap', 'r&b', 'soul', 'neo-soul', 'funk', 'trap',
                   'grime', 'boom bap', 'urban', 'rhythm and blues', 'conscious',
                   'southern hip hop', 'east coast', 'west coast hip hop', 'drill'] },
      { id: 'pop',        label: 'Pop',        icon: '✨',
        keywords: ['pop', 'dream pop', 'chamber pop', 'baroque pop', 'electropop', 'hyperpop',
                   'bedroom pop', 'art pop', 'bubblegum', 'synth pop', 'j-pop', 'k-pop',
                   'dance pop', 'teen pop', 'sophisti-pop'] },
      { id: 'jazz',       label: 'Jazz / Blues', icon: '🎷',
        keywords: ['jazz', 'blues', 'swing', 'bebop', 'free jazz', 'latin jazz', 'soul jazz',
                   'gospel', 'boogie', 'ragtime', 'cool jazz', 'fusion', 'nu jazz'] },
      { id: 'classical',  label: 'Classical',  icon: '🎻',
        keywords: ['classical', 'contemporary classical', 'chamber', 'orchestral', 'opera',
                   'choral', 'minimalism', 'neo-classical', 'neoclassical', 'baroque',
                   'romantic', 'impressionist', 'avant-garde', 'new music'] },
      { id: 'folk',       label: 'Folk / World', icon: '🌍',
        keywords: ['folk', 'country', 'americana', 'bluegrass', 'world', 'reggae', 'afrobeat',
                   'latin', 'bossa', 'celtic', 'singer-songwriter', 'acoustic', 'roots',
                   'tropicalia', 'cumbia', 'salsa', 'flamenco', 'afropop', 'dancehall',
                   'calypso', 'ska', 'roots reggae', 'dub reggae'] },
    ];

    /** Assign a genre string to its cluster id (returns 'other' if none match). */
    function clusterOf(genre) {
      const g = genre.toLowerCase();
      for (const cluster of GENRE_CLUSTERS) {
        if (cluster.keywords.some(kw => g.includes(kw))) return cluster.id;
      }
      return 'other';
    }

    // Play-history cache: tracks which albums were recently queued so we can
    // exclude them when "Avoid recently played" is active.
    const HISTORY_MAX_AGE_DAYS = 30;   // albums queued within this window are "recent"

    // IndexedDB database name and version.
    // Bump DB_VERSION when the schema changes — the upgrade() callback handles migration.
    const DB_NAME    = 'albumpick_db';
    const DB_VERSION = 1;


    // ═══════════════════════════════════════════════════════════════════════
    // ── INDEXED DB ───────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Open (or reuse) the IndexedDB database.
     * Called lazily — the first caller awaits the open; subsequent calls
     * get the cached promise immediately.
     *
     * Schema:
     *   library  — single record keyed 'main': { cachedAt, genres, albums[] }
     *   history  — one record per album:        { id, name, queuedAt }
     */
    let _db = null;
    async function getDb() {
      if (_db) return _db;
      _db = await idb.openDB(DB_NAME, DB_VERSION, {
        upgrade(db) {
          if (!db.objectStoreNames.contains('library'))
            db.createObjectStore('library');                      // key passed explicitly
          if (!db.objectStoreNames.contains('history'))
            db.createObjectStore('history', { keyPath: 'id' });  // album id as primary key
        },
      });
      return _db;
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── CACHE MODULE ─────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Slim down a full Spotify album object to only the fields we need.
     * Stored in IndexedDB — no size limit concerns, but keeping it lean
     * speeds up serialisation and reduces memory at load time.
     * _genres is attached after the artist-genre fetch and preserved here.
     */
    function slimAlbum(a) {
      return {
        id:           a.id,
        name:         a.name,
        release_date: a.release_date,
        // added_at comes from the /me/albums item wrapper (not the album object itself).
        // We attach it as _added_at in fetchAllAlbums before slimming.
        _added_at:    a._added_at || null,
        artists:      (a.artists || []).map(ar => ({ id: ar.id, name: ar.name })),
        // Keep only the smallest image for the album card thumbnail
        images:       a.images ? [a.images[2] || a.images[1] || a.images[0]].filter(Boolean) : [],
        tracks: {
          total: a.tracks?.total,
          next:  a.tracks?.next || null,
          // Only store uri + duration_ms — that's all the filter & queue need
          items: (a.tracks?.items || []).map(t => ({
            uri:         t.uri,
            duration_ms: t.duration_ms,
          })),
        },
        _genres: a._genres || [],
      };
    }

    /** Persist the full library + genre list to IndexedDB. */
    async function saveLibraryCache() {
      try {
        const db = await getDb();
        await db.put('library', {
          cachedAt: Date.now(),
          genres:   allGenres,
          albums:   allAlbums.map(slimAlbum),
        }, 'main');
      } catch (e) {
        // Private browsing or storage blocked — silently ignore
        console.warn('AlbumPick: could not write library cache', e);
      }
    }

    /**
     * Try to load the library from IndexedDB.
     * Returns true if the cache was valid and data was restored, false otherwise.
     */
    async function loadLibraryCache() {
      try {
        const db   = await getDb();
        const data = await db.get('library', 'main');
        if (!data || !Array.isArray(data.albums) || data.albums.length === 0) return false;
        allAlbums = data.albums;
        allGenres = data.genres || [];

        // Fallback: reconstruct genre list from per-album _genres if top-level is missing.
        // Handles the case where a previous write was interrupted before genres were saved.
        if (allGenres.length === 0 && allAlbums.length > 0) {
          const gset = new Set();
          for (const a of allAlbums)
            for (const g of (a._genres || []))
              gset.add(g);
          allGenres = [...gset].sort();
        }

        state.cachedAt = data.cachedAt || null;
        return true;
      } catch (e) {
        return false;
      }
    }

    /** Remove the cached library from IndexedDB. */
    async function clearLibraryCache() {
      try {
        const db = await getDb();
        await db.delete('library', 'main');
      } catch (e) {}
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── HISTORY MODULE ───────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * In-memory mirror of the IndexedDB `history` store.
     * Populated once at boot by loadHistory(), then kept in sync on every write.
     * All sync helpers (getRecentIds, getHistoryMap) read from this array —
     * no async IDB round-trip needed during render or filter operations.
     *
     * Each entry: { id: string, name: string, queuedAt: number (Unix ms) }
     */
    let historyCache = [];

    /**
     * Read ALL history entries from IndexedDB into the in-memory mirror.
     * No pruning — entries are kept permanently so that coverage stats,
     * the "Never queued" filter, and the "Not in 6 months / 1 year"
     * filters have accurate all-time data.
     * The time-limited "Avoid recently played" filter is handled
     * exclusively by getRecentIds(), which filters in-memory.
     */
    async function loadHistory() {
      try {
        const db  = await getDb();
        const all = await db.getAll('history');
        historyCache = all;
        return all;
      } catch (e) {
        historyCache = [];
        return [];
      }
    }

    /**
     * Append queued albums to the history store.
     * Deduplicates by id (put() overwrites existing record for the same id).
     * Refreshes historyCache after writing.
     */
    async function appendHistory(albums) {
      try {
        const db  = await getDb();
        const tx  = db.transaction('history', 'readwrite');
        const now = Date.now();
        await Promise.all(
          albums.map(a => tx.store.put({ id: a.id, name: a.name, queuedAt: now }))
        );
        await tx.done;
        await loadHistory();   // refresh in-memory mirror
      } catch (e) {
        console.warn('AlbumPick: could not write history', e);
      }
    }

    /** Remove all history entries from IndexedDB and clear the mirror. */
    async function clearHistory() {
      try {
        const db = await getDb();
        await db.clear('history');
        historyCache = [];
      } catch (e) {}
    }

    /**
     * Export all history entries (including expired ones still in IDB)
     * as a JSON file download. Includes library coverage data if available.
     */
    async function exportHistory() {
      try {
        const db  = await getDb();
        const all = await db.getAll('history');
        const payload = {
          _version:  1,
          _exported: new Date().toISOString(),
          _app:      'AlbumPick v3',
          history:   all,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'albumpick_history_' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        console.warn('AlbumPick: export failed', e);
        showError('Export failed: ' + e.message);
      }
    }

    /**
     * Import history from a JSON file. Merges with existing data (dedup by id,
     * keeps the most recent queuedAt for each album).
     */
    async function importHistory() {
      const input = document.createElement('input');
      input.type  = 'file';
      input.accept = '.json';
      input.onchange = async () => {
        const file = input.files?.[0];
        if (!file) return;
        try {
          const text    = await file.text();
          const payload = JSON.parse(text);
          const entries = payload.history || payload; // support raw array or wrapped
          if (!Array.isArray(entries)) throw new Error('Invalid format');

          // Read all existing entries first, then merge in memory
          const db       = await getDb();
          const existing = await db.getAll('history');
          const map      = new Map(existing.map(e => [e.id, e]));

          let count = 0;
          for (const e of entries) {
            if (e.id && e.queuedAt) {
              const prev = map.get(e.id);
              if (!prev || e.queuedAt > prev.queuedAt) {
                map.set(e.id, { id: e.id, name: e.name || '', queuedAt: e.queuedAt });
                count++;
              }
            }
          }

          // Write merged entries in a single transaction
          const tx = db.transaction('history', 'readwrite');
          await Promise.all(
            [...map.values()].map(e => tx.store.put(e))
          );
          await tx.done;

          await loadHistory();
          render();
          showSuccess(`Imported ${count} history entries.`);
        } catch (e) {
          showError('Import failed: ' + e.message);
        }
      };
      input.click();
    }

    // ── Sync accessors (read from in-memory mirror — safe inside render()) ──

    /**
     * Set of album IDs queued within the HISTORY_MAX_AGE_DAYS window.
     * Used exclusively by the "Avoid recently played" toggle.
     * historyCache now contains ALL entries (no pruning), so we filter here.
     */
    function getRecentIds() {
      const cutoff = Date.now() - HISTORY_MAX_AGE_DAYS * 86400000;
      return new Set(historyCache.filter(e => e.queuedAt > cutoff).map(e => e.id));
    }

    /**
     * Map of albumId → queuedAt (ms) for ALL history entries (all-time).
     * Used by coverage stats, weighted pick, and queue-history filters
     * ("Never queued", "Not in 6 months", "Not in 1 year").
     */
    function getHistoryMap() { return new Map(historyCache.map(e => [e.id, e.queuedAt])); }

    /**
     * Compute library coverage statistics.
     * "Heard" = ever queued via AlbumPick (any time in history).
     * "Long ago" = last heard more than 6 months ago.
     * "Recent" = last heard within 6 months.
     */
    function getCoverageStats() {
      const empty = { total: 0, neverHeard: 0, longAgo: 0, recent: 0, everHeard: 0, coveragePct: 0 };
      if (!allAlbums.length) return empty;
      const historyMap = getHistoryMap();
      const now = Date.now();
      const SIX_MONTHS = 180 * 86400000;

      let neverHeard = 0, longAgo = 0, recent = 0;
      for (const album of allAlbums) {
        const lastHeard = historyMap.get(album.id);
        if (!lastHeard)                        neverHeard++;
        else if (now - lastHeard > SIX_MONTHS) longAgo++;
        else                                   recent++;
      }

      const everHeard    = allAlbums.length - neverHeard;
      const coveragePct  = Math.round((everHeard / allAlbums.length) * 100);
      return { total: allAlbums.length, neverHeard, longAgo, recent, everHeard, coveragePct };
    }

    /**
     * Weighted Fisher-Yates: albums never heard get weight 10,
     * heard >6 months ago get weight 5, heard >30 days ago get weight 2,
     * recently heard get weight 1.
     * This biases picks toward forgotten albums without excluding anything.
     */
    function weightedPickRandom(pool, n) {
      const historyMap = getHistoryMap();
      const now        = Date.now();
      const SIX_MONTHS  = 180 * 86400000;
      const THIRTY_DAYS = HISTORY_MAX_AGE_DAYS * 86400000;

      const weighted = pool.map(album => {
        const lastHeard = historyMap.get(album.id);
        let weight;
        if      (!lastHeard)                         weight = 10;  // never heard
        else if (now - lastHeard > SIX_MONTHS)       weight = 5;   // long ago
        else if (now - lastHeard > THIRTY_DAYS)      weight = 2;   // somewhat recent
        else                                         weight = 1;   // very recent
        return { album, weight };
      });

      const result = [];
      const items  = [...weighted];

      for (let i = 0; i < Math.min(n, items.length); i++) {
        let totalWeight = 0;
        for (let k = i; k < items.length; k++) totalWeight += items[k].weight;
        let rand   = Math.random() * totalWeight;
        let chosen = i;
        for (let k = i; k < items.length; k++) {
          rand -= items[k].weight;
          if (rand <= 0) { chosen = k; break; }
        }
        [items[i], items[chosen]] = [items[chosen], items[i]];
        result.push(items[i].album);
      }

      return result;
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── AUTH MODULE – PKCE ───────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Generate a cryptographically random URL-safe string of `len` chars. */
    function generateRandom(len = 64) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      const arr   = crypto.getRandomValues(new Uint8Array(len));
      return Array.from(arr, b => chars[b % chars.length]).join('');
    }

    /**
     * Hash the PKCE verifier with SHA-256, then base64url-encode.
     * This is the code_challenge sent to Spotify on the first leg.
     */
    async function generateChallenge(verifier) {
      const data   = new TextEncoder().encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(digest)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    /** Begin the PKCE auth flow: generate verifier → challenge → redirect. */
    async function login() {
      const verifier  = generateRandom(64);
      const challenge = await generateChallenge(verifier);
      const state     = generateRandom(16);

      localStorage.setItem('pkce_verifier', verifier);
      localStorage.setItem('pkce_state',    state);

      const params = new URLSearchParams({
        response_type:         'code',
        client_id:             CLIENT_ID,
        scope:                 SCOPES,
        redirect_uri:          REDIRECT_URI,
        state,
        code_challenge_method: 'S256',
        code_challenge:        challenge,
      });

      window.location.href = 'https://accounts.spotify.com/authorize?' + params;
    }

    /**
     * Second leg: exchange the auth code for access + refresh tokens.
     * Called once after Spotify redirects back with ?code=&state=.
     */
    async function handleCallback(code, returnedState) {
      const storedState = localStorage.getItem('pkce_state');
      if (returnedState !== storedState) throw new Error('State mismatch – possible CSRF. Please try logging in again.');

      const verifier = localStorage.getItem('pkce_verifier');

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          code,
          redirect_uri:  REDIRECT_URI,
          client_id:     CLIENT_ID,
          code_verifier: verifier,
        }),
      });

      if (!res.ok) throw new Error('Token exchange failed: ' + (await res.text()));
      storeTokens(await res.json());

      // Remove ?code=&state= from the URL so a hard-refresh doesn't re-submit
      window.history.replaceState({}, '', window.location.pathname);
    }

    /**
     * Silently refresh the access token using the stored refresh token.
     * Spotify may return a new refresh_token; if so we store it.
     * Note: Spotify's PKCE refresh tokens can expire after extended inactivity;
     * if refresh fails we clear state and ask the user to log in again.
     */
    async function refreshAccessToken() {
      const refreshToken = localStorage.getItem('spotify_refresh_token');
      if (!refreshToken) throw new Error('No refresh token – please log in.');

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'refresh_token',
          refresh_token: refreshToken,
          client_id:     CLIENT_ID,
        }),
      });

      if (!res.ok) {
        logout();
        throw new Error('Session expired – please log in again.');
      }
      storeTokens(await res.json());
    }

    /** Persist tokens; subtract 60 s from expires_in as a safety buffer. */
    function storeTokens({ access_token, refresh_token, expires_in }) {
      localStorage.setItem('spotify_access_token', access_token);
      if (refresh_token) localStorage.setItem('spotify_refresh_token', refresh_token);
      localStorage.setItem('spotify_expires_at', String(Date.now() + (expires_in - 60) * 1000));
    }

    /** Return a valid access token, refreshing if needed. */
    async function getAccessToken() {
      if (Date.now() > Number(localStorage.getItem('spotify_expires_at') || 0)) {
        await refreshAccessToken();
      }
      return localStorage.getItem('spotify_access_token');
    }

    function isLoggedIn() {
      return !!localStorage.getItem('spotify_refresh_token');
    }

    async function logout() {
      ['spotify_access_token', 'spotify_refresh_token', 'spotify_expires_at',
       'pkce_verifier', 'pkce_state'].forEach(k => localStorage.removeItem(k));
      // Intentionally NOT clearing library cache or play history —
      // data survives logout so it's available immediately after re-login.
      // Use deleteAllData() for a full wipe.
      allAlbums = [];
      allGenres = [];
      state.cachedAt = null;
      render();
    }

    /** Full data wipe: clears tokens, library cache, AND play history. */
    async function deleteAllData() {
      ['spotify_access_token', 'spotify_refresh_token', 'spotify_expires_at',
       'pkce_verifier', 'pkce_state'].forEach(k => localStorage.removeItem(k));
      await clearLibraryCache();
      await clearHistory();
      allAlbums = [];
      allGenres = [];
      state.cachedAt = null;
      render();
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── SPOTIFY API MODULE ───────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Authenticated GET; throws on non-2xx. */
    async function apiGet(url) {
      const token = await getAccessToken();
      const res   = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(`Spotify API ${res.status}: ${body || res.statusText}`);
      }
      return res.json();
    }

    /**
     * Fetch every saved album from /v1/me/albums.
     * The API returns max 50 per page; we follow `next` until null.
     * `onProgress(loaded, total)` is called after each page.
     */
    async function fetchAllAlbums(onProgress) {
      const albums = [];
      let url = 'https://api.spotify.com/v1/me/albums?limit=50&market=from_token';

      while (url) {
        const data = await apiGet(url);
        for (const item of data.items) {
          const album = item.album;
          // added_at lives on the item wrapper, NOT on the album object itself.
          // Spotify's /me/albums response wraps each album in { added_at, album: {...} }.
          // We attach it before pushing so slimAlbum() can persist it.
          album._added_at = item.added_at || null;
          albums.push(album);
        }
        url = data.next;   // null on the last page
        onProgress(albums.length, data.total);
      }
      return albums;
    }

    /**
     * Batch-fetch artist objects (max 50 per request) to read their genre tags.
     * Spotify does NOT expose genres on album objects — they live on the artist.
     * After this call every album in `albums` gets a `_genres` string[] property
     * containing the union of genres from all of its artists.
     * Returns a sorted, deduplicated array of every genre found in the library.
     */
    async function fetchArtistGenres(albums, onProgress) {
      // Collect every unique artist ID referenced across the library
      const idSet = new Set();
      for (const a of albums)
        for (const ar of (a.artists || []))
          if (ar.id) idSet.add(ar.id);

      const ids = [...idSet];
      const genreMap = new Map();   // artistId → string[]
      const BATCH = 50;

      for (let i = 0; i < ids.length; i += BATCH) {
        const batch = ids.slice(i, i + BATCH);
        // GET /v1/artists?ids=id1,id2,... returns up to 50 artist objects
        const data = await apiGet(
          'https://api.spotify.com/v1/artists?ids=' + batch.join(',')
        );
        for (const artist of (data.artists || []))
          if (artist) genreMap.set(artist.id, artist.genres || []);

        onProgress(Math.min(i + BATCH, ids.length), ids.length);
      }

      // Attach a _genres field to each album and collect the global genre set
      const globalSet = new Set();
      for (const album of albums) {
        const ag = new Set();
        for (const ar of (album.artists || []))
          for (const g of (genreMap.get(ar.id) || []))
            { ag.add(g); globalSet.add(g); }
        album._genres = [...ag];
      }

      return [...globalSet].sort();
    }

    /**, including extra pages when total > 50.
     * The /me/albums response embeds up to 50 tracks inline; albums with
     * more (rare but real) require extra requests to /v1/albums/{id}/tracks.
     */
    async function getAlbumTracks(album) {
      let items = album.tracks?.items || [];
      let next  = album.tracks?.next;           // present when total > 50

      while (next) {
        // Fetch the next page of tracks for this album
        const data = await apiGet(next);
        items = items.concat(data.items);
        next  = data.next;
      }
      return items;
    }

    /**
     * Add a single track URI to the user's active playback queue.
     * Spotify returns 204 on success, 404 when no active device is found.
     * The Spotify browser client may need longer delays between calls to
     * avoid 429 rate-limiting; the footer toggle controls this.
     */
    async function addToQueue(uri) {
      const token = await getAccessToken();
      const res   = await fetch(
        `https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(uri)}`,
        { method: 'POST', headers: { Authorization: 'Bearer ' + token } }
      );
      if (res.status === 404) throw new Error('No active Spotify device found. Start playing something first, then try again.');
      if (res.status === 429) throw new Error('Rate limited by Spotify. Enable "Browser client mode" in the footer for slower (safer) queuing.');
      if (!res.ok && res.status !== 204) throw new Error(`Queue error ${res.status}`);
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));


    // ═══════════════════════════════════════════════════════════════════════
    // ── FILTER MODULE ────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Parse the 4-digit year from Spotify's "YYYY", "YYYY-MM", or "YYYY-MM-DD". */
    function releaseYear(album) {
      return parseInt((album.release_date || '').slice(0, 4), 10) || 0;
    }

    /** Map a year to its decade string, e.g. 1983 → "80s", 1965 → "pre-70s". */
    function decadeOf(year) {
      if (year < 1970) return 'pre-70s';
      const base = Math.floor(year / 10) * 10;
      return String(base).slice(2) + 's';
    }

    /**
     * Sum duration of all inline tracks in minutes.
     * Tracks beyond 50 are not included here (they're fetched lazily at queue time),
     * so the slider filter is approximate for very long albums.
     */
    function albumDurMin(album) {
      return (album.tracks?.items || []).reduce((s, t) => s + (t.duration_ms || 0), 0) / 60000;
    }

    /**
     * Apply all active filters with AND logic.
     * Returns the subset of `albums` that passes every enabled filter.
     */
    function applyFilters(albums) {
      // Pre-compute recent IDs once per call (only when filter is active).
      // getRecentIds() parses localStorage and returns a Set<string>.
      const recentIds = state.filters.avoidRecent ? getRecentIds() : null;

      // Pre-compute history map for queueHistory filter
      const historyMap = (state.filters.queueHistory && state.filters.queueHistory !== 'any')
        ? getHistoryMap() : null;
      const now = Date.now();

      return albums.filter(album => {

        // ── Decade (include + exclude, Roon-style inversion) ─────────────
        // Include list: if non-empty, album decade must be in it.
        // Exclude list: album decade must NOT be in it (inverted/red chips).
        const d = decadeOf(releaseYear(album));
        if (state.filters.decades.length > 0 && !state.filters.decades.includes(d)) return false;
        if (state.filters.decadesExcluded.length > 0 && state.filters.decadesExcluded.includes(d)) return false;

        // ── Keyword (checked against album title) ────────────────────
        if (state.filters.excludeKeywords) {
          const low = (album.name || '').toLowerCase();
          if (BLOCKLIST_KEYWORDS.some(kw => low.includes(kw))) return false;
        }

        // ── Duration ─────────────────────────────────────────────────
        const dur = albumDurMin(album);
        if (dur < state.filters.minDurMin || dur > state.filters.maxDurMin) return false;

        // ── Genre ──────────────────────────────────────────────────────
        // If genres selected → album must have at least one matching genre.
        if (state.filters.genres.length > 0) {
          const ag = album._genres || [];
          if (!state.filters.genres.some(g => ag.includes(g))) return false;
        }

        // ── Age ("added to library at least N months ago") ─────────────
        if (state.filters.minAgeMonths > 0) {
          const addedMs  = album._added_at ? new Date(album._added_at).getTime() : 0;
          const cutoffMs = now - state.filters.minAgeMonths * 30 * 24 * 60 * 60 * 1000;
          if (addedMs > cutoffMs) return false;  // added too recently → skip
        }

        // ── Avoid recently queued ─────────────────────────────────────
        if (state.filters.avoidRecent && recentIds && recentIds.has(album.id)) return false;

        // ── Queue History Filter (Roon-style Discovery: never/6m/1yr) ─
        // Inspired by Roon's Focus "Played in the last X" with inversion:
        // allows picking albums you've never heard or haven't heard in a while.
        if (historyMap) {
          const lastHeard = historyMap.get(album.id);
          if (state.filters.queueHistory === 'never') {
            if (lastHeard) return false; // album has been queued before → skip
          } else if (state.filters.queueHistory === '6m') {
            if (lastHeard && (now - lastHeard < 180 * 86400000)) return false;
          } else if (state.filters.queueHistory === '1yr') {
            if (lastHeard && (now - lastHeard < 365 * 86400000)) return false;
          }
        }

        return true;
      });
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── APPLICATION STATE ────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    let allAlbums = [];
    let allGenres = [];   // sorted, deduplicated genre list built after library fetch

    const state = {
      albumCount:     1,
      filterOpen:     false,
      coverageOpen:   false,    // whether Library Coverage panel is expanded
      coverageFilter: null,     // 'unheard' | 'longAgo' | null — set by coverage panel CTA
      phase:          'idle',   // 'idle' | 'picked' | 'queuing'
      isWorking:      false,
      genresLoading:  false,  // true while artist genre batch-fetch is in progress
      cachedAt:       null,   // Unix timestamp (ms) of last cache write; null = no cache loaded
      selectedAlbums: [],
      albumSort:      'pick', // 'pick' | 'release' | 'added' | 'duration'
      activePreset:   null,   // tracks which Quick Focus preset is active
      // Sub-accordion open states for individual filter sections
      filterSections: {
        decade:   false,
        genre:    false,
        added:    false,
        content:  false,
        duration: false,
      },
      filters: {
        decades:          [],
        decadesExcluded:  [], // Roon-style inverted decade filter (excluded decades)
        excludeKeywords:  false,
        minDurMin:        0,
        maxDurMin:        200,
        genres:           [],  // empty = no genre filter; otherwise AND: album must match ≥1
        minAgeMonths:     0,   // 0 = off; otherwise only albums added ≥ N months ago
        avoidRecent:      true,  // exclude albums queued within HISTORY_MAX_AGE_DAYS (on by default)
        weightUnheard:    true,  // bias random picks toward unheard/forgotten albums (on by default)
        queueHistory:     'any', // 'any' | 'never' | '6m' | '1yr' — filter by queue history
      },
    };

    // ── Session filter persistence ─────────────────────────────────────────
    // Saves filter state + UI prefs to sessionStorage so they survive reloads
    // within the same session (inspired by Roon's Bookmark feature).
    function saveFiltersToSession() {
      try {
        sessionStorage.setItem('albumpick_session_filters', JSON.stringify({
          filters:     state.filters,
          albumCount:  state.albumCount,
          albumSort:   state.albumSort,
          activePreset: state.activePreset,
          filterOpen:  state.filterOpen,
          filterSections: state.filterSections,
        }));
      } catch(e) { /* sessionStorage may be blocked */ }
    }

    function restoreFiltersFromSession() {
      try {
        const raw = sessionStorage.getItem('albumpick_session_filters');
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (saved.filters)         Object.assign(state.filters, saved.filters);
        if (saved.albumCount)      state.albumCount = saved.albumCount;
        if (saved.albumSort)       state.albumSort  = saved.albumSort;
        if (saved.activePreset !== undefined) state.activePreset = saved.activePreset;
        if (saved.filterOpen  !== undefined) state.filterOpen   = saved.filterOpen;
        if (saved.filterSections) Object.assign(state.filterSections, saved.filterSections);
      } catch(e) { /* corrupt session data — ignore */ }
    }

    // ── Quick Focus presets ────────────────────────────────────────────────
    // Inspired by Roon's Focus feature: sets multiple filter parameters at once.
    function applyPreset(name) {
      if (name === 'surprise') {
        // Surprise Me: reset all filters
        state.filters.decades          = [];
        state.filters.decadesExcluded  = [];
        state.filters.genres           = [];
        state.filters.excludeKeywords  = false;
        state.filters.minAgeMonths     = 0;
        state.filters.avoidRecent      = false;
        state.filters.weightUnheard    = false;
        state.filters.minDurMin        = 0;
        state.filters.maxDurMin        = 200;
        state.filters.queueHistory     = 'any';
        state.activePreset = 'surprise';
      } else if (name === 'forgotten') {
        // Forgotten Gems: older library adds, never queued, no remixes
        state.filters.decades          = [];
        state.filters.decadesExcluded  = [];
        state.filters.genres           = [];
        state.filters.excludeKeywords  = true;
        state.filters.minAgeMonths     = 12;
        state.filters.avoidRecent      = false;
        state.filters.weightUnheard    = true;
        state.filters.minDurMin        = 0;
        state.filters.maxDurMin        = 200;
        state.filters.queueHistory     = 'never';
        state.activePreset = 'forgotten';
      } else if (name === 'deepcuts') {
        // Deep Cuts: older decades, 6m+ in library, not queued recently
        state.filters.decades          = ['70s', '80s', '90s', '00s'];
        state.filters.decadesExcluded  = [];
        state.filters.genres           = [];
        state.filters.excludeKeywords  = true;
        state.filters.minAgeMonths     = 6;
        state.filters.avoidRecent      = false;
        state.filters.weightUnheard    = false;
        state.filters.minDurMin        = 0;
        state.filters.maxDurMin        = 200;
        state.filters.queueHistory     = '6m';
        state.activePreset = 'deepcuts';
      }
      render();
      updateStatsChip();
      saveFiltersToSession();
    }

    // ── Sort selected albums ───────────────────────────────────────────────
    // Applied in renderAlbumList only — does not affect the pool or state.selectedAlbums order.
    function sortAlbums(albums) {
      const sorted = [...albums];
      switch (state.albumSort) {
        case 'release':
          return sorted.sort((a, b) => releaseYear(a) - releaseYear(b));
        case 'added':
          return sorted.sort((a, b) => {
            const da = a._added_at ? new Date(a._added_at).getTime() : 0;
            const db = b._added_at ? new Date(b._added_at).getTime() : 0;
            return da - db; // oldest additions first
          });
        case 'duration':
          return sorted.sort((a, b) => albumDurMin(a) - albumDurMin(b));
        default:
          return sorted; // 'pick' = original random order
      }
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── UI MODULE ────────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Update only the header action area (cache age label + ↻ + logout).
     * Called mid-flow after saving the library cache so we don't tear down

          </span>
          ${cvg.everHeard}/${cvg.total}
        </span>` : '';

      actions.innerHTML = `
        <div style="display:flex;align-items:center;gap:6px;">

        </div>`;

      document.getElementById('refreshBtn')?.addEventListener('click', async () => {
        if (state.isWorking) return;
        await clearLibraryCache();
        allAlbums = [];
        allGenres = [];
        state.cachedAt = null;
        state.filters.genres = [];
        render();
        handlePick();

      actions.innerHTML = `

          ${cacheLabel ? `<span style="font-size:10px;color:var(--text-dim);font-family:var(--font-mono);">${escHtml(cacheLabel)}</span>` : ''}

      document.getElementById('refreshBtn')?.addEventListener('click', async () => {

      // 3-state decade chip buttons: neutral / included (green) / excluded (red)
      // Click cycles: neutral → included → excluded → neutral
      const decadeChips = decades.map(d => {
        const isIncluded = state.filters.decades.includes(d);

        const cls = isIncluded ? 'included' : isExcluded ? 'excluded' : '';

      const cutoffRecent    = Date.now() - HISTORY_MAX_AGE_DAYS * 86400000;

                    ].map(o => `
