<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Album Discovery</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#1e1e1e;--surface:#252525;--surface2:#2c2c2c;--surface3:#343434;
      --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--border3:rgba(255,255,255,.20);
      --text:#f0ede8;--text-mid:#a8a4a0;--text-dim:#686460;
      --blue:#4a90d9;--blue-dk:#357ab8;--blue-glow:rgba(74,144,217,.13);
      --warm:#d4a574;--error:#d95349;
      --font-h:'Outfit',-apple-system,sans-serif;--font-b:'DM Sans',-apple-system,sans-serif;
      --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;--r-f:9999px;
      --sh-sm:0 2px 8px rgba(0,0,0,.40);--sh-md:0 4px 20px rgba(0,0,0,.50);--sh-lg:0 8px 40px rgba(0,0,0,.65);
      --tab-h:64px;--hdr-h:52px;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:14px;
      line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.8px;color:var(--text-mid)}
    /* App Shell */
    #app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
    #appHdr{height:var(--hdr-h);display:flex;align-items:center;justify-content:space-between;
      padding:0 16px;border-bottom:1px solid var(--border);background:rgba(26,26,26,.94);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;z-index:50}
    .logo{font-family:var(--font-h);font-size:19px;font-weight:700;letter-spacing:-.3px;user-select:none}
    .logo span{color:var(--blue)}
    .hdr-right{display:flex;align-items:center;gap:10px}
    .hdr-badge{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:5px}
    .hdr-badge-bar{width:32px;height:3px;background:var(--border2);border-radius:var(--r-f);overflow:hidden}
    .hdr-badge-fill{height:100%;background:var(--blue);border-radius:var(--r-f)}
    #tabContent{flex:1;overflow:hidden;position:relative}
    .tab-panel{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
      padding:16px 16px calc(var(--tab-h) + 16px);display:none;
      -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
    .tab-panel.active{display:block}
    /* Tab Bar */
    #tabBar{height:var(--tab-h);display:flex;align-items:stretch;border-top:1px solid var(--border);
      background:rgba(22,22,22,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      flex-shrink:0;z-index:50;padding-bottom:env(safe-area-inset-bottom,0)}
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;border:none;background:none;cursor:pointer;color:var(--text-dim);
      font-family:var(--font-b);font-size:10px;font-weight:500;letter-spacing:.2px;transition:color .15s;
      -webkit-tap-highlight-color:transparent;padding:0 4px}
    .tab-icon{font-size:20px;line-height:1;transition:transform .15s}
    .tab-btn:active .tab-icon{transform:scale(.86)}
    .tab-btn.active{color:var(--blue)}
    /* Components */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-sm)}
    .section{margin-bottom:14px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
      padding:11px 20px;border:1px solid var(--border2);background:transparent;color:var(--text-mid);
      font-family:var(--font-b);font-size:13px;font-weight:500;border-radius:var(--r-f);cursor:pointer;
      letter-spacing:.2px;min-height:44px;transition:border-color .15s,background .15s,color .15s;white-space:nowrap}
    .btn:hover{border-color:var(--border3);color:var(--text)}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;box-shadow:0 2px 16px rgba(74,144,217,.28)}
    .btn-primary:hover{background:#5a9fe8;border-color:#5a9fe8}
    .btn-primary:active{background:var(--blue-dk)}
    .btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-danger{border-color:rgba(217,83,74,.35);color:var(--error)}
    .btn-danger:hover{background:rgba(217,83,74,.1);border-color:var(--error)}
    .btn-full{width:100%}
    .btn-sm{padding:8px 14px;font-size:12px;min-height:36px}
    /* Collapse */
    .clps-trg{display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;cursor:pointer;user-select:none;min-height:50px;transition:background .15s}
    .clps-trg:hover{background:var(--surface2)}
    .clps-arr{color:var(--text-dim);font-size:10px;transition:transform .22s;flex-shrink:0}
    .clps-arr.open{transform:rotate(180deg)}
    .clps-body{border-top:1px solid var(--border);overflow:hidden;max-height:0;transition:max-height .3s ease}
    .clps-body.open{max-height:3000px}
    .clps-inner{padding:16px}
    /* Filter sub-sections */
    .fsub{border-bottom:1px solid var(--border)}
    .fsub:last-child{border-bottom:none}
    .fsub-trg{display:flex;align-items:center;justify-content:space-between;padding:11px 0;cursor:pointer;user-select:none}
    .fsub-trg:active{opacity:.7}
    .fsub-arr{font-size:9px;color:var(--text-dim);transition:transform .22s}
    .fsub-arr.open{transform:rotate(180deg)}
    .fsub-body{display:none;padding-bottom:14px}
    .fsub-body.open{display:block}
    /* Toggles */
    .tgl-row{display:flex;align-items:center;justify-content:space-between;min-height:46px;gap:12px}
    .tgl-info{flex:1;min-width:0}
    .tgl-title{font-size:13px;color:var(--text)}
    .tgl-sub{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.4}
    .tgl-sw{position:relative;width:44px;height:26px;flex-shrink:0}
    .tgl-sw input{opacity:0;width:0;height:0;position:absolute}
    .tgl-track{position:absolute;inset:0;background:var(--surface3);border-radius:13px;transition:background .2s;cursor:pointer}
    .tgl-track::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;
      background:rgba(255,255,255,.28);border-radius:50%;transition:transform .2s,background .2s}
    .tgl-sw input:checked+.tgl-track{background:var(--blue)}
    .tgl-sw input:checked+.tgl-track::after{transform:translateX(18px);background:#fff}
    /* Phase 11 QID-013: Burn Mode */
    .burn-mode-active{color:var(--error)!important}
    .tgl-sw input:checked+.burn-track{background:var(--error)!important}
    /* Phase 11 QID-014: Hidden Gem + Just Added badges */
    .badge-hiddengem{background:rgba(212,165,116,.15);color:var(--warm);border:1px solid rgba(212,165,116,.3)}
    .badge-justadded{background:rgba(74,144,217,.15);color:var(--blue);border:1px solid var(--blue-glow)}
    /* Phase 11 QID-021: Artist Deep Dive Modal */
    .adm-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:210;display:flex;flex-direction:column;animation:fadein .18s ease}
    .adm-sheet{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
    .adm-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
    .adm-art{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surface3)}
    .adm-hdr-info{flex:1;min-width:0}
    .adm-hdr-name{font-family:var(--font-h);font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .adm-hdr-sub{font-size:12px;color:var(--text-dim);margin-top:2px}
    .adm-close{border:none;background:none;color:var(--text-dim);font-size:22px;cursor:pointer;padding:4px 8px;flex-shrink:0}
    .adm-filters{display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
    .adm-filter-chip{padding:5px 12px;border:1px solid var(--border2);border-radius:var(--r-f);font-size:12px;font-weight:600;background:none;color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:all .12s}
    .adm-filter-chip.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .adm-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px calc(var(--tab-h) + 16px)}
    .adm-alb-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
    .adm-alb-row:last-child{border-bottom:none}
    .adm-alb-art{width:52px;height:52px;border-radius:var(--r-sm);object-fit:cover;flex-shrink:0;background:var(--surface3)}
    .adm-alb-info{flex:1;min-width:0}
    .adm-alb-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .adm-alb-meta{font-size:12px;color:var(--text-dim);margin-top:2px}
    .adm-alb-heard{color:var(--blue);font-size:12px;flex-shrink:0}
    /* Sliders */
    input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;
      background:var(--border2);border-radius:var(--r-f);outline:none;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;
      background:var(--blue);border-radius:50%;cursor:pointer;box-shadow:0 0 0 4px var(--blue-glow)}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;background:var(--blue);border:none;border-radius:50%}
    /* Radio chips */
    .rchip{position:relative}
    .rchip input{position:absolute;opacity:0;width:0;height:0}
    .rchip label{display:flex;align-items:center;justify-content:center;height:38px;
      border:1px solid var(--border2);border-radius:var(--r-f);cursor:pointer;
      font-size:11px;font-weight:600;color:var(--text-dim);font-family:var(--font-b);
      transition:all .15s;text-align:center;line-height:1.3;padding:0 4px}
    .rchip label:active{transform:scale(.96)}
    .rchip input:checked+label{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    /* Presets */
    .presets-wrap{display:flex;flex-direction:column;gap:6px}
    .presets-row{display:flex;gap:6px;flex-wrap:wrap}
    .presets-row-custom{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding-top:6px;border-top:1px solid var(--border)}
    .preset-btn{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:9px 15px;
      border:1px solid var(--border2);border-radius:var(--r-f);background:var(--surface);
      color:var(--text-mid);font-family:var(--font-b);font-size:12px;font-weight:600;
      cursor:pointer;white-space:nowrap;transition:all .15s;min-height:40px;box-shadow:var(--sh-sm)}
    .preset-btn:hover{border-color:var(--blue);color:var(--text)}
    .preset-btn:active{transform:scale(.96)}
    .preset-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    /* Count buttons */
    .count-row{display:flex;align-items:center;gap:8px}
    .count-lbl{font-size:11px;color:var(--text-dim);white-space:nowrap}
    .count-btns{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
    .count-btns::-webkit-scrollbar{display:none}
    .count-btn{display:flex;align-items:center;justify-content:center;min-width:42px;height:42px;
      padding:0 10px;border:1px solid var(--border2);border-radius:var(--r-f);background:none;
      color:var(--text-dim);font-family:var(--font-b);font-size:13px;font-weight:600;
      cursor:pointer;transition:all .15s;flex-shrink:0}
    .count-btn:active{transform:scale(.92)}
    .count-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    /* Decade grid */
    .dec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
    .dec-chip{display:flex;align-items:center;justify-content:center;height:38px;
      border:1px solid var(--border2);border-radius:var(--r-f);font-size:11px;font-weight:600;
      font-family:var(--font-b);color:var(--text-dim);background:none;cursor:pointer;transition:all .15s}
    .dec-chip:active{transform:scale(.94)}
    .dec-chip.inc{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .dec-chip.exc{border-color:var(--error);color:var(--error);background:rgba(217,83,74,.08)}
    .dec-hint{font-size:10px;color:var(--text-dim);margin-top:6px;text-align:center}
    /* Genre cluster */
    .gc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px}
    .gc-chip{display:flex;align-items:center;gap:6px;padding:9px 12px;
      border:1px solid var(--border2);border-radius:var(--r-md);font-size:12px;font-weight:500;
      color:var(--text-mid);background:none;cursor:pointer;transition:all .15s;font-family:var(--font-b)}
    .gc-chip:active{transform:scale(.96)}
    .gc-chip.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .gc-icon{font-size:14px;flex-shrink:0}
    /* Genre search */
    .gsearch-wrap{position:relative;margin-top:10px}
    .gsearch{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-f);
      color:var(--text);font-family:var(--font-b);font-size:13px;padding:10px 14px 10px 36px;
      outline:none;-webkit-appearance:none;transition:border-color .15s,box-shadow .15s}
    .gsearch::placeholder{color:var(--text-dim)}
    .gsearch:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
    .gsearch-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-dim);pointer-events:none}
    .gsearch-results{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .gsr-chip{padding:5px 11px;border:1px solid var(--border2);border-radius:var(--r-f);
      font-size:11px;font-weight:500;color:var(--text-dim);background:none;cursor:pointer;
      font-family:var(--font-b);transition:all .12s}
    .gsr-chip.sel{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .genre-progress{font-size:11px;color:var(--text-dim);text-align:center;padding:6px 0}
    /* Sort */
    .sort-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
    .sort-row::-webkit-scrollbar{display:none}
    .sort-lbl{font-size:11px;color:var(--text-dim);flex-shrink:0}
    .sort-chip{padding:5px 12px;border:1px solid var(--border2);border-radius:var(--r-f);
      background:none;font-size:11px;font-weight:500;color:var(--text-dim);cursor:pointer;
      font-family:var(--font-b);transition:all .12s;flex-shrink:0;white-space:nowrap}
    .sort-chip.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    /* Album items */
    .album-list{display:flex;flex-direction:column;gap:2px}
    .album-item{display:flex;align-items:center;gap:11px;padding:10px 12px;
      border-radius:var(--r-md);background:var(--surface);border:1px solid var(--border);
      transition:transform .15s,opacity .15s;will-change:transform;
      touch-action:pan-y;position:relative;overflow:hidden;
      animation:fadeUp .2s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .album-list .album-item:nth-child(1){animation-delay:0ms}
    .album-list .album-item:nth-child(2){animation-delay:45ms}
    .album-list .album-item:nth-child(3){animation-delay:90ms}
    .album-list .album-item:nth-child(4){animation-delay:135ms}
    .album-list .album-item:nth-child(5){animation-delay:175ms}
    .album-list .album-item:nth-child(n+6){animation-delay:210ms}
    .album-item.swipe-ready{border-left:3px solid var(--error)!important;transform:scale(.985)}
    @keyframes slideOutLeft{to{transform:translateX(-110%);opacity:0}}
    @keyframes slideInRight{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
    .album-item.swipe-exit{animation:slideOutLeft .2s ease forwards}
    .album-item.swipe-enter{animation:slideInRight .22s ease forwards!important}
    .alb-num{font-size:10px;color:var(--text-dim);width:14px;text-align:right;flex-shrink:0}
    .alb-art-wrap{width:72px;height:72px;flex-shrink:0;border-radius:var(--r-sm);overflow:hidden;background:var(--surface3);box-shadow:var(--sh-sm)}
    .alb-art-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .alb-art-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px}
    .alb-info{flex:1;min-width:0}
    .alb-name{font-family:var(--font-h);font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;line-height:1.2}
    .alb-artist{font-size:11px;color:var(--text-mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .alb-meta{font-size:10px;color:var(--text-dim);margin-top:2px;line-height:1.5}
    .reroll-btn{width:32px;height:32px;border:1px solid var(--border2);border-radius:var(--r-f);
      background:none;color:var(--text-dim);font-size:17px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
    .reroll-btn:hover{border-color:var(--blue);color:var(--blue)}
    .reroll-btn:active{transform:scale(.86)}
    /* Coverage */
    .cvg-top{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
    .cvg-pct{font-family:var(--font-h);font-size:38px;font-weight:700;color:var(--blue);line-height:1}
    .cvg-lbl{font-size:11px;color:var(--text-dim)}
    .freshness-bar{display:flex;height:6px;border-radius:var(--r-f);overflow:hidden;gap:1px;margin:10px 0 6px}
    .fresh-seg{height:100%;border-radius:1px;transition:flex .6s ease}
    .fresh-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}
    .fresh-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-dim)}
    .fresh-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .cvg-stat{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-top:1px solid var(--border)}
    .cvg-stat-left{display:flex;align-items:center;gap:10px}
    .cvg-stat-icon{font-size:16px;opacity:.7}
    .cvg-stat-lbl{font-size:12px;color:var(--text)}
    .cvg-stat-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
    .ov-section{margin-top:14px;border-top:1px solid var(--border);padding-top:14px}
    .ov-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-mid);font-weight:700;margin-bottom:10px}
    .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .bar-lbl{font-size:10px;color:var(--text-dim);width:46px;flex-shrink:0}
    .bar-track{flex:1;height:4px;background:var(--border2);border-radius:var(--r-f);overflow:hidden}
    .bar-fill{height:100%;background:var(--blue);border-radius:var(--r-f);opacity:.7;transition:width .6s ease}
    .bar-cnt{font-size:10px;color:var(--text-dim);width:28px;text-align:right;flex-shrink:0}
    /* Stats */
    .stats-info{font-size:11px;color:var(--text-dim);text-align:center;padding:8px 0 4px}
    /* Modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;animation:fadein .2s ease}
    @keyframes fadein{from{opacity:0}to{opacity:1}}
    .modal{width:100%;max-height:82dvh;background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;
      overflow-y:auto;animation:slideup .25s ease;border:1px solid var(--border2);border-bottom:none}
    @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
    .modal-handle{width:36px;height:4px;background:var(--border3);border-radius:var(--r-f);margin:12px auto 14px}
    .modal-body{padding:0 20px 32px}
    .modal-art{width:150px;height:150px;border-radius:var(--r-lg);object-fit:cover;box-shadow:var(--sh-lg);margin:0 auto 16px;display:block}
    .modal-art-ph{width:150px;height:150px;border-radius:var(--r-lg);background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 16px}
    .modal-title{font-family:var(--font-h);font-size:21px;font-weight:700;text-align:center;margin-bottom:4px}
    .modal-artist{font-size:14px;color:var(--text-mid);text-align:center;margin-bottom:4px}
    .modal-meta{font-size:12px;color:var(--text-dim);text-align:center;margin-bottom:20px;line-height:1.7}
    .modal-actions{display:flex;flex-direction:column;gap:8px}
    .modal-actions .btn-primary{width:100%}
    .modal-actions-row2{display:flex;gap:8px}
    .modal-actions-row2 .btn{flex:1}
    /* Library tab */
    .lib-filter{position:sticky;top:-16px;margin:-16px -16px 12px;padding:10px 16px;
      background:rgba(30,30,30,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);z-index:10}
    .lib-srch-wrap{position:relative}
    .lib-srch{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-f);
      color:var(--text);font-family:var(--font-b);font-size:13px;padding:10px 14px 10px 36px;
      outline:none;-webkit-appearance:none;transition:border-color .15s}
    .lib-srch:focus{border-color:var(--blue)}
    .lib-srch::placeholder{color:var(--text-dim)}
    .lib-srch-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-dim);pointer-events:none}
    .alb-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .alb-grid-item{cursor:pointer;border-radius:var(--r-md);overflow:hidden;background:var(--surface);
      border:1px solid var(--border);box-shadow:var(--sh-sm);transition:transform .15s;
      -webkit-tap-highlight-color:transparent;animation:fadeUp .2s ease both}
    .alb-grid-item:active{transform:scale(.96)}
    .alb-grid-art{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface3);display:block}
    .alb-grid-art-ph{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--surface3);font-size:32px}
    .alb-grid-info{padding:8px 10px 10px}
    .alb-grid-name{font-family:var(--font-h);font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
    .alb-grid-artist{font-size:11px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* Profile tab */
    .prof-user{display:flex;align-items:center;gap:14px;padding:16px;
      background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px}
    .prof-avi{width:56px;height:56px;border-radius:50%;background:var(--surface3);overflow:hidden;flex-shrink:0}
    .prof-avi img{width:100%;height:100%;object-fit:cover}
    .prof-name{font-family:var(--font-h);font-size:18px;font-weight:700}
    .prof-sub{font-size:12px;color:var(--text-dim);margin-top:2px}
    .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
    .stat-val{font-family:var(--font-h);font-size:28px;font-weight:700;color:var(--blue);line-height:1;margin-bottom:4px}
    .stat-lbl{font-size:11px;color:var(--text-dim)}
    /* Onboarding */
    #screen-onb{display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:40px 28px 60px;min-height:100dvh;text-align:center}
    .onb-icon{width:90px;height:90px;background:var(--surface);border:1px solid var(--border2);
      border-radius:var(--r-xl);display:flex;align-items:center;justify-content:center;
      font-size:40px;margin-bottom:28px;box-shadow:var(--sh-md)}
    .onb-title{font-family:var(--font-h);font-size:34px;font-weight:700;line-height:1.1;
      margin-bottom:14px;letter-spacing:-.5px}
    .onb-title span{color:var(--blue)}
    .onb-sub{font-size:15px;color:var(--text-mid);line-height:1.7;max-width:300px;margin-bottom:36px}
    .onb-btn{width:100%;max-width:280px;height:56px;font-size:15px;font-family:var(--font-h);
      font-weight:700;letter-spacing:.3px;border-radius:var(--r-xl)}
    /* Now playing bar */
    #npBar{background:var(--surface);border-top:1px solid var(--border);
      padding:7px 14px;display:none;align-items:center;gap:10px;flex-shrink:0;z-index:45}
    #npBar.vis{display:flex}
    .np-art{width:36px;height:36px;border-radius:var(--r-sm);background:var(--surface3);flex-shrink:0;object-fit:cover}
    .np-info{flex:1;min-width:0}
    .np-track{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .np-artist{font-size:11px;color:var(--text-mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .np-icon{font-size:14px;color:var(--blue);flex-shrink:0;animation:pulse 2s ease infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    /* Progress & status */
    .prog-lbl{font-size:12px;color:var(--text-mid);margin-bottom:10px}
    .prog-bg{height:3px;background:var(--border2);border-radius:var(--r-f);overflow:hidden;margin-bottom:6px}
    .prog-fill{height:100%;background:var(--blue);border-radius:var(--r-f);transition:width .3s ease}
    .status-msg{font-size:12px;padding:10px 14px;border-radius:var(--r-md);margin-bottom:12px}
    .status-msg.err{background:rgba(217,83,74,.08);border:1px solid rgba(217,83,74,.2);color:var(--error)}
    .status-msg.ok{background:rgba(74,144,217,.08);border:1px solid rgba(74,144,217,.2);color:var(--blue)}
    .status-msg.inf{background:var(--surface2);border:1px solid var(--border);color:var(--text-mid)}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);
      border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Phase 11 QID-013: Burn Toast floating emoji */
    @keyframes burnFloat{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}60%{opacity:1;transform:translateX(-50%) translateY(-80px) scale(1.4)}100%{opacity:0;transform:translateX(-50%) translateY(-140px) scale(.8)}}
    @keyframes burnTextSlide{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}
    .burn-float-emoji{position:fixed;font-size:36px;z-index:1000;pointer-events:none;animation:burnFloat 1.1s ease-out forwards}
    .burn-toast-text{position:fixed;background:rgba(217,83,74,.18);border:1px solid rgba(217,83,74,.4);color:#f87171;padding:8px 18px;border-radius:var(--r-f);font-size:13px;font-weight:600;white-space:nowrap;z-index:999;pointer-events:none;backdrop-filter:blur(8px);animation:burnTextSlide 2.2s ease forwards}
    /* Phase 12 QID-026: Home Refresh Button */
    @keyframes spin{to{transform:rotate(360deg)}}
    #homeRefreshBtn:disabled{animation:spin .8s linear infinite;opacity:.6}
    .load-center{display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 20px;text-align:center}
    .load-center p{font-size:13px;color:var(--text-dim)}
    /* Placeholder tabs */
    .ph-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);
      padding:28px 20px;text-align:center;margin-bottom:14px}
    .ph-phase{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--blue);font-weight:600;margin-bottom:10px}
    .ph-title{font-family:var(--font-h);font-size:22px;font-weight:700;margin-bottom:8px}
    .ph-sub{font-size:13px;color:var(--text-mid);line-height:1.6}
    .teaser-row{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
    .teaser-row::-webkit-scrollbar{display:none}
    .teaser-card{flex-shrink:0;width:130px}
    .teaser-art{width:130px;height:130px;border-radius:var(--r-md);object-fit:cover;background:var(--surface3);margin-bottom:7px;display:block}
    .teaser-art-ph{width:130px;height:130px;border-radius:var(--r-md);background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:7px}
    .teaser-name{font-size:12px;font-weight:600;font-family:var(--font-h);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .teaser-artist{font-size:11px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* Genre sub-genres */
    .gc-chip-wrap{display:flex;flex-direction:column;gap:0}
    .gc-subgenres{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;padding:8px 0 4px 6px;border-left:2px solid var(--blue-glow);margin:0 0 6px 6px}
    .sgchip{padding:4px 10px;border:1px solid var(--border2);border-radius:var(--r-f);font-size:11px;
      font-weight:500;color:var(--text-dim);background:none;cursor:pointer;font-family:var(--font-b);transition:all .12s}
    .sgchip.sel{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .sgchip-cnt{font-size:9px;opacity:.6;margin-left:3px}
    .gc-chip-expand{font-size:10px;color:var(--text-dim);margin-left:auto;padding-left:8px;transition:transform .2s}
    .gc-chip-expand.open{transform:rotate(180deg)}
    /* Custom preset styles */
    .preset-btn.custom{border-color:rgba(212,165,116,.4);color:var(--warm)}
    .preset-btn.custom.active{border-color:var(--warm);background:rgba(212,165,116,.12)}
    .preset-del{font-size:11px;padding:0 3px 0 4px;opacity:.5;line-height:1}
    .preset-del:hover{opacity:1;color:var(--error)}
    /* Picker source buttons — QID-009 */
    .picker-src-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .picker-src-btn{height:40px;border:1px solid var(--border2);border-radius:var(--r-f);background:none;
      color:var(--text-mid);font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;
      transition:all .15s;white-space:nowrap}
    .picker-src-btn:active{transform:scale(.96)}
    .picker-src-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .preset-save-btn{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:9px 12px;
      border:1px dashed var(--border2);border-radius:var(--r-f);background:none;color:var(--text-dim);
      font-family:var(--font-b);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;
      transition:all .15s;min-height:40px}
    .preset-save-btn:hover{border-color:var(--warm);color:var(--warm)}
    /* Save-preset dialog */
    .preset-dlg-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);z-index:300;display:flex;align-items:flex-end;animation:fadein .15s}
    .preset-dlg{width:100%;background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;
      padding:20px 20px 32px;border:1px solid var(--border2);border-bottom:none;animation:slideup .2s}
    .preset-dlg h3{font-family:var(--font-h);font-size:17px;font-weight:700;margin-bottom:14px}
    .preset-dlg input{width:100%;background:var(--surface2);border:1px solid var(--border2);
      border-radius:var(--r-md);color:var(--text);font-family:var(--font-b);font-size:14px;
      padding:12px 14px;outline:none;margin-bottom:14px;-webkit-appearance:none}
    .preset-dlg input:focus{border-color:var(--blue)}
    .preset-dlg-btns{display:flex;gap:10px}
    .preset-dlg-btns .btn{flex:1}
    @media(max-width:360px){.dec-grid{grid-template-columns:repeat(3,1fr)}.gc-grid{grid-template-columns:1fr}}
    @media(min-width:500px){.tab-panel{padding-left:max(16px,(100vw - 468px)/2);padding-right:max(16px,(100vw - 468px)/2)}}

    /* ── PHASE 6A: HEAVY ROTATION & LIBRARY RADIO ──────────────────── */
    .heavy-rot-section{margin-bottom:20px}
    .heavy-rot-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;font-weight:600;color:var(--text)}
    .heavy-rot-icon{font-size:18px}
    .heavy-rot-carousel{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin:12px 0}
    .heavy-rot-carousel::-webkit-scrollbar{display:none}
    .heavy-rot-card{flex-shrink:0;scroll-snap-align:start;position:relative;width:120px;aspect-ratio:1;border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:transform .15s;box-shadow:var(--sh-sm)}
    .heavy-rot-card:active{transform:scale(.95)}
    .heavy-rot-card-art{width:100%;height:100%;object-fit:cover;display:block}
    .heavy-rot-badge{position:absolute;bottom:8px;right:8px;background:var(--bg);border:1px solid rgba(255,255,255,.2);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.5)}
    .heavy-rot-actions{display:flex;gap:8px;margin-top:10px}
    .heavy-rot-actions .btn{flex:1;font-size:12px;padding:10px}
    .library-radio-container{margin-bottom:20px}
    .library-radio-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;font-weight:600;color:var(--text)}
    .library-radio-carousel{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .library-radio-carousel::-webkit-scrollbar{display:none}
    .library-radio-card{flex-shrink:0;scroll-snap-align:start;width:100px;aspect-ratio:1;border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:transform .15s;box-shadow:var(--sh-sm)}
    .library-radio-card:active{transform:scale(.95)}
    .library-radio-card-art{width:100%;height:100%;object-fit:cover;display:block}
    .library-radio-actions{display:flex;gap:8px;margin-top:10px}
    .library-radio-actions .btn{flex:1;font-size:12px;padding:10px}
    .badge-container{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;z-index:10}
    .sonic-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15)}
    .sonic-badge.hot-rotation{background:#f59e0b;color:#fff}
    .sonic-badge.new-album{background:#06b6d4;color:#fff}
    .sonic-badge.rediscover{background:#ec4899;color:#fff}

    /* ── PHASE 7A: DAILY PICK + FORGOTTEN GEMS + ON THIS DAY + QUICK QUEUE ── */
    .daily-pick-section{margin-bottom:20px}
    .daily-pick-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.8px;color:var(--blue);margin-bottom:8px}
    .daily-pick-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:12px;cursor:pointer;transition:background .15s;box-shadow:var(--sh-sm)}
    .daily-pick-card:active{background:var(--surface2)}
    .daily-pick-art{width:64px;height:64px;border-radius:var(--r-md);object-fit:cover;flex-shrink:0;box-shadow:var(--sh-sm)}
    .daily-pick-art-ph{width:64px;height:64px;border-radius:var(--r-md);background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
    .daily-pick-info{flex:1;min-width:0}
    .daily-pick-name{font-family:var(--font-h);font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
    .daily-pick-artist{font-size:12px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
    .daily-pick-hint{font-size:11px;color:var(--text-dim)}
    .daily-pick-btn{flex-shrink:0;font-size:12px!important;padding:8px 14px!important;min-height:34px!important}
    .quick-queue-wrap{margin-bottom:20px}
    .quick-queue-btn{background:linear-gradient(135deg,rgba(74,144,217,.15),rgba(74,144,217,.08))!important;border-color:rgba(74,144,217,.35)!important;color:var(--text)!important;gap:12px!important;padding:16px 20px!important;min-height:60px!important;text-align:left!important;justify-content:flex-start!important}
    .quick-queue-btn:active{background:linear-gradient(135deg,rgba(74,144,217,.22),rgba(74,144,217,.12))!important}
    .quick-queue-icon{font-size:24px;flex-shrink:0}
    .quick-queue-title{font-family:var(--font-h);font-size:16px;font-weight:700;color:var(--text)}
    .quick-queue-sub{font-size:12px;color:var(--text-dim);margin-top:2px}
    /* ── PHASE 6B: RANDOMIZED CAROUSEL + PLAYLIST MODAL ─────────────– */
    .car-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .car-section-title{font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent}
    .car-section-title:hover{color:var(--blue)}
    .car-section-title .car-see-all{font-size:11px;font-weight:500;color:var(--blue);opacity:.8}
    .car-section-sub{font-size:11px;color:var(--text-dim)}
    /* Playlist Full View Modal */
    .plm-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;animation:fadein .15s;display:flex;flex-direction:column;overflow:hidden}
    .plm-sheet{background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;margin-top:auto;max-height:90dvh;display:flex;flex-direction:column;animation:slideup .22s}
    .plm-hdr{display:flex;align-items:center;gap:12px;padding:18px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    .plm-title{font-family:var(--font-h);font-size:17px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .plm-count{font-size:11px;color:var(--text-dim);flex-shrink:0}
    .plm-view-toggle{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-f);padding:5px 10px;font-size:12px;color:var(--text-mid);cursor:pointer;font-family:var(--font-b);flex-shrink:0;transition:all .12s}
    .plm-view-toggle:hover{color:var(--text)}
    .plm-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px;line-height:1;flex-shrink:0}
    .plm-search{padding:10px 16px;flex-shrink:0}
    .plm-search input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-md);color:var(--text);font-family:var(--font-b);font-size:13px;padding:9px 12px;outline:none;-webkit-appearance:none}
    .plm-search input:focus{border-color:var(--blue)}
    .plm-body{overflow-y:auto;flex:1;padding:4px 0 env(safe-area-inset-bottom,16px)}
    /* List view */
    .plm-list-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
    .plm-list-item:hover{background:var(--surface2)}
    .plm-list-item:active{background:var(--surface3)}
    .plm-list-art{width:52px;height:52px;border-radius:var(--r-sm);object-fit:cover;flex-shrink:0;background:var(--surface3)}
    .plm-list-art-ph{width:52px;height:52px;border-radius:var(--r-sm);background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .plm-list-info{flex:1;min-width:0}
    .plm-list-name{font-family:var(--font-h);font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .plm-list-artist{font-size:11px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* Grid view */
    .plm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:0 16px}
    .plm-grid-item{aspect-ratio:1;border-radius:var(--r-sm);overflow:hidden;cursor:pointer;transition:opacity .12s;position:relative}
    .plm-grid-item:active{opacity:.7}
    .plm-grid-art{width:100%;height:100%;object-fit:cover;display:block}
    .plm-grid-ph{width:100%;height:100%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:28px}
    .plm-empty{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px}

    /* ── PHASE 2: HOME DASHBOARD ─────────────────────────────────── */
    .dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .dash-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 10px;text-align:center}
    .dash-stat-val{font-family:var(--font-h);font-size:26px;font-weight:700;color:var(--blue);line-height:1;margin-bottom:3px}
    .dash-stat-lbl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.2px;font-weight:600}
    .dash-section{margin-bottom:20px}
    .dash-section-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
    .dash-section-title{font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--text)}
    .dash-section-sub{font-size:11px;color:var(--text-dim)}
    /* Coverage freshness mini bar */
    .dash-cvg-bar{display:flex;height:4px;border-radius:var(--r-f);overflow:hidden;gap:1px;margin-top:8px}
    .dash-cvg-seg{height:100%;border-radius:1px}
    /* Carousel */
    .carousel-wrap{position:relative;margin:0 -16px;padding:0 16px}
    .carousel-track{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:0 0 6px;
      -webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
    .carousel-track::-webkit-scrollbar{display:none}
    /* Carousel album cards */
    .car-card{flex-shrink:0;width:120px;cursor:pointer;-webkit-tap-highlight-color:transparent;
      scroll-snap-align:start;transition:transform .15s}
    .car-card:active{transform:scale(.94)}
    .car-art-wrap{width:120px;height:120px;border-radius:var(--r-md);overflow:hidden;background:var(--surface3);
      box-shadow:var(--sh-md);margin-bottom:7px;position:relative}
    .car-art{width:100%;height:100%;object-fit:cover;display:block}
    .car-art-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px}
    .car-badge{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,.72);border-radius:var(--r-f);
      font-size:9px;font-weight:600;color:rgba(255,255,255,.85);padding:2px 6px;letter-spacing:.3px;
      backdrop-filter:blur(4px)}
    .car-name{font-family:var(--font-h);font-size:12px;font-weight:600;overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
    .car-artist{font-size:11px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    /* Top Albums time-range chips */
    .time-chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;padding-bottom:2px}
    .time-chips::-webkit-scrollbar{display:none}
    .time-chip{flex-shrink:0;padding:5px 12px;border:1px solid var(--border2);border-radius:var(--r-f);
      background:none;font-size:11px;font-weight:600;color:var(--text-dim);cursor:pointer;
      font-family:var(--font-b);transition:all .12s;white-space:nowrap}
    .time-chip.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    /* Random pick teaser card */
    .pick-teaser{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-xl);
      overflow:hidden;display:flex;align-items:center;gap:14px;padding:14px;cursor:pointer;
      transition:border-color .15s,transform .15s;-webkit-tap-highlight-color:transparent;margin-bottom:20px}
    .pick-teaser:hover{border-color:var(--blue);transform:scale(1.005)}
    .pick-teaser:active{transform:scale(.97)}
    .pick-teaser-art{width:72px;height:72px;border-radius:var(--r-md);object-fit:cover;
      background:var(--surface3);flex-shrink:0;box-shadow:var(--sh-sm)}
    .pick-teaser-art-ph{width:72px;height:72px;border-radius:var(--r-md);background:var(--surface3);
      display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
    .pick-teaser-info{flex:1;min-width:0}
    .pick-teaser-label{font-size:10px;color:var(--blue);font-weight:600;text-transform:uppercase;
      letter-spacing:1.5px;margin-bottom:4px}
    .pick-teaser-name{font-family:var(--font-h);font-size:15px;font-weight:700;overflow:hidden;
      text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
    .pick-teaser-artist{font-size:12px;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pick-teaser-arrow{font-size:18px;color:var(--text-dim);flex-shrink:0;margin-left:4px}
    /* Empty carousel state */
    .carousel-empty{padding:20px 0;color:var(--text-dim);font-size:13px;text-align:center}

    /* ── PHASE 2: LIBRARY GENRE NAV ──────────────────────────────── */
    /* Compact sticky top bar: search + filter button only */
    .lib-filter-bar{position:sticky;top:-16px;margin:-16px -16px 0;z-index:20;
      background:rgba(30,30,30,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);padding:10px 16px 10px}
    .lib-top-row{display:flex;align-items:center;gap:8px}
    .lib-srch-wrap{position:relative;flex:1}
    .lib-filter-btn{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:0 14px;
      height:42px;border:1px solid var(--border2);border-radius:var(--r-f);background:none;
      color:var(--text-mid);font-family:var(--font-b);font-size:12px;font-weight:600;cursor:pointer;
      transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .lib-filter-btn:active{transform:scale(.96)}
    .lib-filter-btn.has-filters{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .lib-filter-badge{background:var(--blue);color:#fff;border-radius:var(--r-f);
      font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}
    /* Active filter chips row (shown below search when filters active) */
    .lib-active-chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:8px 0 0}
    .lib-active-chips::-webkit-scrollbar{display:none}
    .lib-active-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;
      padding:4px 10px;border:1px solid var(--blue);border-radius:var(--r-f);
      background:var(--blue-glow);font-size:11px;font-weight:600;color:var(--blue);
      cursor:pointer;font-family:var(--font-b);white-space:nowrap;min-height:28px;transition:all .12s}
    .lib-active-chip:active{opacity:.7}
    .lib-active-chip .x{font-size:10px;opacity:.7;margin-left:1px}
    .lib-active-chip.type-chip{border-color:var(--warm);color:var(--warm);background:rgba(212,165,116,.08)}
    .lib-active-chip.sort-chip{border-color:var(--border3);color:var(--text);background:var(--surface2)}
    /* Bottom Sheet overlay */
    .lib-sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);z-index:100;animation:fadein .2s ease;
      -webkit-tap-highlight-color:transparent}
    .lib-sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;
      background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;
      border:1px solid var(--border2);border-bottom:none;
      max-height:88dvh;display:flex;flex-direction:column;
      animation:slideup .28s cubic-bezier(.32,1,.56,1)}
    /* Lens Filter Sheet: z-index above .sam-bg (200) */
    .lens-sheet-bg{z-index:250!important}
    .lens-sheet-bg .lib-sheet{z-index:251!important}
    .lib-sheet-handle{width:36px;height:4px;background:var(--border3);border-radius:var(--r-f);
      margin:12px auto 0;flex-shrink:0}
    .lib-sheet-header{display:flex;align-items:center;justify-content:space-between;
      padding:14px 20px 10px;flex-shrink:0}
    .lib-sheet-title{font-family:var(--font-h);font-size:17px;font-weight:700}
    .lib-sheet-reset{font-size:12px;color:var(--blue);background:none;border:none;
      cursor:pointer;font-family:var(--font-b);padding:4px 0}
    .lib-sheet-body{overflow-y:auto;padding:0 20px 40px;-webkit-overflow-scrolling:touch}
    .lib-sh-sec{margin-bottom:20px}
    .lib-sh-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;
      color:var(--text-mid);margin-bottom:10px}
    /* Genre chips in sheet */
    .lib-genre-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:7px 13px;
      border:1px solid var(--border2);border-radius:var(--r-f);background:none;
      font-size:12px;font-weight:600;color:var(--text-dim);cursor:pointer;
      font-family:var(--font-b);transition:all .12s;white-space:nowrap;min-height:36px}
    .lib-genre-chip:active{transform:scale(.95)}
    .lib-genre-chip.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .lib-genre-chip.back-btn{border-color:rgba(74,144,217,.35);color:var(--blue)}
    .lib-genre-chip .chip-icon{font-size:14px}
    .lib-genre-chip .chip-cnt{font-size:9px;opacity:.55;margin-left:1px}
    .lib-genre-wrap{display:flex;flex-wrap:wrap;gap:7px}
    .lib-subgenre-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0 0 8px;
      border-left:2px solid var(--blue-glow);margin:4px 0 0 4px}
    .lib-subgenre-chip{padding:4px 10px;border:1px solid var(--border2);border-radius:var(--r-f);
      font-size:11px;font-weight:500;color:var(--text-dim);background:none;cursor:pointer;
      font-family:var(--font-b);transition:all .12s}
    .lib-subgenre-chip.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .lib-type-chips{display:flex;gap:7px;flex-wrap:wrap}
    .lib-type-chip{flex-shrink:0;padding:7px 14px;border:1px solid var(--border2);border-radius:var(--r-f);
      background:none;font-size:12px;font-weight:600;color:var(--text-dim);cursor:pointer;
      font-family:var(--font-b);transition:all .12s;white-space:nowrap;min-height:36px}
    .lib-type-chip:active{transform:scale(.95)}
    .lib-type-chip.active{border-color:var(--warm);color:var(--warm);background:rgba(212,165,116,.08)}
    .lib-sort-chips{display:flex;gap:7px;flex-wrap:wrap}
    .lib-sort-chip{flex-shrink:0;padding:7px 14px;border:1px solid var(--border2);border-radius:var(--r-f);
      background:none;font-size:12px;font-weight:500;color:var(--text-dim);cursor:pointer;
      font-family:var(--font-b);transition:all .12s;white-space:nowrap;min-height:36px}
    .lib-sort-chip:active{transform:scale(.95)}
    .lib-sort-chip.active{border-color:var(--border3);color:var(--text);background:var(--surface2)}
    /* Library content area */
    .lib-content{padding-top:12px}
    .lib-count{font-size:11px;color:var(--text-dim);padding:2px 0 8px;text-align:center}
    /* Load more btn */
    .lib-load-more{width:100%;padding:13px;background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r-lg);color:var(--text-mid);font-family:var(--font-b);font-size:13px;
      font-weight:500;cursor:pointer;margin-top:12px;transition:all .15s}
    .lib-load-more:hover{border-color:var(--border3);color:var(--text)}
    .lib-load-more:active{transform:scale(.98)}
    /* ── PHASE 4: Profile Tab ── */
    .p4-section{margin-bottom:20px}
    .p4-section-title{font-family:var(--font-h);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);margin-bottom:10px;padding:0 2px}
    /* Freshness bar — 3 segments */
    .fresh-bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
    .fresh-bar-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
    .fresh-bar-label{font-family:var(--font-h);font-size:13px;font-weight:600}
    .fresh-bar-pct{font-family:var(--font-h);font-size:22px;font-weight:700;color:var(--blue)}
    .fresh-bar-track{height:10px;border-radius:var(--r-f);background:var(--surface3);overflow:hidden;display:flex;margin-bottom:10px}
    .fresh-seg{height:100%;transition:width .6s cubic-bezier(.4,0,.2,1)}
    .fresh-seg-never{background:#4e4e55}
    .fresh-seg-ago{background:var(--warm)}
    .fresh-seg-recent{background:var(--blue)}
    .fresh-legend{display:flex;gap:14px;flex-wrap:wrap}
    .fresh-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-mid)}
    .fresh-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    /* Decade bars */
    .decade-bars{display:flex;flex-direction:column;gap:7px}
    .decade-row{display:grid;grid-template-columns:52px 1fr 32px;align-items:center;gap:8px}
    .decade-row-label{font-size:11px;color:var(--text-mid);font-weight:500;text-align:right}
    .decade-bar-track{height:8px;background:var(--surface3);border-radius:var(--r-f);overflow:hidden}
    .decade-bar-fill{height:100%;border-radius:var(--r-f);background:linear-gradient(90deg,var(--blue-dk),var(--blue));transition:width .6s cubic-bezier(.4,0,.2,1)}
    .decade-row-count{font-size:10px;color:var(--text-dim);text-align:right}
    /* Genre bars */
    .genre-bars{display:flex;flex-direction:column;gap:6px}
    .genre-row{display:grid;grid-template-columns:1fr 120px 36px;align-items:center;gap:8px}
    .genre-row-label{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .genre-bar-track{height:6px;background:var(--surface3);border-radius:var(--r-f);overflow:hidden}
    .genre-bar-fill{height:100%;border-radius:var(--r-f);background:linear-gradient(90deg,#7b5ea7,var(--blue));transition:width .55s cubic-bezier(.4,0,.2,1)}
    .genre-row-count{font-size:10px;color:var(--text-dim);text-align:right}
    /* Settings card */
    .settings-row{display:flex;align-items:center;justify-content:space-between;min-height:52px;padding:0 16px;border-bottom:1px solid var(--border)}
    .settings-row:last-child{border-bottom:none}
    .settings-row-label{font-size:13px;color:var(--text)}
    .settings-row-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
    .settings-input{background:var(--surface3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:var(--font-b);font-size:12px;padding:6px 10px;width:160px;outline:none;transition:border-color .15s}
    .settings-input:focus{border-color:var(--blue)}
    .settings-slider{-webkit-appearance:none;appearance:none;width:130px;height:4px;background:var(--surface3);border-radius:var(--r-f);outline:none;cursor:pointer}
    .settings-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 0 0 3px rgba(74,144,217,.2)}
    .settings-slider-val{font-size:11px;color:var(--blue);font-weight:600;min-width:32px;text-align:right}
    /* History management */
    .hist-action-row{display:flex;gap:8px;flex-wrap:wrap}
    .hist-action-row .btn{flex:1;min-width:100px}
    /* Listen Later */
    .ll-sort-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none}
    .ll-sort-row::-webkit-scrollbar{display:none}
    .ll-sort-chip{border:1px solid var(--border);border-radius:var(--r-f);padding:6px 12px;background:none;font-size:12px;font-weight:500;color:var(--text-dim);cursor:pointer;font-family:var(--font-b);transition:all .12s;white-space:nowrap;min-height:32px}
    .ll-sort-chip.active{border-color:var(--border3);color:var(--text);background:var(--surface2)}
    .ll-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .12s}
    .ll-item:last-child{border-bottom:none}
    .ll-item:active{background:var(--surface2)}
    .ll-art{width:46px;height:46px;border-radius:var(--r-sm);object-fit:cover;flex-shrink:0;background:var(--surface3)}
    .ll-art-ph{width:46px;height:46px;border-radius:var(--r-sm);background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .ll-info{flex:1;min-width:0}
    .ll-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ll-artist{font-size:11px;color:var(--text-mid);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ll-date{font-size:10px;color:var(--text-dim);margin-top:3px}
    .ll-actions{display:flex;gap:6px;flex-shrink:0}
    .ll-btn{border:1px solid var(--border2);border-radius:var(--r-sm);padding:5px 8px;background:none;color:var(--text-mid);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font-b);min-height:30px;transition:all .12s;white-space:nowrap}
    .ll-btn:hover{border-color:var(--border3);color:var(--text)}
    .ll-btn:active{transform:scale(.94)}
    .ll-btn-play{border-color:rgba(74,144,217,.4);color:var(--blue)}
    .ll-btn-remove{border-color:rgba(217,83,74,.3);color:var(--error)}
    .ll-empty{text-align:center;padding:48px 24px;color:var(--text-dim)}
    .ll-empty-icon{font-size:36px;margin-bottom:12px}
    .ll-empty-title{font-family:var(--font-h);font-size:16px;font-weight:600;color:var(--text-mid);margin-bottom:6px}
    /* Search */
    .srch-input-wrap{position:relative;margin-bottom:14px}
    .srch-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-lg);color:var(--text);font-family:var(--font-b);font-size:14px;padding:12px 40px 12px 44px;outline:none;transition:border-color .15s;min-height:48px}
    .srch-input:focus{border-color:var(--blue);background:var(--surface)}
    .srch-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
    .srch-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:4px;line-height:1;display:none}
    .srch-clear.vis{display:block}
    .srch-tabs{display:flex;gap:6px;margin-bottom:12px}
    .srch-tab{flex:1;border:1px solid var(--border);border-radius:var(--r-f);padding:7px 8px;background:none;font-size:12px;font-weight:500;color:var(--text-dim);cursor:pointer;font-family:var(--font-b);transition:all .12s;text-align:center;white-space:nowrap}
    .srch-tab.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    .srch-result-count{font-size:11px;color:var(--text-dim);margin-bottom:10px;padding:0 2px}
    .srch-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .12s}
    .srch-item:last-child{border-bottom:none}
    .srch-item:active{opacity:.7}
    .srch-art{width:44px;height:44px;border-radius:var(--r-sm);object-fit:cover;flex-shrink:0;background:var(--surface3)}
    .srch-art-ph{width:44px;height:44px;border-radius:var(--r-sm);background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .srch-info{flex:1;min-width:0}
    .srch-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .srch-sub{font-size:11px;color:var(--text-mid);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .srch-badge{font-size:10px;color:var(--text-dim);border:1px solid var(--border);border-radius:var(--r-f);padding:2px 7px;white-space:nowrap;flex-shrink:0}
    .srch-empty{text-align:center;padding:48px 24px;color:var(--text-dim)}
    .srch-empty-icon{font-size:36px;margin-bottom:12px}
    .srch-hl{color:var(--blue);font-weight:600}
    /* Profile quick stats */
    .prof-stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
    .prof-stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px}
    .prof-stat-val{font-family:var(--font-h);font-size:24px;font-weight:700;line-height:1}
    .prof-stat-lbl{font-size:11px;color:var(--text-dim);margin-top:4px}
    /* Import/Export button row in History section */
    .hist-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    /* Streak display */
    .streak-wrap{display:flex;gap:10px}
    .streak-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;text-align:center}
    .streak-val{font-family:var(--font-h);font-size:28px;font-weight:700;color:var(--warm)}
    .streak-lbl{font-size:10px;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:1.5px}
    /* Lib tab header with search + LL tabs */
    .lib-view-tabs{display:flex;gap:6px;margin:-16px -16px 12px;padding:10px 16px 10px;
      position:sticky;top:-16px;z-index:30;
      background:rgba(30,30,30,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border)}
    .lib-view-tab{flex:1;border:1px solid var(--border);border-radius:var(--r-f);padding:8px 6px;background:none;font-size:12px;font-weight:500;color:var(--text-dim);cursor:pointer;font-family:var(--font-b);transition:all .12s;text-align:center;overflow:visible}
    .lib-view-tab.active{border-color:var(--blue);color:var(--blue);background:var(--blue-glow)}
    /* Phase 7A: Library Coverage Bar */

let historyCache=new Map();

  getMap(){return historyCache;},

/** PHASE 6A: Get heavily rotated albums from play history */
async function getHeavyRotation(days=30, limit=10){
  const cutoff = Date.now() - (days ? days * 86400000 : 0);
  const historyMap = HistoryProvider.getMap();
  const counts = {};
  for(const[albumId,queuedAt] of historyMap.entries()){
    if(!days || queuedAt > cutoff){counts[albumId] = (counts[albumId]||0)+1;}
  }
  const sorted = Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,limit)
    .map(([albumId,playCount])=>{
      const album = allAlbums.find(a=>a.id===albumId);
      if(!album)return null;
      let badge='cool';
      if(playCount>10)badge='hot';
      else if(playCount>5)badge='warm';
      return{album,playCount,badge,badgeColor:badge==='hot'?'#f59e0b':badge==='warm'?'#d97706':'#fbbf24'};
    })
    .filter(x=>x!==null);
  return sorted;
}

/** QID-005: Get the most recently queued album from history */
function getLastPlayedAlbum(){
  if(!allAlbums.length||!historyCache.size)return null;
  let lastId=null,lastTs=0;
  for(const[id,ts]of historyCache){if(ts>lastTs){lastTs=ts;lastId=id;}}
  if(!lastId)return null;
  return allAlbums.find(a=>a.id===lastId)||null;
}

/** PHASE 6A: Get shuffled top-50 all-time albums for Library Radio */
async function getLibraryRadio(limit=50){
  const rotation = await getHeavyRotation(null, limit);
  const shuffled = [...rotation];
  for(let i=shuffled.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [shuffled[i],shuffled[j]] = [shuffled[j],shuffled[i]];
  }
  return shuffled;
}

// SECTION 4C — ENRICHED LIBRARY (QID-017)
// ═══════════════════════════════════════════════════════════════════
const EnrichedLibrary={
  // Build merged pool: library albums + own playlist albums, deduplicated by id.
  // Playlist albums get _genres via artist_cache fallback (QID-015 inline).
  // Only runs if useEnrichedLibrary is true.
  async build(){
    const db=await DB.getDb();
    // Collect all playlist albums from selected playlists
    const selectedIds=await PlaylistCache.getSelectedIds();
    const plAlbumMap=new Map();
    for(const pid of selectedIds){
      const albums=await PlaylistCache.getAlbums(pid)||[];
      for(const a of albums){
        if(!plAlbumMap.has(a.id)){
          // Mark source — playlist-only unless also in library
          plAlbumMap.set(a.id,{...a,_inLibrary:false,_source:'playlist'});
        }
      }
    }
    // Enrich playlist album genres from artist_cache (QID-015 inline)
    const cachedArtists=await db.getAll('artist_cache');
    const artistGenreMap=new Map(cachedArtists.map(e=>[e.id,e.genres||[]]));
    for(const a of plAlbumMap.values()){
      if(!(a._genres||[]).length){
        const merged=new Set();
        for(const ar of(a.artists||[])){
          if(ar.id&&artistGenreMap.has(ar.id))for(const g of artistGenreMap.get(ar.id))merged.add(g);
        }
        a._genres=[...merged];
        a._genres_source='artist';
      }
    }
    // Merge with library (library wins on duplicates — keeps _inLibrary:true + genres)
    const merged=new Map(allAlbums.map(a=>[a.id,{...a,_inLibrary:true,_source:'library'}]));
    for(const[id,a]of plAlbumMap)if(!merged.has(id))merged.set(id,a);
    const result=[...merged.values()];
    // Persist
    await db.put('enriched_library',{cachedAt:Date.now(),albums:result.map(slimAlbum)},'main').catch(()=>{});
    return result;
  },
  async get(){
    try{
      const db=await DB.getDb();
      const r=await db.get('enriched_library','main');
      if(!r?.albums?.length)return null;
      if(Date.now()-r.cachedAt>ENRICHED_LIB_TTL)return null;
      return r.albums;
    }catch(e){return null;}
  },
  async invalidate(){
    try{const db=await DB.getDb();await db.delete('enriched_library','main');}catch(e){}
  },
  // Get the active pool for picker/filters based on state
  async getPool(){
    if(!state.useEnrichedLibrary)return allAlbums;
    const src=state.enrichedSource||'all';
    let enriched=await this.get();
    if(!enriched)enriched=await this.build();
    if(src==='library')return enriched.filter(a=>a._source==='library'||a._inLibrary);
    if(src==='playlists')return enriched.filter(a=>a._source==='playlist'&&!a._inLibrary);
    return enriched; // 'all'
  },
};

// QID-026 Phase 12: TopArtistsCache — 0 API-Calls, lokal aus History + allAlbums
const TopArtistsCache={
  // timeRange: 'short_term' (4w) | 'medium_term' (6m) | 'long_term' (all)
  getLocal(timeRange){
    const hm=HistoryProvider.getMap();
    const now=Date.now();
    const cutoff=timeRange==='short_term'?now-28*86400000:timeRange==='medium_term'?now-180*86400000:0;
    // Count plays per artist from history
    const artistCount=new Map();
    for(const[id,queuedAt]of hm){
      if(cutoff&&queuedAt<cutoff)continue;
      const a=allAlbums.find(x=>x.id===id);if(!a)continue;
      for(const ar of(a.artists||[])){
        const prev=artistCount.get(ar.id)||{id:ar.id,name:ar.name,genres:ar._genres||[],count:0};
        prev.count++;
        artistCount.set(ar.id,prev);
      }
    }
    return[...artistCount.values()].sort((a,b)=>b.count-a.count).slice(0,20);
  },
  async fetchAndCache(timeRange){return this.getLocal(timeRange);},
};

// ═══════════════════════════════════════════════════════════════════
// SECTION 4F — LASTFM CACHE v2 (QID-036 Phase 17)
// ═══════════════════════════════════════════════════════════════════
const LastfmCache=(()=>{
  let _stats=null; // {metadata, fatgad[], albums[], artists[], tracks[]}
  let _playCountMap=null; // Map<"artist||album", plays>

  async function load(){
    if(_stats)return;
    try{
      const db=await DB.getDb();
      const r=await db.get('lastfm_complete','main');
      if(r){_stats=r;_playCountMap=null;} // reset derived map on load
    }catch(e){console.warn('LastfmCache.load failed',e);}
  }

  function getStats(){return _stats||null;}

  function isImported(){return!!(_stats?.metadata);}

  /** Map<"artist_lower||album_lower", plays> — built once, cached */
  function getPlayCountMap(){
    if(_playCountMap)return _playCountMap;
    if(!_stats?.albums)return new Map();
    _playCountMap=new Map();
    for(const a of _stats.albums){
      const k=(a.artist||'').toLowerCase().trim()+'||'+(a.album||'').toLowerCase().trim();
      _playCountMap.set(k,a.plays||0);
    }
    return _playCountMap;
  }

  /** Resolve plays for a Spotify album object */
  function playsForAlbum(album){
    const map=getPlayCountMap();
    const artist=(album.artists||[])[0]?.name||'';
    const k=artist.toLowerCase().trim()+'||'+album.name.toLowerCase().trim();
    return map.get(k)||0;
  }

  async function saveStats(data){
    try{
      const db=await DB.getDb();
      await db.put('lastfm_complete',data,'main');
      _stats=data;
      _playCountMap=null; // invalidate derived map
    }catch(e){console.warn('LastfmCache.saveStats failed',e);throw e;}
  }

  async function clear(){
    try{const db=await DB.getDb();await db.delete('lastfm_complete','main');}catch(e){}
    _stats=null;_playCountMap=null;
  }

  /** QID-053: Top albums by play count, matched to allAlbums */
  function getMostPlayed(limit=100){
    if(!_stats?.albums)return[];
    const map=getPlayCountMap();
    return allAlbums
      .map(a=>{const k=(a.artists||[])[0]?.name?.toLowerCase().trim()+'||'+a.name.toLowerCase().trim();return{album:a,plays:map.get(k)||0,rank:_stats.albums.find(x=>x.artist?.toLowerCase().trim()+'||'+x.album?.toLowerCase().trim()===k)?.myRank||9999};})
      .filter(x=>x.plays>0)
      .sort((a,b)=>a.rank-b.rank)
      .slice(0,limit);
  }

  /** QID-044: Albums with ≥30 plays, sorted by avg scrobble date DESC (newest discoveries) */
  function getLatestDiscoveries(limit=100){
    if(!_stats?.fatgad)return[];
    const albumDates=new Map(); // key → [timestamps]
    for(const s of _stats.fatgad){
      if(!s.artist||!s.album)continue;
      const k=s.artist.toLowerCase().trim()+'||'+s.album.toLowerCase().trim();
      if(!albumDates.has(k))albumDates.set(k,[]);
      albumDates.get(k).push(s.timestamp);
    }
    const results=[];
    for(const a of allAlbums){
      const k=(a.artists||[])[0]?.name?.toLowerCase().trim()+'||'+a.name.toLowerCase().trim();
      const ts=albumDates.get(k);
      if(!ts||ts.length<30)continue;
      const avg=ts.reduce((s,t)=>s+t,0)/ts.length;
      results.push({album:a,plays:ts.length,avgDate:avg,firstDate:Math.min(...ts)});
    }
    return results.sort((a,b)=>b.avgDate-a.avgDate).slice(0,limit);
  }

  /** QID-045: Same as above but ASC (oldest avg date = golden oldies) */
  function getGoldenOldies(limit=100){
    return getLatestDiscoveries(300).sort((a,b)=>a.avgDate-b.avgDate).slice(0,limit);
  }

  /** QID-046/047: Climbers (gain>0) or Fallers (gain<0) — plays last month vs 3m avg */
  function _getMonthlyTrend(){
    if(!_stats?.fatgad)return[];
    const now=Date.now();
    const oneMonthAgo=now-30*86400000;
    const threeMonthsAgo=now-90*86400000;
    const albumMonth=new Map();
    const album3m=new Map();
    const albumTotal=new Map();
    for(const s of _stats.fatgad){
      if(!s.artist||!s.album)continue;
      const k=s.artist.toLowerCase().trim()+'||'+s.album.toLowerCase().trim();
      albumTotal.set(k,(albumTotal.get(k)||0)+1);
      if(s.timestamp>=oneMonthAgo)albumMonth.set(k,(albumMonth.get(k)||0)+1);
      if(s.timestamp>=threeMonthsAgo)album3m.set(k,(album3m.get(k)||0)+1);
    }
    const results=[];
    for(const a of allAlbums){
      const k=(a.artists||[])[0]?.name?.toLowerCase().trim()+'||'+a.name.toLowerCase().trim();
      const total=albumTotal.get(k)||0;
      if(total<30)continue;
      const lastMonth=albumMonth.get(k)||0;
      const last3m=album3m.get(k)||0;
      const avg3m=last3m/3;
      const gain=lastMonth-avg3m;
      // skip albums not played in last 3m (no baseline)
      if(last3m<2)continue;
      results.push({album:a,gain:Math.round(gain*10)/10,lastMonth,avg3m:Math.round(avg3m*10)/10,total});
    }
    return results;
  }
  function getBiggestClimbers(limit=100){return _getMonthlyTrend().filter(x=>x.gain>=2).sort((a,b)=>b.gain-a.gain).slice(0,limit);}
  function getBiggestFallers(limit=100){return _getMonthlyTrend().filter(x=>x.gain<=-2).sort((a,b)=>a.gain-b.gain).slice(0,limit);}

  /** QID-048: Artists with only 1 unique track but ≥5 plays — matched to albums */
  function getOneHitWonders(limit=100){
    if(!_stats?.artists||!_stats?.tracks)return[];
    const ohwArtists=_stats.artists.filter(a=>a.tracks===1&&a.plays>=5).sort((a,b)=>b.plays-a.plays).slice(0,limit*2);
    // find best matching album for each artist
    const trackMap=new Map(_stats.tracks.map(t=>[t.artist?.toLowerCase().trim(),t]));
    const results=[];
    for(const ar of ohwArtists){
      const arKey=ar.artist?.toLowerCase().trim();
      const track=trackMap.get(arKey);
      // find matching spotify album
      const album=allAlbums.find(a=>(a.artists||[]).some(x=>x.name.toLowerCase().trim()===arKey));
      if(!album)continue;
      results.push({album,artist:ar.artist,track:track?.track||'',plays:ar.plays});
      if(results.length>=limit)break;
    }
    return results;
  }

  /** QID-049: Albums with longest consecutive-day listening streaks */
  function getListeningStreaks(limit=100){
    if(!_stats?.fatgad)return[];
    const albumDays=new Map(); // key → Set<dateStr>
    for(const s of _stats.fatgad){
      if(!s.artist||!s.album)continue;
      const k=s.artist.toLowerCase().trim()+'||'+s.album.toLowerCase().trim();
      if(!albumDays.has(k))albumDays.set(k,new Set());
      const d=new Date(s.timestamp);
      albumDays.get(k).add(`${d.getUTCFullYear()}-${d.getUTCMonth()}-${d.getUTCDate()}`);
    }
    const results=[];
    for(const a of allAlbums){
      const k=(a.artists||[])[0]?.name?.toLowerCase().trim()+'||'+a.name.toLowerCase().trim();
      const days=albumDays.get(k);
      if(!days||days.size<5)continue;
      const sorted=[...days].sort();
      let longest=1,cur=1;
      for(let i=1;i<sorted.length;i++){
        const [py,pm,pd]=sorted[i-1].split('-').map(Number);
        const [cy,cm,cd]=sorted[i].split('-').map(Number);
        const prev=Date.UTC(py,pm,pd),curr=Date.UTC(cy,cm,cd);
        if((curr-prev)/86400000===1){cur++;longest=Math.max(longest,cur);}else cur=1;
      }
      if(longest>=5)results.push({album:a,longestStreak:longest,totalDays:days.size});
    }
    return results.sort((a,b)=>b.longestStreak-a.longestStreak).slice(0,limit);
  }

  /** QID-050: Albums with first play in last 7 days of data + ≥5 plays */
  function getRecentlyDiscovered(days=14){
    if(!_stats?.fatgad)return[];
    const dataEnd=Math.max(..._stats.fatgad.map(s=>s.timestamp));
    const cutoff=dataEnd-(days*86400000);
    const albumFirst=new Map();
    const albumTotal=new Map();
    for(const s of _stats.fatgad){
      if(!s.artist||!s.album)continue;
      const k=s.artist.toLowerCase().trim()+'||'+s.album.toLowerCase().trim();
      albumTotal.set(k,(albumTotal.get(k)||0)+1);
      if(!albumFirst.has(k)||s.timestamp<albumFirst.get(k))albumFirst.set(k,s.timestamp);
    }
    const results=[];
    for(const a of allAlbums){
      const k=(a.artists||[])[0]?.name?.toLowerCase().trim()+'||'+a.name.toLowerCase().trim();
      const first=albumFirst.get(k);
      const total=albumTotal.get(k)||0;
      if(!first||first<cutoff||total<5)continue;
      const daysAgo=Math.round((dataEnd-first)/86400000);
      results.push({album:a,firstDate:first,plays:total,daysAgo});
    }
    return results.sort((a,b)=>b.firstDate-a.firstDate).slice(0,20);
  }

  /** QID-051: Artists with ≥20 unique tracks + ≥50 plays in Last.fm */
  function getDeepDives(minTracks=20,minPlays=50,limit=100){
    if(!_stats?.artists)return[];
    const deepArtists=_stats.artists.filter(a=>a.tracks>=minTracks&&a.plays>=minPlays).sort((a,b)=>b.plays-a.plays);
    const results=[];
    for(const ar of deepArtists){
      const arKey=ar.artist?.toLowerCase().trim();
      const album=allAlbums.find(a=>(a.artists||[]).some(x=>x.name.toLowerCase().trim()===arKey));
      if(!album)continue;
      results.push({album,artist:ar.artist,tracks:ar.tracks,plays:ar.plays,discoveryType:ar.discoveryType||''});
      if(results.length>=limit)break;
    }
    return results;
  }

  /** QID-052: Top albums for a given month (1=Jan…12=Dec), aggregated across all years */
  function getSeasonalFavorites(month,limit=100){
    if(!_stats?.fatgad)return[];
    const m=month!=null?month:new Date().getMonth()+1; // 1-based
    const albumPlays=new Map();
    for(const s of _stats.fatgad){
      if(!s.artist||!s.album)continue;
      const mo=new Date(s.timestamp).getMonth()+1;
      if(mo!==m)continue;
      const k=s.artist.toLowerCase().trim()+'||'+s.album.toLowerCase().trim();
      albumPlays.set(k,(albumPlays.get(k)||0)+1);
    }
    if(!albumPlays.size)return[];
    return allAlbums
      .map(a=>{const k=(a.artists||[])[0]?.name?.toLowerCase().trim()+'||'+a.name.toLowerCase().trim();return{album:a,plays:albumPlays.get(k)||0};})
      .filter(x=>x.plays>=2)
      .sort((a,b)=>b.plays-a.plays)
      .slice(0,limit);
  }

  const GITHUB_LF_URL='https://raw.githubusercontent.com/martn1a/SpotifyRandom/main/lastfm-parser/lastfm_complete_stats.json';

  /** Fetch lastfm_complete_stats.json from GitHub, compare parsedAt, save if newer.
   *  @param {boolean} [showError=false] — show toast on network error (for manual button)
   *  @returns {Promise<'updated'|'uptodate'|'first'|'error'>}
   */
  async function githubSync(showError=false){
    try{
      const res=await fetch(GITHUB_LF_URL);
      if(!res.ok)throw new Error('HTTP '+res.status);
      const data=await res.json();
      if(!data.fatgad||!data.albums||!data.artists||!data.tracks)throw new Error('Ungültiges Format');
      const remoteTs=data.metadata?.parsedAt||null;
      const localTs=_stats?.metadata?.parsedAt||null;
      if(remoteTs&&localTs&&new Date(remoteTs)<=new Date(localTs))return'uptodate';
      await saveStats(data);
      await Settings.set('lastfmImported',true);
      return localTs?'updated':'first';
    }catch(e){
      console.warn('LastfmCache.githubSync failed',e);
      if(showError)_toast('GitHub-Sync fehlgeschlagen: '+e.message,true);
      return'error';
    }

function _rand(n){const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';const a=crypto.getRandomValues(new Uint8Array(n));return Array.from(a,b=>c[b%c.length]).join('');}
async function _chal(v){const d=new TextEncoder().encode(v);const h=await crypto.subtle.digest('SHA-256',d);return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
async function _refresh(){const rt=localStorage.getItem('spotify_refresh_token');if(!rt)throw new Error('No refresh token.');const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'refresh_token',refresh_token:rt,client_id:CLIENT_ID})});if(!res.ok){Auth.logout();throw new Error('Session expired — please log in again.');}  _storeTok(await res.json());}

  async fetchAllAlbums(onProg){const albums=[];let url='https://api.spotify.com/v1/me/albums?limit=50&market=from_token';while(url){const d=await this.get(url);for(const item of d.items){item.album._added_at=item.added_at||null;albums.push(item.album);}url=d.next;onProg(albums.length,d.total);}return albums;},
  async fetchArtistGenres(albums,onProg){
    const idSet=new Set();for(const a of albums)for(const ar of(a.artists||[]))if(ar.id)idSet.add(ar.id);
    const allIds=[...idSet];const gm=new Map();

    const uncached=allIds.filter(id=>!gm.has(id));let done=allIds.length-uncached.length;onProg(done,allIds.length);
    const fetchOne=async(id)=>{try{const d=await this.get('https://api.spotify.com/v1/artists/'+encodeURIComponent(id));const g=d.genres||[];gm.set(id,g);db.put('artist_cache',{id,genres:g,cachedAt:Date.now()}).catch(()=>{});}catch(e){gm.set(id,[]);}done++;onProg(done,allIds.length);};
    const POOL=5;for(let i=0;i<uncached.length;i+=POOL)await Promise.all(uncached.slice(i,i+POOL).map(fetchOne));
    const gs=new Set();for(const a of albums){const ag=new Set();for(const ar of(a.artists||[]))for(const g of(gm.get(ar.id)||[])){ag.add(g);gs.add(g);}a._genres=[...ag];}
