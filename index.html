/** Render the compact active-filter chips below the search bar */
function _renderLibActiveChips(panel){
  const row=panel.querySelector('#libActiveChips');
  // Filter btn lives in brw-header (parent of .lib-view-container)
  const btn=panel.querySelector('#libFilterBtn')||panel.closest('.tab-panel')?.querySelector('#brwFilterBtn');
  if(!row)return;

  const chips=[];
  if(libState.activeCluster){
    const c=GENRE_CLUSTERS.find(x=>x.id===libState.activeCluster);
    if(c)chips.push({label:`${c.icon} ${c.label}`,cls:'',action:()=>{libState.activeCluster=null;libState.activeSubGenres=[];libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  for(const g of libState.activeSubGenres){
    chips.push({label:g,cls:'',action:()=>{libState.activeSubGenres=libState.activeSubGenres.filter(x=>x!==g);libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  for(const t of libState.albumTypes){
    const lbl={album:'Album',single:'Single / EP',compilation:'Compilation'}[t]||t;
    chips.push({label:lbl,cls:'type-chip',action:()=>{libState.albumTypes=libState.albumTypes.filter(x=>x!==t);libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  if(libState.sortMode!=='added'){
    const lbl={az:'A–Z',za:'Z–A',release:'Newest',oldest:'Oldest',duration:'Duration',mostplayed:'Most Played',lastplayed:'Last Played'}[libState.sortMode]||libState.sortMode;
    chips.push({label:`↕ ${lbl}`,cls:'sort-chip',action:()=>{libState.sortMode='added';libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  // Phase 7B chips
  const curYear=new Date().getFullYear();
  if(libState.yearMin!==1950||libState.yearMax!==curYear){
    chips.push({label:`📅 ${libState.yearMin}–${libState.yearMax}`,cls:'',action:()=>{libState.yearMin=1950;libState.yearMax=curYear;libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  for(const m of libState.moods){
    chips.push({label:MOOD_LABELS[m]||m,cls:'',action:()=>{libState.moods=libState.moods.filter(x=>x!==m);libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  if(libState.heardStatus!=='all'){
    const lbl={heard:'👂 Heard',unheard:'🆕 Unheard'}[libState.heardStatus];
    chips.push({label:lbl,cls:'type-chip',action:()=>{libState.heardStatus='all';libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }
  if(libState.addedWithin!=='all'){
    const lbl={month:'Added: Month',['6months']:'Added: 6 Mo',year:'Added: Year'}[libState.addedWithin];
    chips.push({label:lbl,cls:'sort-chip',action:()=>{libState.addedWithin='all';libState.page=1;_renderLibActiveChips(panel);const albums=_applyLibFilters();_renderLibGrid(panel,albums);}});
  }

  const count=chips.length;
  if(count>0){
    btn.classList.add('has-filters');
    btn.innerHTML=`⚙ Filter <span class="lib-filter-badge">${count}</span>`;
  }else{
    btn.classList.remove('has-filters');
    btn.innerHTML='⚙ Filter';
  }

  if(!chips.length){row.style.display='none';row.innerHTML='';return;}
  row.style.display='flex';
  row.innerHTML=chips.map((c,i)=>`<button class="lib-active-chip ${c.cls}" data-chipidx="${i}">${esc(c.label)} <span class="x">✕</span></button>`).join('');
  row.querySelectorAll('[data-chipidx]').forEach(b=>b.addEventListener('click',()=>chips[+b.dataset.chipidx].action()));
}

/** Open the filter bottom sheet */
function _openLibSheet(panel){
  const clusterCounts=_buildClusterCounts();
  const sheetBg=document.createElement('div');
  sheetBg.className='lib-sheet-bg';
  const sheet=document.createElement('div');
  sheet.className='lib-sheet';

  function _buildSheetHTML(){
    const curYear=new Date().getFullYear();
    const genreChips=GENRE_CLUSTERS.map(c=>{
      const cnt=clusterCounts.get(c.id)||0;if(!cnt)return'';
      const active=libState.activeCluster===c.id;
      return`<button class="lib-genre-chip${active?' active':''}" data-shcluster="${c.id}"><span class="chip-icon">${c.icon}</span>${c.label}<span class="chip-cnt">${cnt}</span></button>`;
    }).join('');

    let subHTML='';
    if(libState.activeCluster){
      const subs=_subGenresForCluster(libState.activeCluster).slice(0,30);
      if(subs.length){
        subHTML=`<div class="lib-subgenre-wrap">${subs.map(({genre,count})=>`<button class="lib-subgenre-chip${libState.activeSubGenres.includes(genre)?' active':''}" data-shsubgenre="${esc(genre)}">${esc(genre)}<span class="chip-cnt" style="font-size:9px;opacity:.5;margin-left:3px">${count}</span></button>`).join('')}</div>`;
      }
    }

    const typeChips=['album','single','compilation'].map(t=>{
      const lbl={album:'Album',single:'Single / EP',compilation:'Compilation'}[t];
      return`<button class="lib-type-chip${libState.albumTypes.includes(t)?' active':''}" data-shtype="${t}">${lbl}</button>`;
    }).join('');

    const sortChips=[['added','Recently Added'],['release','Newest First'],['oldest','Oldest First'],['az','A–Z'],['za','Z–A'],['mostplayed','Most Played'],['lastplayed','Last Played']].map(([v,l])=>`<button class="lib-sort-chip${libState.sortMode===v?' active':''}" data-shsort="${v}">${l}</button>`).join('');

    // Phase 7B: Year range
    const yearHTML=`<div class="lib-sh-range-wrap">
      <div class="lib-sh-range-row"><span class="lib-sh-range-lbl">Von</span><input type="range" min="1950" max="${curYear}" value="${libState.yearMin}" data-shyear="min"><span class="lib-sh-range-val" id="shYearMinVal">${libState.yearMin}</span></div>
      <div class="lib-sh-range-row"><span class="lib-sh-range-lbl">Bis</span><input type="range" min="1950" max="${curYear}" value="${libState.yearMax}" data-shyear="max"><span class="lib-sh-range-val" id="shYearMaxVal">${libState.yearMax}</span></div>
    </div>`;

    // Phase 7B: Mood chips
    const moodHTML=Object.entries(MOOD_LABELS).map(([k,l])=>`<button class="lib-mood-chip${libState.moods.includes(k)?' active':''}" data-shmood="${k}">${l}</button>`).join('');

    // Phase 7B: Heard status radios
    const heardHTML=[['all','Alle'],['unheard','🆕 Ungehört'],['heard','👂 Gehört']].map(([v,l])=>`<label class="lib-sh-radio-row"><input type="radio" name="shheard" value="${v}"${libState.heardStatus===v?' checked':''}><span>${l}</span></label>`).join('');

    // Phase 7B: Added within radios
    const addedHTML=[['all','Alles'],['month','Letzter Monat'],['6months','Letzte 6 Monate'],['year','Letztes Jahr']].map(([v,l])=>`<label class="lib-sh-radio-row"><input type="radio" name="shadded" value="${v}"${libState.addedWithin===v?' checked':''}><span>${l}</span></label>`).join('');

    return`
      <div class="lib-sheet-handle"></div>
      <div class="lib-sheet-header">
        <span class="lib-sheet-title">Filter & Sort</span>
        <button class="lib-sheet-reset" id="sheetReset">Reset all</button>
      </div>
      <div class="lib-sheet-body">
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">📅 Erscheinungsjahr</div>
          ${yearHTML}
        </div>
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">😊 Stimmung</div>
          <div class="lib-mood-chips">${moodHTML}</div>
        </div>
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">🎸 Genre</div>
          <div class="lib-genre-wrap">${genreChips}</div>
          ${subHTML}
        </div>
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">👂 Gehört-Status</div>
          <div class="lib-sh-radio-group">${heardHTML}</div>
        </div>
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">🗓 Hinzugefügt</div>
          <div class="lib-sh-radio-group">${addedHTML}</div>
        </div>
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">📦 Typ</div>
          <div class="lib-type-chips">${typeChips}</div>
        </div>
        <div class="lib-sh-sec">
          <div class="lib-sh-sec-title">↕ Sortierung</div>
          <div class="lib-sort-chips">${sortChips}</div>
        </div>
      </div>`;
  }

  function refreshSheet(){sheet.innerHTML=_buildSheetHTML();attachSheetEvents();}

  function closeSheet(){
    sheetBg.style.animation='fadein .18s ease reverse';
    sheet.style.animation='slideup .18s cubic-bezier(.32,1,.56,1) reverse';
    setTimeout(()=>sheetBg.remove(),180);
    _renderLibActiveChips(panel);
    const albums=_applyLibFilters();_renderLibGrid(panel,albums);
  }

  function attachSheetEvents(){
    const curYear=new Date().getFullYear();
    sheet.querySelector('#sheetReset')?.addEventListener('click',()=>{
      libState.activeCluster=null;libState.activeSubGenres=[];libState.albumTypes=[];libState.sortMode='added';libState.page=1;
      libState.yearMin=1950;libState.yearMax=curYear;libState.moods=[];libState.heardStatus='all';libState.addedWithin='all';
      refreshSheet();
    });
    sheet.querySelectorAll('[data-shcluster]').forEach(b=>b.addEventListener('click',()=>{
      const id=b.dataset.shcluster;
      if(libState.activeCluster===id){libState.activeCluster=null;libState.activeSubGenres=[];}
      else{libState.activeCluster=id;libState.activeSubGenres=[];}
      libState.page=1;refreshSheet();
    }));
    sheet.querySelectorAll('[data-shsubgenre]').forEach(b=>b.addEventListener('click',()=>{
      const g=b.dataset.shsubgenre;
      const idx=libState.activeSubGenres.indexOf(g);
      if(idx>=0)libState.activeSubGenres.splice(idx,1);else libState.activeSubGenres.push(g);
      libState.page=1;refreshSheet();
    }));
    sheet.querySelectorAll('[data-shtype]').forEach(b=>b.addEventListener('click',()=>{
      const t=b.dataset.shtype;const idx=libState.albumTypes.indexOf(t);
      if(idx>=0)libState.albumTypes.splice(idx,1);else libState.albumTypes.push(t);
      libState.page=1;refreshSheet();
    }));
    sheet.querySelectorAll('[data-shsort]').forEach(b=>b.addEventListener('click',()=>{
      libState.sortMode=b.dataset.shsort;libState.page=1;refreshSheet();
    }));
    // Phase 7B events
    sheet.querySelectorAll('[data-shyear]').forEach(inp=>inp.addEventListener('input',()=>{
      const v=+inp.value;
      if(inp.dataset.shyear==='min'){
        libState.yearMin=Math.min(v,libState.yearMax);
        const el=sheet.querySelector('#shYearMinVal');if(el)el.textContent=libState.yearMin;
        inp.value=libState.yearMin;
      } else {
        libState.yearMax=Math.max(v,libState.yearMin);
        const el=sheet.querySelector('#shYearMaxVal');if(el)el.textContent=libState.yearMax;
        inp.value=libState.yearMax;
      }
      libState.page=1;
    }));
    sheet.querySelectorAll('[data-shmood]').forEach(b=>b.addEventListener('click',()=>{
      const m=b.dataset.shmood;const idx=libState.moods.indexOf(m);
      if(idx>=0)libState.moods.splice(idx,1);else libState.moods.push(m);
      libState.page=1;b.classList.toggle('active',libState.moods.includes(m));
    }));
    sheet.querySelectorAll('input[name=shheard]').forEach(r=>r.addEventListener('change',()=>{
      libState.heardStatus=r.value;libState.page=1;
    }));
    sheet.querySelectorAll('input[name=shadded]').forEach(r=>r.addEventListener('change',()=>{
      libState.addedWithin=r.value;libState.page=1;
    }));
  }

  sheet.innerHTML=_buildSheetHTML();
  attachSheetEvents();
  sheetBg.appendChild(sheet);
  document.body.appendChild(sheetBg);
  sheetBg.addEventListener('click',e=>{if(e.target===sheetBg)closeSheet();});

  // Swipe-down-to-close
  let startY=0,dragging=false;
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;dragging=true;},{passive:true});
  sheet.addEventListener('touchmove',e=>{if(!dragging)return;const dy=e.touches[0].clientY-startY;if(dy>0)sheet.style.transform=`translateY(${dy}px)`;},{passive:true});
  sheet.addEventListener('touchend',e=>{if(!dragging)return;dragging=false;const dy=e.changedTouches[0].clientY-startY;if(dy>80)closeSheet();else sheet.style.transform='';},{passive:true});
}

// ── Listen Later sort state ────────────────────────────────────────
const llState={sort:'date'}; // 'date' | 'artist' | 'name'

/** PHASE 4: Render Listen Later management view inside Library tab.
 *  Sort by: date added, artist, album name.
 *  Actions: Play, Queue, Remove. */
async function renderListenLaterView(container){
  container.innerHTML='<div style="text-align:center;padding:32px"><span style="color:var(--text-dim)">Loading…</span></div>';
  let items=[];
  try{items=await ListenLater.getAll();}catch(e){container.innerHTML='<div class="ll-empty"><div class="ll-empty-icon">⚠️</div><div class="ll-empty-title">Could not load list</div></div>';return;}

  // Sort
  const sorted=[...items];
  if(llState.sort==='date')sorted.sort((a,b)=>b.addedAt-a.addedAt);
  else if(llState.sort==='artist')sorted.sort((a,b)=>(a.artist||'').localeCompare(b.artist||''));
  else if(llState.sort==='name')sorted.sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  container.innerHTML='';

  // Sort chips
  const sortRow=document.createElement('div');sortRow.className='ll-sort-row';
  [['date','Date added'],['artist','Artist'],['name','Album name']].forEach(([k,l])=>{
    const c=document.createElement('button');c.className='ll-sort-chip'+(llState.sort===k?' active':'');
    c.textContent=l;c.addEventListener('click',()=>{llState.sort=k;renderListenLaterView(container);});
    sortRow.appendChild(c);
  });
  container.appendChild(sortRow);

  if(!sorted.length){
    const emp=document.createElement('div');emp.className='ll-empty';
    emp.innerHTML='<div class="ll-empty-icon">🕐</div><div class="ll-empty-title">Nothing saved yet</div><div style="font-size:12px;margin-top:6px">Tap "Save for later" on any album to add it here.</div>';
    container.appendChild(emp);return;
  }

  const countEl=document.createElement('div');
  countEl.style.cssText='font-size:11px;color:var(--text-dim);margin-bottom:8px;padding:0 2px';
  countEl.textContent=`${sorted.length} album${sorted.length!==1?'s':''}`;
  container.appendChild(countEl);

  const listEl=document.createElement('div');listEl.className='card';
  for(const item of sorted){
    const row=document.createElement('div');row.className='ll-item';
    const addedLbl=item.addedAt?`Added ${_formatShortDate(item.addedAt)}`:'';
    const artHTML=item.art
      ?`<img class="ll-art" src="${esc(item.art)}" alt="" loading="lazy">`
      :`<div class="ll-art-ph">🎵</div>`;
    row.innerHTML=`${artHTML}<div class="ll-info"><div class="ll-name">${esc(item.name||'')}</div><div class="ll-artist">${esc(item.artist||'')}</div>${addedLbl?`<div class="ll-date">${addedLbl}</div>`:''}</div><div class="ll-actions"><button class="ll-btn ll-btn-play" data-ll-play="${esc(item.id)}" title="Queue & play">▶ Play</button><button class="ll-btn ll-btn-remove" data-ll-remove="${esc(item.id)}" title="Remove">✕</button></div>`;
    listEl.appendChild(row);
  }
  container.appendChild(listEl);

  // Events
  listEl.addEventListener('click',async e=>{
    const playBtn=e.target.closest('[data-ll-play]');
    const remBtn=e.target.closest('[data-ll-remove]');
    if(playBtn){
      const id=playBtn.dataset.llPlay;
      const item=items.find(x=>x.id===id);if(!item)return;
      const album=item.albumRef||allAlbums.find(a=>a.id===id);
      if(!album){_toast('Album not in library — please re-sync.',true);return;}
      playBtn.disabled=true;playBtn.textContent='…';
      try{
        const delay=state.browserMode?DELAY_BROWSER_MS:DELAY_DESKTOP_MS;
        const tracks=await SpotifyAPI.getAlbumTracks(album);
        for(const t of tracks){await SpotifyAPI.addToQueue(t.uri);await sleep(delay);}
        await HistoryProvider.log(album.id,album.name);
        playBtn.textContent='✓';_toast(`Queued "${album.name}"`);
        renderHdrBadge();
      }catch(err){playBtn.disabled=false;playBtn.textContent='▶ Play';_toast(err.message,true);}
    }
    if(remBtn){
      const id=remBtn.dataset.llRemove;
      await ListenLater.remove(id);
      renderListenLaterView(container);
    }
  });
}

// QID-007: Favorites View — Section 13.5
async function renderFavoritesView(container){
  container.innerHTML='';
  let items=[];
  try{items=await Favorites.getAll();}catch(e){container.innerHTML='<div class="ll-empty"><div class="ll-empty-icon">⚠️</div><div class="ll-empty-title">Could not load favorites</div></div>';return;}
  if(!items.length){
    container.innerHTML='<div class="ll-empty"><div class="ll-empty-icon">❤️</div><div class="ll-empty-title">No favorites yet</div><div class="ll-empty-sub">Open any album and tap ❤️ Favorite to save it here.</div></div>';
    return;
  }
  // Sort newest first
  items.sort((a,b)=>b.addedAt-a.addedAt);
  // Burn filter
  if(state.burnMode)items=items.filter(i=>!BurnMode.isBurned(i.id));

  const hdr=document.createElement('div');hdr.style.cssText='padding:12px 0 6px;font-size:12px;color:var(--text-dim)';
  hdr.textContent=`${items.length} favorite${items.length!==1?'s':''}`;
  container.appendChild(hdr);

  const list=document.createElement('div');list.className='ll-list';
  for(const item of items){
    const album=item.albumRef||allAlbums.find(a=>a.id===item.id)||item;
    const art=item.art||getArt(album,'sm')||null;
    const row=document.createElement('div');row.className='ll-item';
    row.innerHTML=`${art?`<img class="ll-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="ll-art-ph">🎵</div>`}
      <div class="ll-info"><div class="ll-name">${esc(item.name)}</div><div class="ll-artist">${esc(item.artist||'')}</div></div>
      <div class="ll-actions">
        <button class="btn btn-sm btn-primary ll-play" data-favPlay="${esc(item.id)}">▶</button>
        <button class="btn btn-sm btn-danger ll-rem" data-favRem="${esc(item.id)}">✕</button>
      </div>`;
    row.querySelector('.ll-info').addEventListener('click',()=>{if(album.id)openAlbumDetail(album);});
    list.appendChild(row);
  }
  container.appendChild(list);

  list.addEventListener('click',async e=>{
    const playBtn=e.target.closest('[data-favPlay]');
    const remBtn=e.target.closest('[data-favRem]');
    if(playBtn){
      const id=playBtn.dataset.favPlay;
      const item=items.find(i=>i.id===id);
      const album=item?.albumRef||allAlbums.find(a=>a.id===id)||item;
      if(!album){_toast('Album not found — re-sync library.',true);return;}
      playBtn.disabled=true;playBtn.textContent='…';
      try{
        const delay=state.browserMode?DELAY_BROWSER_MS:DELAY_DESKTOP_MS;
        let qAlbum=album;
        if(!(qAlbum.tracks?.items?.length)&&!(qAlbum.tracks?.next)){
          try{const full=await SpotifyAPI.get(`https://api.spotify.com/v1/albums/${encodeURIComponent(id)}`);if(full?.id)qAlbum={...qAlbum,tracks:{total:full.tracks?.total||0,items:(full.tracks?.items||[]).map(t=>({uri:t.uri,duration_ms:t.duration_ms})),next:full.tracks?.next||null}};}catch(fe){}
        }
        const tracks=await SpotifyAPI.getAlbumTracks(qAlbum);
        for(const t of tracks){await SpotifyAPI.addToQueue(t.uri);await sleep(delay);}
        await HistoryProvider.log(id,item?.name||'');
        playBtn.textContent='✓';_toast(`Queued "${item?.name||''}"`);
      }catch(err){playBtn.disabled=false;playBtn.textContent='▶';_toast(err.message,true);}
    }
    if(remBtn){
      const id=remBtn.dataset.favRem;
      await Favorites.remove(id);
      renderFavoritesView(container);
    }
  });
}

/** PHASE 4: Full-text search across albums, artists, genres.
 *  Real-time results as user types with 200ms debounce. */
let _srchScope='all'; // 'all' | 'albums' | 'artists' | 'genres'
let _srchTimer=null;

function renderSearchView(container, initialQuery){
  container.innerHTML='';

  const inputWrap=document.createElement('div');inputWrap.className='srch-input-wrap';
  inputWrap.innerHTML=`<span class="srch-icon">🔍</span><input class="srch-input" id="srchInput" type="search" placeholder="Search albums, artists, genres…" autocomplete="off" spellcheck="false" value="${esc(initialQuery||'')}"><button class="srch-clear${initialQuery?' vis':''}" id="srchClear">✕</button>`;
  container.appendChild(inputWrap);

  // Scope tabs
  const tabsEl=document.createElement('div');tabsEl.className='srch-tabs';
  [['all','All'],['albums','Albums'],['artists','Artists'],['genres','Genres']].forEach(([k,l])=>{
    const b=document.createElement('button');b.className='srch-tab'+(_srchScope===k?' active':'');
    b.textContent=l;b.addEventListener('click',()=>{_srchScope=k;tabsEl.querySelectorAll('.srch-tab').forEach(x=>x.classList.toggle('active',x.textContent===l));_doSearch();});
    tabsEl.appendChild(b);
  });
  container.appendChild(tabsEl);

  const resultsEl=document.createElement('div');resultsEl.id='srchResults';container.appendChild(resultsEl);

  const inp=container.querySelector('#srchInput');
  const clearBtn=container.querySelector('#srchClear');

  inp.addEventListener('input',()=>{
    clearBtn.classList.toggle('vis',inp.value.length>0);
    clearTimeout(_srchTimer);_srchTimer=setTimeout(_doSearch,200);
  });
  clearBtn.addEventListener('click',()=>{inp.value='';clearBtn.classList.remove('vis');_renderSearchResults(resultsEl,'',_srchScope);inp.focus();});

  function _doSearch(){_renderSearchResults(resultsEl,inp.value.trim(),_srchScope);}

  // Initial render
  if(initialQuery){_renderSearchResults(resultsEl,initialQuery,_srchScope);}
  else{_renderSearchPlaceholder(resultsEl);}

  // Focus input
  setTimeout(()=>inp.focus(),80);
}

function _renderSearchPlaceholder(el){
  el.innerHTML=`<div class="srch-empty"><div class="srch-empty-icon">🔍</div><div style="font-size:14px;color:var(--text-mid);font-weight:500;margin-bottom:6px">Search your library</div><div style="font-size:12px;color:var(--text-dim)">Albums · Artists · Genres</div></div>`;
}

function _renderSearchResults(el,q,scope){
  if(!q){_renderSearchPlaceholder(el);return;}
  if(!allAlbums.length){el.innerHTML=`<div class="srch-empty"><div class="srch-empty-icon">📚</div><div style="font-size:14px;color:var(--text-mid)">Library not loaded</div></div>`;return;}

  const ql=q.toLowerCase();
  const results=[];

  // Match albums by title
  if(scope==='all'||scope==='albums'){
    for(const a of allAlbums){
      if(a.name.toLowerCase().includes(ql)){
        results.push({type:'album',score:a.name.toLowerCase().startsWith(ql)?2:1,album:a,label:a.name,sub:(a.artists||[]).map(x=>x.name).join(', ')});
      }
    }
  }

  // Match by artist name (collect unique artists, link to albums)
  if(scope==='all'||scope==='artists'){
    const artistMap=new Map();
    for(const a of allAlbums){
      for(const ar of(a.artists||[])){
        if(ar.name.toLowerCase().includes(ql)){
          if(!artistMap.has(ar.id))artistMap.set(ar.id,{name:ar.name,albums:[],id:ar.id});
          artistMap.get(ar.id).albums.push(a);
        }
      }
    }
    for(const[,ar]of artistMap){
      results.push({type:'artist',score:ar.name.toLowerCase().startsWith(ql)?3:1.5,label:ar.name,sub:`${ar.albums.length} album${ar.albums.length!==1?'s':''}`,art:ar.albums[0]?getArt(ar.albums[0],'sm'):null,albums:ar.albums});
    }
  }

  // Match by genre
  if(scope==='all'||scope==='genres'){
    const genreMap=new Map();
    for(const a of allAlbums){
      for(const g of(a._genres||[])){
        if(g.toLowerCase().includes(ql)){
          if(!genreMap.has(g))genreMap.set(g,[]);
          genreMap.get(g).push(a);
        }
      }
    }
    for(const[g,albums]of genreMap){
      results.push({type:'genre',score:g.toLowerCase().startsWith(ql)?2.5:1,label:g,sub:`${albums.length} album${albums.length!==1?'s':''}`,albums});
    }
  }

  results.sort((a,b)=>b.score-a.score||a.label.localeCompare(b.label));

  if(!results.length){
    el.innerHTML=`<div class="srch-empty"><div class="srch-empty-icon">🔍</div><div style="font-size:14px;color:var(--text-mid)">No results for "${esc(q)}"</div></div>`;
    return;
  }

  const count=document.createElement('div');count.className='srch-result-count';count.textContent=`${results.length} result${results.length!==1?'s':''}`;
  el.innerHTML='';el.appendChild(count);

  const list=document.createElement('div');
  for(const r of results.slice(0,80)){
    const item=document.createElement('div');item.className='srch-item';
    const hl=(s)=>s.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<span class="srch-hl">$1</span>');
    let artHTML='',badge='';
    if(r.type==='album'){const art=getArt(r.album,'sm');artHTML=art?`<img class="srch-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="srch-art-ph">🎵</div>`;badge=`<span class="srch-badge">Album</span>`;}
    else if(r.type==='artist'){artHTML=r.art?`<img class="srch-art" src="${esc(r.art)}" alt="" loading="lazy">`:`<div class="srch-art-ph">👤</div>`;badge=`<span class="srch-badge">Artist</span>`;}
    else if(r.type==='genre'){artHTML=`<div class="srch-art-ph">🏷</div>`;badge=`<span class="srch-badge">Genre</span>`;}
    item.innerHTML=`${artHTML}<div class="srch-info"><div class="srch-name">${hl(esc(r.label))}</div><div class="srch-sub">${esc(r.sub||'')}</div></div>${badge}`;
    item.addEventListener('click',()=>{
      if(r.type==='album')openAlbumDetail(r.album);
      else if(r.type==='artist'||r.type==='genre'){
        const albums=r.albums||[];
        if(!albums.length)return;
        openPlaylistModal(r.label,albums,r.type==='artist'?'👤':'🏷');
      }
    });
    list.appendChild(item);
  }
  el.appendChild(list);
}

/** Helper: format a Unix-ms timestamp as a short date string. */
function _formatShortDate(ms){
  const d=new Date(ms);const now=new Date();
  const diffMs=now-d;const diffDays=Math.floor(diffMs/86400000);
  if(diffDays===0)return'today';if(diffDays===1)return'yesterday';
  if(diffDays<7)return`${diffDays} days ago`;
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:d.getFullYear()!==now.getFullYear()?'numeric':undefined});
}
