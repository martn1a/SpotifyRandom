  async addToQueue(uri){const tok=await Auth.getToken();const res=await fetch(`https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(uri)}`,{method:'POST',headers:{Authorization:'Bearer '+tok}});if(res.status===404)throw new Error('No active Spotify device. Start playing something first.');if(res.status===429)throw new Error('Rate limited. Enable Browser client mode for safer queuing.');if(!res.ok&&res.status!==204)throw new Error(`Queue error ${res.status}`);},

  async getProfile(){try{return await this.get('https://api.spotify.com/v1/me');}catch(e){return null;}},
  // ── QID-009: Playlist API (Feb 2026: /items endpoint, owner filter) ──
  async fetchUserPlaylists(){
    // GET /me/playlists — still available Feb 2026
    // Filter to owner.id === current user to ensure /items returns tracks
    const me=await this.getProfile();

  async fetchPlaylistItems(playlistId){
    // GET /playlists/{id}/items — Feb 2026 new endpoint (replaces /tracks)
    // Response: items.items[].item.album — extract unique album objects
    const albumMap=new Map();
    let url=`https://api.spotify.com/v1/playlists/${encodeURIComponent(playlistId)}/items?limit=50`;
    while(url){
      const d=await this.get(url);
      for(const entry of(d.items||[])){
        const track=entry.item; // Feb 2026: renamed from .track → .item
        if(!track||track.type!=='track')continue;
        const album=track.album;
        if(!album?.id)continue;
        if(!albumMap.has(album.id)){
          // Slim the album object to match app format
          // tracks.next must be set so getAlbumTracks() can paginate → modal Queue works
          albumMap.set(album.id,{

            name:album.name,

            artists:(album.artists||[]).map(ar=>({id:ar.id,name:ar.name})),

            _genres:[],
            _inLibrary:false,
            _added_at:null,
          });
        }
      }
      url=d.next||null;
    }
    return[...albumMap.values()];
  },
  // QID-021: Get artist's full discography (paginated, album+single+compilation)
  async getArtistAlbums(artistId,includeGroups='album,single,compilation'){
    const albums=[];
    let url=`https://api.spotify.com/v1/artists/${encodeURIComponent(artistId)}/albums?include_groups=${includeGroups}&limit=50`;
    while(url){
      const d=await this.get(url);
      for(const a of(d.items||[])){
        albums.push({id:a.id,name:a.name,release_date:a.release_date||'',artists:(a.artists||[]).map(ar=>({id:ar.id,name:ar.name})),images:(a.images||[]).slice(0,3),tracks:{total:a.total_tracks||0,items:[],next:`https://api.spotify.com/v1/albums/${encodeURIComponent(a.id)}/tracks?limit=50`},album_type:a.album_type||'album',_genres:[],_inLibrary:false,_added_at:null});
      }

const MusicBrainz={

  async fetchArtistGenres(artistName){
    try{
      const q=encodeURIComponent(`artist:"${artistName}"`);
      const r=await fetch(`${this._base}/artist?query=${q}&limit=1&fmt=json`,{headers:this._headers});
      if(!r.ok)return[];
      const d=await r.json();
      const artist=d.artists?.[0];if(!artist)return[];
      const tags=(artist.tags||[]).sort((a,b)=>b.count-a.count).slice(0,8).map(t=>t.name.toLowerCase());
      return tags;
    }catch(e){return[];}
  },
  async enrichLibrary(onProg){
    const toEnrich=allAlbums.filter(a=>!(a._genres?.length));
    if(!toEnrich.length)return 0;
    // Deduplicate by artist
    const artistMap=new Map();
    for(const a of toEnrich)for(const ar of(a.artists||[]))if(ar.name&&!artistMap.has(ar.name))artistMap.set(ar.name,ar.name);
    const artistNames=[...artistMap.keys()];
    const db=await DB.getDb();
    let done=0,enriched=0;
    for(const name of artistNames){
      const genres=await this.fetchArtistGenres(name);
      if(genres.length){
        // Apply to all albums by this artist
        for(const a of allAlbums){
          if((a.artists||[]).some(ar=>ar.name===name)&&!(a._genres?.length)){
            a._genres=genres;enriched++;
          }
        }
        // Cache result — use name as key prefixed to avoid collision
        db.put('artist_cache',{id:'mb_'+name,genres,cachedAt:Date.now()}).catch(()=>{});
      }
      done++;onProg(done,artistNames.length,enriched);
      await sleep(1100); // MusicBrainz: max 1 req/s
    }
    // Persist enriched library
    if(enriched>0){
      allGenres=[...new Set([...allGenres,...allAlbums.flatMap(a=>a._genres||[])])].sort();
      await Cache.saveLibrary();
    }
    return enriched;
  },
};

function releaseYear(a){return parseInt((a.release_date||'').slice(0,4),10)||0;}
function decadeOf(y){if(y<1970)return'pre-70s';return String(Math.floor(y/10)*10).slice(2)+'s';}
function albumDurMin(a){return(a.tracks?.items||[]).reduce((s,t)=>s+(t.duration_ms||0),0)/60000;}

function applyFilters(albums){
  const ri=state.filters.avoidRecent?HistoryProvider.getRecentIds():null;
  const hm=(state.filters.queueHistory&&state.filters.queueHistory!=='any')?HistoryProvider.getMap():null;
  const now=Date.now();
  let pool=albums;
  const rsrc=state.filters.radarSource||'all';
  if(rsrc==='library'){pool=albums.filter(a=>a._inLibrary!==false);}

  // QID-008: Most Queued filter — restrict pool to top N by play count
  const mq=state.filters.mostQueued||'off';
  if(mq!=='off'){
    const fullHm=HistoryProvider.getMap();
    const cutoff=mq==='7d'?now-7*86400000:mq==='30d'?now-30*86400000:0;
    const counts=new Map();
    for(const[id,ts]of fullHm){if(!cutoff||ts>cutoff)counts.set(id,(counts.get(id)||0)+1);}
    const sorted=[...counts.entries()].sort((a,b)=>b[1]-a[1]).map(([id])=>id);
    const topIds=new Set(sorted.slice(0,50));
    pool=pool.filter(a=>topIds.has(a.id));
  }

  return pool.filter(a=>{
    const d=decadeOf(releaseYear(a));
    if(state.filters.decades.length>0&&!state.filters.decades.includes(d))return false;
    if(state.filters.decadesExcl.length>0&&state.filters.decadesExcl.includes(d))return false;
    if(state.filters.excludeKW){const l=(a.name||'').toLowerCase();if(BLOCKLIST_KW.some(k=>l.includes(k)))return false;}
    const dur=albumDurMin(a);if(dur<state.filters.minDur||dur>state.filters.maxDur)return false;
    if(state.filters.genres.length>0){const ag=a._genres||[];if(!state.filters.genres.some(g=>ag.includes(g)))return false;}
    if(state.filters.clusters.length>0){const ag=a._genres||[];const ac=new Set(ag.map(clusterOf));if(!state.filters.clusters.some(c=>ac.has(c)))return false;}
    if(state.filters.minAgeMonths>0){const addedMs=a._added_at?new Date(a._added_at).getTime():0;if(addedMs>now-state.filters.minAgeMonths*30*86400000)return false;}
    if(ri&&ri.has(a.id))return false;
    if(hm){const lh=hm.get(a.id);if(state.filters.queueHistory==='never'&&lh)return false;if(state.filters.queueHistory==='6m'&&lh&&now-lh<180*86400000)return false;if(state.filters.queueHistory==='1yr'&&lh&&now-lh<365*86400000)return false;}
    return true;
  });
}

function weightedPick(pool,n){
  const hm=HistoryProvider.getMap();const now=Date.now();const SIX=180*86400000,THI=HISTORY_MAX_AGE_DAYS*86400000;
  const w=pool.map(a=>{const lh=hm.get(a.id);const wt=!lh?10:now-lh>SIX?5:now-lh>THI?2:1;return{a,wt};});
  const res=[];const items=[...w];
  for(let i=0;i<Math.min(n,items.length);i++){let tot=0;for(let k=i;k<items.length;k++)tot+=items[k].wt;let r=Math.random()*tot,ch=i;for(let k=i;k<items.length;k++){r-=items[k].wt;if(r<=0){ch=k;break;}}[items[i],items[ch]]=[items[ch],items[i]];res.push(items[i].a);}
  return res;
}
function plainPick(pool,n){const a=[...pool];const r=[];for(let i=0;i<Math.min(n,a.length);i++){const j=i+Math.floor(Math.random()*(a.length-i));[a[i],a[j]]=[a[j],a[i]];r.push(a[i]);}return r;}
function sortAlbums(albums){const s=[...albums];if(state.albumSort==='release')return s.sort((a,b)=>releaseYear(a)-releaseYear(b));if(state.albumSort==='added')return s.sort((a,b)=>(a._added_at||'')<(b._added_at||'')?-1:1);if(state.albumSort==='duration')return s.sort((a,b)=>albumDurMin(a)-albumDurMin(b));return s;}

function getCovStats(){
  if(!allAlbums.length)return{total:0,neverHeard:0,longAgo:0,recent:0,everHeard:0,pct:0};
  const hm=HistoryProvider.getMap();const now=Date.now(),SIX=180*86400000;
  let nh=0,la=0,re=0;for(const a of allAlbums){const lh=hm.get(a.id);if(!lh)nh++;else if(now-lh>SIX)la++;else re++;}
  const ev=allAlbums.length-nh;return{total:allAlbums.length,neverHeard:nh,longAgo:la,recent:re,everHeard:ev,pct:Math.round(ev/allAlbums.length*100)};
}

// ── Sub-genre helpers ─────────────────────────────────────────────
/** Count how many albums contain each genre string. Cached per render. */
function getGenreCounts(){
  if(!allAlbums.length)return{};
  const c={};for(const a of allAlbums)for(const g of(a._genres||[]))c[g]=(c[g]||0)+1;
  return c;
}
/** Return sub-genres for a cluster that have ≥ MIN_SUBGENRE_ALBUMS albums, sorted by count desc. */
const MIN_SUBGENRE_ALBUMS=5;
function getSubGenres(clusterId){
  const counts=getGenreCounts();
  return Object.entries(counts)
    .filter(([g,n])=>clusterOf(g)===clusterId&&n>=MIN_SUBGENRE_ALBUMS)
    .sort((a,b)=>b[1]-a[1])
    .map(([g,n])=>({g,n}));
}
function formatAge(ms){const s=Math.floor(ms/1000);if(s<60)return'just now';const m=Math.floor(s/60);if(m<60)return`${m} min ago`;const h=Math.floor(m/60);if(h<24)return`${h} h ago`;const d=Math.floor(h/24);return`${d} day${d!==1?'s':''} ago`;}
function formatAddedAt(iso){if(!iso)return'';const ms=Date.now()-new Date(iso).getTime();if(ms<0)return'';const d=Math.floor(ms/86400000),mo=Math.floor(d/30.44),yr=Math.floor(d/365.25);if(yr>=1)return`${yr} yr in library`;if(mo>=1)return`Added ${mo} mo ago`;if(d>=1)return`Added ${d}d ago`;return'Added today';}

function attachShellEvents(){
  document.querySelectorAll('.tab-btn[data-tab]').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
  document.getElementById('logoutBtn').addEventListener('click',()=>{if(confirm('Log out? Library cache and history are preserved.'))Auth.logout();});
  document.getElementById('syncBtn').addEventListener('click',()=>handleRefresh());
  // QID-026: Home Refresh Button
  document.getElementById('homeRefreshBtn')?.addEventListener('click',async()=>{
    const btn=document.getElementById('homeRefreshBtn');
    if(!btn||btn.dataset.refreshing)return;
    btn.dataset.refreshing='1';btn.textContent='⏳';btn.disabled=true;
    try{
      // Re-fetch playlists + playlist albums in background
      const freshPl=await SpotifyAPI.fetchUserPlaylists();
      if(freshPl?.length){
        await PlaylistCache.savePlaylists(freshPl);
        const selectedIds=await PlaylistCache.getSelectedIds();
        for(const pid of selectedIds.slice(0,5)){
          try{
            await new Promise(r=>setTimeout(r,340));
            const albs=await SpotifyAPI.fetchPlaylistItems(pid);
            await PlaylistCache.saveAlbums(pid,albs);
          }catch(e){console.warn('Refresh playlist failed',pid,e);}
        }
      }
      // Invalidate enriched library so next pick is fresh
      EnrichedLibrary.invalidate().catch(()=>{});
      // Re-render Home
      _invalidateHomeDashCache();
      const panel=document.getElementById('tab-home');
      if(panel)renderHomeDashboard(panel);
      _homeDashCache.valid=true;
      _toast('Home refreshed');
    }catch(e){_toast('Refresh failed: '+e.message,true);}
    btn.textContent='🔄';btn.disabled=false;delete btn.dataset.refreshing;
  });
}

function switchTab(name){
  if(state.activeTab===name)return;state.activeTab=name;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.dataset.tab===name));
  // QID-026: Refresh-Button nur auf Home zeigen
  const refreshBtn=document.getElementById('homeRefreshBtn');
  if(refreshBtn)refreshBtn.style.display=(name==='home'&&Auth.isLoggedIn()&&allAlbums.length)?'':'none';
  renderActiveTab();
}

function renderActiveTab(){
  const p=document.getElementById('tab-'+state.activeTab);if(!p)return;
  if(state.activeTab==='home')    renderHomeTab(p);
  else if(state.activeTab==='picker')  renderPickerContent();
  else if(state.activeTab==='browser') renderBrowserTab(p);
  else if(state.activeTab==='profile') renderProfileTab(p);
}

function buildCoverageHTML(cvg){
  const total=cvg.recent+cvg.longAgo+cvg.neverHeard||1;
  const fb=`<div class="freshness-bar"><div class="fresh-seg" style="flex:${cvg.recent/total};background:#4a90d9"></div><div class="fresh-seg" style="flex:${cvg.longAgo/total};background:#d4a574"></div><div class="fresh-seg" style="flex:${cvg.neverHeard/total};background:var(--border2)"></div></div><div class="fresh-legend"><div class="fresh-item"><div class="fresh-dot" style="background:#4a90d9"></div>Queued recently (${cvg.recent})</div><div class="fresh-item"><div class="fresh-dot" style="background:#d4a574"></div>Long ago (${cvg.longAgo})</div><div class="fresh-item"><div class="fresh-dot" style="background:var(--border3)"></div>Never heard (${cvg.neverHeard})</div></div>`;
  const body=`<div class="clps-inner"><div class="cvg-top"><span class="cvg-pct">${cvg.pct}%</span><span class="cvg-lbl">discovered</span></div>${fb}<div class="cvg-stat"><div class="cvg-stat-left"><span class="cvg-stat-icon">✦</span><div><div class="cvg-stat-lbl">Never heard</div><div class="cvg-stat-sub">${cvg.neverHeard} albums</div></div></div><button class="btn btn-sm" data-cvgfilter="unheard">Pick these</button></div><div class="cvg-stat"><div class="cvg-stat-left"><span class="cvg-stat-icon">🕰️</span><div><div class="cvg-stat-lbl">Heard long ago</div><div class="cvg-stat-sub">${cvg.longAgo} albums (6+ months)</div></div></div><button class="btn btn-sm" data-cvgfilter="longAgo">Pick these</button></div>${buildLibOv()}</div>`;
  return`<div class="card section"><div class="clps-trg" id="cvgTrg"><span style="font-family:var(--font-h);font-size:15px;font-weight:600">Library Coverage</span><span class="clps-arr${state.coverageOpen?' open':''}">▼</span></div><div class="clps-body${state.coverageOpen?' open':''}" id="cvgBody">${body}</div></div>`;
}

function buildLibOv(){
  if(!allAlbums.length)return'';
  const dc={};for(const a of allAlbums){const d=decadeOf(releaseYear(a));dc[d]=(dc[d]||0)+1;}
  const mxd=Math.max(...Object.values(dc));
  const decRows=['pre-70s','70s','80s','90s','00s','10s','20s'].filter(d=>dc[d]).map(d=>`<div class="bar-row"><span class="bar-lbl">${d}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(dc[d]/mxd*100)}%"></div></div><span class="bar-cnt">${dc[d]}</span></div>`).join('');
  const gc={};for(const a of allAlbums)for(const g of(a._genres||[]))gc[g]=(gc[g]||0)+1;
  const topG=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,7);const mxg=topG[0]?.[1]||1;
  const gRows=topG.map(([g,n])=>`<div class="bar-row"><span class="bar-lbl" style="width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g)}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/mxg*100)}%"></div></div><span class="bar-cnt">${n}</span></div>`).join('');
  return`<div class="ov-section"><p class="ov-title">By Decade</p>${decRows}</div>${topG.length?`<div class="ov-section"><p class="ov-title">Top Genres</p>${gRows}</div>`:''}`;
}

function buildAlbumListHTML(){
  const sorted=sortAlbums(state.selectedAlbums);
  const items=sorted.map((a,di)=>{
    const idx=state.selectedAlbums.indexOf(a);
    const art=getArt(a,'md');const artist=(a.artists||[]).map(ar=>ar.name).join(', ');
    const dur=Math.round(albumDurMin(a));const trk=a.tracks?.total||a.tracks?.items?.length||'?';
    const yr=releaseYear(a)||'';const addLbl=formatAddedAt(a._added_at);
    const gLbl=(a._genres||[]).slice(0,2).join(' · ');
    const lh=HistoryProvider.getMap().get(a.id);const heard=lh?(Date.now()-lh>180*86400000?'🕰️':'✓'):'';
    return`<div class="album-item" data-idx="${idx}"><span class="alb-num">${di+1}</span><div class="alb-art-wrap">${art?`<img src="${esc(art)}" alt="" loading="lazy">`:'<div class="alb-art-ph">🎵</div>'}</div><div class="alb-info"><div class="alb-name">${esc(a.name)}</div><div class="alb-artist">${esc(artist)}</div><div class="alb-meta">${yr?yr+' · ':''}${trk} tracks · ${dur} min ${heard}</div>${gLbl?`<div class="alb-meta" style="opacity:.7">${esc(gLbl)}</div>`:''}${addLbl?`<div class="alb-meta">${esc(addLbl)}</div>`:''}</div><button class="reroll-btn" data-reroll="${idx}" title="Swap this album">↻</button></div>`;
  }).join('');
  let status='';
  if(state.phase==='queuing')status=`<div class="status-msg inf" id="queueStatus">Queueing albums…</div>`;
  else if(state.phase==='done')status=`<div class="status-msg ok">✓ Albums queued in Spotify!</div>`;
  else if(state.phase==='error')status=`<div class="status-msg err" id="queueStatus">Error queueing albums</div>`;
  return`<div class="section" id="albumListWrap">${status}<div class="album-list" id="albumListInner">${items}</div>${state.phase!=='queuing'?`<button class="btn btn-primary btn-full queue-sel-btn" id="queueSelBtn" style="margin-top:12px;height:52px;font-size:14px;font-family:var(--font-h);font-weight:700;border-radius:var(--r-xl)">▶ Queue These Albums</button>`:''}</div>`;
}

    item.addEventListener('touchend',e=>{if(!dr)return;dr=false;item.classList.remove('swipe-ready');const dx=e.changedTouches[0].clientX-sx;if(dx<-60&&!state.isWorking)rerollAlbum(+item.dataset.idx);else item.style.transform='';},{passive:true});

async function handlePick(){
  if(state.isWorking||!allAlbums.length)return;
  state.isWorking=true;renderPickerContent();

  // QID-009: build base pool according to pickerSource
  let basePool;
  const src=state.filters.pickerSource||'library';
  basePool=allAlbums;
  if(src==='playlists'||src==='both'){
    const selectedIds=await PlaylistCache.getSelectedIds();
    if(!selectedIds.length){
      _toast('Keine Playlists hinterlegt. Bitte zuerst im Profil auswählen.',true);
      state.isWorking=false;renderPickerContent();return;
    }
    const plAlbumMap=new Map();
    for(const pid of selectedIds){
      const albums=await PlaylistCache.getAlbums(pid)||[];
      for(const a of albums)if(!plAlbumMap.has(a.id))plAlbumMap.set(a.id,a);
    }
    const plAlbums=[...plAlbumMap.values()];
    if(src==='playlists'){basePool=plAlbums.length?plAlbums:allAlbums;}
    else{const merged=new Map(allAlbums.map(a=>[a.id,a]));for(const a of plAlbums)if(!merged.has(a.id))merged.set(a.id,a);basePool=[...merged.values()];}
    if(!basePool.length){_toast('Playlist-Alben konnten nicht geladen werden.',true);state.isWorking=false;renderPickerContent();return;}
  }

  let pool=applyFilters(basePool);
  const hm=HistoryProvider.getMap();const now=Date.now();
  // QID-013: Burn Mode — exclude burned albums from pool
  if(state.burnMode){await BurnMode.load();pool=pool.filter(a=>!BurnMode.isBurned(a.id));}
  if(state.coverageFilter==='unheard'){pool=pool.filter(a=>!hm.has(a.id));state.coverageFilter=null;}
  else if(state.coverageFilter==='longAgo'){pool=pool.filter(a=>{const lh=hm.get(a.id);return!lh||now-lh>180*86400000;});state.coverageFilter=null;}
  if(!pool.length){
    state.isWorking=false;state.phase='idle';renderPickerContent();
    const p=document.getElementById('tab-picker');
    if(p){
      const m=document.createElement('div');m.className='status-msg err';
      m.textContent=state.burnMode?'🔥 All albums burned! Turn off Burn Mode to reset.':'No albums match the current filters. Try relaxing your criteria.';
      const b=p.querySelector('#queueBtn');if(b)b.insertAdjacentElement('beforebegin',m);setTimeout(()=>m.remove(),4000);
    }
    return;
  }
  // QID-013: Burn Mode — burn previously shown picks before picking new ones
  if(state.burnMode&&state.selectedAlbums.length){
    for(const a of state.selectedAlbums)await BurnMode.burn(a.id,a.name);
    if(state.selectedAlbums.length===1)_burnToast(state.selectedAlbums[0].name);
    else _toast(`🔥 ${state.selectedAlbums.length} albums burned`);
  }
  state.selectedAlbums=state.filters.weightUnheard?weightedPick(pool,state.albumCount):plainPick(pool,state.albumCount);
  state.phase='picked';state.isWorking=false;renderPickerContent(true);
}

async function rerollAlbum(idx){
  // QID-010: async, pickerSource-aware
  if(state.isWorking)return;
  let basePool;
  const src=state.filters.pickerSource||'library';
  basePool=allAlbums;
  if(src==='playlists'||src==='both'){
    const selectedIds=await PlaylistCache.getSelectedIds();
    if(selectedIds.length){
      const plAlbumMap=new Map();
      for(const pid of selectedIds){
        const albums=await PlaylistCache.getAlbums(pid)||[];
        for(const a of albums)if(!plAlbumMap.has(a.id))plAlbumMap.set(a.id,a);
      }
      const plAlbums=[...plAlbumMap.values()];
      if(src==='playlists'){basePool=plAlbums.length?plAlbums:allAlbums;}
      else{const merged=new Map(allAlbums.map(a=>[a.id,a]));for(const a of plAlbums)if(!merged.has(a.id))merged.set(a.id,a);basePool=[...merged.values()];}
    }
  }
  const pool=applyFilters(basePool).filter(a=>!state.selectedAlbums.includes(a)&&(!state.burnMode||!BurnMode.isBurned(a.id)));if(!pool.length)return;
  const[rep]=state.filters.weightUnheard?weightedPick(pool,1):plainPick(pool,1);
  const item=document.querySelector(`.album-item[data-idx="${idx}"]`);
  if(item){item.classList.add('swipe-exit');await sleep(200);}
  // QID-013: Burn the replaced album on reroll
  if(state.burnMode){const old=state.selectedAlbums[idx];if(old){await BurnMode.burn(old.id,old.name);_burnToast(old.name);}}
  state.selectedAlbums[idx]=rep;
  const wrap=document.getElementById('albumListWrap');
  if(wrap){wrap.outerHTML=buildAlbumListHTML();const panel=document.getElementById('tab-picker');attachAlbumListEvents(panel);document.getElementById('queueSelBtn')?.addEventListener('click',handleQueue);const ni=document.querySelector(`.album-item[data-idx="${idx}"]`);if(ni)ni.classList.add('swipe-enter');}
}

async function handleQueue(){
  if(state.isWorking||!state.selectedAlbums.length)return;
  state.isWorking=true;state.phase='queuing';renderPickerContent();
  const delay=state.browserMode?DELAY_BROWSER_MS:DELAY_DESKTOP_MS;
  try{
    for(let album of state.selectedAlbums){
      const el=document.getElementById('queueStatus');if(el)el.textContent=`Queueing "${album.name}"…`;
      // QID-023: Playlist-Alben haben leere tracks.items — on-demand fetch
      if(!(album.tracks?.items?.length)&&!(album.tracks?.next)){
        try{
          if(el)el.textContent=`Loading tracks for "${album.name}"…`;
          const full=await SpotifyAPI.get(`https://api.spotify.com/v1/albums/${encodeURIComponent(album.id)}`);
          if(full?.id){
            // Merge track data into album, cache in enriched_library
            album={...album,tracks:{total:full.tracks?.total||0,items:(full.tracks?.items||[]).map(t=>({uri:t.uri,duration_ms:t.duration_ms})),next:full.tracks?.next||null}};
            try{const db=await DB.getDb();const ex=await db.get('enriched_library','main');if(ex?.albums){const idx=ex.albums.findIndex(a=>a.id===album.id);if(idx>=0)ex.albums[idx]=slimAlbum(album);else ex.albums.push(slimAlbum(album));await db.put('enriched_library',ex,'main');}}catch(ce){console.warn('Cache update failed',ce);}
          }
        }catch(fe){console.warn('QID-023: full album fetch failed',album.id,fe);}
      }
      const tracks=await SpotifyAPI.getAlbumTracks(album);
      for(const t of tracks){await SpotifyAPI.addToQueue(t.uri);await sleep(delay);}
      await HistoryProvider.log(album.id,album.name);
      if(state.burnMode){await BurnMode.burn(album.id,album.name);_burnToast(album.name);}
    }
    state.phase='done';
  }catch(err){const el=document.getElementById('queueStatus');if(el)el.textContent=err.message;state.phase='error';}
  finally{state.isWorking=false;renderPickerContent();renderHdrBadge();}
}

async function handleRefresh(){
  if(state.isWorking)return;
  state.isWorking=true;state.loadingLibrary=true;state.phase='idle';state.selectedAlbums=[];
  renderPickerContent();
  try{
    allAlbums=await SpotifyAPI.fetchAllAlbums((loaded,total)=>{const el=document.getElementById('fetchProgress');if(el)el.textContent=`Fetching library… ${loaded} / ${total}`;});
    // Phase 6B: mark all fetched library albums as _inLibrary=true
    for(const a of allAlbums)a._inLibrary=true;
    state.cachedAt=Date.now();await Cache.saveLibrary();
    const syncBtn=document.getElementById('syncBtn');if(syncBtn)syncBtn.style.display='';
    renderHdrBadge();state.loadingLibrary=false;state.genresLoading=true;renderPickerContent();
    allGenres=await SpotifyAPI.fetchArtistGenres(allAlbums,(loaded,total)=>{['genreProgressWrap','genreProgressInner'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=`Genres… ${loaded} / ${total}`;});});
    state.genresLoading=false;await Cache.saveLibrary();
    
    // Reset browser tab so genre chips re-build with new data
    const lp=document.getElementById('tab-browser');if(lp)delete lp.dataset.libBuilt;
    _invalidateHomeDashCache();
    renderPickerContent();
  }catch(err){
    state.loadingLibrary=false;state.genresLoading=false;
    const p=document.getElementById('tab-picker');if(p){const m=document.createElement('div');m.className='status-msg err';m.textContent=err.message;p.prepend(m);}
  }finally{state.isWorking=false;renderPickerContent();}
}

function openAlbumDetail(album){
  const art=getArt(album,'lg');const artist=(album.artists||[]).map(a=>a.name).join(', ');
  const yr=releaseYear(album)||'';const trk=album.tracks?.total||album.tracks?.items?.length||'?';
  const dur=Math.round(albumDurMin(album));const genres=(album._genres||[]).slice(0,4).join(' · ');
  const lh=HistoryProvider.getMap().get(album.id);const heard=lh?`Last queued ${formatAge(Date.now()-lh)}`:'Never queued';
  const modal=document.createElement('div');modal.className='modal-bg';
  const firstArtist=(album.artists||[])[0];
  modal.innerHTML=`<div class="modal"><div class="modal-handle"></div><div class="modal-body">${art?`<img class="modal-art" src="${esc(art)}" alt="">`:`<div class="modal-art-ph">🎵</div>`}<div class="modal-title">${esc(album.name)}</div><div class="modal-artist">${esc(artist)}</div><div class="modal-meta">${yr?yr+' · ':''}${trk} tracks · ${dur} min${genres?' · '+esc(genres):''}<br><span style="color:var(--blue)">${heard}</span></div><div class="modal-actions"><button class="btn btn-primary" id="mdlQueue">▶ Queue Album</button><div class="modal-actions-row2"><button class="btn" id="mdlSaveLater">🕐 Save for Later</button><button class="btn" id="mdlFave">❤️ Favorite</button>${firstArtist?.id?`<button class="btn" id="mdlArtistDive">🎤 Artist</button>`:''}<button class="btn" id="mdlClose">Close</button></div></div></div></div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
  modal.querySelector('#mdlClose').addEventListener('click',()=>modal.remove());
  if(firstArtist?.id){
    modal.querySelector('#mdlArtistDive')?.addEventListener('click',async()=>{
      modal.remove();
      // Try to get artist image from Spotify (GET /artists/{id} still available Feb 2026)
      let imgUrl=null;
      try{const ar=await SpotifyAPI.get('https://api.spotify.com/v1/artists/'+encodeURIComponent(firstArtist.id));imgUrl=ar.images?.[1]?.url||ar.images?.[0]?.url||null;}catch(e){}
      openArtistDeepDive(firstArtist.id,firstArtist.name,imgUrl);
    });
  }
  modal.querySelector('#mdlSaveLater').addEventListener('click',async()=>{
    const btn=modal.querySelector('#mdlSaveLater');btn.disabled=true;
    const alreadyIn=await ListenLater.has(album.id);
    if(alreadyIn){await ListenLater.remove(album.id);btn.textContent='Removed';_toast('Removed from Listen Later.');}
    else{await ListenLater.add(album);btn.textContent='✓ Saved!';_toast(`"${album.name}" saved for later.`);}
    setTimeout(()=>modal.remove(),1000);
  });
  // Check if already in listen later
  ListenLater.has(album.id).then(has=>{const b=modal.querySelector('#mdlSaveLater');if(b&&has)b.textContent='✓ Already saved';});
  // QID-007: Favorites toggle
  modal.querySelector('#mdlFave').addEventListener('click',async()=>{
    const btn=modal.querySelector('#mdlFave');btn.disabled=true;
    const isFave=await Favorites.toggle(album);
    btn.textContent=isFave?'❤️ Favorited':'🤍 Removed';
    _toast(isFave?`❤️ Added to Favorites`:`Removed from Favorites`);
    setTimeout(()=>modal.remove(),900);
  });
  Favorites.has(album.id).then(has=>{const b=modal.querySelector('#mdlFave');if(b&&has)b.textContent='❤️ Favorited';});
  modal.querySelector('#mdlQueue').addEventListener('click',async()=>{
    const btn=modal.querySelector('#mdlQueue');btn.disabled=true;btn.textContent='Queueing…';
    try{
      const delay=state.browserMode?DELAY_BROWSER_MS:DELAY_DESKTOP_MS;
      // QID-023: on-demand fetch wenn tracks leer (Playlist-Album)
      let qAlbum=album;
      if(!(qAlbum.tracks?.items?.length)&&!(qAlbum.tracks?.next)){
        btn.textContent='Loading tracks…';
        try{const full=await SpotifyAPI.get(`https://api.spotify.com/v1/albums/${encodeURIComponent(qAlbum.id)}`);if(full?.id)qAlbum={...qAlbum,tracks:{total:full.tracks?.total||0,items:(full.tracks?.items||[]).map(t=>({uri:t.uri,duration_ms:t.duration_ms})),next:full.tracks?.next||null}};}catch(fe){console.warn('QID-023 modal fetch failed',fe);}
      }
      const tracks=await SpotifyAPI.getAlbumTracks(qAlbum);
      for(const t of tracks){await SpotifyAPI.addToQueue(t.uri);await sleep(delay);}
      await HistoryProvider.log(qAlbum.id,qAlbum.name);
      if(state.burnMode){
        await BurnMode.burn(qAlbum.id,qAlbum.name);
        _burnToast(qAlbum.name);
        // Remove card from Home carousels + Lens immediately (no full re-render)
        if(state.activeTab==='home'||document.querySelector('.sam-bg')){
          const albumId=qAlbum.id;
          // Remove from all carousel tracks on Home
          document.querySelectorAll(`.car-card[data-id="${CSS.escape(albumId)}"]`).forEach(card=>{
            const track=card.closest('.carousel-track');
            card.remove();
            // If carousel track is now empty → hide the whole section
            if(track&&!track.children.length){
              const sec=track.closest('.dash-section,.heavy-rot-section,.library-radio-container,.daily-pick-section');
              if(sec)sec.remove();
            }
          });
          // Remove from Lens View grid if open
          document.querySelectorAll(`.sam-item[data-id="${CSS.escape(albumId)}"]`).forEach(item=>{
            const grid=item.closest('.sam-grid');
            item.remove();
            const countEl=document.querySelector('#samCount');
            if(countEl){const n=parseInt(countEl.textContent)||0;if(n>0)countEl.textContent=`${n-1} albums`;}
            // If grid group is empty → remove group header + grid
            if(grid&&!grid.children.length){
              const grpWrap=grid.closest('.sam-group,.sam-cluster-hdr')?.parentElement;
              if(grpWrap)grpWrap.remove();else grid.remove();
            }
          });
          _invalidateHomeDashCache();
        }
      }
      btn.textContent='✓ Queued!';setTimeout(()=>modal.remove(),1500);
    }    catch(err){btn.disabled=false;btn.textContent='▶ Queue Album';alert(err.message);}
  });
}

// ── Settings helpers (IndexedDB settings store) ───────────────────
const Settings={
  _cache:null,
  async load(){
    if(this._cache)return this._cache;
    try{const db=await DB.getDb();const r=await db.get('settings','prefs');this._cache=r||{};}
    catch(e){this._cache={};}
    return this._cache;
  },
  async get(key,def){const s=await this.load();return s[key]!==undefined?s[key]:def;},
  async set(key,val){const s=await this.load();s[key]=val;try{const db=await DB.getDb();await db.put('settings',s,'prefs');}catch(e){}},
  async setMulti(obj){const s=await this.load();Object.assign(s,obj);try{const db=await DB.getDb();await db.put('settings',s,'prefs');}catch(e){}},
};

// ── Listen Later helpers ──────────────────────────────────────────
const ListenLater={
  async getAll(){try{const db=await DB.getDb();return await db.getAll('listen_later');}catch(e){return[];}},
  async add(album){
    try{
      const db=await DB.getDb();
      const art=getArt(album,'sm')||getArt(album,'md')||null;
      const artist=(album.artists||[]).map(a=>a.name).join(', ');
      await db.put('listen_later',{id:album.id,name:album.name,artist,art,addedAt:Date.now(),albumRef:album});
    }catch(e){console.warn('ListenLater.add failed',e);}
  },
  async remove(id){try{const db=await DB.getDb();await db.delete('listen_later',id);}catch(e){}},
  async has(id){try{const db=await DB.getDb();return!!(await db.get('listen_later',id));}catch(e){return false;}},
};

// QID-007: Favorites — IDB store `favorites` active since DB_VERSION 9
const Favorites={
  async getAll(){try{const db=await DB.getDb();return await db.getAll('favorites');}catch(e){return[];}},
  async add(album){
    try{
      const db=await DB.getDb();
      const art=getArt(album,'sm')||getArt(album,'md')||null;
      const artist=(album.artists||[]).map(a=>a.name).join(', ');
      await db.put('favorites',{id:album.id,name:album.name,artist,art,addedAt:Date.now(),albumRef:album});
    }catch(e){console.warn('Favorites.add failed',e);}
  },
  async remove(id){try{const db=await DB.getDb();await db.delete('favorites',id);}catch(e){}},
  async has(id){try{const db=await DB.getDb();return!!(await db.get('favorites',id));}catch(e){return false;}},
  async toggle(album){
    const has=await this.has(album.id);
    if(has){await this.remove(album.id);return false;}
    else{await this.add(album);return true;}
  },
  async getIds(){try{const db=await DB.getDb();const all=await db.getAll('favorites');return new Set(all.map(f=>f.id));}catch(e){return new Set();}},
};

/** Compute current and longest listening streak (days with ≥1 play). */
function _computeStreaks(){
  const dates=new Set();
  for(const[,t]of HistoryProvider.getMap()){
    const d=new Date(t);dates.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
  }
  if(!dates.size)return{currentStreak:0,longestStreak:0};
  const sorted=[...dates].sort();
  let longest=1,cur=1;
  for(let i=1;i<sorted.length;i++){
    const prev=new Date(sorted[i-1].replace(/-/g,'/')),curr=new Date(sorted[i].replace(/-/g,'/'));
    const diff=(curr-prev)/86400000;
    if(diff===1){cur++;longest=Math.max(longest,cur);}else{cur=1;}
  }
  // Check if streak extends to today/yesterday
  const lastDate=new Date(sorted[sorted.length-1].replace(/-/g,'/'));
  const today=new Date();today.setHours(0,0,0,0);
  const diffToday=(today-lastDate)/86400000;
  if(diffToday>1)cur=0;
  return{currentStreak:cur,longestStreak:longest};
}

// SECTION 16 — LEGACY MIGRATION (from original AlbumPick v3 localStorage)
// ═══════════════════════════════════════════════════════════════════
async function migrateFromLegacy(){
  try{
    const rawLib=localStorage.getItem('albumpick_library_v1');
    if(rawLib){const p=JSON.parse(rawLib);if(p?.albums?.length){const db=await DB.getDb();const ex=await db.get('library','main');if(!ex)await db.put('library',{cachedAt:p.cachedAt||Date.now(),genres:p.genres||[],albums:p.albums},'main');}localStorage.removeItem('albumpick_library_v1');}
    const rawHist=localStorage.getItem('albumpick_history_v1');
    if(rawHist){const e=JSON.parse(rawHist);if(Array.isArray(e)&&e.length){const db=await DB.getDb();const tx=db.transaction('history','readwrite');await Promise.all(e.filter(x=>x.id&&x.queuedAt).map(x=>tx.store.put({id:x.id,name:x.name||'',queuedAt:x.queuedAt})));await tx.done;}localStorage.removeItem('albumpick_history_v1');}
  }catch(e){console.warn('Legacy migration failed',e);}
}

// ═══════════════════════════════════════════════════════════════════
(async function boot(){
  // Request persistent storage early
  navigator.storage?.persist?.().then(g=>console.log('Persistent storage:',g?'granted':'denied')).catch(()=>{});

  const params=new URLSearchParams(window.location.search);
  const code=params.get('code'),oState=params.get('state'),oError=params.get('error');

  if(oError){window.history.replaceState({},'',window.location.pathname);render();return;}

  if(code&&oState){
    if(Auth.isLoggedIn()){window.history.replaceState({},'',window.location.pathname);}
    else{try{await Auth.handleCallback(code,oState);}catch(err){window.history.replaceState({},'',window.location.pathname);render();document.getElementById('app').innerHTML+=`<div style="position:fixed;top:16px;left:16px;right:16px;background:rgba(217,83,74,.12);border:1px solid rgba(217,83,74,.3);color:#d95349;padding:12px 16px;border-radius:10px;font-size:13px;z-index:999">${esc(err.message)}</div>`;return;}}
  }

  await migrateFromLegacy();

  if(Auth.isLoggedIn()){
    await Promise.all([Cache.loadLibrary(),HistoryProvider.load(),HomeLayout.load(),BurnMode.load(),LastfmCache.load()]);
    restoreSession();
    if(allAlbums.length){
      const syncBtn=document.getElementById('syncBtn');if(syncBtn)syncBtn.style.display='';
      // QID-026: Refresh-Button einblenden wenn auf Home-Tab
      if(state.activeTab==='home'){const rb=document.getElementById('homeRefreshBtn');if(rb)rb.style.display='';}
    }

    // QID-026: Background-Sync — Playlists + TopAlbums nachladen (non-blocking, Rate-limit 3 req/sec)
    (async()=>{
      try{
        // Playlists: nur wenn kein frischer Cache
        const cachedPl=await PlaylistCache.getPlaylists();
        const plTTL=24*60*60*1000;
        if(!cachedPl||(Date.now()-(cachedPl[0]?._cachedAt||0))>plTTL){
          const freshPl=await SpotifyAPI.fetchUserPlaylists();
          if(freshPl?.length){
            await PlaylistCache.savePlaylists(freshPl);
            // Fetch albums für selektierte Playlists — max 3 req/sec
            const selectedIds=await PlaylistCache.getSelectedIds();
            for(const pid of selectedIds.slice(0,5)){
              const ex=await PlaylistCache.getAlbums(pid);
              if(!ex){
                try{
                  await new Promise(r=>setTimeout(r,340)); // ~3 req/sec
                  const albs=await SpotifyAPI.fetchPlaylistItems(pid);
                  await PlaylistCache.saveAlbums(pid,albs);
                  EnrichedLibrary.invalidate().catch(()=>{});
                }catch(e){console.warn('Playlist bg-sync failed',pid,e);}
              }
            }
          }
        }
        // TopAlbums: nur wenn TTL abgelaufen (TTL = TOP_ALBUMS_TTL, 7 Tage)
        for(const tRange of['short_term','medium_term','long_term']){
          const cached=await TopAlbumsCache.get(tRange);
          if(!cached){
            try{
              await new Promise(r=>setTimeout(r,340));
              await TopAlbumsCache.fetchAndCache(tRange);
            }catch(e){console.warn('TopAlbums bg-sync failed',tRange,e);}
          }
        }
      }catch(e){console.warn('Background sync error',e);}
    })();

    // Phase 17C: Last.fm GitHub Auto-Sync — silent, non-blocking
    (async()=>{
      const result=await LastfmCache.githubSync(false);
      if(result==='updated')_toast('🎵 Last.fm Stats aktualisiert');
      else if(result==='first'){
        // Erster Import: interaktiver Toast mit Bestätigungs-Button
        const t=document.createElement('div');
        t.style.cssText='position:fixed;bottom:calc(var(--tab-h)+16px);left:50%;transform:translateX(-50%);background:rgba(74,144,217,.18);border:1px solid rgba(74,144,217,.4);color:var(--blue);padding:10px 16px;border-radius:var(--r-f);font-size:13px;font-weight:500;z-index:999;display:flex;align-items:center;gap:10px;backdrop-filter:blur(8px);white-space:nowrap';
        t.innerHTML='🎵 Last.fm Stats verfügbar <button id="lfGhAccept" style="background:var(--blue);color:#fff;border:none;border-radius:var(--r-f);padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer">Jetzt laden</button>';
        document.body.appendChild(t);
        const cleanup=()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);};
        setTimeout(cleanup,8000);
        t.querySelector('#lfGhAccept').addEventListener('click',async()=>{
          cleanup();
          const r=await LastfmCache.githubSync(true);
          if(r==='updated'||r==='first'){_toast('✅ Last.fm Stats importiert!');_invalidateHomeDashCache&&_invalidateHomeDashCache();}
        });
      }
    })();
  }

  render();

  // Start Now Playing polling (every 15s while app is open)
  if(Auth.isLoggedIn()){
    pollNowPlaying();
    _npTimer=setInterval(pollNowPlaying,15000);
  }

  // Register service worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW registration failed',e));
  }
})();

function _attachCarouselClicks(container, extraAlbums=[]){

/** PHASE 2: Return albums added to library in last N days */
function getNewInLibrary(days=30){
  const cutoff=Date.now()-days*86400000;
  return allAlbums
    .filter(a=>a._added_at&&new Date(a._added_at).getTime()>cutoff)
    .sort((a,b)=>new Date(b._added_at).getTime()-new Date(a._added_at).getTime());
}

/** PHASE 2: Return albums not heard in >90 days (rediscover candidates) */
function getRediscoverAlbums(maxDays=90){
  const hm=HistoryProvider.getMap();const now=Date.now();const threshold=maxDays*86400000;
  return allAlbums
    .filter(a=>{const lh=hm.get(a.id);return lh&&(now-lh>threshold);})
    .sort((a,b)=>{
      const la=hm.get(a.id)||0,lb=hm.get(b.id)||0;
      return la-lb; // oldest-heard first
    });
}

 * @param {'4w'|'6m'|'all'|'app30d'|'appAll'} timeRange */
async function getTopAlbums(timeRange){
  const hm=HistoryProvider.getMap();const now=Date.now();
  // Spotify ranges — use persistent TopAlbumsCache (QID-018)
  if(timeRange==='4w'||timeRange==='6m'||timeRange==='all'){
    const tRange=timeRange==='4w'?'short_term':timeRange==='6m'?'medium_term':'long_term';
    const albums=await TopAlbumsCache.fetchAndCache(tRange);
    // Score by count field
    return albums.slice(0,30).map(a=>({album:a,playCount:a.count||1,source:'spotify'}));
  }
  // App history ranges
  let cutoff=0;
  if(timeRange==='app30d')cutoff=now-30*86400000;
  const scored=new Map();
  for(const[id,queuedAt]of hm){
    if(cutoff&&queuedAt<cutoff)continue;
    const a=allAlbums.find(x=>x.id===id);if(!a)continue;
    const prev=scored.get(id)||{album:a,playCount:0,source:'app',lastPlayed:0};
    prev.playCount++;prev.lastPlayed=Math.max(prev.lastPlayed,queuedAt);
    scored.set(id,prev);
  }
  return [...scored.values()].sort((a,b)=>b.playCount-a.playCount).slice(0,30);
}

/** Fisher-Yates shuffle — returns new shuffled array, does not mutate */
function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/** QID-012/032: Compute context badges for an album.
 *  @param {object} album
 *  @param {string|null} relatedArtistName
 *  @param {object} badgeToggles  — {heavyRotation,newAlbum,justAdded,trending,favorite,hiddenGem,repeat,playlist}
 *  @param {Set} heavyIds
 *  @param {Set} trendingIds
 *  @param {Set} favoriteIds
 *  @param {Set} hiddenGemIds
 *  @param {Set} repeatIds        — albums queued >2× in last 7d
 *  @returns {Array<{cls,label}>}
 */
function _computeBadges(album, relatedArtistName, badgeToggles, heavyIds, trendingIds, favoriteIds, hiddenGemIds, repeatIds=new Set()){
  const badges=[];
  if(relatedArtistName&&(album.artists||[]).length===1){
    const name=relatedArtistName.length>18?relatedArtistName.slice(0,16)+'…':relatedArtistName;
    badges.push({cls:'related',label:`🎵 ${name}`});
  }
  if(badgeToggles.heavyRotation&&heavyIds.has(album.id))badges.push({cls:'heavy',label:'⭐ Heavy'});
  if(badgeToggles.trending&&trendingIds.has(album.id))badges.push({cls:'trending',label:'🔥 Trending'});
  if(badgeToggles.repeat&&repeatIds.has(album.id))badges.push({cls:'trending',label:'🔁 Repeat'});
  if(badgeToggles.favorite&&favoriteIds.has(album.id))badges.push({cls:'related',label:'❤️ Fave'});
  if(badgeToggles.hiddenGem&&hiddenGemIds&&hiddenGemIds.has(album.id))badges.push({cls:'hiddengem',label:'💎 Hidden Gem'});
  if(badgeToggles.justAdded&&album._added_at&&Date.now()-new Date(album._added_at).getTime()<7*86400000)badges.push({cls:'new',label:'🆕 Just Added'});
  else if(badgeToggles.newAlbum&&album._added_at&&Date.now()-new Date(album._added_at).getTime()<30*86400000)badges.push({cls:'new',label:'📅 New'});
  // QID-032: Playlist badge — album from playlist source only
  if(badgeToggles.playlist&&album._inLibrary===false)badges.push({cls:'related',label:'🎵 Playlist'});
  return badges.slice(0,3);
}

const _lensFilters={};

/** Phase 17: Unified Relevance Score — integrates Last.fm play data for all carousels.
 *  Formula: lfPlays_norm×2.0 + recency×1.5 + rank_norm×1.0 + newness×0.8 + carouselBonus
 */
function _lensRelevanceScore(album, carouselId, hm, playCounts, heavyIds, hiddenGemIds){
  const now=Date.now();
  const lastPlayed=hm.get(album.id)||0;
  const daysSince=lastPlayed?(now-lastPlayed)/86400000:9999;
  const addedMs=album._added_at?new Date(album._added_at).getTime():0;
  const daysSinceAdded=addedMs?(now-addedMs)/86400000:9999;

  // App-history components
  const recency   = Math.min(daysSince/365,3);         // 0–3, higher = not heard longer
  const newness   = Math.max(0,1-(daysSinceAdded/180));// 0–1, newer = higher
  const badgeBonus= heavyIds.has(album.id)?0.5:hiddenGemIds.has(album.id)?0.8:0;

  // Last.fm components
  const lfMap=LastfmCache.getPlayCountMap();
  const lfKey=(album.artists||[])[0]?.name?.toLowerCase().trim()+'||'+album.name.toLowerCase().trim();
  const lfPlays=lfMap.get(lfKey)||0;
  const LF_MAX_PLAYS=387; // Bonobo/Fragments — top album in dataset
  const lfPlays_norm=Math.min(lfPlays/LF_MAX_PLAYS,1); // 0–1

  // Last.fm rank (lower rank = better, invert to 0–1)
  const lfStats=LastfmCache.getStats();
  const lfAlbumEntry=lfStats?.albums?.find(a=>a.artist?.toLowerCase().trim()+'||'+a.album?.toLowerCase().trim()===lfKey);
  const lfRank=lfAlbumEntry?.myRank||null;
  const LF_TOTAL=lfStats?.albums?.length||14589;
  const rank_norm=lfRank?Math.max(0,1-(lfRank/LF_TOTAL)):0; // 0–1, rank 1 = ~1.0

  // Unified base score
  const base = (lfPlays_norm*2.0) + (recency*1.5) + (rank_norm*1.0) + (newness*0.8) + badgeBonus;

  // Carousel-type bonus on top of unified base
  if(carouselId==='forgotten-gems')   return base + recency*0.5;
  if(carouselId==='heavy-rotation')   return base + lfPlays_norm*0.5;
  if(carouselId==='new-in-library')   return base + newness*1.5;
  if(carouselId==='rediscover')       return base + recency*1.0;
  if(carouselId.startsWith('playlist-')) return base + newness*0.5;
  return base;
}

/** Lens Filter Sheet — Genre + Subgenres + Gehört + Hinzugefügt + Typ + Burned + Sort */
function _openLensSheet(lf, poolAlbums, onClose, carouselId=''){
  document.querySelector('.lens-sheet-bg')?.remove();
  const sheetBg=document.createElement('div');sheetBg.className='lib-sheet-bg lens-sheet-bg';
  const sheet=document.createElement('div');sheet.className='lib-sheet';

  // Build genre cluster counts from pool
  function _genreCounts(){
    const counts=new Map();
    for(const a of poolAlbums){
      const gs=a._genres||[];
      const clusters=new Set(gs.map(g=>clusterOf(g)));
      for(const c of clusters)counts.set(c,(counts.get(c)||0)+1);
    }
    return counts;
  }
  // Sub-genres for active cluster from pool
  function _subGenresForLens(clusterId){
    const kw=(GENRE_CLUSTERS.find(c=>c.id===clusterId)||{}).kw||[];
    const counts=new Map();
    for(const a of poolAlbums){
      for(const g of(a._genres||[])){
        if(kw.some(k=>g.toLowerCase().includes(k)))counts.set(g,(counts.get(g)||0)+1);
      }
    }
    return[...counts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,30).map(([g,n])=>({genre:g,count:n}));
  }

  function _countActive(){
    let n=0;
    if(lf.heardStatus!=='all')n++;if(lf.addedWithin!=='all')n++;if(lf.albumTypes.length)n++;
    if(lf.showBurned!=='hide')n++;if(lf.activeBadges.length)n++;if(lf.activeGenres.length)n++;
    return n;
  }

  function _build(){
    const genreCounts=_genreCounts();
    const genreChips=GENRE_CLUSTERS.map(c=>{
      const cnt=genreCounts.get(c.id)||0;if(!cnt)return'';
      const active=lf.activeGenres.includes(c.id);
      return`<button class="lib-genre-chip${active?' active':''}" data-lg="${c.id}"><span class="chip-icon">${c.icon}</span>${c.label}<span class="chip-cnt">${cnt}</span></button>`;
    }).join('');

    let subHTML='';
    if(lf.activeGenres.length===1){
      const subs=_subGenresForLens(lf.activeGenres[0]).slice(0,30);
      if(subs.length)subHTML=`<div class="lib-subgenre-wrap">${subs.map(({genre,count})=>`<button class="lib-subgenre-chip${lf.activeSubGenres.includes(genre)?' active':''}" data-lsg="${esc(genre)}">${esc(genre)}<span class="chip-cnt" style="font-size:9px;opacity:.5;margin-left:3px">${count}</span></button>`).join('')}</div>`;
    }

    const typeChips=['album','single','compilation'].map(t=>
      `<button class="lib-type-chip${lf.albumTypes.includes(t)?' active':''}" data-lt="${t}">${{album:'Album',single:'Single / EP',compilation:'Compilation'}[t]}</button>`
    ).join('');
    const isLfCarousel=_LF_CAROUSEL_IDS.has(carouselId);
    const sortChips=[
      ...(isLfCarousel?[['original','Original']]:
          [['relevance','Relevance']]),
      ...(isLfCarousel?[['relevance','Relevance']]:
          []),
      ['badge','By Badge'],['newest','Newest'],['oldest','Oldest'],['az','A–Z'],['za','Z–A'],['mostplayed','Most Played'],['lastplayed','Last Played']
    ].map(([v,l])=>`<button class="lib-sort-chip${lf.sortMode===v?' active':''}" data-ls="${v}">${l}</button>`).join('');
    const heardHTML=[['all','Alle'],['unheard','🆕 Ungehört'],['heard','👂 Gehört']].map(
      ([v,l])=>`<label class="lib-sh-radio-row"><input type="radio" name="lsheard" value="${v}"${lf.heardStatus===v?' checked':''}><span>${l}</span></label>`).join('');
    const addedHTML=[['all','Alles'],['month','Letzter Monat'],['6months','Letzte 6 Monate'],['year','Letztes Jahr']].map(
      ([v,l])=>`<label class="lib-sh-radio-row"><input type="radio" name="lsadded" value="${v}"${lf.addedWithin===v?' checked':''}><span>${l}</span></label>`).join('');

      ([v,l])=>`<label class="lib-sh-radio-row"><input type="radio" name="lsburned" value="${v}"${lf.showBurned===v?' checked':''}><span>🔥 ${l}</span></label>`).join('');

    sheet.innerHTML=`

        <div class="lib-sh-sec"><div class="lib-sh-sec-title">👂 Gehört-Status</div><div class="lib-sh-radio-group">${heardHTML}</div></div>
        <div class="lib-sh-sec"><div class="lib-sh-sec-title">🗓 Hinzugefügt</div><div class="lib-sh-radio-group">${addedHTML}</div></div>

      _build();
    }));
    sheet.querySelectorAll('[data-lt]').forEach(b=>b.addEventListener('click',()=>{
      const t=b.dataset.lt;const i=lf.albumTypes.indexOf(t);
      if(i>=0)lf.albumTypes.splice(i,1);else lf.albumTypes.push(t);
      _build();
    }));
    sheet.querySelectorAll('[data-ls]').forEach(b=>b.addEventListener('click',()=>{lf.sortMode=b.dataset.ls;_build();}));
    sheet.querySelectorAll('input[name=lsheard]').forEach(r=>r.addEventListener('change',()=>{lf.heardStatus=r.value;}));
    sheet.querySelectorAll('input[name=lsadded]').forEach(r=>r.addEventListener('change',()=>{lf.addedWithin=r.value;}));
    sheet.querySelectorAll('input[name=lsburned]').forEach(r=>r.addEventListener('change',()=>{lf.showBurned=r.value;}));
  }

    sheetBg.style.animation='fadein .18s ease reverse';
    sheet.style.animation='slideup .18s cubic-bezier(.32,1,.56,1) reverse';
    setTimeout(()=>{sheetBg.remove();onClose(_countActive());},180);
  }

  _build();
  sheetBg.appendChild(sheet);
  document.body.appendChild(sheetBg);
  sheetBg.addEventListener('click',e=>{if(e.target===sheetBg)_close();});
  const escKey=e=>{if(e.key==='Escape'){_close();document.removeEventListener('keydown',escKey);}};
  document.addEventListener('keydown',escKey);
}

  const allAlbums_orig=[...albums];

  // ── Pre-compute badge data sets ──
  const hm=HistoryProvider.getMap();
  const now=Date.now();
  const week7=now-7*86400000;
  const heavyIds=new Set();
  const trendingCounts=new Map();
  const repeatCounts=new Map();
  for(const[id,ts]of hm){
    if(ts>week7){
      heavyIds.add(id);
      trendingCounts.set(id,(trendingCounts.get(id)||0)+1);
      repeatCounts.set(id,(repeatCounts.get(id)||0)+1);
    }
  }
  const trendingIds=new Set([...trendingCounts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,10).map(([id])=>id));
  const repeatIds=new Set([...repeatCounts.entries()].filter(([,c])=>c>2).map(([id])=>id));
  const favoriteIds=new Set();
  try{const db=await DB.getDb();const favs=await db.getAll('favorites');for(const f of favs)favoriteIds.add(f.id);}catch(e){}
  const hiddenGemIds=new Set();
  const playCounts=new Map();for(const[id]of hm)playCounts.set(id,(playCounts.get(id)||0)+1);
  for(const a of allAlbums_orig){if(a._inLibrary!==false&&(!playCounts.has(a.id)||(playCounts.get(a.id)||0)<3))hiddenGemIds.add(a.id);}

  // Badge priority for sort
  const BADGE_PRIORITY={'⭐ Heavy':7,'🔥 Trending':6,'🔁 Repeat':5,'❤️ Fave':4,'💎 Hidden Gem':3,'🆕 Just Added':2,'📅 New':1,'🎵 Playlist':1};
  const bt=state._badgeToggles;
  function _badgePriority(a){
    const bs=_computeBadges(a,relatedArtistName,bt,heavyIds,trendingIds,favoriteIds,hiddenGemIds,repeatIds);
    return bs.length?(BADGE_PRIORITY[bs[0].label]||0):0;
  }
  function _getBadgeKeys(a){
    // Returns array of badge keys active on this album
    const keys=[];
    if(heavyIds.has(a.id))keys.push('heavyRotation');
    if(trendingIds.has(a.id))keys.push('trending');
    if(repeatIds.has(a.id))keys.push('repeat');
    if(favoriteIds.has(a.id))keys.push('favorite');
    if(hiddenGemIds.has(a.id))keys.push('hiddenGem');
    if(a._added_at&&now-new Date(a._added_at).getTime()<7*86400000)keys.push('justAdded');
    else if(a._added_at&&now-new Date(a._added_at).getTime()<30*86400000)keys.push('newAlbum');
    if(a._inLibrary===false)keys.push('playlist');
    return keys;
  }

  // ── Lens state ──
  const lf=_getLensFilter(carouselId);
  // _samFilters for grouping/artistFilter (persisted)
  if(!state._samFilters[carouselId])state._samFilters[carouselId]={grouping:'genre',artistFilter:'',sortBy:'relevance'};
  const sf=state._samFilters[carouselId];

  // ── Build modal ──
  const bg=document.createElement('div');bg.className='sam-bg';
  const sheet=document.createElement('div');sheet.className='sam-sheet';

  // Header — Filter-Button rechts neben Count, gleicher Style wie Library
  function _activeFilterCount(){
    let n=0;
    if(lf.heardStatus!=='all')n++;if(lf.addedWithin!=='all')n++;if(lf.albumTypes.length)n++;
    if(lf.showBurned!=='hide')n++;if(lf.activeBadges.length)n++;if(lf.activeGenres.length)n++;
    return n;
  }
  const hdr=document.createElement('div');hdr.className='sam-hdr';
  hdr.innerHTML=`<span class="sam-hdr-icon">${esc(icon)}</span><span class="sam-hdr-title">${esc(title)}</span><span class="sam-hdr-count" id="samCount"></span><button class="lib-filter-btn lens-filter-btn" id="lensFilterBtn">⚙ Filter</button><button class="sam-close" id="samClose">✕</button>`;
  sheet.appendChild(hdr);

  // Burn Mode info banner
  const burnBannerWrap=document.createElement('div');burnBannerWrap.id='samBurnBanner';
  sheet.appendChild(burnBannerWrap);

  // Badge chips — 2 rows, OR-logic, default all OFF
  const BADGE_DEFS=[
    ['heavyRotation','⭐ Heavy'],['trending','🔥 Trending'],['repeat','🔁 Repeat'],['favorite','❤️ Fave'],
    ['hiddenGem','💎 Gem'],['justAdded','🆕 Just Added'],['newAlbum','📅 30d'],['playlist','🎵 Playlist'],
  ];
  const badgeBar=document.createElement('div');badgeBar.className='sam-badge-toggles sam-badge-2row';
  badgeBar.innerHTML=`<span class="sam-badge-label">Badges:</span><div class="sam-badge-chips-wrap">${
    BADGE_DEFS.map(([k,l])=>`<button class="sam-badge-chip${lf.activeBadges.includes(k)?' active':''}" data-lbadge="${k}">${l}</button>`).join('')
  }</div>`;
  sheet.appendChild(badgeBar);

  // Body + ctrl row
  const body=document.createElement('div');body.className='sam-body';
  sheet.appendChild(body);

  const allArtistNames=[...new Set(allAlbums_orig.flatMap(a=>(a.artists||[]).map(ar=>ar.name)))].sort();
  const ctrlRow=document.createElement('div');ctrlRow.className='sam-ctrl-row';
  ctrlRow.innerHTML=`
    <select class="sam-ctrl-sel" id="samGrouping">
      <option value="genre"${sf.grouping==='genre'?' selected':''}>Group: Genre</option>
      <option value="decade"${sf.grouping==='decade'?' selected':''}>Group: Decade</option>
      <option value="artist"${sf.grouping==='artist'?' selected':''}>Group: Artist</option>
      <option value="year"${sf.grouping==='year'?' selected':''}>Group: Year</option>
      <option value="none"${sf.grouping==='none'?' selected':''}>No Grouping</option>
    </select>
    <select class="sam-ctrl-sel" id="samArtistFilter" style="flex:1;min-width:0">
      <option value="">All Artists</option>
      ${allArtistNames.map(n=>`<option value="${esc(n)}"${sf.artistFilter===n?' selected':''}>${esc(n)}</option>`).join('')}
    </select>`;
  sheet.appendChild(ctrlRow);

  bg.appendChild(sheet);
  document.body.appendChild(bg);

  function _updateFilterBtn(){
    const n=_activeFilterCount();
    const btn=hdr.querySelector('#lensFilterBtn');
    if(!btn)return;
    btn.textContent=n>0?`⚙ Filter (${n})`:'⚙ Filter';
    btn.style.borderColor=n>0?'var(--blue)':'';
    btn.style.color=n>0?'var(--blue)':'';
  }
  _updateFilterBtn();

  // ── Apply all filters + sort → return pool ──
  function _applyLensFilters(){
    const burnedIds=BurnMode.getBurnedIds();
    let pool=[...allAlbums_orig];

    // Burn filter
    if(lf.showBurned==='hide')pool=pool.filter(a=>!burnedIds.has(a.id));
    else if(lf.showBurned==='only')pool=pool.filter(a=>burnedIds.has(a.id));

    // Heard status
    if(lf.heardStatus==='unheard')pool=pool.filter(a=>!hm.has(a.id));
    else if(lf.heardStatus==='heard')pool=pool.filter(a=>hm.has(a.id));

    // Added within
    if(lf.addedWithin!=='all'){
      const cuts={'month':30,'6months':180,'year':365};
      const cutoff=now-(cuts[lf.addedWithin]||0)*86400000;
      pool=pool.filter(a=>a._added_at&&new Date(a._added_at).getTime()>=cutoff);
    }

    // Type filter
    if(lf.albumTypes.length)pool=pool.filter(a=>lf.albumTypes.includes(a.album_type||'album'));

    // Badge filter (OR-logic, default = show all)
    if(lf.activeBadges.length){
      pool=pool.filter(a=>{
        const keys=_getBadgeKeys(a);
        return lf.activeBadges.some(b=>keys.includes(b));
      });
    }

    // Artist filter
    if(sf.artistFilter)pool=pool.filter(a=>(a.artists||[]).some(ar=>ar.name===sf.artistFilter));

    // Sort
    const sm=lf.sortMode||'relevance';
    if(sm==='original'){/* preserve incoming order — no sort */}
    else if(sm==='relevance')pool=[...pool].sort((a,b)=>_lensRelevanceScore(b,carouselId,hm,playCounts,heavyIds,hiddenGemIds)-_lensRelevanceScore(a,carouselId,hm,playCounts,heavyIds,hiddenGemIds));
    else if(sm==='badge')pool=[...pool].sort((a,b)=>_badgePriority(b)-_badgePriority(a));
    else if(sm==='az')pool=[...pool].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    else if(sm==='za')pool=[...pool].sort((a,b)=>(b.name||'').localeCompare(a.name||''));
    else if(sm==='newest')pool=[...pool].sort((a,b)=>(b.release_date||'').localeCompare(a.release_date||''));
    else if(sm==='oldest')pool=[...pool].sort((a,b)=>(a.release_date||'').localeCompare(b.release_date||''));
    else if(sm==='mostplayed')pool=[...pool].sort((a,b)=>(playCounts.get(b.id)||0)-(playCounts.get(a.id)||0));
    else if(sm==='lastplayed')pool=[...pool].sort((a,b)=>(hm.get(b.id)||0)-(hm.get(a.id)||0));

    // Genre filter
    if(lf.activeGenres.length){
      pool=pool.filter(a=>{
        const gs=a._genres||[];
        if(lf.activeSubGenres.length)return lf.activeSubGenres.some(sg=>gs.includes(sg));
        return gs.some(g=>lf.activeGenres.includes(clusterOf(g)));
      });
    }

    return pool;
  }

  function _render(){
    const pool=_applyLensFilters();
    hdr.querySelector('#samCount').textContent=`${pool.length} albums`;

    // Burn banner
    const burnedIds=BurnMode.getBurnedIds();
    const burnBanner=bg.querySelector('#samBurnBanner');
    if(burnBanner){
      const hidden=allAlbums_orig.filter(a=>burnedIds.has(a.id)).length;
      if(state.burnMode&&hidden>0&&lf.showBurned==='hide'){
        burnBanner.style.cssText='padding:7px 16px;background:rgba(217,83,74,.1);border-bottom:1px solid rgba(217,83,74,.25);font-size:12px;color:#f87171;display:flex;align-items:center;gap:6px;flex-shrink:0';
        burnBanner.innerHTML=`🔥 Burn Mode — <strong>${hidden} album${hidden!==1?'s':''} hidden</strong>`;
      } else burnBanner.style.display='none';
    }

    body.innerHTML='';
    if(!pool.length){body.innerHTML=`<div class="sam-empty">No albums match this filter. <button class="btn btn-sm" id="samResetLens" style="margin-top:10px">Reset filters</button></div>`;
      body.querySelector('#samResetLens')?.addEventListener('click',()=>{
        lf.heardStatus='all';lf.addedWithin='all';lf.albumTypes=[];lf.sortMode=_LF_CAROUSEL_IDS.has(carouselId)?'original':'relevance';
        lf.showBurned='hide';lf.activeBadges=[];lf.activeGenres=[];lf.activeSubGenres=[];
        _updateFilterBtn();_render();
      });
      return;
    }

    // Grouping
    let groups=new Map();
    const grp=sf.grouping||'genre';
    if(grp==='none'){
      groups.set('',pool);
    } else if(grp==='genre'){
      for(const a of pool){const lbl=_samGenreLabel(a);if(!groups.has(lbl))groups.set(lbl,[]);groups.get(lbl).push(a);}
      groups=new Map([...groups.entries()].sort((a,b)=>{if(a[0]==='Other')return 1;if(b[0]==='Other')return-1;return b[1].length-a[1].length;}));
    } else if(grp==='decade'){
      const DEC_ORDER=['20s','10s','00s','90s','80s','70s','pre-70s'];
      for(const a of pool){const d=decadeOf(releaseYear(a));if(!groups.has(d))groups.set(d,[]);groups.get(d).push(a);}
      const ordered=new Map();for(const d of DEC_ORDER)if(groups.has(d))ordered.set(d,groups.get(d));
      for(const[k,v]of groups)if(!ordered.has(k))ordered.set(k,v);groups=ordered;
    } else if(grp==='artist'){
      for(const a of pool){const n=(a.artists||[])[0]?.name||'Unknown';if(!groups.has(n))groups.set(n,[]);groups.get(n).push(a);}
      groups=new Map([...groups.entries()].sort((a,b)=>b[1].length-a[1].length));
    } else {
      for(const a of pool){const y=String(releaseYear(a)||'Unknown');if(!groups.has(y))groups.set(y,[]);groups.get(y).push(a);}
      groups=new Map([...groups.entries()].sort((a,b)=>Number(b[0])-Number(a[0])));
    }

    for(const[groupLabel,groupAlbums]of groups){
      if(groupLabel){
        const ch=document.createElement('div');ch.className='sam-cluster-hdr';
        ch.innerHTML=`${esc(groupLabel)} <span class="sam-cluster-hdr-count">${groupAlbums.length}</span>`;
        body.appendChild(ch);
      }
      const grid=document.createElement('div');grid.className='sam-grid sam-grid-2col';
      for(const a of groupAlbums){
        const art=getArt(a,'md')||getArt(a,'lg');
        const artist=(a.artists||[]).map(x=>x.name).join(', ');
        const badges=_computeBadges(a,relatedArtistName,bt,heavyIds,trendingIds,favoriteIds,hiddenGemIds,repeatIds);
        const badgesHTML=badges.length?`<div class="sam-badges">${badges.map(b=>`<span class="sam-badge ${b.cls}">${esc(b.label)}</span>`).join('')}</div>`:'';
        const item=document.createElement('div');item.className='sam-item';item.dataset.id=a.id;
        item.innerHTML=`<div class="sam-art-wrap">${art?`<img class="sam-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="sam-art-ph">🎵</div>`}${badgesHTML}</div><div class="sam-name">${esc(a.name)}</div><div class="sam-artist">${esc(artist)}</div>`;
        item.addEventListener('click',()=>openAlbumDetail(a));
        grid.appendChild(item);
      }
      body.appendChild(grid);
    }
  }

  _render();

  // ── Events ──
  hdr.querySelector('#samClose').addEventListener('click',()=>bg.remove());
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});

  // Badge chips — OR filter, default all off
  badgeBar.addEventListener('click',e=>{
    const btn=e.target.closest('[data-lbadge]');if(!btn)return;
    const k=btn.dataset.lbadge;
    const idx=lf.activeBadges.indexOf(k);
    if(idx>=0)lf.activeBadges.splice(idx,1);else lf.activeBadges.push(k);
    btn.classList.toggle('active',lf.activeBadges.includes(k));
    _updateFilterBtn();_render();
  });

  ctrlRow.querySelector('#samGrouping').addEventListener('change',e=>{sf.grouping=e.target.value;_render();});
  ctrlRow.querySelector('#samArtistFilter').addEventListener('change',e=>{sf.artistFilter=e.target.value;_render();});

  // Filter-Button (ersetzt FAB)
  hdr.querySelector('#lensFilterBtn').addEventListener('click',()=>{
    _openLensSheet(lf,allAlbums_orig,()=>{_updateFilterBtn();_render();},carouselId);
  });

  const onKey=e=>{if(e.key==='Escape'){bg.remove();document.removeEventListener('keydown',onKey);}};
  document.addEventListener('keydown',onKey);
}

  // Load discography

          <div class="adm-alb-name">${esc(a.name)}</div>

// PHASE 7A — HOME TAB MODERNIZATION HELPERS
// ═══════════════════════════════════════════════════════════════════

/** Deterministic seeded random (0–1) for daily pick */
function seededRandom(seed){const x=Math.sin(seed+1)*10000;return x-Math.floor(x);}

/** Daily Pick: deterministic per-day, prefers unheard albums added in last 12 months */
function loadDailyPick(){
  if(!allAlbums.length)return null;
  const hm=HistoryProvider.getMap();
  const oneYearAgo=Date.now()-365*86400000;
  const unheardRecent=allAlbums.filter(a=>{
    const addedOk=a._added_at&&new Date(a._added_at).getTime()>oneYearAgo;
    return addedOk&&!hm.has(a.id);
  });
  const pool=unheardRecent.length>0?unheardRecent:allAlbums;
  const seed=Math.floor(Date.now()/86400000);
  return pool[Math.floor(seededRandom(seed)*pool.length)];
}

/** Forgotten Gems: added 6+ months ago, never played — shuffled, max 15 */
function loadForgottenGems(){
  if(!allAlbums.length)return[];
  const hm=HistoryProvider.getMap();
  const sixMonthsAgo=Date.now()-6*30*86400000;
  const forgotten=allAlbums.filter(a=>{
    if(!a._added_at)return false;
    return new Date(a._added_at).getTime()<sixMonthsAgo&&!hm.has(a.id);
  });
  return shuffleArray(forgotten).slice(0,15);
}

/** On This Day: albums whose release_date matches today's month+day (any year) */
function loadOnThisDayAlbums(){
  if(!allAlbums.length)return[];
  const now=new Date();
  const todayM=now.getMonth()+1;
  const todayD=now.getDate();
  return allAlbums.filter(a=>{
    if(!a.release_date||a.release_date.length<10)return false;
    const parts=a.release_date.split('-');
    return parseInt(parts[1],10)===todayM&&parseInt(parts[2],10)===todayD;
  });
}

/** QID-005: Because You Played — unheard albums in same genre cluster as last queued */
function loadBecauseYouPlayed(){
  const last=getLastPlayedAlbum();
  if(!last)return{albums:[],refName:''};
  const hm=HistoryProvider.getMap();
  const firstGenre=(last._genres||[])[0];
  if(!firstGenre)return{albums:[],refName:''};
  const cluster=clusterOf(firstGenre);
  if(cluster==='other')return{albums:[],refName:''};
  const pool=allAlbums.filter(a=>{
    if(hm.has(a.id))return false; // already heard
    if(a.id===last.id)return false;
    const gs=a._genres||[];
    return gs.some(g=>clusterOf(g)===cluster);
  });
  if(pool.length<=3)return{albums:[],refName:''};
  return{albums:shuffleArray(pool).slice(0,10),refName:last.name};
}

/** Same Artist, Different Album — unheard albums by same artist(s) as current Random Pick */
function loadSameArtistAlbums(referenceAlbum){
  if(!referenceAlbum)return{albums:[],artistName:''};
  const hm=HistoryProvider.getMap();
  const artistIds=new Set((referenceAlbum.artists||[]).map(ar=>ar.id));
  const artistName=(referenceAlbum.artists||[])[0]?.name||'';
  const pool=allAlbums.filter(a=>{
    if(a.id===referenceAlbum.id)return false;
    if(hm.has(a.id))return false;
    return(a.artists||[]).some(ar=>artistIds.has(ar.id));
  });
  return{albums:shuffleArray(pool),artistName};
}

/** Added This Month, Last Year — albums added ±2 weeks around same month last year */
function loadAddedThisMonthLastYear(){
  if(!allAlbums.length)return[];
  const now=new Date();
  const targetStart=new Date(now.getFullYear()-1,now.getMonth()-1,now.getDate()).getTime();
  const targetEnd  =new Date(now.getFullYear()-1,now.getMonth()+1,now.getDate()).getTime();
  const pool=allAlbums.filter(a=>{
    if(!a._added_at)return false;
    const t=new Date(a._added_at).getTime();
    return t>=targetStart&&t<=targetEnd;
  });
  return shuffleArray(pool).slice(0,10);
}

/** Decade Roulette — 3 random unheard albums per decade */
function loadDecadeRoulette(){
  const hm=HistoryProvider.getMap();
  const DEC_ORDER=['pre-70s','70s','80s','90s','00s','10s','20s'];
  const byDecade={};
  for(const a of allAlbums){
    const d=decadeOf(releaseYear(a));
    if(!byDecade[d])byDecade[d]=[];
    byDecade[d].push(a);
  }
  const result=[];
  for(const dec of DEC_ORDER){
    const pool=(byDecade[dec]||[]);
    if(pool.length<3)continue;
    const picks=shuffleArray(pool).slice(0,3);
    result.push({decade:dec,albums:picks});
  }
  return result;
}

/** Almost Heard Everything — artists where 70%+ of their library albums are heard, show the rest */
function loadAlmostHeardEverything(){
  const hm=HistoryProvider.getMap();
  // Build per-artist album map
  const artistAlbums=new Map();
  for(const a of allAlbums){
    for(const ar of(a.artists||[])){
      if(!artistAlbums.has(ar.id))artistAlbums.set(ar.id,{name:ar.name,albums:[]});
      artistAlbums.get(ar.id).albums.push(a);
    }
  }
  const result=[];
  for(const[,{name,albums}]of artistAlbums){
    if(albums.length<2)continue; // need at least 2 to be meaningful
    const heard=albums.filter(a=>hm.has(a.id)).length;
    const pct=heard/albums.length;
    if(pct>=0.7&&pct<1.0){
      const missing=albums.filter(a=>!hm.has(a.id));
      if(missing.length>0)result.push({artistName:name,missing,heardPct:Math.round(pct*100),total:albums.length});
    }
  }
  // Sort by completion desc, take top 5 artists, flatten missing albums
  result.sort((a,b)=>b.heardPct-a.heardPct);
  return result.slice(0,5);
}

/** QID-025: Filter burned albums from pool if BurnMode active */
function _burnFilter(albums){
  if(!state.burnMode)return albums;
  return albums.filter(a=>!BurnMode.isBurned(a.id));
}

// ── Library state
const libState={
  search:'',
  activeCluster:null,   // null = All, string = über-genre id
  activeSubGenres:[],   // selected sub-genre strings
  albumTypes:[],        // 'album','single','compilation' — empty = all
  sortMode:'added',     // 'added'|'az'|'release'|'duration'|'mostplayed'|'lastplayed'
  page:1,
  PAGE_SIZE:50,
  // Phase 7B filters
  yearMin:1950,         // release year range
  yearMax:new Date().getFullYear(),
  moods:[],             // mood keys: energetic/relaxed/dark/uplifting/melancholic/focused
  heardStatus:'all',    // 'all'|'unheard'|'heard'
  addedWithin:'all',    // 'all'|'month'|'6months'|'year'
};

// Phase 7B: Mood → Genre mapping
const MOOD_TO_GENRES={
  energetic:['Electronic','Dance','Hip-Hop','Rock','Pop','Funk'],
  relaxed:['Jazz','Ambient','Lo-Fi','Soul','Classical','Indie','Folk'],
  dark:['Metal','Industrial','Dark Ambient','Trip-Hop','Synthwave','Goth'],
  uplifting:['Pop','Indie Pop','Indie Rock','Soul','R&B','Funk','Gospel'],
  melancholic:['Indie','Alternative','Emo','Singer-Songwriter','Blues','Soul'],
  focused:['Ambient','Post-Rock','Minimal','Classical','Lo-Fi Hip-Hop','Electronic'],
};
const MOOD_LABELS={energetic:'⚡ Energetic',relaxed:'😌 Relaxed',dark:'🌑 Dark',uplifting:'☀️ Uplifting',melancholic:'💧 Melancholic',focused:'🎯 Focused'};

/** Build over-genre counts from current library */
function _buildClusterCounts(){
  const counts=new Map();
  for(const a of allAlbums){
    const gs=a._genres||[];
    const clusters=new Set(gs.map(g=>clusterOf(g)));
    clusters.delete('other');
    for(const c of clusters){counts.set(c,(counts.get(c)||0)+1);}
  }
  return counts;
}

/** Get sub-genres for a cluster id, sorted by count */
function _subGenresForCluster(clusterId){
  const cluster=GENRE_CLUSTERS.find(c=>c.id===clusterId);if(!cluster)return[];
  const counts=new Map();
  for(const a of allAlbums){
    for(const g of(a._genres||[])){
      if(cluster.kw.some(k=>g.toLowerCase().includes(k))){
        counts.set(g,(counts.get(g)||0)+1);
      }
    }
  }
  return [...counts.entries()].sort((a,b)=>b[1]-a[1]).map(([g,n])=>({genre:g,count:n}));
}

/** Detect album_group / album_type from album name heuristics (Spotify doesn't return type in saved albums) */
function _guessAlbumType(a){
  const n=(a.name||'').toLowerCase();
  const t=a.tracks?.total||a.tracks?.items?.length||0;
  if(n.includes(' - single')||n.includes('(single)')||(t&&t<=3))return'single';
  if(n.includes('compilation')||n.includes(' - ep')||n.includes('(compilation)'))return'compilation';
  return'album';
}

/** Apply all library filters and return sorted albums */
function _applyLibFilters(){
  const q=libState.search.toLowerCase();
  const now=Date.now();
  const histMap=HistoryProvider.getMap();
  // Mood → genre expansion
  let moodGenres=null;
  if(libState.moods.length>0){
    moodGenres=new Set();
    for(const m of libState.moods)(MOOD_TO_GENRES[m]||[]).forEach(g=>moodGenres.add(g.toLowerCase()));
  }
  // addedWithin cutoff
  let addedCutoff=0;
  if(libState.addedWithin==='month')addedCutoff=now-30*86400000;
  else if(libState.addedWithin==='6months')addedCutoff=now-180*86400000;
  else if(libState.addedWithin==='year')addedCutoff=now-365*86400000;

  let result=allAlbums.filter(a=>{
    // text search
    if(q&&!a.name.toLowerCase().includes(q)&&!(a.artists||[]).some(ar=>ar.name.toLowerCase().includes(q)))return false;
    // genre cluster filter
    if(libState.activeCluster){
      const ag=a._genres||[];const ac=new Set(ag.map(g=>clusterOf(g)));
      if(!ac.has(libState.activeCluster))return false;
    }
    // sub-genre filter
    if(libState.activeSubGenres.length>0){
      const ag=a._genres||[];
      if(!libState.activeSubGenres.some(sg=>ag.includes(sg)))return false;
    }
    // album type
    if(libState.albumTypes.length>0){
      if(!libState.albumTypes.includes(_guessAlbumType(a)))return false;
    }
    // Phase 7B: year range
    const yr=releaseYear(a);
    if(yr&&(yr<libState.yearMin||yr>libState.yearMax))return false;
    // Phase 7B: mood (OR match against genres)
    if(moodGenres){
      const ag=(a._genres||[]).map(g=>g.toLowerCase());
      if(!ag.some(g=>moodGenres.has(g)))return false;
    }
    // Phase 7B: heard status
    if(libState.heardStatus==='heard'&&!histMap.has(a.id))return false;
    if(libState.heardStatus==='unheard'&&histMap.has(a.id))return false;
    // Phase 7B: added within
    if(addedCutoff>0){
      const addedMs=a._added_at?new Date(a._added_at).getTime():0;
      if(addedMs<addedCutoff)return false;
    }
    return true;
  });
  // sort
  if(libState.sortMode==='az'){result.sort((a,b)=>a.name.localeCompare(b.name));}
  else if(libState.sortMode==='za'){result.sort((a,b)=>b.name.localeCompare(a.name));}
  else if(libState.sortMode==='release'){result.sort((a,b)=>releaseYear(b)-releaseYear(a));}
  else if(libState.sortMode==='oldest'){result.sort((a,b)=>releaseYear(a)-releaseYear(b));}
  else if(libState.sortMode==='duration'){result.sort((a,b)=>albumDurMin(b)-albumDurMin(a));}
  else if(libState.sortMode==='mostplayed'){
    result.sort((a,b)=>{
      // count plays from histMap (value is last-played timestamp, use presence for count)
      const pa=histMap.has(a.id)?1:0;const pb=histMap.has(b.id)?1:0;
      return pb-pa;
    });
  }
  else if(libState.sortMode==='lastplayed'){
    result.sort((a,b)=>{
      const ta=histMap.get(a.id)||0;const tb=histMap.get(b.id)||0;
      if(!ta&&!tb)return 0;if(!ta)return 1;if(!tb)return-1;return tb-ta;
    });
  }
  else{// added (recently added first)
    result.sort((a,b)=>{const ta=a._added_at?new Date(a._added_at).getTime():0;const tb=b._added_at?new Date(b._added_at).getTime():0;return tb-ta;});
  }
  return result;
}

/** Render the album grid portion */
function _renderLibGrid(container,albums){
  const content=container.querySelector('#libContent');if(!content)return;
  const total=albums.length;const show=albums.slice(0,libState.page*libState.PAGE_SIZE);
  const countEl=content.querySelector('.lib-count');if(countEl)countEl.textContent=`${total} album${total!==1?'s':''}`;
  const grid=content.querySelector('#libGrid2');if(!grid)return;
  if(!show.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text-dim)">${allAlbums.length?'No albums match your filters':'Library not loaded — go to Picker to sync.'}</div>`;
    const lm=content.querySelector('.lib-load-more');if(lm)lm.remove();return;
  }
  grid.innerHTML=show.map((a,i)=>{
    const art=getArt(a,'md')||getArt(a,'lg');const artist=(a.artists||[]).map(ar=>ar.name).join(', ');
    return`<div class="alb-grid-item" data-libid="${esc(a.id)}" style="animation-delay:${Math.min(i*15,300)}ms">
      ${art?`<img class="alb-grid-art" src="${esc(art)}" alt="" loading="lazy">`:`<div class="alb-grid-art-ph">🎵</div>`}
      <div class="alb-grid-info"><div class="alb-grid-name">${esc(a.name)}</div><div class="alb-grid-artist">${esc(artist)}</div></div>
    </div>`;
  }).join('');
  grid.querySelectorAll('.alb-grid-item').forEach(item=>item.addEventListener('click',()=>{const a=allAlbums.find(x=>x.id===item.dataset.libid);if(a)openAlbumDetail(a);}));
  // Load more button
  let lm=content.querySelector('.lib-load-more');
  if(show.length<total){
    if(!lm){lm=document.createElement('button');lm.className='lib-load-more';lm.textContent=`Load more (${total-show.length} remaining)`;lm.addEventListener('click',()=>{libState.page++;_renderLibGrid(container,albums);});content.appendChild(lm);}
    else{lm.textContent=`Load more (${total-show.length} remaining)`;}
  }else if(lm){lm.remove();}
}
