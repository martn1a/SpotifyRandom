<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spotify Discovery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #1DB954;
      --green-dark: #158a3e;
      --green-glow: rgba(29,185,84,.12);
      --bg:         #090909;
      --surface:    #111111;
      --surface2:   #181818;
      --border:     #252525;
      --border2:    #2e2e2e;
      --text:       #e8e8e8;
      --text-dim:   #7a7a7a;   /* raised from #5a5a5a for WCAG AA (4.5:1) */
      --text-mid:   #999999;   /* raised from #888888 */
      --error:      #e84343;
      --font-h:     'Bebas Neue', system-ui, sans-serif;
      --font-body:  'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono:  'IBM Plex Mono', 'SF Mono', 'Menlo', monospace;
      /* Graduated border-radius system — matches Spotify/Roon feel */
      --radius-sm:  6px;
      --radius-md:  12px;
      --radius-lg:  16px;
      --radius-full: 9999px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--font-h);
      font-size: 26px;
      letter-spacing: 3px;
      color: var(--green);
      line-height: 1;
      user-select: none;
    }

    .logo em { color: var(--text); font-style: normal; }

    /* ── BUTTONS ─────────────────────────────────────── */
    .btn {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      padding: 10px 16px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      border-radius: var(--radius-sm);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: border-color .15s, background .15s, color .15s;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover  { border-color: var(--text-mid); }
    .btn:active { transform: scale(.98); }

    .btn-primary {
      background: var(--green);
      border-color: var(--green);
      color: #000;
      font-weight: 500;
    }
    .btn-primary:hover  { background: #1fdf64; border-color: #1fdf64; }
    .btn-primary:active { background: var(--green-dark); border-color: var(--green-dark); }
    .btn-primary:disabled {
      background: var(--green-dark);
      border-color: var(--green-dark);
      color: rgba(0,0,0,.5);
      cursor: not-allowed;
      transform: none;
    }

    .btn-ghost-danger { border-color: var(--error); color: var(--error); font-size: 11px; }
    .btn-ghost-danger:hover { background: var(--error); color: #fff; }

    /* ── MAIN ────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 18px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── GLOBAL STATUS (for boot errors shown on login screen) */
    #globalStatus {
      max-width: 480px;
      width: calc(100% - 36px);
      margin: 12px auto 0;
      border-radius: var(--radius-sm);
      font-size: 12px;
      padding: 0;
      display: none;
    }
    #globalStatus.show {
      display: block;
      padding: 12px 14px;
    }
    #globalStatus.error {
      background: rgba(232,67,67,.1);
      border: 1px solid rgba(232,67,67,.3);
      color: var(--error);
    }

    /* ── LOGIN SCREEN ────────────────────────────────── */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 52px 24px 40px;
      text-align: center;
    }

    .login-icon {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-full);
      background: var(--surface);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .login-title {
      font-family: var(--font-h);
      font-size: 48px;
      letter-spacing: 4px;
      color: var(--green);
      line-height: 1;
    }

    .login-sub {
      color: var(--text-mid);
      font-size: 12px;
      line-height: 1.9;
      max-width: 272px;
    }

    /* ── CARD ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    /* ── COLLAPSIBLE ─────────────────────────────────── */
    .collapse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      min-height: 48px;
      border-radius: var(--radius-md);
    }
    .collapse-header:hover { background: var(--surface2); }

    .collapse-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-mid);
    }

    .collapse-arrow {
      color: var(--text-dim);
      font-size: 9px;
      transition: transform .2s;
    }
    .collapse-arrow.open { transform: rotate(180deg); }

    .collapse-body {
      border-top: 1px solid var(--border);
      padding: 16px;
      display: none;
    }
    .collapse-body.open { display: block; }

    /* ── FILTER CONTROLS ─────────────────────────────── */
    .filter-section { margin-bottom: 0; }
    .filter-section:last-child { margin-bottom: 0; }

    /* Sub-accordion: each filter category is individually collapsible */
    .filter-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 0;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .filter-section:last-child .filter-section-header { border-bottom: none; }
    .filter-section-header:active { opacity: .7; }
    .filter-section-body {
      display: none;
      padding: 12px 0 16px;
    }
    .filter-section-body.open { display: block; }
    .filter-section-arrow {
      color: var(--text-dim);
      font-size: 9px;
      transition: transform .2s;
      flex-shrink: 0;
    }
    .filter-section-arrow.open { transform: rotate(180deg); }

    .filter-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--green);
      margin-bottom: 10px;
      display: block;
    }

    /* Decade chips */
    .decade-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .decade-chip { position: relative; }
    .decade-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
    .decade-chip label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      transition: all .15s;
    }
    .decade-chip label:active { transform: scale(.96); }
    .decade-chip input:checked + label {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }

    /* Toggle row */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      gap: 12px;
    }
    .toggle-info { flex: 1; }
    .toggle-title { font-size: 12px; color: var(--text); }
    .toggle-sub   { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border2);
      border-radius: 13px;
      transition: background .2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: transform .2s, background .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--green); }
    .toggle-switch input:checked + .toggle-track::after {
      transform: translateX(18px);
      background: #fff;
    }

    /* Duration sliders */
    .slider-row { display: flex; flex-direction: column; gap: 10px; }
    .slider-values {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-dim);
    }
    .slider-values b { color: var(--text); font-weight: 400; }
    .range-wrap { display: flex; flex-direction: column; gap: 8px; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border2);
      border-radius: var(--radius-full);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px; height: 26px;
      background: var(--green);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    input[type=range]::-moz-range-thumb {
      width: 26px; height: 26px;
      background: var(--green);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    /* Stats chip */
    .stats-chip {
      display: none;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-dim);
      padding: 10px 0 0;
      text-align: center;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    .stats-chip.visible { display: block; }

    /* ── GENRE SEARCH INPUT ──────────────────────────── */
    .genre-search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .genre-search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--text-dim);
      pointer-events: none;
      line-height: 1;
    }
    .genre-search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 11px;
      padding: 9px 32px 9px 28px;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    .genre-search::placeholder { color: var(--text-dim); }
    .genre-search:focus { border-color: var(--green); }
    .genre-search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      display: none;
    }
    .genre-search-clear.visible { display: block; }
    .genre-search-clear:hover { color: var(--text); }

    /* Flat search results (shown instead of lanes while query is active) */
    .genre-search-results {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 180px;
      overflow-y: auto;
      padding-right: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }
    .genre-search-results::-webkit-scrollbar { width: 4px; }
    .genre-search-results::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .genre-search-noresult {
      font-size: 11px;
      color: var(--text-dim);
      padding: 4px 0;
    }

    /* ── GENRE LANES ─────────────────────────────────── */
    .genre-lanes { display: flex; flex-direction: column; gap: 0; }

    .genre-lane { border-bottom: 1px solid var(--border); }
    .genre-lane:last-child { border-bottom: none; }

    .genre-lane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 0 6px;
      gap: 8px;
    }
    .genre-lane-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .genre-lane-icon { font-size: 11px; opacity: .7; }
    .genre-lane-badge {
      font-size: 9px;
      padding: 1px 6px;
      background: var(--green);
      color: #000;
      border-radius: 10px;
      font-weight: 600;
      display: none;
    }
    .genre-lane-badge.visible { display: inline-block; }

    /* Horizontal scrolling chip row */
    .genre-lane-chips {
      display: flex;
      flex-direction: row;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 9px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
    }
    .genre-lane-chips::-webkit-scrollbar { display: none; }

    /* Individual genre chip (no hidden input — we use data attributes) */
    .glchip {
      display: inline-flex;
      align-items: center;
      padding: 0 11px;
      height: 32px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-body);
      color: var(--text-dim);
      white-space: nowrap;
      background: transparent;
      transition: border-color .12s, color .12s, background .12s, transform .1s;
      flex-shrink: 0;
      user-select: none;
    }
    .glchip:hover  { border-color: var(--text-mid); color: var(--text); }
    .glchip:active { transform: scale(.94); }
    .glchip.selected {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }

    /* Selected summary bar at top */
    .genre-selected-bar {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .genre-selected-bar.visible { display: flex; }
    .genre-selected-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 8px 0 10px;
      height: 28px;
      background: var(--green);
      color: #000;
      border-radius: var(--radius-lg);
      font-size: 11px;
      font-family: var(--font-body);
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      transition: background .12s;
    }
    .genre-selected-pill:hover { background: #1fdf64; }
    .genre-selected-pill-x { font-size: 12px; opacity: .7; line-height: 1; }

    .genre-clear-all {
      font-size: 10px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
      align-self: center;
    }
    .genre-clear-all:hover { color: var(--text); }

    .genre-empty { font-size: 11px; color: var(--text-dim); }
    .genre-loading {
      font-size: 10px; color: var(--text-dim);
      display: flex; align-items: center; gap: 8px;
    }
    .genre-loading::before {
      content: '';
      display: inline-block;
      width: 10px; height: 10px;
      border: 1px solid var(--border2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ACTION ROW ──────────────────────────────────── */
    .action-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .count-selector {
      display: flex;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      overflow: hidden;
      flex-shrink: 0;
    }
    .count-btn {
      padding: 0 13px;
      height: 52px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      border-right: 1px solid var(--border2);
      min-width: 40px;
    }
    .count-btn:last-child { border-right: none; }
    .count-btn.active { background: var(--green); color: #000; }
    .count-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .count-btn:active:not(.active) { background: var(--border2); }

    #queueBtn {
      flex: 1;
      height: 52px;
      font-size: 12px;
      letter-spacing: 1.5px;
    }

    /* ── PROGRESS ────────────────────────────────────── */
    .progress-wrap { display: none; }
    .progress-wrap.visible { display: block; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-dim);
      margin-bottom: 7px;
    }
    .progress-bar-bg {
      height: 2px;
      background: var(--border2);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: var(--radius-full);
      transition: width .3s ease;
      width: 0%;
    }

    /* ── STATUS ──────────────────────────────────────── */
    .status-area {
      display: none;
      padding: 13px 15px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      line-height: 1.7;
    }
    .status-area.success {
      display: block;
      background: var(--green-glow);
      border: 1px solid rgba(29,185,84,.3);
      color: var(--green);
    }
    .status-area.error {
      display: block;
      background: rgba(232,67,67,.08);
      border: 1px solid rgba(232,67,67,.25);
      color: var(--error);
    }

    /* ── SELECTED ALBUMS LIST ────────────────────────── */
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-dim);
    }

    .album-list { display: flex; flex-direction: column; gap: 8px; }
    .album-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      animation: fadeIn .25s ease forwards;
      opacity: 0;
      position: relative;
      overflow: hidden;
      touch-action: pan-y;   /* allow vertical scroll; we handle horizontal swipe ourselves */
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── SWIPE / REROLL ─────────────────────────────────── */
    .album-item.swipe-exit {
      transition: transform .22s ease, opacity .18s ease !important;
      animation: none !important;
      transform: translateX(-110%) !important;
      opacity: 0 !important;
    }
    /* Visual feedback when swipe crosses the 60px reroll threshold */
    .album-item.swipe-ready {
      background: rgba(232,67,67,.08) !important;
      border-color: var(--error) !important;
    }
    .album-item.swipe-ready .reroll-btn {
      border-color: var(--error);
      color: var(--error);
    }
    @keyframes slideInRight {
      from { transform: translateX(48px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    .album-item.swipe-enter {
      animation: slideInRight .22s ease forwards !important;
    }

    .reroll-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, color .15s, transform .1s;
    }
    .reroll-btn:hover  { border-color: var(--green); color: var(--green); }
    .reroll-btn:active { transform: scale(.88); }

    /* ── QUEUE-SELECTED BUTTON ──────────────────────────── */
    #queueSelectedBtn {
      width: 100%;
      height: 52px;
      font-size: 12px;
      letter-spacing: 1.5px;
      margin-top: 10px;
    }

    /* ── AGE FILTER CHIPS ───────────────────────────────── */
    .age-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .age-chip { position: relative; }
    .age-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
    .age-chip label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      transition: all .15s;
      text-align: center;
      line-height: 1.3;
      padding: 0 4px;
    }
    .age-chip label:active { transform: scale(.96); }
    .age-chip input:checked + label {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }

    /* ── HISTORY NOTE ───────────────────────────────────── */
    .history-note {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-dim);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .history-note-clear {

  <!-- Minimal idb-compatible wrapper (inlined to avoid CDN dependency).
       Provides the same API surface as idb@8 used by the app:
       idb.openDB(), db.get/put/delete/getAll/clear, db.transaction(). -->
  <script>
  (function(global){
    'use strict';
    function wrap(req) {
      return new Promise(function(resolve, reject) {
        req.onsuccess = function() { resolve(req.result); };
        req.onerror   = function() { reject(req.error); };
      });
    }
    function wrapTx(tx) {
      return new Promise(function(resolve, reject) {
        tx.oncomplete = function() { resolve(); };
        tx.onerror    = function() { reject(tx.error); };
        tx.onabort    = function() { reject(tx.error || new DOMException('AbortError')); };
      });
    }
    function wrapStore(store, done) {
      return {
        put: function(value, key) {
          var req = key !== undefined ? store.put(value, key) : store.put(value);
          return wrap(req);
        },
        get: function(key) { return wrap(store.get(key)); },
        delete: function(key) { return wrap(store.delete(key)); },
        getAll: function() { return wrap(store.getAll()); },
        clear: function() { return wrap(store.clear()); },
      };
    }
    function wrapDb(db) {
      return {
        _db: db,
        get objectStoreNames() { return db.objectStoreNames; },
        get: function(storeName, key) {
          var tx = db.transaction(storeName, 'readonly');
          return wrap(tx.objectStore(storeName).get(key));
        },
        put: function(storeName, value, key) {
          var tx = db.transaction(storeName, 'readwrite');
          if (key !== undefined)
            tx.objectStore(storeName).put(value, key);
          else
            tx.objectStore(storeName).put(value);
          return wrapTx(tx);
        },
        delete: function(storeName, key) {
          var tx = db.transaction(storeName, 'readwrite');
          tx.objectStore(storeName).delete(key);
          return wrapTx(tx);
        },
        getAll: function(storeName) {
          var tx = db.transaction(storeName, 'readonly');
          return wrap(tx.objectStore(storeName).getAll());
        },
        clear: function(storeName) {
          var tx = db.transaction(storeName, 'readwrite');
          tx.objectStore(storeName).clear();
          return wrapTx(tx);
        },
        transaction: function(storeName, mode) {
          var tx    = db.transaction(storeName, mode || 'readonly');
          var store = wrapStore(tx.objectStore(storeName), wrapTx(tx));
          return { store: store, done: wrapTx(tx) };
        },
      };
    }
    global.idb = {
      openDB: function(name, version, opts) {
        return new Promise(function(resolve, reject) {
          var req = indexedDB.open(name, version);
          req.onupgradeneeded = function(e) {
            var db = e.target.result;
            // Provide a thin wrapper with createObjectStore for the upgrade callback

                objectStoreNames: db.objectStoreNames,
                createObjectStore: function(n, o) { return db.createObjectStore(n, o); },
              });
            }
          };
          req.onsuccess = function() { resolve(wrapDb(req.result)); };
          req.onerror   = function() { reject(req.error); };
        });
      }
    };

    // ═══════════════════════════════════════════════════════════════════════
    // ── INDEXED DB ───────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Open (or reuse) the IndexedDB database.
     * Called lazily — the first caller awaits the open; subsequent calls
     * get the cached promise immediately.
     *
     * Schema:
     *   library  — single record keyed 'main': { cachedAt, genres, albums[] }
     *   history  — one record per album:        { id, name, queuedAt }
     */
    let _db = null;
    async function getDb() {
      if (_db) return _db;
      _db = await idb.openDB(DB_NAME, DB_VERSION, {
        upgrade(db) {
          if (!db.objectStoreNames.contains('library'))
            db.createObjectStore('library');
          if (!db.objectStoreNames.contains('history'))
            db.createObjectStore('history', { keyPath: 'id' });
          // v2: banned albums (permanently excluded from picks)
          if (!db.objectStoreNames.contains('banned'))
            db.createObjectStore('banned', { keyPath: 'id' });
          // v2: listen later bookmarks
          if (!db.objectStoreNames.contains('listenlater'))
            db.createObjectStore('listenlater', { keyPath: 'id' });
        },
      });
      return _db;
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── CACHE MODULE ─────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Slim down a full Spotify album object to only the fields we need.
     * Stored in IndexedDB — no size limit concerns, but keeping it lean
     * speeds up serialisation and reduces memory at load time.
     * _genres is attached after the artist-genre fetch and preserved here.
     */
    function slimAlbum(a) {
      return {
        id:           a.id,
        name:         a.name,
        release_date: a.release_date,
        // added_at comes from the /me/albums item wrapper (not the album object itself).
        // We attach it as _added_at in fetchAllAlbums before slimming.
        _added_at:    a._added_at || null,
        artists:      (a.artists || []).map(ar => ({ id: ar.id, name: ar.name })),
        // Keep only the smallest image for the album card thumbnail
        images:       a.images ? [a.images[2] || a.images[1] || a.images[0]].filter(Boolean) : [],
        tracks: {
          total: a.tracks?.total,
          next:  a.tracks?.next || null,
          // Only store uri + duration_ms — that's all the filter & queue need
          items: (a.tracks?.items || []).map(t => ({
            uri:         t.uri,
            duration_ms: t.duration_ms,
          })),
        },
        _genres: a._genres || [],
      };
    }

    /** Persist the full library + genre list to IndexedDB. */
    async function saveLibraryCache() {
      try {
        const db = await getDb();
        await db.put('library', {
          cachedAt: Date.now(),
          genres:   allGenres,
          albums:   allAlbums.map(slimAlbum),
        }, 'main');
      } catch (e) {
        // Private browsing or storage blocked — silently ignore
        console.warn('SpotifyDiscovery: could not write library cache', e);
      }
    }

    /**
     * Try to load the library from IndexedDB.
     * Returns true if the cache was valid and data was restored, false otherwise.
     */
    async function loadLibraryCache() {
      try {
        const db   = await getDb();
        const data = await db.get('library', 'main');
        if (!data || !Array.isArray(data.albums) || data.albums.length === 0) return false;
        allAlbums = data.albums;
        allGenres = data.genres || [];

        // Fallback: reconstruct genre list from per-album _genres if top-level is missing.
        // Handles the case where a previous write was interrupted before genres were saved.
        if (allGenres.length === 0 && allAlbums.length > 0) {
          const gset = new Set();
          for (const a of allAlbums)
            for (const g of (a._genres || []))
              gset.add(g);
          allGenres = [...gset].sort();
        }

        state.cachedAt = data.cachedAt || null;
        return true;
      } catch (e) {
        return false;
      }
    }

    /** Remove the cached library from IndexedDB. */
    async function clearLibraryCache() {
      try {
        const db = await getDb();
        await db.delete('library', 'main');
      } catch (e) {}
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── BAN MODULE ───────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * In-memory mirror of the 'banned' IDB store.
     * Loaded at boot; kept in sync after every write.
     * Format: Set<albumId>
     */
    let bannedCache = new Set();

    async function loadBanned() {
      try {
        const db  = await getDb();
        const all = await db.getAll('banned');
        bannedCache = new Set(all.map(e => e.id));
        return bannedCache;
      } catch (e) { bannedCache = new Set(); return bannedCache; }
    }

    /**
     * Permanently ban an album — excludes it from all future picks.
     * Stored as { id, name, bannedAt } in IndexedDB.
     */
    async function banAlbum(album) {
      try {
        const db = await getDb();
        await db.put('banned', { id: album.id, name: album.name, bannedAt: Date.now() });
        bannedCache.add(album.id);
      } catch (e) { console.warn('SpotifyDiscovery: could not write ban', e); }
    }

    async function clearBanned() {
      try {
        const db = await getDb();
        await db.clear('banned');
        bannedCache = new Set();
      } catch (e) {}
    }

    /** Returns current count of banned albums (sync, from in-memory cache). */
    function getBannedCount() { return bannedCache.size; }


    // ═══════════════════════════════════════════════════════════════════════
    // ── LISTEN LATER MODULE ──────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * In-memory mirror of the 'listenlater' IDB store.
     * Each entry: a slim album object (same shape as allAlbums entries).
     */
    let listenLaterCache = [];

    async function loadListenLater() {
      try {
        const db  = await getDb();
        const all = await db.getAll('listenlater');
        listenLaterCache = all;
        return all;
      } catch (e) { listenLaterCache = []; return []; }
    }

    /**
     * Bookmark an album for later. Deduplicates by id.
     * Stores a slim copy so it can be queued without a library lookup.
     */
    async function addToListenLater(album) {
      try {
        const db = await getDb();
        const slim = slimAlbum(album);
        await db.put('listenlater', slim);
        if (!listenLaterCache.some(a => a.id === slim.id)) {
          listenLaterCache.push(slim);
        }
      } catch (e) { console.warn('SpotifyDiscovery: could not write listen later', e); }
    }

    async function removeFromListenLater(id) {
      try {
        const db = await getDb();
        await db.delete('listenlater', id);
        listenLaterCache = listenLaterCache.filter(a => a.id !== id);
      } catch (e) {}
    }

    async function clearListenLater() {
      try {
        const db = await getDb();
        await db.clear('listenlater');
        listenLaterCache = [];
      } catch (e) {}
    }

    function isInListenLater(id) {
      return listenLaterCache.some(a => a.id === id);
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── HISTORY MODULE ───────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * In-memory mirror of the IndexedDB `history` store.
     * Populated once at boot by loadHistory(), then kept in sync on every write.
     * All sync helpers (getRecentIds, getHistoryMap) read from this array —
     * no async IDB round-trip needed during render or filter operations.
     *
     * Each entry: { id: string, name: string, queuedAt: number (Unix ms) }
     */
    let historyCache = [];

    /**
     * Read all history entries from IndexedDB, prune expired ones,
     * and refresh the in-memory mirror.
     * Called once at boot and internally after every write.
     */
    async function loadHistory() {
      try {
        const db     = await getDb();
        const all    = await db.getAll('history');
        const cutoff = Date.now() - HISTORY_MAX_AGE_DAYS * 86400000;
        const fresh  = all.filter(e => e.queuedAt > cutoff);
        const stale  = all.filter(e => e.queuedAt <= cutoff);

        // Remove expired entries from the DB in a single transaction
        if (stale.length) {
          const tx = db.transaction('history', 'readwrite');
          await Promise.all(stale.map(e => tx.store.delete(e.id)));
          await tx.done;
        }

        historyCache = fresh;
        return fresh;
      } catch (e) {
        historyCache = [];
        return [];
      }
    }

    /**
     * Append queued albums to the history store.
     * Deduplicates by id (put() overwrites existing record for the same id).
     * Refreshes historyCache after writing.
     */
    async function appendHistory(albums) {
      try {
        const db  = await getDb();
        const tx  = db.transaction('history', 'readwrite');
        const now = Date.now();
        await Promise.all(
          albums.map(a => tx.store.put({ id: a.id, name: a.name, queuedAt: now }))
        );
        await tx.done;
        await loadHistory();   // refresh in-memory mirror
      } catch (e) {
        console.warn('SpotifyDiscovery: could not write history', e);
      }
    }

    /** Remove all history entries from IndexedDB and clear the mirror. */
    async function clearHistory() {
      try {
        const db = await getDb();
        await db.clear('history');
        historyCache = [];
      } catch (e) {}
    }

    /**
     * Export all history entries (including expired ones still in IDB)
     * as a JSON file download. Includes library coverage data if available.
     */
    async function exportHistory() {
      try {
        const db  = await getDb();
        const all = await db.getAll('history');
        const payload = {
          _version:  1,
          _exported: new Date().toISOString(),
          _app:      'Spotify Discovery',
          history:   all,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'spotify_discovery_history_' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        console.warn('SpotifyDiscovery: export failed', e);
        showError('Export failed: ' + e.message);
      }
    }

    /**
     * Import history from a JSON file. Merges with existing data (dedup by id,
     * keeps the most recent queuedAt for each album).
     */
    async function importHistory() {
      const input = document.createElement('input');
      input.type  = 'file';
      input.accept = '.json';
      input.onchange = async () => {
        const file = input.files?.[0];
        if (!file) return;
        try {
          const text    = await file.text();
          const payload = JSON.parse(text);
          const entries = payload.history || payload; // support raw array or wrapped
          if (!Array.isArray(entries)) throw new Error('Invalid format');

          // Read all existing entries first, then merge in memory
          const db       = await getDb();
          const existing = await db.getAll('history');
          const map      = new Map(existing.map(e => [e.id, e]));

          let count = 0;
          for (const e of entries) {
            if (e.id && e.queuedAt) {
              const prev = map.get(e.id);
              if (!prev || e.queuedAt > prev.queuedAt) {
                map.set(e.id, { id: e.id, name: e.name || '', queuedAt: e.queuedAt });
                count++;
              }
            }
          }

          // Write merged entries in a single transaction
          const tx = db.transaction('history', 'readwrite');
          await Promise.all(
            [...map.values()].map(e => tx.store.put(e))
          );
          await tx.done;

          await loadHistory();
          render();
          showSuccess(`Imported ${count} history entries.`);
        } catch (e) {
          showError('Import failed: ' + e.message);
        }
      };
      input.click();
    }

    // ── Sync accessors (read from in-memory mirror — safe inside render()) ──

    /** Set of album IDs queued within the history window. */
    function getRecentIds()  { return new Set(historyCache.map(e => e.id)); }

    /** Map of albumId → queuedAt (ms) for all non-expired history entries. */
    function getHistoryMap() { return new Map(historyCache.map(e => [e.id, e.queuedAt])); }

    /**
     * Compute library coverage statistics.
     * "Heard" = ever queued via Spotify Discovery (any time in history).
     * "Long ago" = last heard more than 6 months ago.
     * "Recent" = last heard within 6 months.
     */
    function getCoverageStats() {
      const empty = { total: 0, neverHeard: 0, longAgo: 0, recent: 0, everHeard: 0, coveragePct: 0 };
      if (!allAlbums.length) return empty;
      const historyMap = getHistoryMap();
      const now = Date.now();
      const SIX_MONTHS = 180 * 86400000;

      let neverHeard = 0, longAgo = 0, recent = 0;
      for (const album of allAlbums) {
        const lastHeard = historyMap.get(album.id);
        if (!lastHeard)                        neverHeard++;
        else if (now - lastHeard > SIX_MONTHS) longAgo++;
        else                                   recent++;
      }

      const everHeard    = allAlbums.length - neverHeard;
      const coveragePct  = Math.round((everHeard / allAlbums.length) * 100);
      return { total: allAlbums.length, neverHeard, longAgo, recent, everHeard, coveragePct };
    }

    /**
     * Weighted Fisher-Yates pick.
     * Base weights by play recency (never=10, old=5, recent=2, very-recent=1).
     * When keepGenreContext is active, albums sharing genres with the last
     * session get an extra 3× multiplier — a soft Roon-style context anchor.
     */
    function weightedPickRandom(pool, n) {
      const historyMap     = getHistoryMap();
      const now            = Date.now();
      const SIX_MONTHS     = 180 * 86400000;
      const THIRTY_DAYS    = HISTORY_MAX_AGE_DAYS * 86400000;
      const sessionGenreSet = state.filters.keepGenreContext && state.sessionGenres.length > 0
        ? new Set(state.sessionGenres)
        : null;

      const weighted = pool.map(album => {
        const lastHeard = historyMap.get(album.id);
        let weight;
        if      (!lastHeard)                         weight = 10;
        else if (now - lastHeard > SIX_MONTHS)       weight = 5;
        else if (now - lastHeard > THIRTY_DAYS)      weight = 2;
        else                                         weight = 1;

        // Session genre context boost: albums that share ≥1 genre with last session
        if (sessionGenreSet && (album._genres || []).some(g => sessionGenreSet.has(g))) {
          weight *= 3;
        }

        return { album, weight };
      });

      const result = [];
      const items  = [...weighted];

      for (let i = 0; i < Math.min(n, items.length); i++) {
        let totalWeight = 0;
        for (let k = i; k < items.length; k++) totalWeight += items[k].weight;
        let rand   = Math.random() * totalWeight;
        let chosen = i;
        for (let k = i; k < items.length; k++) {
          rand -= items[k].weight;
          if (rand <= 0) { chosen = k; break; }
        }
        [items[i], items[chosen]] = [items[chosen], items[i]];
        result.push(items[i].album);
      }

      return result;
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── AUTH MODULE – PKCE ───────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Generate a cryptographically random URL-safe string of `len` chars. */
    function generateRandom(len = 64) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      const arr   = crypto.getRandomValues(new Uint8Array(len));
      return Array.from(arr, b => chars[b % chars.length]).join('');
    }

    /**
     * Hash the PKCE verifier with SHA-256, then base64url-encode.
     * This is the code_challenge sent to Spotify on the first leg.
     */
    async function generateChallenge(verifier) {
      const data   = new TextEncoder().encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(digest)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    /** Begin the PKCE auth flow: generate verifier → challenge → redirect. */
    async function login() {
      const verifier  = generateRandom(64);
      const challenge = await generateChallenge(verifier);
      const state     = generateRandom(16);

      localStorage.setItem('pkce_verifier', verifier);
      localStorage.setItem('pkce_state',    state);

      const params = new URLSearchParams({
        response_type:         'code',
        client_id:             CLIENT_ID,
        scope:                 SCOPES,
        redirect_uri:          REDIRECT_URI,
        state,
        code_challenge_method: 'S256',
        code_challenge:        challenge,
      });

      window.location.href = 'https://accounts.spotify.com/authorize?' + params;
    }

    /**
     * Second leg: exchange the auth code for access + refresh tokens.
     * Called once after Spotify redirects back with ?code=&state=.
     */
    async function handleCallback(code, returnedState) {
      const storedState = localStorage.getItem('pkce_state');
      if (returnedState !== storedState) throw new Error('State mismatch – possible CSRF. Please try logging in again.');

      const verifier = localStorage.getItem('pkce_verifier');

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          code,
          redirect_uri:  REDIRECT_URI,
          client_id:     CLIENT_ID,
          code_verifier: verifier,
        }),
      });

      if (!res.ok) throw new Error('Token exchange failed: ' + (await res.text()));
      storeTokens(await res.json());

      // Remove ?code=&state= from the URL so a hard-refresh doesn't re-submit
      window.history.replaceState({}, '', window.location.pathname);
    }

    /**
     * Silently refresh the access token using the stored refresh token.
     * Spotify may return a new refresh_token; if so we store it.
     * Note: Spotify's PKCE refresh tokens can expire after extended inactivity;
     * if refresh fails we clear state and ask the user to log in again.
     */
    async function refreshAccessToken() {
      const refreshToken = localStorage.getItem('spotify_refresh_token');
      if (!refreshToken) throw new Error('No refresh token – please log in.');

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'refresh_token',
          refresh_token: refreshToken,
          client_id:     CLIENT_ID,
        }),
      });

      if (!res.ok) {
        logout();
        throw new Error('Session expired – please log in again.');
      }
      storeTokens(await res.json());
    }

    /** Persist tokens; subtract 60 s from expires_in as a safety buffer. */
    function storeTokens({ access_token, refresh_token, expires_in }) {
      localStorage.setItem('spotify_access_token', access_token);
      if (refresh_token) localStorage.setItem('spotify_refresh_token', refresh_token);
      localStorage.setItem('spotify_expires_at', String(Date.now() + (expires_in - 60) * 1000));
    }

    /** Return a valid access token, refreshing if needed. */
    async function getAccessToken() {
      if (Date.now() > Number(localStorage.getItem('spotify_expires_at') || 0)) {
        await refreshAccessToken();
      }
      return localStorage.getItem('spotify_access_token');
    }

    function isLoggedIn() {
      return !!localStorage.getItem('spotify_refresh_token');
    }

    async function logout() {
      ['spotify_access_token', 'spotify_refresh_token', 'spotify_expires_at',
       'pkce_verifier', 'pkce_state'].forEach(k => localStorage.removeItem(k));
      // Intentionally NOT clearing library cache or play history —
      // data survives logout so it's available immediately after re-login.
      // Use deleteAllData() for a full wipe.
      allAlbums = [];
      allGenres = [];
      state.cachedAt = null;
      render();
    }

    /** Full data wipe: clears tokens, library cache, play history, bans, listen-later. */
    async function deleteAllData() {
      ['spotify_access_token', 'spotify_refresh_token', 'spotify_expires_at',
       'pkce_verifier', 'pkce_state'].forEach(k => localStorage.removeItem(k));
      await clearLibraryCache();
      await clearHistory();
      await clearBanned();
      await clearListenLater();
      allAlbums = [];
      allGenres = [];
      state.cachedAt = null;
      state.sessionGenres = [];
      render();
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── SPOTIFY API MODULE ───────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Authenticated GET; throws on non-2xx. */
    async function apiGet(url) {
      const token = await getAccessToken();
      const res   = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(`Spotify API ${res.status}: ${body || res.statusText}`);
      }
      return res.json();
    }

    /**
     * Fetch every saved album from /v1/me/albums.
     * The API returns max 50 per page; we follow `next` until null.
     * `onProgress(loaded, total)` is called after each page.
     */
    async function fetchAllAlbums(onProgress) {
      const albums = [];
      let url = 'https://api.spotify.com/v1/me/albums?limit=50&market=from_token';

      while (url) {
        const data = await apiGet(url);
        for (const item of data.items) {
          const album = item.album;
          // added_at lives on the item wrapper, NOT on the album object itself.
          // Spotify's /me/albums response wraps each album in { added_at, album: {...} }.
          // We attach it before pushing so slimAlbum() can persist it.
          album._added_at = item.added_at || null;
          albums.push(album);
        }
        url = data.next;   // null on the last page
        onProgress(albums.length, data.total);
      }
      return albums;
    }

    /**
     * Batch-fetch artist objects (max 50 per request) to read their genre tags.
     * Spotify does NOT expose genres on album objects — they live on the artist.
     * After this call every album in `albums` gets a `_genres` string[] property
     * containing the union of genres from all of its artists.
     * Returns a sorted, deduplicated array of every genre found in the library.
     */
    async function fetchArtistGenres(albums, onProgress) {
      // Collect every unique artist ID referenced across the library
      const idSet = new Set();
      for (const a of albums)
        for (const ar of (a.artists || []))
          if (ar.id) idSet.add(ar.id);

      const ids = [...idSet];
      const genreMap = new Map();   // artistId → string[]
      const BATCH = 50;

      for (let i = 0; i < ids.length; i += BATCH) {
        const batch = ids.slice(i, i + BATCH);
        // GET /v1/artists?ids=id1,id2,... returns up to 50 artist objects
        const data = await apiGet(
          'https://api.spotify.com/v1/artists?ids=' + batch.join(',')
        );
        for (const artist of (data.artists || []))
          if (artist) genreMap.set(artist.id, artist.genres || []);

        onProgress(Math.min(i + BATCH, ids.length), ids.length);
      }

      // Attach a _genres field to each album and collect the global genre set
      const globalSet = new Set();
      for (const album of albums) {
        const ag = new Set();
        for (const ar of (album.artists || []))
          for (const g of (genreMap.get(ar.id) || []))
            { ag.add(g); globalSet.add(g); }
        album._genres = [...ag];
      }

      return [...globalSet].sort();
    }

    /**, including extra pages when total > 50.
     * The /me/albums response embeds up to 50 tracks inline; albums with
     * more (rare but real) require extra requests to /v1/albums/{id}/tracks.
     */
    async function getAlbumTracks(album) {
      let items = album.tracks?.items || [];
      let next  = album.tracks?.next;           // present when total > 50

      while (next) {
        // Fetch the next page of tracks for this album
        const data = await apiGet(next);
        items = items.concat(data.items);
        next  = data.next;
      }
      return items;
    }

    /**
     * Add a single track URI to the user's active playback queue.
     * Spotify returns 204 on success, 404 when no active device is found.
     * The Spotify browser client may need longer delays between calls to
     * avoid 429 rate-limiting; the footer toggle controls this.
     */
    async function addToQueue(uri) {
      const token = await getAccessToken();
      const res   = await fetch(
        `https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(uri)}`,
        { method: 'POST', headers: { Authorization: 'Bearer ' + token } }
      );
      if (res.status === 404) throw new Error('No active Spotify device found. Start playing something first, then try again.');
      if (res.status === 429) throw new Error('Rate limited by Spotify. Enable "Browser client mode" in the footer for slower (safer) queuing.');
      if (!res.ok && res.status !== 204) throw new Error(`Queue error ${res.status}`);
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));


    // ═══════════════════════════════════════════════════════════════════════
    // ── FILTER MODULE ────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Parse the 4-digit year from Spotify's "YYYY", "YYYY-MM", or "YYYY-MM-DD". */
    function releaseYear(album) {
      return parseInt((album.release_date || '').slice(0, 4), 10) || 0;
    }

    /** Map a year to its decade string, e.g. 1983 → "80s", 1965 → "pre-70s". */
    function decadeOf(year) {
      if (year < 1970) return 'pre-70s';
      const base = Math.floor(year / 10) * 10;
      return String(base).slice(2) + 's';
    }

    /**
     * Sum duration of all inline tracks in minutes.
     * Tracks beyond 50 are not included here (they're fetched lazily at queue time),
     * so the slider filter is approximate for very long albums.
     */
    function albumDurMin(album) {
      return (album.tracks?.items || []).reduce((s, t) => s + (t.duration_ms || 0), 0) / 60000;
    }

    /**
     * Apply all active filters with AND logic.
     * Returns the subset of `albums` that passes every enabled filter.
     */
    function applyFilters(albums) {
      const recentIds = state.filters.avoidRecent ? getRecentIds() : null;

      return albums.filter(album => {

        // ── Always exclude banned albums ──────────────────────────────
        if (bannedCache.has(album.id)) return false;

        // ── Decade ──────────────────────────────────────────────────────
        // If no decades selected → skip this filter (accept all).
        if (state.filters.decades.length > 0) {
          if (!state.filters.decades.includes(decadeOf(releaseYear(album)))) return false;
        }

        // ── Keyword (checked against album title) ────────────────────
        if (state.filters.excludeKeywords) {
          const low = (album.name || '').toLowerCase();
          if (BLOCKLIST_KEYWORDS.some(kw => low.includes(kw))) return false;
        }

        // ── Duration ─────────────────────────────────────────────────
        const dur = albumDurMin(album);
        if (dur < state.filters.minDurMin || dur > state.filters.maxDurMin) return false;

        // ── Genre ──────────────────────────────────────────────────────
        // If genres selected → album must have at least one matching genre.
        if (state.filters.genres.length > 0) {
          const ag = album._genres || [];
          if (!state.filters.genres.some(g => ag.includes(g))) return false;
        }

        // ── Age ("not heard in a long time") ─────────────────────────
        // minAgeMonths > 0 → only albums that were added to the library
        // at least that many months ago (i.e., potentially forgotten).
        if (state.filters.minAgeMonths > 0) {
          const addedMs  = album._added_at ? new Date(album._added_at).getTime() : 0;
          const cutoffMs = Date.now() - state.filters.minAgeMonths * 30 * 24 * 60 * 60 * 1000;
          if (addedMs > cutoffMs) return false;  // added too recently → skip
        }

        // ── Avoid recently queued ─────────────────────────────────────
        // If the album was queued within HISTORY_MAX_AGE_DAYS, exclude it.
        if (state.filters.avoidRecent && recentIds && recentIds.has(album.id)) return false;

        return true;
      });
    }

    /**
     * Build the HTML for the genre filter section using horizontal scroll-lanes.
     * Each cluster (Rock, Electronic, etc.) gets its own scrollable row of chips.
     * Selected genres are shown as removeable pills in a summary bar at the top.
     */
    function buildGenreFilterHTML() {
      if (!allAlbums.length) {
        return `<div class="genre-empty">Load your library first — genres will appear here.</div>`;
      }
      if (state.genresLoading) {
        return `<div class="genre-loading">Fetching artist genres…</div>`;
      }
      if (!allGenres.length) {
        return `<div class="genre-empty">No genre data found for your library.</div>`;
      }

      // Group allGenres into clusters
      const clusterMap = new Map(GENRE_CLUSTERS.map(c => [c.id, { ...c, genres: [] }]));
      clusterMap.set('other', { id: 'other', label: 'Other', icon: '🏷', genres: [] });
      for (const g of allGenres) clusterMap.get(clusterOf(g)).genres.push(g);

      // Selected summary bar
      const sel = state.filters.genres;
      const selectedBar = sel.length === 0 ? '' : `
        <div class="genre-selected-bar visible" id="genreSelectedBar">
          ${sel.map(g => `
            <span class="genre-selected-pill" data-remove="${escHtml(g)}">
              ${escHtml(g)}<span class="genre-selected-pill-x">×</span>
            </span>`).join('')}
          <button class="genre-clear-all" id="genreClearAll" type="button">Clear all</button>
        </div>`;

      // Build lanes (skip empty clusters)
      const lanes = [...clusterMap.values()]
        .filter(c => c.genres.length > 0)
        .map(c => {
          const selCount = c.genres.filter(g => sel.includes(g)).length;
          const chips = c.genres.map(g => {
            const isSelected = sel.includes(g);
            return `<button class="glchip${isSelected ? ' selected' : ''}" data-genre="${escHtml(g)}">${escHtml(g)}</button>`;

          return `
            <div class="genre-lane">
              <div class="genre-lane-header">
                <span class="genre-lane-title">
                  <span class="genre-lane-icon">${c.icon}</span>${c.label}

        }).join('');

     * Empty state: compact hint message.
     */
    function buildListenLaterHTML() {
      const items = listenLaterCache;
      const count = items.length;
      if (count === 0) return '';   // panel hides entirely when empty

      const itemsHTML = items.map(a => {
        const imgUrl  = a.images?.[0]?.url || '';
        const imgEl   = imgUrl
          ? `<img class="ll-art" src="${imgUrl}" alt="" loading="lazy">`
          : `<div class="ll-art-placeholder">🎵</div>`;
        const artists = (a.artists || []).map(x => x.name).join(', ');
        return `
          <div class="ll-item" data-id="${escHtml(a.id)}">
            ${imgEl}
            <div class="ll-info">
              <div class="ll-name">${escHtml(a.name)}</div>
              <div class="ll-artist">${escHtml(artists)}</div>
            </div>
            <button class="ll-remove-btn" data-remove="${escHtml(a.id)}" title="Remove" aria-label="Remove from Listen Later">×</button>
          </div>`;
      }).join('');

      return `
        <div class="ll-panel">
          <div class="ll-header" id="llToggle">
            <div class="ll-title-wrap">
              <span class="ll-title">🔖 Listen Later</span>
              <span class="ll-count-badge">${count}</span>
            </div>
            <span class="ll-arrow ${state.listenLaterOpen ? 'open' : ''}" id="llArrow">▼</span>
          </div>
          <div class="ll-body ${state.listenLaterOpen ? 'open' : ''}" id="llBody">
            <div class="ll-list">${itemsHTML}</div>
            <div class="ll-actions">
              <button class="ll-queue-btn" id="queueLLBtn">▶ Queue All (${count} album${count !== 1 ? 's' : ''})</button>
              <button class="ll-clear-btn" id="clearLLBtn">Clear</button>
            </div>
          </div>
        </div>`;
    }

    /** Re-render the Listen Later panel in-place after any change. */
    function refreshListenLaterPanel() {
      // Find the panel's parent container (it lives between coverage and action row)
      const existing = document.getElementById('llToggle')?.closest('.ll-panel');
      const actionRow = document.querySelector('.action-row');
      if (!actionRow) return;

      const newHTML = buildListenLaterHTML();
      if (existing) {
        if (newHTML) {
          const wrapper = document.createElement('div');
          wrapper.innerHTML = newHTML;
          existing.replaceWith(wrapper.firstElementChild);
        } else {
          existing.remove();
        }
      } else if (newHTML) {
        actionRow.insertAdjacentHTML('beforebegin', newHTML);
      }
      attachListenLaterEvents();
    }

    function attachEvents() {
      // Filter panel collapse
      document.getElementById('filterToggle').addEventListener('click', () => {
        state.filterOpen = !state.filterOpen;
        document.getElementById('filterArrow').classList.toggle('open', state.filterOpen);
        document.getElementById('filterBody').classList.toggle('open', state.filterOpen);
      });

      // Sub-accordion: each filter section header toggles its own body
      document.querySelectorAll('.filter-section[data-filter]').forEach(section => {
        const key    = section.dataset.filter;
        const header = section.querySelector('.filter-section-header');
        const arrow  = section.querySelector('.filter-section-arrow');
        const body   = section.querySelector('.filter-section-body');
        if (!header || !body) return;
        header.addEventListener('click', () => {
          state.filterSections[key] = !state.filterSections[key];
          arrow?.classList.toggle('open', state.filterSections[key]);
          body.classList.toggle('open', state.filterSections[key]);
        });
      });

      // Coverage panel collapse
      document.getElementById('coverageToggle').addEventListener('click', () => {
        state.coverageOpen = !state.coverageOpen;
        document.getElementById('coverageArrow').classList.toggle('open', state.coverageOpen);
        document.getElementById('coverageBody').classList.toggle('open', state.coverageOpen);
      });

      // Coverage "Jetzt spielen" buttons (delegated)
      attachCoverageEvents();

      // Decade checkboxes
      document.querySelectorAll('.decade-chip input').forEach(cb => {
        cb.addEventListener('change', e => {
          const v = e.target.value;
          if (e.target.checked) { if (!state.filters.decades.includes(v)) state.filters.decades.push(v); }
          else { state.filters.decades = state.filters.decades.filter(d => d !== v); }
          updateStatsChip();
        });
      });

      // Keyword filter toggle
      document.getElementById('kwFilter').addEventListener('change', e => {
        state.filters.excludeKeywords = e.target.checked;
        updateStatsChip();
      });

      // Duration sliders
      const minSlider = document.getElementById('minDur');
      const maxSlider = document.getElementById('maxDur');
      minSlider.addEventListener('input', e => {
        state.filters.minDurMin = +e.target.value;
        if (state.filters.minDurMin > state.filters.maxDurMin) {
          state.filters.maxDurMin = state.filters.minDurMin;
          maxSlider.value = state.filters.maxDurMin;
          document.getElementById('maxDurVal').textContent = state.filters.maxDurMin;
        }
        document.getElementById('minDurVal').textContent = state.filters.minDurMin;
        updateStatsChip();
      });
      maxSlider.addEventListener('input', e => {
        state.filters.maxDurMin = +e.target.value;
        if (state.filters.maxDurMin < state.filters.minDurMin) {
          state.filters.minDurMin = state.filters.maxDurMin;
          minSlider.value = state.filters.minDurMin;
          document.getElementById('minDurVal').textContent = state.filters.minDurMin;
        }
        document.getElementById('maxDurVal').textContent = state.filters.maxDurMin;
        updateStatsChip();
      });

      // Album count buttons
      document.getElementById('countSelector').addEventListener('click', e => {
        const btn = e.target.closest('.count-btn');
        if (!btn) return;
        state.albumCount = +btn.dataset.count;
        document.querySelectorAll('.count-btn').forEach(b =>
          b.classList.toggle('active', +b.dataset.count === state.albumCount));
      });

      // Main queue button → now triggers handlePick()
      document.getElementById('queueBtn').addEventListener('click', handlePick);

      // Age filter (radio group)
      document.querySelectorAll('input[name="ageFilter"]').forEach(rb => {
        rb.addEventListener('change', e => {
          state.filters.minAgeMonths = +e.target.value;
          updateStatsChip();
        });
      });

      // Avoid recently played toggle
      const avoidRecentEl = document.getElementById('avoidRecentToggle');
      if (avoidRecentEl) {
        avoidRecentEl.addEventListener('change', e => {
          state.filters.avoidRecent = e.target.checked;
          updateStatsChip();
        });
      }

      // Weight-unheard toggle
      const weightUnheardEl = document.getElementById('weightUnheardToggle');
      if (weightUnheardEl) {
        weightUnheardEl.addEventListener('change', e => {
          state.filters.weightUnheard = e.target.checked;
        });
      }

      // Clear history button (may not exist if history is empty)
      document.getElementById('clearHistoryBtn')?.addEventListener('click', async () => {
        await clearHistory();
        render();
      });

      // Clear banned button (may not exist if no albums are banned)
      document.getElementById('clearBannedBtn')?.addEventListener('click', async () => {
        await clearBanned();
        render();
      });

      // Genre-Kontext footer toggle
      const gcToggle = document.getElementById('genreContextToggle');
      if (gcToggle) {
        gcToggle.checked = state.filters.keepGenreContext;
        gcToggle.addEventListener('change', e => {
          state.filters.keepGenreContext = e.target.checked;
          updateSessionGenreTags();
        });
      }

      // Genre events (may not exist yet if library not loaded)
      attachGenreEvents();

      // Listen Later panel events
      attachListenLaterEvents();
    }

    /**
     * Attach all event handlers for the Listen Later panel.
     * Safe to call even when panel is absent (no-ops in that case).
     */
    function attachListenLaterEvents() {
      // Collapse toggle
      document.getElementById('llToggle')?.addEventListener('click', () => {
        state.listenLaterOpen = !state.listenLaterOpen;

      // Queue all
      document.getElementById('queueLLBtn')?.addEventListener('click', queueListenLater);

    /**
