    function attachGenreEvents() {
      const lanesEl   = document.getElementById('genreLanes');
      const searchEl  = document.getElementById('genreSearch');
      const clearBtn  = document.getElementById('genreSearchClear');
      const resultsEl = document.getElementById('genreSearchResults');
      if (!lanesEl) return;

      // ── Search input ───────────────────────────────────────────────────
      if (searchEl) {
        searchEl.addEventListener('input', e => {
          const q = e.target.value.trim().toLowerCase();
          clearBtn?.classList.toggle('visible', q.length > 0);

          if (!q) {
            // Empty query — restore lanes, hide results
            resultsEl.style.display = 'none';
            resultsEl.innerHTML = '';
            lanesEl.style.display = '';
            return;
          }

          // Filter all genres by query
          const matches = allGenres.filter(g => g.toLowerCase().includes(q));

          if (matches.length === 0) {
            resultsEl.innerHTML = `<div class="genre-search-noresult">No genres match "${escHtml(q)}"</div>`;
          } else {
            resultsEl.innerHTML = `<div class="genre-search-results" id="genreSearchResultsInner">${
              matches.map(g => {
                const isSelected = state.filters.genres.includes(g);
                return `<button class="glchip${isSelected ? ' selected' : ''}" data-genre="${escHtml(g)}">${escHtml(g)}</button>`;
              }).join('')
            }</div>`;
            // Delegated click on search results
            resultsEl.querySelector('#genreSearchResultsInner')?.addEventListener('click', e => {
              const chip = e.target.closest('.glchip');
              if (!chip) return;
              _toggleGenreChip(chip.dataset.genre);
            });
          }

          // Show results panel, hide lanes
          resultsEl.style.display = '';
          lanesEl.style.display = 'none';
        });

        // Clear button wipes the input and restores lanes
        clearBtn?.addEventListener('click', () => {
          searchEl.value = '';
          clearBtn.classList.remove('visible');
          resultsEl.style.display = 'none';
          resultsEl.innerHTML = '';
          lanesEl.style.display = '';
          searchEl.focus();
        });
      }

      // ── Delegated click on lane chips ─────────────────────────────────
      lanesEl.addEventListener('click', e => {
        const chip = e.target.closest('.glchip');
        if (!chip) return;
        _toggleGenreChip(chip.dataset.genre);
      });

      // Clear-all button (inside selected bar — may not exist yet)
      _bindGenreClearAll();

      // Selected pills remove (delegated to selected bar)
      const bar = document.getElementById('genreSelectedBar');
      if (bar) {
        bar.addEventListener('click', e => {
          const pill = e.target.closest('.genre-selected-pill');
          if (!pill) return;
          const g = pill.dataset.remove;
          state.filters.genres = state.filters.genres.filter(x => x !== g);
          // Deselect in lanes and in search results if open
          document.querySelectorAll(`.glchip[data-genre="${CSS.escape(g)}"]`)
            .forEach(c => c.classList.remove('selected'));
          _syncGenreBadgesAndBar();
          updateStatsChip();
        });
      }
    }

    /**
     * Toggle a genre on/off by name.
     * Updates state, syncs the chip in lanes AND in search results (if open).
     */
    function _toggleGenreChip(g) {
      if (!g) return;
      const isSelected = state.filters.genres.includes(g);
      if (isSelected) {
        state.filters.genres = state.filters.genres.filter(x => x !== g);
      } else {
        state.filters.genres.push(g);
      }
      // Update every rendered chip with this genre (lane + search results can both exist)
      document.querySelectorAll(`.glchip[data-genre="${CSS.escape(g)}"]`)
        .forEach(c => c.classList.toggle('selected', !isSelected));
      _syncGenreBadgesAndBar();
      updateStatsChip();
    }

    function _bindGenreClearAll() {
      document.getElementById('genreClearAll')?.addEventListener('click', () => {
        state.filters.genres = [];
        // Deselect chips in lanes AND in search results panel
        document.querySelectorAll('.glchip.selected').forEach(c => c.classList.remove('selected'));
        _syncGenreBadgesAndBar();
        updateStatsChip();
      });
    }

    /**
     * After any genre selection change: update per-lane badge counts
     * and re-render the selected-pills summary bar without rebuilding all lanes.
     */
    function _syncGenreBadgesAndBar() {
      const sel = state.filters.genres;

      // Update badges per cluster
      for (const c of GENRE_CLUSTERS) {
        const badge = document.getElementById('badge_' + c.id);
        if (!badge) continue;
        const lane  = document.getElementById('lane_' + c.id);
        if (!lane) continue;
        const count = [...lane.querySelectorAll('.glchip.selected')].length;
        badge.textContent = count;
        badge.classList.toggle('visible', count > 0);
      }

      // Rebuild selected bar
      const section = document.getElementById('genreFilterSection');
      if (!section) return;
      let bar = document.getElementById('genreSelectedBar');

      if (sel.length === 0) {
        bar?.remove();
        return;
      }

      const newBarHTML = `
        <div class="genre-selected-bar visible" id="genreSelectedBar">
          ${sel.map(g => `
            <span class="genre-selected-pill" data-remove="${escHtml(g)}">
              ${escHtml(g)}<span class="genre-selected-pill-x">×</span>
            </span>`).join('')}
          <button class="genre-clear-all" id="genreClearAll" type="button">Clear all</button>
        </div>`;

      if (bar) {
        bar.outerHTML = newBarHTML;
      } else {
        const lanes = document.getElementById('genreLanes');
        if (lanes) lanes.insertAdjacentHTML('beforebegin', newBarHTML);
      }
      // Re-bind clear-all since we replaced the element
      _bindGenreClearAll();
      // Re-bind pill removal on new bar
      const newBar = document.getElementById('genreSelectedBar');
      const lanesEl = document.getElementById('genreLanes');
      if (newBar) {
        newBar.addEventListener('click', e => {
          const pill = e.target.closest('.genre-selected-pill');
          if (!pill) return;
          _toggleGenreChip(pill.dataset.remove);
        });
      }
    }

    function updateStatsChip() {
      if (!allAlbums.length) return;
      const chip = document.getElementById('statsChip');
      if (!chip) return;
      chip.classList.add('visible');
      const filtered = applyFilters(allAlbums);
      const recentExcluded = state.filters.avoidRecent
        ? allAlbums.length - applyFilters(allAlbums.map(a => ({ ...a }))).length
        : 0;
      // Re-run without avoidRecent to count how many history removes
      let historyNote = '';
      if (state.filters.avoidRecent) {
        const withoutHistory = allAlbums.filter(a => {
          if (state.filters.decades.length > 0 && !state.filters.decades.includes(decadeOf(releaseYear(a)))) return false;
          if (state.filters.excludeKeywords && BLOCKLIST_KEYWORDS.some(kw => (a.name||'').toLowerCase().includes(kw))) return false;
          const dur = albumDurMin(a);
          if (dur < state.filters.minDurMin || dur > state.filters.maxDurMin) return false;
          if (state.filters.genres.length > 0 && !(a._genres||[]).some(g => state.filters.genres.includes(g))) return false;
          if (state.filters.minAgeMonths > 0 && a._added_at) {
            if (new Date(a._added_at).getTime() > Date.now() - state.filters.minAgeMonths * 30 * 86400000) return false;
          }
          return true;
        }).length;
        const excluded = withoutHistory - filtered.length;
        if (excluded > 0) historyNote = ` · ${excluded} recent excluded`;
      }
      chip.textContent = `${allAlbums.length} albums in library · ${filtered.length} match filters${historyNote}`;
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── QUEUE FLOW ───────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Phase 1: Load library (if needed) and pick random albums.
     * Does NOT queue anything — shows albums for review + reroll first.
     */
    async function handlePick() {
      if (state.isWorking) return;
      state.isWorking = true;
      state.phase = 'idle';
      clearStatus();

      try {
        // ── 1. Load library (once) ────────────────────────────────────
        if (allAlbums.length === 0) {
          showProgress('Fetching your library…', 0);
          allAlbums = await fetchAllAlbums((loaded, total) => {
            showProgress(`Fetching library… ${loaded} / ${total}`, loaded / total * 100);
          });
          const btn = document.getElementById('queueBtn');
          if (btn) btn.textContent = '🎲 Pick Albums';
          updateStatsChip();

          // ── 1b. Fetch artist genres ───────────────────────────────
          state.genresLoading = true;
          refreshGenrePanel();

          const totalArtists = new Set(
            allAlbums.flatMap(a => (a.artists || []).map(ar => ar.id))
          ).size;
          showProgress(`Fetching genres… 0 / ${totalArtists} artists`, 0);

          allGenres = await fetchArtistGenres(allAlbums, (done, total) => {
            showProgress(`Fetching genres… ${done} / ${total} artists`, done / total * 100);
          });

          state.genresLoading = false;
          refreshGenrePanel();
          updateStatsChip();

          // ── 1c. Persist to IndexedDB ───────────────────────────
          await saveLibraryCache();
          state.cachedAt = Date.now();
          renderHeader();
        }

        // ── 2. Apply filters + pick ───────────────────────────────────
        let pool = applyFilters(allAlbums);

        // Apply coverage filter if triggered from the coverage panel CTAs.
        // This is applied AFTER regular filters (AND logic), narrowing the
        // pool to only unheard or long-forgotten albums.
        if (state.coverageFilter) {
          const historyMap = getHistoryMap();
          const now        = Date.now();
          const SIX_MONTHS = 180 * 86400000;
          if (state.coverageFilter === 'unheard') {
            pool = pool.filter(a => !historyMap.has(a.id));
          } else if (state.coverageFilter === 'longAgo') {
            pool = pool.filter(a => {
              const lastHeard = historyMap.get(a.id);
              return lastHeard && (now - lastHeard > SIX_MONTHS);
            });
          }
          state.coverageFilter = null;  // consume and clear
        }

        if (pool.length === 0) {
          hideProgress();
          showError('No albums match the current filters. Try removing some filter constraints.');
          state.isWorking = false;
          return;
        }

        const n = Math.min(state.albumCount, pool.length);
        // Use weighted pick when "Prefer unheard" is active
        state.selectedAlbums = state.filters.weightUnheard
          ? weightedPickRandom(pool, n)
          : pickRandom(pool, n);
        state.phase = 'picked';

        hideProgress();
        renderAlbumList(state.selectedAlbums);

      } catch (err) {
        hideProgress();
        showError(err.message || 'An unexpected error occurred.');
      }

      state.isWorking = false;
    }

    /**
     * Phase 2: Queue the currently selected albums.
     * Called by the "Queue These Albums" button in the album list.
     */
    async function queueSelected() {
      if (state.isWorking || !state.selectedAlbums.length) return;
      state.isWorking = true;
      state.phase = 'queuing';

      // Disable the queue-selected button immediately
      const qsBtn = document.getElementById('queueSelectedBtn');
      if (qsBtn) { qsBtn.disabled = true; qsBtn.textContent = 'Queuing…'; }

      try {
        const delay = document.getElementById('browserModeToggle').checked
          ? DELAY_BROWSER_MS
          : DELAY_DESKTOP_MS;

        showProgress('Preparing tracks…', 0);
        const allTracks = [];
        for (const album of state.selectedAlbums) {
          // Fetches additional track pages for albums with > 50 tracks.
          const tracks = await getAlbumTracks(album);
          for (const t of tracks) allTracks.push({ uri: t.uri, album: album.name });
        }

        const total = allTracks.length;
        for (let i = 0; i < total; i++) {
          showProgress(
            `Queuing track ${i + 1} / ${total}  —  ${escHtml(allTracks[i].album)}`,
            (i / total) * 100
          );
          await addToQueue(allTracks[i].uri);
          if (i < total - 1) await sleep(delay);
        }

        // ── Save to play history + session genre context ──────────────
        await appendHistory(state.selectedAlbums);
        _updateSessionGenres(state.selectedAlbums);
        refreshCoveragePanel();
        renderHeader();

        showProgress('Done!', 100);
        await sleep(400);
        hideProgress();
        const n = state.selectedAlbums.length;
        showSuccess(
          `✓ Added ${total} track${total !== 1 ? 's' : ''} from ` +
          `${n} album${n !== 1 ? 's' : ''} to your Spotify queue.`
        );
        state.phase = 'idle';

        // Re-enable pick button for next round
        const pickBtn = document.getElementById('queueBtn');
        if (pickBtn) pickBtn.disabled = false;
        if (qsBtn) { qsBtn.disabled = false; qsBtn.textContent = '▶ Queue These Albums'; }

      } catch (err) {
        hideProgress();
        showError(err.message || 'An unexpected error occurred.');
        if (qsBtn) { qsBtn.disabled = false; qsBtn.textContent = '▶ Queue These Albums'; }
      }

      state.isWorking = false;
    }

    /**
     * Queue all albums in the Listen Later list, then clear it.
     * Same track-by-track flow as queueSelected().
     */
    async function queueListenLater() {
      if (state.isWorking || !listenLaterCache.length) return;
      state.isWorking = true;

      const btn = document.getElementById('queueLLBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Queuing…'; }

      try {
        const delay = document.getElementById('browserModeToggle').checked
          ? DELAY_BROWSER_MS : DELAY_DESKTOP_MS;

        showProgress('Preparing Listen Later tracks…', 0);
        const allTracks = [];
        for (const album of listenLaterCache) {
          const tracks = await getAlbumTracks(album);
          for (const t of tracks) allTracks.push({ uri: t.uri, album: album.name });
        }

        const total = allTracks.length;
        for (let i = 0; i < total; i++) {
          showProgress(
            `Queuing track ${i + 1} / ${total}  —  ${escHtml(allTracks[i].album)}`,
            (i / total) * 100
          );
          await addToQueue(allTracks[i].uri);
          if (i < total - 1) await sleep(delay);
        }

        await appendHistory(listenLaterCache);
        _updateSessionGenres(listenLaterCache);
        await clearListenLater();
        refreshListenLaterPanel();
        refreshCoveragePanel();
        renderHeader();

        showProgress('Done!', 100);
        await sleep(400);
        hideProgress();
        showSuccess(`✓ ${total} track${total !== 1 ? 's' : ''} from Listen Later added to queue.`);
      } catch (err) {
        hideProgress();
        showError(err.message || 'An unexpected error occurred.');
        if (btn) { btn.disabled = false; btn.textContent = '▶ Queue All'; }
      }

      state.isWorking = false;
    }
    function pickRandom(arr, k) {
      const copy = [...arr];
      for (let i = 0; i < k; i++) {
        const j = i + Math.floor(Math.random() * (copy.length - i));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy.slice(0, k);
    }

    /**
     * Replace the album at `index` in state.selectedAlbums with a new random
     * pick from the filtered pool (excluding all currently selected albums).
     * Animates the old item out and the new one in.
     */
    function rerollAlbum(index) {
      const pool     = applyFilters(allAlbums);
      const usedIds  = new Set(state.selectedAlbums.map(a => a.id));
      const candidates = pool.filter(a => !usedIds.has(a.id));

      if (candidates.length === 0) {
        // No more candidates — flash the button to indicate failure
        const btn = document.querySelector(`.reroll-btn[data-reroll="${index}"]`);
        if (btn) { btn.textContent = '✕'; setTimeout(() => btn.textContent = '↻', 800); }
        return;
      }

      const newAlbum = pickRandom(candidates, 1)[0];
      state.selectedAlbums[index] = newAlbum;

      // Animate: slide old item out, then replace DOM and slide new one in
      const itemEl = document.querySelector(`.album-item[data-idx="${index}"]`);
      if (!itemEl) { renderAlbumList(state.selectedAlbums); return; }

      itemEl.classList.add('swipe-exit');
      setTimeout(() => {
        const a       = newAlbum;
        const imgUrl  = a.images?.[0]?.url || '';
        const imgEl   = imgUrl
          ? `<img class="album-art" src="${imgUrl}" alt="" loading="lazy">`
          : `<div class="album-art-placeholder">🎵</div>`;
        const artists = (a.artists || []).map(x => x.name).join(', ');
        const dur     = albumDurMin(a).toFixed(0);
        const tracks  = a.tracks?.total || '?';
        const genres  = (a._genres || []).slice(0, 3).join(' · ');
        const addedLabel = formatAddedAt(a._added_at);
        const bookmarked = isInListenLater(a.id);

        itemEl.outerHTML = `
          <div class="album-item swipe-enter" data-idx="${index}" data-id="${escHtml(a.id)}">
            <span class="album-num" style="font-family:var(--font-mono);">${index + 1}</span>
            ${imgEl}
            <div class="album-info">
              <div class="album-name">${escHtml(a.name)}</div>
              <div class="album-artist">${escHtml(artists)}</div>
              ${genres ? `<div style="font-size:10px;color:var(--text-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(genres)}</div>` : ''}
              ${addedLabel ? `<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">${escHtml(addedLabel)}</div>` : ''}
            </div>
            <div class="album-meta" style="font-family:var(--font-mono);">
              <div>${tracks} tracks</div>
              <div>${dur} min</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
              <button class="bookmark-btn${bookmarked ? ' saved' : ''}" data-bookmark="${index}"
                title="${bookmarked ? 'In Listen Later' : 'Für später merken'}" aria-label="Listen Later">🔖</button>
              <button class="reroll-btn" data-reroll="${index}" title="Swap this album" aria-label="Swap album">↻</button>
            </div>
          </div>`;

        const newItemEl = document.querySelector(`.album-item[data-idx="${index}"]`);
        if (newItemEl) _attachItemEvents(newItemEl);
      }, 220);
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── UI HELPERS ───────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    function showProgress(text, pct) {
      const wrap = document.getElementById('progressWrap');
      if (!wrap) return;
      wrap.classList.add('visible');
      document.getElementById('progressText').textContent = text;
      const pctEl = document.getElementById('progressPct');
      if (pctEl && pct !== undefined) pctEl.textContent = Math.min(100, Math.round(pct)) + '%';
      const fill = document.getElementById('progressFill');
      if (fill && pct !== undefined) fill.style.width = Math.min(100, pct) + '%';
      const btn = document.getElementById('queueBtn');
      if (btn) btn.disabled = true;
    }

    function hideProgress() {
      const wrap = document.getElementById('progressWrap');
      if (wrap) wrap.classList.remove('visible');
      const btn = document.getElementById('queueBtn');
      if (btn) btn.disabled = false;
    }

    function showSuccess(msg) {
      const el = document.getElementById('statusArea');
      if (!el) return;
      el.className = 'status-area success';
      el.textContent = msg;
    }

    function showError(msg) {
      const el = document.getElementById('statusArea');
      if (el) {
        el.className = 'status-area error';
        el.textContent = msg;
      } else {
        // Fallback: use the global status div (shown on login screen)
        const gs = document.getElementById('globalStatus');
        if (gs) { gs.className = 'show error'; gs.textContent = msg; }
      }
    }

    function clearStatus() {
      const el = document.getElementById('statusArea');
      if (el) { el.className = 'status-area'; el.textContent = ''; }
      const list = document.getElementById('albumList');
      if (list) list.innerHTML = '';
    }

    /**
     * Extract genres from queued albums and store as session context.
     * Picks the top genres by frequency across all albums in the session.
     * Called after every successful queue operation.
     */
    function _updateSessionGenres(albums) {
      const freq = new Map();
      for (const a of albums) {
        for (const g of (a._genres || [])) {
          freq.set(g, (freq.get(g) || 0) + 1);
        }
      }
      // Keep top 8 genres by frequency
      state.sessionGenres = [...freq.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, 8)
        .map(([g]) => g);
      updateSessionGenreTags();
    }

    /** Update the session genre tags display in the footer. */
    function updateSessionGenreTags() {
      const wrap = document.getElementById('sessionGenreTags');
      if (!wrap) return;
      if (!state.filters.keepGenreContext || state.sessionGenres.length === 0) {
        wrap.style.display = 'none';
        return;
      }
      wrap.style.display = 'flex';
      wrap.innerHTML = state.sessionGenres
        .map(g => `<span class="session-genre-tag">${escHtml(g)}</span>`)
        .join('');
    }

    function renderAlbumList(albums) {
      const list = document.getElementById('albumList');
      if (!list || !albums.length) return;

      const labelDiv = `<div class="section-label" style="margin-bottom:8px;">Selected albums · swipe left to swap · long-press to ban</div>`;
      const items = albums.map((a, i) => {
        const imgUrl  = a.images?.[0]?.url || '';
        const imgEl   = imgUrl
          ? `<img class="album-art" src="${imgUrl}" alt="" loading="lazy">`
          : `<div class="album-art-placeholder">🎵</div>`;
        const artists = (a.artists || []).map(x => x.name).join(', ');
        const dur     = albumDurMin(a).toFixed(0);
        const tracks  = a.tracks?.total || '?';
        const genres  = (a._genres || []).slice(0, 3).join(' · ');
        const addedLabel = formatAddedAt(a._added_at);
        const bookmarked = isInListenLater(a.id);

        return `
          <div class="album-item" style="animation-delay:${i * 60}ms" data-idx="${i}" data-id="${escHtml(a.id)}">
            <span class="album-num" style="font-family:var(--font-mono);">${i + 1}</span>
            ${imgEl}
            <div class="album-info">
              <div class="album-name">${escHtml(a.name)}</div>
              <div class="album-artist">${escHtml(artists)}</div>
              ${genres ? `<div style="font-size:10px;color:var(--text-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(genres)}</div>` : ''}
              ${addedLabel ? `<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">${escHtml(addedLabel)}</div>` : ''}
            </div>
            <div class="album-meta" style="font-family:var(--font-mono);">
              <div>${tracks} tracks</div>
              <div>${dur} min</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
              <button class="bookmark-btn${bookmarked ? ' saved' : ''}" data-bookmark="${i}"
                title="${bookmarked ? 'In Listen Later' : 'Für später merken'}" aria-label="Listen Later">🔖</button>
              <button class="reroll-btn" data-reroll="${i}" title="Swap this album" aria-label="Swap album">↻</button>
            </div>
          </div>`;
      }).join('');

      const queueBtn = `
        <button class="btn btn-primary" id="queueSelectedBtn">
          ▶ Queue These Albums
        </button>`;

      list.innerHTML = labelDiv + `<div class="album-list" id="albumListInner">${items}</div>` + queueBtn;

      // Attach all per-item events (reroll, swipe, bookmark, long-press ban)
      list.querySelectorAll('.album-item').forEach(item => _attachItemEvents(item));

      // Queue Selected button
      document.getElementById('queueSelectedBtn').addEventListener('click', queueSelected);
    }

    /**
     * Attach reroll, swipe, bookmark, and long-press-ban events to one album card.
     * Extracted to avoid duplication between renderAlbumList and rerollAlbum.
     */
    function _attachItemEvents(item) {
      const idx = +item.dataset.idx;

      // ── Reroll button ─────────────────────────────────────────────────
      item.querySelector('.reroll-btn')?.addEventListener('click', () => {
        if (state.isWorking) return;
        rerollAlbum(idx);
      });

      // ── Bookmark button ───────────────────────────────────────────────
      item.querySelector('.bookmark-btn')?.addEventListener('click', async e => {
        e.stopPropagation();
        const btn   = e.currentTarget;
        const album = state.selectedAlbums[idx];
        if (!album) return;

        if (isInListenLater(album.id)) {
          await removeFromListenLater(album.id);
          btn.classList.remove('saved');
          btn.title = 'Für später merken';
        } else {
          await addToListenLater(album);
          btn.classList.add('saved');
          btn.title = 'In Listen Later';
          btn.classList.add('pop');
          btn.addEventListener('animationend', () => btn.classList.remove('pop'), { once: true });
        }
        refreshListenLaterPanel();
      });

      // ── Long-press → Ban (600 ms hold) ────────────────────────────────
      let pressTimer = null;
      const LONG_PRESS_MS = 600;

      const startPress = () => {
        if (state.isWorking) return;
        item.classList.add('ban-priming');
        pressTimer = setTimeout(async () => {
          pressTimer = null;
          item.classList.remove('ban-priming');
          const album = state.selectedAlbums[idx];
          if (!album) return;
          await banAlbum(album);
          item.classList.add('ban-ejecting');
          item.addEventListener('animationend', () => {
            const pool = applyFilters(allAlbums);
            const usedIds = new Set(state.selectedAlbums.filter((_, i2) => i2 !== idx).map(a => a.id));
            const candidates = pool.filter(a => !usedIds.has(a.id));
            if (candidates.length > 0) {
              state.selectedAlbums[idx] = pickRandom(candidates, 1)[0];
            } else {
              state.selectedAlbums.splice(idx, 1);
            }
            renderAlbumList(state.selectedAlbums);
            // Refresh banned count in filter panel
            const n = getBannedCount();
            const note = document.querySelector('.banned-note');
            if (note) {
              note.innerHTML = n > 0
                ? `<span>${n} album${n !== 1 ? 's' : ''} gebannt</span><button class="banned-note-clear" id="clearBannedBtn">Clear</button>`
                : `<span style="opacity:.5;">Long-press auf Album → dauerhaft ausschließen</span>`;
              document.getElementById('clearBannedBtn')?.addEventListener('click', async () => {
                await clearBanned(); render();
              });
            }
          }, { once: true });
        }, LONG_PRESS_MS);
      };

      const cancelPress = () => {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        item.classList.remove('ban-priming');
      };

      item.addEventListener('mousedown',   startPress);
      item.addEventListener('touchstart',  startPress, { passive: true });
      item.addEventListener('mouseup',     cancelPress);
      item.addEventListener('mouseleave',  cancelPress);
      item.addEventListener('touchend',    cancelPress, { passive: true });
      item.addEventListener('touchcancel', cancelPress, { passive: true });

      // ── Swipe-to-reroll ────────────────────────────────────────────────
      let startX = 0, startY = 0, dragging = false;
      item.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        dragging = true;
      }, { passive: true });
      item.addEventListener('touchmove', e => {
        if (!dragging) return;
        const dx = e.touches[0].clientX - startX;
        const dy = e.touches[0].clientY - startY;
        if (Math.abs(dy) > Math.abs(dx) + 10) { dragging = false; item.classList.remove('swipe-ready'); return; }
        if (dx < 0) item.style.transform = `translateX(${dx}px)`;
        item.classList.toggle('swipe-ready', dx < -60);
      }, { passive: true });
      item.addEventListener('touchend', e => {
        if (!dragging) return;
        dragging = false;
        item.classList.remove('swipe-ready');
        const dx = e.changedTouches[0].clientX - startX;
        if (dx < -60 && !state.isWorking) rerollAlbum(idx);
        else item.style.transform = '';
      }, { passive: true });
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /** Human-readable cache age: "just now", "3 h ago", "2 days ago". */
    function formatAge(ms) {
      const s = Math.floor(ms / 1000);
      if (s < 60)   return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60)   return `${m} min ago`;
      const h = Math.floor(m / 60);
      if (h < 24)   return `${h} h ago`;
      const d = Math.floor(h / 24);
      return `${d} day${d !== 1 ? 's' : ''} ago`;
    }

    /** Human-readable "in library since" label from an ISO date string.
     *  Returns e.g. "In library for 3 years" or "Added 2 months ago". */
    function formatAddedAt(isoStr) {
      if (!isoStr) return '';
      const ms = Date.now() - new Date(isoStr).getTime();
      if (ms < 0) return '';
      const days   = Math.floor(ms / 86400000);
      const months = Math.floor(days / 30.44);
      const years  = Math.floor(days / 365.25);
      if (years >= 1)  return `In library for ${years} year${years !== 1 ? 's' : ''}`;
      if (months >= 1) return `Added ${months} month${months !== 1 ? 's' : ''} ago`;
      if (days >= 1)   return `Added ${days} day${days !== 1 ? 's' : ''} ago`;
      return 'Added today';
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── BOOT ─────────────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    (async function boot() {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      const oState = params.get('state');
      const oError = params.get('error');

      if (oError) {
        window.history.replaceState({}, '', window.location.pathname);
        render();
        showError('Spotify authorization was denied: ' + oError);
        return;
      }

      if (code && oState) {
        try {
          await handleCallback(code, oState);
        } catch (err) {
          render();
          showError(err.message);
          return;
        }
      }

      // ── One-time migration from legacy localStorage cache ─────────────
      // If the user had data in the old albumpick_library_v1 / albumpick_history_v1
      // keys, import it into IndexedDB and then remove the old keys so this
      // code path only runs once.
      await _migrateFromLocalStorage();

      // Populate in-memory historyCache + allAlbums/allGenres from IndexedDB
      // before the first render, so genre chips and history counts are correct
      // on the very first paint.
      if (isLoggedIn()) {
        await Promise.all([
          loadLibraryCache(),
          loadHistory(),
          loadBanned(),
          loadListenLater(),
        ]);

        // Request persistent storage so the browser won't evict IndexedDB data
        // under storage pressure. Non-blocking; result is logged but not required.
        if (navigator.storage && navigator.storage.persist) {
          navigator.storage.persist().then(granted => {
            if (granted) console.log('SpotifyDiscovery: persistent storage granted');
            else console.log('SpotifyDiscovery: persistent storage denied — data may be evicted');
          }).catch(() => {});
        }
      }

      render();
    })();

    /**
     * One-time migration: copy legacy localStorage data into IndexedDB.
     * Safe to call on every boot — it's a no-op if the old keys are absent.
     */
    async function _migrateFromLocalStorage() {
      try {
        // ── Library ──────────────────────────────────────────────────────
        const rawLib = localStorage.getItem('albumpick_library_v1');
        if (rawLib) {
          const parsed = JSON.parse(rawLib);
          if (parsed?.albums?.length) {
            const db = await getDb();
            // Only write if IDB is currently empty to avoid overwriting fresh data
            const existing = await db.get('library', 'main');
            if (!existing) {
              await db.put('library', {
                cachedAt: parsed.cachedAt || Date.now(),
                genres:   parsed.genres   || [],
                albums:   parsed.albums,
              }, 'main');
            }
          }
          localStorage.removeItem('albumpick_library_v1');
        }

        // ── History ───────────────────────────────────────────────────────
        const rawHist = localStorage.getItem('albumpick_history_v1');
        if (rawHist) {
          const entries = JSON.parse(rawHist);
          if (Array.isArray(entries) && entries.length) {
            const db  = await getDb();
            const tx  = db.transaction('history', 'readwrite');
            const cutoff = Date.now() - HISTORY_MAX_AGE_DAYS * 86400000;
            await Promise.all(
              entries
                .filter(e => e.queuedAt > cutoff)
                .map(e => tx.store.put({ id: e.id, name: e.name, queuedAt: e.queuedAt }))
            );
            await tx.done;
          }
          localStorage.removeItem('albumpick_history_v1');
        }
      } catch (e) {
        // Migration errors are non-fatal — old data simply won't be imported
        console.warn('SpotifyDiscovery: localStorage migration failed', e);
      }
    }
  </script>
</body>
</html>
