    // ═══════════════════════════════════════════════════════════════════════
    // ── LAST.FM MODULE ───────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    function getLastfmKey()     { return localStorage.getItem('lastfm_api_key') || ''; }
    function setLastfmKey(key)  { localStorage.setItem('lastfm_api_key', key.trim()); }

    let _lastfmMemCache = new Map(); // artistName.lower → cached record

    async function primeLastfmMemCache() {
      try {
        const db  = await getDb();
        const all = await db.getAll('lastfm_cache');
        _lastfmMemCache.clear();
        for (const rec of (all || []))
          if (rec?.artistName) _lastfmMemCache.set(rec.artistName, rec);
      } catch(e) {}
    }

    function getLastfmDataSync(artistName) {
      return _lastfmMemCache.get(artistName.toLowerCase()) || null;
    }

    async function fetchLastfmArtist(artistName) {
      const key     = getLastfmKey();
      const cacheKey = artistName.toLowerCase();
      // In-memory hit
      const mem = _lastfmMemCache.get(cacheKey);
      if (mem && Date.now() - mem.fetchedAt < LASTFM_CACHE_TTL) return mem;
      if (!key) return null;

      try {
        const [r1, r2] = await Promise.all([
          fetch(`${LASTFM_BASE}?method=artist.getTopTags&artist=${encodeURIComponent(artistName)}&api_key=${key}&format=json`),
          fetch(`${LASTFM_BASE}?method=artist.getSimilar&artist=${encodeURIComponent(artistName)}&limit=15&api_key=${key}&format=json`),
        ]);
        const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
        const topTags        = (d1.toptags?.tag  || []).slice(0, 8).map(t => t.name.toLowerCase());
        const similarArtists = (d2.similarartists?.artist || []).slice(0, 15).map(a => a.name.toLowerCase());
        const rec = { artistName: cacheKey, topTags, similarArtists, fetchedAt: Date.now() };
        _lastfmMemCache.set(cacheKey, rec);
        // Persist to IDB (fire-and-forget)
        getDb().then(db => db.put('lastfm_cache', rec, cacheKey)).catch(() => {});
        return rec;
      } catch(e) { return null; }
    }

    /**
     * Batch-fetch Last.fm data for all unique artists in the library.
     * Respects ~5 req/s rate limit via 210ms sleep.
     */
    async function fetchLastfmForLibrary(onProgress) {
      const key = getLastfmKey();
      if (!key || !allAlbums.length) return;
      const artists = new Map();
      for (const album of allAlbums)
        for (const ar of (album.artists || []))
          if (ar.id && !artists.has(ar.id)) artists.set(ar.id, ar.name);
      const entries = [...artists.values()];
      let done = 0;
      for (const name of entries) {
        await fetchLastfmArtist(name);
        done++;
        if (onProgress) onProgress(done, entries.length);
        await sleep(210);
      }
      // Attach _lastfmTags to each album
      for (const album of allAlbums) {
        const tags = new Set();
        for (const ar of (album.artists || [])) {
          const d = getLastfmDataSync(ar.name);
          if (d) for (const t of (d.topTags || [])) tags.add(t);
        }
        album._lastfmTags = [...tags];
      }
    }

    function hasLastfmData() {
      return _lastfmMemCache.size > 0;
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── SIMILARITY ENGINE ────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    function computeSimilarity(a, b) {
      let score = 0;
      const artistIdsA   = new Set((a.artists || []).map(ar => ar.id));
      const artistNamesA = new Set((a.artists || []).map(ar => ar.name.toLowerCase()));

      // Same artist (strongest signal)
      for (const ar of (b.artists || []))
        if (artistIdsA.has(ar.id)) score += 100;

      // Last.fm similar artists (bidirectional, asymmetric weight)
      for (const arA of (a.artists || [])) {
        const lfm = getLastfmDataSync(arA.name);
        if (!lfm) continue;
        for (const arB of (b.artists || []))
          if (lfm.similarArtists?.includes(arB.name.toLowerCase())) score += 40;
      }
      for (const arB of (b.artists || [])) {
        const lfm = getLastfmDataSync(arB.name);
        if (!lfm) continue;
        for (const arA of (a.artists || []))
          if (lfm.similarArtists?.includes(arA.name.toLowerCase())) score += 20;
      }

      // Shared Spotify genre tags
      const genresA = new Set(a._genres || []);
      for (const g of (b._genres || []))
        if (genresA.has(g)) score += 14;

      // Shared Last.fm tags
      const lfmTagsA = new Set(a._lastfmTags || []);
      for (const t of (b._lastfmTags || []))
        if (lfmTagsA.has(t)) score += 9;

      // Shared genre cluster
      const clustersA = new Set((a._genres || []).map(clusterOf));
      for (const g of (b._genres || []))
        if (clustersA.has(clusterOf(g))) score += 5;

      // Era proximity (max 18 pts, linear decay)
      const ya = releaseYear(a), yb = releaseYear(b);
      if (ya && yb) score += Math.max(0, 18 - Math.abs(ya - yb));

      return score;
    }

    function findSimilarAlbums(target, pool, n) {
      return pool
        .filter(a => a.id !== target.id)
        .map(a => ({ album: a, score: computeSimilarity(target, a) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, n)
        .map(x => x.album);
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── NEGLECT & PERSONALITY HELPERS ────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    function neglectScore(album) {
      const added = album._added_at ? new Date(album._added_at).getTime() : Date.now();
      const days  = Math.max(1, (Date.now() - added) / 86400000);
      const plays = historyCache.filter(e => e.id === album.id).length;
      return days / (plays + 1);
    }

    function getTopNeglected(n) {
      return [...allAlbums]
        .map(a => ({ album: a, score: neglectScore(a) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, n)
        .map(x => x.album);
    }

    function getPersonalityStats() {
      if (!historyCache.length || !allAlbums.length) return null;
      const albumMap = new Map(allAlbums.map(a => [a.id, a]));
      const decadeQ = {}, genreQ = {}, monthQ = {};
      let playedMultiple = 0;

      for (const h of historyCache) {
        const album = albumMap.get(h.id);
        if (album) {
          const d = decadeOf(releaseYear(album));
          decadeQ[d] = (decadeQ[d] || 0) + 1;
          for (const g of (album._genres || []))
            genreQ[g] = (genreQ[g] || 0) + 1;
        }
        const m = new Date(h.queuedAt).toISOString().slice(0, 7);
        monthQ[m] = (monthQ[m] || 0) + 1;
        if ((h.playCount || 1) > 1) playedMultiple++;
      }

      const favDecade = Object.entries(decadeQ).sort((a,b) => b[1]-a[1])[0]?.[0] || '—';

      const genreLib = {};
      for (const a of allAlbums)
        for (const g of (a._genres || []))
          genreLib[g] = (genreLib[g] || 0) + 1;

      const neglectedGenres = Object.entries(genreLib)
        .filter(([g, c]) => c >= 5 && (genreQ[g] || 0) < c * 0.2)
        .sort((a,b) => b[1]-a[1]).slice(0, 3).map(([g]) => g);

      const bestMonth    = Object.entries(monthQ).sort((a,b) => b[1]-a[1])[0]?.[0] || '—';
      const loyaltyPct   = Math.round(playedMultiple / historyCache.length * 100);
      const uniqueQueued = new Set(historyCache.map(h => h.id)).size;
      const explorerPct  = Math.round(uniqueQueued / historyCache.length * 100);
      const neverHeardPct= Math.round((allAlbums.length - uniqueQueued) / allAlbums.length * 100);

      return { favDecade, neglectedGenres, bestMonth, loyaltyPct, explorerPct, neverHeardPct, uniqueQueued, totalAlbums: allAlbums.length };
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── AUTH MODULE – PKCE ───────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Generate a cryptographically random URL-safe string of `len` chars. */
    function generateRandom(len = 64) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      const arr   = crypto.getRandomValues(new Uint8Array(len));
      return Array.from(arr, b => chars[b % chars.length]).join('');
    }

    /**
     * Hash the PKCE verifier with SHA-256, then base64url-encode.
     * This is the code_challenge sent to Spotify on the first leg.
     */
    async function generateChallenge(verifier) {
      const data   = new TextEncoder().encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(digest)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    /** Begin the PKCE auth flow: generate verifier → challenge → redirect. */
    async function login() {
      const verifier  = generateRandom(64);
      const challenge = await generateChallenge(verifier);
      const state     = generateRandom(16);

      localStorage.setItem('pkce_verifier', verifier);
      localStorage.setItem('pkce_state',    state);

      const params = new URLSearchParams({
        response_type:         'code',
        client_id:             CLIENT_ID,
        scope:                 SCOPES,
        redirect_uri:          REDIRECT_URI,
        state,
        code_challenge_method: 'S256',
        code_challenge:        challenge,
      });

      window.location.href = 'https://accounts.spotify.com/authorize?' + params;
    }

    /**
     * Second leg: exchange the auth code for access + refresh tokens.
     * Called once after Spotify redirects back with ?code=&state=.
     */
    async function handleCallback(code, returnedState) {
      const storedState = localStorage.getItem('pkce_state');
      if (returnedState !== storedState) throw new Error('State mismatch – possible CSRF. Please try logging in again.');

      const verifier = localStorage.getItem('pkce_verifier');

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          code,
          redirect_uri:  REDIRECT_URI,
          client_id:     CLIENT_ID,
          code_verifier: verifier,
        }),
      });

      if (!res.ok) throw new Error('Token exchange failed: ' + (await res.text()));
      storeTokens(await res.json());

      // Remove ?code=&state= from the URL so a hard-refresh doesn't re-submit
      window.history.replaceState({}, '', window.location.pathname);
    }

    /**
     * Silently refresh the access token using the stored refresh token.
     * Spotify may return a new refresh_token; if so we store it.
     * Note: Spotify's PKCE refresh tokens can expire after extended inactivity;
     * if refresh fails we clear state and ask the user to log in again.
     */
    async function refreshAccessToken() {
      const refreshToken = localStorage.getItem('spotify_refresh_token');
      if (!refreshToken) throw new Error('No refresh token – please log in.');

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'refresh_token',
          refresh_token: refreshToken,
          client_id:     CLIENT_ID,
        }),
      });

      if (!res.ok) {
        logout();
        throw new Error('Session expired – please log in again.');
      }
      storeTokens(await res.json());
    }

    /** Persist tokens; subtract 60 s from expires_in as a safety buffer. */
    function storeTokens({ access_token, refresh_token, expires_in }) {
      localStorage.setItem('spotify_access_token', access_token);
      if (refresh_token) localStorage.setItem('spotify_refresh_token', refresh_token);
      localStorage.setItem('spotify_expires_at', String(Date.now() + (expires_in - 60) * 1000));
    }

    /** Return a valid access token, refreshing if needed. */
    async function getAccessToken() {
      if (Date.now() > Number(localStorage.getItem('spotify_expires_at') || 0)) {
        await refreshAccessToken();
      }
      return localStorage.getItem('spotify_access_token');
    }

    function isLoggedIn() {
      return !!localStorage.getItem('spotify_refresh_token');
    }

    async function logout() {
      stopLibraryRadio();
      ['spotify_access_token', 'spotify_refresh_token', 'spotify_expires_at',
       'pkce_verifier', 'pkce_state'].forEach(k => localStorage.removeItem(k));
      // Intentionally NOT clearing library cache or play history —
      // data survives logout so it's available immediately after re-login.
      // Use deleteAllData() for a full wipe.
      allAlbums = [];
      allGenres = [];
      state.cachedAt = null;
      render();
    }

    /** Full data wipe: clears tokens, library cache, AND play history. */
    async function deleteAllData() {
      ['spotify_access_token', 'spotify_refresh_token', 'spotify_expires_at',
       'pkce_verifier', 'pkce_state'].forEach(k => localStorage.removeItem(k));
      await clearLibraryCache();
      await clearHistory();
      allAlbums = [];
      allGenres = [];
      state.cachedAt = null;
      render();
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── SPOTIFY API MODULE ───────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Authenticated GET; throws on non-2xx. */
    async function apiGet(url) {
      const token = await getAccessToken();
      const res   = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(`Spotify API ${res.status}: ${body || res.statusText}`);
      }
      return res.json();
    }

    /**
     * Fetch every saved album from /v1/me/albums.
     * The API returns max 50 per page; we follow `next` until null.
     * `onProgress(loaded, total)` is called after each page.
     */
    async function fetchAllAlbums(onProgress) {
      const albums = [];
      let url = 'https://api.spotify.com/v1/me/albums?limit=50&market=from_token';

      while (url) {
        const data = await apiGet(url);
        for (const item of data.items) {
          const album = item.album;
          // added_at lives on the item wrapper, NOT on the album object itself.
          // Spotify's /me/albums response wraps each album in { added_at, album: {...} }.
          // We attach it before pushing so slimAlbum() can persist it.
          album._added_at = item.added_at || null;
          albums.push(album);
        }
        url = data.next;   // null on the last page
        onProgress(albums.length, data.total);
      }
      return albums;
    }

    /**
     * Batch-fetch artist objects (max 50 per request) to read their genre tags.
     * Spotify does NOT expose genres on album objects — they live on the artist.
     * After this call every album in `albums` gets a `_genres` string[] property
     * containing the union of genres from all of its artists.
     * Returns a sorted, deduplicated array of every genre found in the library.
     */
    async function fetchArtistGenres(albums, onProgress) {
      // Collect every unique artist ID referenced across the library
      const idSet = new Set();
      for (const a of albums)
        for (const ar of (a.artists || []))
          if (ar.id) idSet.add(ar.id);

      const ids = [...idSet];
      const genreMap = new Map();   // artistId → string[]
      const BATCH = 50;

      for (let i = 0; i < ids.length; i += BATCH) {
        const batch = ids.slice(i, i + BATCH);
        // GET /v1/artists?ids=id1,id2,... returns up to 50 artist objects
        const data = await apiGet(
          'https://api.spotify.com/v1/artists?ids=' + batch.join(',')
        );
        for (const artist of (data.artists || []))
          if (artist) genreMap.set(artist.id, artist.genres || []);

        onProgress(Math.min(i + BATCH, ids.length), ids.length);
      }

      // Attach a _genres field to each album and collect the global genre set
      const globalSet = new Set();
      for (const album of albums) {
        const ag = new Set();
        for (const ar of (album.artists || []))
          for (const g of (genreMap.get(ar.id) || []))
            { ag.add(g); globalSet.add(g); }
        album._genres = [...ag];
      }

      return [...globalSet].sort();
    }

    /**, including extra pages when total > 50.
     * The /me/albums response embeds up to 50 tracks inline; albums with
     * more (rare but real) require extra requests to /v1/albums/{id}/tracks.
     */
    async function getAlbumTracks(album) {
      let items = album.tracks?.items || [];
      let next  = album.tracks?.next;           // present when total > 50

      while (next) {
        // Fetch the next page of tracks for this album
        const data = await apiGet(next);
        items = items.concat(data.items);
        next  = data.next;
      }
      return items;
    }

    /**
     * Add a single track URI to the user's active playback queue.
     * Spotify returns 204 on success, 404 when no active device is found.
     * The Spotify browser client may need longer delays between calls to
     * avoid 429 rate-limiting; the footer toggle controls this.
     */
    async function addToQueue(uri) {
      const token = await getAccessToken();
      const res   = await fetch(
        `https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(uri)}`,
        { method: 'POST', headers: { Authorization: 'Bearer ' + token } }
      );
      if (res.status === 404) throw new Error('No active Spotify device found. Start playing something first, then try again.');
      if (res.status === 429) throw new Error('Rate limited by Spotify. Enable "Browser client mode" in the footer for slower (safer) queuing.');
      if (!res.ok && res.status !== 204) throw new Error(`Queue error ${res.status}`);
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));


    // ═══════════════════════════════════════════════════════════════════════
    // ── FILTER MODULE ────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Parse the 4-digit year from Spotify's "YYYY", "YYYY-MM", or "YYYY-MM-DD". */
    function releaseYear(album) {
      return parseInt((album.release_date || '').slice(0, 4), 10) || 0;
    }

    /** Map a year to its decade string, e.g. 1983 → "80s", 1965 → "pre-70s". */
    function decadeOf(year) {
      if (year < 1970) return 'pre-70s';
      const base = Math.floor(year / 10) * 10;
      return String(base).slice(2) + 's';
    }

    /**
     * Sum duration of all inline tracks in minutes.
     * Tracks beyond 50 are not included here (they're fetched lazily at queue time),
     * so the slider filter is approximate for very long albums.
     */
    function albumDurMin(album) {
      return (album.tracks?.items || []).reduce((s, t) => s + (t.duration_ms || 0), 0) / 60000;
    }

    /**
     * Apply all active filters with AND logic.
     * Returns the subset of `albums` that passes every enabled filter.
     */
    function applyFilters(albums) {
      // Pre-compute recent IDs once per call (only when filter is active).
      const recentIds = state.filters.avoidRecent ? getRecentIds() : null;

      // Pre-compute history map for queueHistory + SR filters
      const historyMap = ((state.filters.queueHistory && state.filters.queueHistory !== 'any') || state.filters.srDueOnly)
        ? getHistoryMap() : null;
      const now = Date.now();

      // Pre-compute SR due map
      const srDueMap = state.filters.srDueOnly
        ? new Map(historyCache.map(e => [e.id, e.nextDue || computeNextDue(e.queuedAt, e.playCount || 1)]))
        : null;

      return albums.filter(album => {

        // ── Spaced Repetition "Due Today" ─────────────────────────────
        if (srDueMap) {
          const due = srDueMap.get(album.id);
          if (due === undefined || due > now) return false;
        }

        // ── Decade (include + exclude, Roon-style inversion) ─────────────
        // Include list: if non-empty, album decade must be in it.
        // Exclude list: album decade must NOT be in it (inverted/red chips).
        const d = decadeOf(releaseYear(album));
        if (state.filters.decades.length > 0 && !state.filters.decades.includes(d)) return false;
        if (state.filters.decadesExcluded.length > 0 && state.filters.decadesExcluded.includes(d)) return false;

        // ── Keyword (checked against album title) ────────────────────
        if (state.filters.excludeKeywords) {
          const low = (album.name || '').toLowerCase();
          if (BLOCKLIST_KEYWORDS.some(kw => low.includes(kw))) return false;
        }

        // ── Duration ─────────────────────────────────────────────────
        const dur = albumDurMin(album);
        if (dur < state.filters.minDurMin || dur > state.filters.maxDurMin) return false;

        // ── Genre (OR within cluster, AND between clusters) ────────────
        // If genres selected: album must match ≥1 genre from EACH cluster
        // that has selected genres (Roon-style Boolean: OR within, AND between).
        if (state.filters.genres.length > 0) {
          const ag = new Set([...(album._genres || []), ...(album._lastfmTags || [])]);
          // Group selected genres by cluster
          const selByCluster = {};
          for (const g of state.filters.genres) {
            const c = clusterOf(g);
            if (!selByCluster[c]) selByCluster[c] = [];
            selByCluster[c].push(g);
          }
          // Album must match ≥1 genre from EACH represented cluster
          for (const [, clusterGenres] of Object.entries(selByCluster)) {
            if (!clusterGenres.some(g => ag.has(g))) return false;
          }
        }

        // ── Age ("added to library at least N months ago") ─────────────
        if (state.filters.minAgeMonths > 0) {
          const addedMs  = album._added_at ? new Date(album._added_at).getTime() : 0;
          const cutoffMs = now - state.filters.minAgeMonths * 30 * 24 * 60 * 60 * 1000;
          if (addedMs > cutoffMs) return false;  // added too recently → skip
        }

        // ── Avoid recently queued ─────────────────────────────────────
        if (state.filters.avoidRecent && recentIds && recentIds.has(album.id)) return false;

        // ── Queue History Filter (Roon-style Discovery: never/6m/1yr) ─
        // Inspired by Roon's Focus "Played in the last X" with inversion:
        // allows picking albums you've never heard or haven't heard in a while.
        if (historyMap) {
          const lastHeard = historyMap.get(album.id);
          if (state.filters.queueHistory === 'never') {
            if (lastHeard) return false; // album has been queued before → skip
          } else if (state.filters.queueHistory === '6m') {
            if (lastHeard && (now - lastHeard < 180 * 86400000)) return false;
          } else if (state.filters.queueHistory === '1yr') {
            if (lastHeard && (now - lastHeard < 365 * 86400000)) return false;
          }
        }

        return true;
      });
    }

    // ── APPLICATION STATE ────────────────────────────────────────────────

    let allAlbums = [];

      radioIntervalId:   null,

    // ── Session filter persistence ─────────────────────────────────────────
    // Saves filter state + UI prefs to sessionStorage so they survive reloads
    // within the same session (inspired by Roon's Bookmark feature).
    function saveFiltersToSession() {
      try {
        sessionStorage.setItem('albumpick_session_filters', JSON.stringify({
          filters:      state.filters,
          albumCount:   state.albumCount,
          albumSort:    state.albumSort,
          activePreset: state.activePreset,
          activeBookmark: state.activeBookmark,
          filterOpen:   state.filterOpen,
          filterSections: state.filterSections,
          journeyOpen:  state.journeyOpen,
          journeyTab:   state.journeyTab,
          settingsOpen: state.settingsOpen,
        }));
      } catch(e) {}
    }

    function restoreFiltersFromSession() {
      try {
        const raw = sessionStorage.getItem('albumpick_session_filters');
        if (!raw) return;
        const saved = JSON.parse(raw);
        if (saved.filters)        Object.assign(state.filters, saved.filters);
        if (saved.albumCount)     state.albumCount = saved.albumCount;
        if (saved.albumSort)      state.albumSort  = saved.albumSort;
        if (saved.activePreset  !== undefined) state.activePreset   = saved.activePreset;
        if (saved.activeBookmark !== undefined) state.activeBookmark = saved.activeBookmark;
        if (saved.filterOpen    !== undefined) state.filterOpen     = saved.filterOpen;
        if (saved.filterSections) Object.assign(state.filterSections, saved.filterSections);
        if (saved.journeyOpen   !== undefined) state.journeyOpen    = saved.journeyOpen;
        if (saved.journeyTab)     state.journeyTab  = saved.journeyTab;
        if (saved.settingsOpen  !== undefined) state.settingsOpen   = saved.settingsOpen;
      } catch(e) {}
    }

    function applyPreset(name) {
      // Reset SR flag on all presets unless it's duetoday
      const resetBase = () => {
        state.filters.decades = []; state.filters.decadesExcluded = [];
        state.filters.genres = []; state.filters.excludeKeywords = false;
        state.filters.minAgeMonths = 0; state.filters.avoidRecent = false;
        state.filters.weightUnheard = false; state.filters.minDurMin = 0;
        state.filters.maxDurMin = 200; state.filters.queueHistory = 'any';
        state.filters.srDueOnly = false;
      };
      if (name === 'surprise') {
        resetBase();
        state.activePreset = 'surprise';
      } else if (name === 'forgotten') {
        resetBase();
        state.filters.excludeKeywords = true;
        state.filters.minAgeMonths    = 12;
        state.filters.weightUnheard   = true;
        state.filters.queueHistory    = 'never';
        state.activePreset = 'forgotten';
      } else if (name === 'deepcuts') {
        resetBase();
        state.filters.decades         = ['70s', '80s', '90s', '00s'];
        state.filters.excludeKeywords = true;
        state.filters.minAgeMonths    = 6;
        state.filters.queueHistory    = '6m';
        state.activePreset = 'deepcuts';
      } else if (name === 'duetoday') {
        resetBase();
        state.filters.srDueOnly       = true;
        state.activePreset = 'duetoday';
      }
      state.activeBookmark = null;
      render();
      updateStatsChip();
      saveFiltersToSession();
    }

    // ── Sort selected albums ───────────────────────────────────────────────
    // Applied in renderAlbumList only — does not affect the pool or state.selectedAlbums order.
    function sortAlbums(albums) {
      const sorted = [...albums];
      switch (state.albumSort) {
        case 'release':
          return sorted.sort((a, b) => releaseYear(a) - releaseYear(b));
        case 'added':
          return sorted.sort((a, b) => {
            const da = a._added_at ? new Date(a._added_at).getTime() : 0;
            const db = b._added_at ? new Date(b._added_at).getTime() : 0;
            return da - db; // oldest additions first
          });
        case 'duration':
          return sorted.sort((a, b) => albumDurMin(a) - albumDurMin(b));
        default:
          return sorted; // 'pick' = original random order
      }
    }

                    <span class="toggle-track"></span>
                  </label>
                </div>
                <!-- Queue History filter — Roon Focus "Played in last X" equivalent -->
                <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
                  <div style="font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-mid);font-weight:700;margin-bottom:8px;">Queue History${totalHistoryCount > 0 ? ` <span style="font-weight:400;text-transform:none;letter-spacing:0;">· ${totalHistoryCount} album${totalHistoryCount !== 1 ? 's' : ''} tracked</span>` : ''}</div>
                  <div class="queue-history-grid">
                    ${[
                      { val: 'any',   label: 'Any time' },
                      { val: 'never', label: 'Never queued' },
                      { val: '6m',    label: 'Not in 6 months' },
                      { val: '1yr',   label: 'Not in 1 year' },
                    ].map(o => `
                      <div class="qh-chip">
                        <input type="radio" name="queueHistory" id="qh_${o.val}" value="${o.val}"
                          ${state.filters.queueHistory === o.val ? 'checked' : ''}>
                        <label for="qh_${o.val}">${o.label}</label>
                      </div>`).join('')}
                  </div>
                </div>
              </div>
            </div>

            <div class="filter-section" data-filter="duration">
              <div class="filter-section-header">
                <span class="filter-label">Album Duration</span>
                <span class="filter-section-arrow ${state.filterSections.duration ? 'open' : ''}">▼</span>
              </div>
              <div class="filter-section-body ${state.filterSections.duration ? 'open' : ''}">
                <div class="slider-row">
                  <div class="slider-values">
                    Min: <b id="minDurVal">${state.filters.minDurMin}</b> <span style="font-family:var(--font-mono);">min</span>
                    &nbsp;·&nbsp;
                    Max: <b id="maxDurVal">${state.filters.maxDurMin}</b> <span style="font-family:var(--font-mono);">min</span>
                  </div>
                  <div class="range-wrap">
                    <input type="range" id="minDur" min="0" max="200" step="5"
                      value="${state.filters.minDurMin}" aria-label="Minimum duration">
                    <input type="range" id="maxDur" min="0" max="200" step="5"
                      value="${state.filters.maxDurMin}" aria-label="Maximum duration">
                  </div>
                </div>
              </div>
            </div>

            <div class="stats-chip ${libraryLoaded ? 'visible' : ''}" id="statsChip">
              ${libraryLoaded ? allAlbums.length + ' albums in library · ' + applyFilters(allAlbums).length + ' match current filters' : ''}
            </div>
          </div>
        </div>

        <!-- Library Coverage panel -->
        <div class="card">
          <div class="collapse-header" id="coverageToggle">
            <span class="collapse-title">Library Overview</span>
            <span class="collapse-arrow ${state.coverageOpen ? 'open' : ''}" id="coverageArrow">▼</span>
          </div>
          <div class="collapse-body ${state.coverageOpen ? 'open' : ''}" id="coverageBody">
            ${buildCoverageHTML()}
          </div>
        </div>

        <!-- Journeys card -->
        <div class="card">
          <div class="collapse-header" id="journeyToggle">
            <span class="collapse-title">Listening Journeys</span>
            <span class="collapse-arrow ${state.journeyOpen ? 'open' : ''}" id="journeyArrow">▼</span>
          </div>
          <div class="collapse-body ${state.journeyOpen ? 'open' : ''}" id="journeyBody">
            ${buildJourneysHTML()}
          </div>
        </div>

        <!-- Settings card (Last.fm + Radio) -->
        <div class="card">
          <div class="collapse-header" id="settingsToggle">
            <span class="collapse-title">Settings &amp; Integrations</span>
            <span class="collapse-arrow ${state.settingsOpen ? 'open' : ''}" id="settingsArrow">▼</span>
          </div>
          <div class="collapse-body ${state.settingsOpen ? 'open' : ''}" id="settingsBody">
            ${buildSettingsHTML()}
          </div>
        </div>

        <!-- Action row -->
        <div class="action-row">
          <div class="count-selector" id="countSelector">${countBtns}</div>
          <button class="btn btn-primary" id="queueBtn"
            ${state.isWorking ? 'disabled' : ''}>${queueLabel}</button>
        </div>

        <!-- Progress -->
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-meta">
            <span id="progressText">Loading…</span>
            <span id="progressPct"></span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
        </div>

        <!-- Status -->
        <div class="status-area" id="statusArea"></div>

        <!-- Selected albums (with inline Queue button) -->
        <div id="albumList"></div>
      `;

      attachEvents();
    }

    /**
     * Build the HTML for the genre filter section using collapsible cluster accordions.
     * Each cluster (Rock, Electronic, etc.) has:
     *   - A toggle zone (left ~80%) that opens/closes the cluster
     *   - An "All +" button (right ~20%) that selects all subgenres at once
     * Subgenres with fewer than MIN_GENRE_ALBUMS albums are hidden (always show if selected).
     * Clusters with ≥1 selected genre start open so the user sees their active filters.
     */
    const MIN_GENRE_ALBUMS = 5; // minimum albums a genre must have to appear as a chip

    function buildGenreFilterHTML() {
      if (!allAlbums.length) {
        return `<div class="genre-empty">Load your library first — genres will appear here.</div>`;
      }
      if (state.genresLoading) {
        return `<div class="genre-loading">Fetching artist genres…</div>`;
      }
      if (!allGenres.length) {
        return `<div class="genre-empty">No genre data found for your library.</div>`;
      }

      // Count how many albums carry each genre tag
      const genreAlbumCount = {};
      for (const album of allAlbums)
        for (const g of (album._genres || []))
          genreAlbumCount[g] = (genreAlbumCount[g] || 0) + 1;

      // Group genres into clusters; filter to ≥ MIN_GENRE_ALBUMS (always keep selected)
      const sel = state.filters.genres;
      const clusterMap = new Map(GENRE_CLUSTERS.map(c => [c.id, { ...c, genres: [] }]));
      clusterMap.set('other', { id: 'other', label: 'Other', icon: '🏷', genres: [] });
      for (const g of allGenres) {
        const count = genreAlbumCount[g] || 0;
        if (count >= MIN_GENRE_ALBUMS || sel.includes(g)) {
          clusterMap.get(clusterOf(g)).genres.push(g);
        }
      }

      // Selected summary bar
      const selectedBar = sel.length === 0 ? '' : `
        <div class="genre-selected-bar visible" id="genreSelectedBar">
          ${sel.map(g => `
            <span class="genre-selected-pill" data-remove="${escHtml(g)}">
              ${escHtml(g)}<span class="genre-selected-pill-x">×</span>
            </span>`).join('')}
          <button class="genre-clear-all" id="genreClearAll" type="button">Clear all</button>
        </div>`;

      // Build cluster accordions (skip clusters with no visible genres)
      const clusters = [...clusterMap.values()].filter(c => c.genres.length > 0);
      const lanes = clusters.map(c => {
        const selInCluster  = c.genres.filter(g => sel.includes(g));
        const selCount      = selInCluster.length;
        const allSelected   = selCount === c.genres.length && c.genres.length > 0;
        const someSelected  = selCount > 0 && !allSelected;
        // Start open if any genre in this cluster is selected
        const isOpen        = selCount > 0;

        const allBtnClass   = allSelected ? 'genre-cluster-all all-selected'
                            : someSelected ? 'genre-cluster-all some-selected'
                            : 'genre-cluster-all';
        const allBtnLabel   = allSelected ? '✓ Alle' : '+ Alle';

        const chips = c.genres.map(g => {
          const count      = genreAlbumCount[g] || 0;
          const isSelected = sel.includes(g);
          return `<button class="glchip${isSelected ? ' selected' : ''}" data-genre="${escHtml(g)}" title="${count} albums">${escHtml(g)}</button>`;
        }).join('');

        return `
          <div class="genre-cluster" data-cluster="${c.id}">
            <div class="genre-cluster-header">
              <div class="genre-cluster-toggle" data-cluster-toggle="${c.id}">
                <span class="genre-cluster-arrow${isOpen ? ' open' : ''}">▼</span>
                <span class="genre-cluster-icon">${c.icon}</span>
                <span class="genre-cluster-label">${c.label}</span>
                <span class="genre-cluster-badge${selCount ? ' visible' : ''}" id="badge_${c.id}">${selCount}</span>
              </div>
              <button class="${allBtnClass}" data-cluster-all="${c.id}" id="allbtn_${c.id}"
                title="${allSelected ? 'Deselect all ' + c.label : 'Select all ' + c.label} genres">
                ${allBtnLabel}
              </button>
            </div>
            <div class="genre-cluster-body${isOpen ? ' open' : ''}" id="body_${c.id}">
              <div class="genre-cluster-chips" id="lane_${c.id}">${chips}</div>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="genre-search-wrap">
          <span class="genre-search-icon">⌕</span>
          <input class="genre-search" type="search" id="genreSearch"
            placeholder="Search genres…" autocomplete="off" autocorrect="off"
            spellcheck="false" value="">
          <button class="genre-search-clear" id="genreSearchClear" type="button" aria-label="Clear search">×</button>
        </div>
        <div id="genreSearchResults" style="display:none;"></div>
        ${selectedBar}
        <div class="genre-lanes" id="genreLanes">${lanes}</div>`;
    }

    /** Re-render only the genre panel contents without rebuilding the whole UI. */
    function refreshGenrePanel() {
      const section = document.getElementById('genreFilterSection');
      if (!section) return;
      // Only replace the body content within the sub-accordion, not the header
      const body = section.querySelector('.filter-section-body');
      if (body) {
        body.innerHTML = buildGenreFilterHTML();
      } else {
        // Fallback if sub-accordion structure not yet rendered
        section.innerHTML = buildGenreFilterHTML();
      }
      attachGenreEvents();
    }

    /**
     * Build the HTML for the Library Coverage panel.
     * Shows % of library ever queued via AlbumPick + three stat rows
     * with CTAs that pre-filter the pick to unheard / long-ago albums.
     */
    function buildCoverageHTML() {
      if (!allAlbums.length) {
        return `<div class="coverage-empty">Load your library first — the overview will appear here.</div>`;
      }

      const s   = getCoverageStats();
      const bar = Math.max(2, s.coveragePct);

      // ── Decade distribution (Roon library view inspiration) ───────────
      const decades = ['pre-70s','70s','80s','90s','00s','10s','20s'];
      const decadeCount = {};
      for (const album of allAlbums) {
        const d = decadeOf(releaseYear(album));
        decadeCount[d] = (decadeCount[d] || 0) + 1;
      }
      const maxDecadeCount = Math.max(...Object.values(decadeCount), 1);

      // ── Top 5 genres by album count ───────────────────────────────────
      const genreCount = {};
      for (const album of allAlbums)
        for (const g of (album._genres || []))
          genreCount[g] = (genreCount[g] || 0) + 1;
      const topGenres = Object.entries(genreCount)
        .sort((a,b) => b[1] - a[1]).slice(0, 5);
      const maxGenreCount = topGenres[0]?.[1] || 1;

      // ── Library freshness: when albums were added to Spotify library ──
      const oneYearAgo   = Date.now() - 365  * 86400000;
      const threeYearsAgo = Date.now() - 3 * 365 * 86400000;
      let fresh = 0, medium = 0, old = 0;
      for (const album of allAlbums) {
        const added = album._added_at ? new Date(album._added_at).getTime() : 0;
        if      (added > oneYearAgo)    fresh++;
        else if (added > threeYearsAgo) medium++;
        else                            old++;
      }
      const total = allAlbums.length;
      const freshPct  = Math.round(fresh  / total * 100);
      const mediumPct = Math.round(medium / total * 100);
      const oldPct    = Math.max(0, 100 - freshPct - mediumPct);

      return `
        <div class="coverage-top">
          <span class="coverage-pct">${s.coveragePct}%</span>
          <span class="coverage-pct-label">queued via AlbumPick</span>
        </div>
        <div class="coverage-bar-bg">
          <div class="coverage-bar-fill" style="width:${bar}%"></div>
        </div>

        <div class="coverage-stat-row">
          <div class="coverage-stat-info">
            <span class="coverage-stat-icon">○</span>
            <div class="coverage-stat-text">
              <div class="coverage-stat-label">${s.neverHeard} never played</div>
              <div class="coverage-stat-sub">Never queued via AlbumPick</div>
            </div>
          </div>
          ${s.neverHeard > 0
            ? `<button class="btn-coverage" data-coverage="unheard">Play now →</button>`
            : `<span style="font-size:10px;color:var(--green);">✓ all heard</span>`}
        </div>

        <div class="coverage-stat-row">
          <div class="coverage-stat-info">
            <span class="coverage-stat-icon">◑</span>
            <div class="coverage-stat-text">
              <div class="coverage-stat-label">${s.longAgo} not heard in 6+ months</div>
              <div class="coverage-stat-sub">Last played over 6 months ago</div>
            </div>
          </div>
          ${s.longAgo > 0
            ? `<button class="btn-coverage" data-coverage="longAgo">Play now →</button>`
            : `<span style="font-size:10px;color:var(--text-dim);">–</span>`}
        </div>

        <div class="coverage-stat-row">
          <div class="coverage-stat-info">
            <span class="coverage-stat-icon">●</span>
            <div class="coverage-stat-text">
              <div class="coverage-stat-label">${s.recent} played in last 6 months</div>
              <div class="coverage-stat-sub">Recently queued via AlbumPick</div>
            </div>
          </div>
        </div>

        <!-- ── Library Breakdown: Decade Distribution ── -->
        ${decades.some(d => decadeCount[d]) ? `
        <div class="overview-section">
          <div class="overview-title">Decade Distribution</div>
          ${decades.map(d => {
            const count = decadeCount[d] || 0;
            if (!count) return '';
            const pct = Math.max(3, Math.round(count / maxDecadeCount * 100));
            return `
              <div class="decade-bar-row">
                <span class="decade-bar-label">${d}</span>
                <div class="decade-bar-track">
                  <div class="decade-bar-fill" style="width:${pct}%"></div>
                </div>
                <span class="decade-bar-count">${count}</span>
              </div>`;
          }).join('')}
        </div>` : ''}

        <!-- ── Library Breakdown: Top Genres ── -->
        ${topGenres.length ? `
        <div class="overview-section">
          <div class="overview-title">Top Genres</div>
          <div class="top-genres-list">
            ${topGenres.map(([genre, count]) => {
              const pct = Math.max(4, Math.round(count / maxGenreCount * 100));
              return `
                <div class="top-genre-row">
                  <span class="top-genre-name">${escHtml(genre)}</span>
                  <div class="top-genre-track">
                    <div class="top-genre-fill" style="width:${pct}%"></div>
                  </div>
                  <span class="top-genre-count">${count}</span>
                </div>`;
            }).join('')}
          </div>
        </div>` : ''}

        <!-- ── Library Freshness (when albums were added) ── -->
        <div class="overview-section">
          <div class="overview-title">Library Freshness</div>
          <div class="freshness-bar">
            <div class="freshness-seg" style="width:${freshPct}%;background:var(--green);opacity:.8;"></div>
            <div class="freshness-seg" style="width:${mediumPct}%;background:var(--green);opacity:.4;"></div>
            <div class="freshness-seg" style="width:${oldPct}%;background:var(--border2);"></div>
          </div>
          <div class="freshness-legend">
            <span class="freshness-legend-item">
              <span class="freshness-dot" style="background:var(--green);opacity:.8;"></span>
              <1 yr (${fresh})
            </span>
            <span class="freshness-legend-item">
              <span class="freshness-dot" style="background:var(--green);opacity:.4;"></span>
              1–3 yr (${medium})
            </span>
            <span class="freshness-legend-item">
              <span class="freshness-dot" style="background:var(--border2);"></span>
              3+ yr (${old})
            </span>
          </div>
        </div>

        <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn-coverage" id="exportHistoryBtn">Export history</button>
          <button class="btn-coverage" id="importHistoryBtn">Import history</button>
          <button class="btn-coverage" id="deleteAllDataBtn" style="border-color:rgba(232,67,67,.4);color:var(--error);">Delete all data</button>
        </div>

        <!-- ── Neglect Score ── -->
        ${allAlbums.length > 0 ? (() => {
          const neglected = getTopNeglected(NEGLECT_TOP_N);
          return `
        <div class="overview-section">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <div class="overview-title" style="margin-bottom:0;">Most Neglected</div>
            <button class="btn-coverage" id="queueNeglectedBtn">Queue top ${Math.min(3, neglected.length)}</button>
          </div>
          ${neglected.map(a => {
            const img     = a.images?.[0]?.url;
            const artists = (a.artists||[]).map(x=>x.name).join(', ');
            const days    = a._added_at ? Math.floor((Date.now()-new Date(a._added_at).getTime())/86400000) : 0;
            const plays   = historyCache.filter(h=>h.id===a.id).length;
            return `<div class="neglect-item">
              ${img ? `<img class="neglect-art" src="${img}" alt="" loading="lazy">` : `<div class="neglect-art" style="display:flex;align-items:center;justify-content:center;font-size:14px;">🎵</div>`}
              <div class="neglect-info">
                <div class="neglect-name">${escHtml(a.name)}</div>
                <div class="neglect-sub">${escHtml(artists)} · saved ${days}d ago · ${plays} play${plays!==1?'s':''}</div>
              </div>
            </div>`;
          }).join('')}
        </div>`;
        })() : ''}

        <!-- ── Listening Personality ── -->
        ${(() => {
          const p = getPersonalityStats();
          if (!p) return '';
          const bestMonthFmt = p.bestMonth !== '—' ? new Date(p.bestMonth+'-01').toLocaleString('default',{month:'long',year:'numeric'}) : '—';
          return `
        <div class="overview-section">
          <div class="overview-title">Listening Personality</div>
          <div class="personality-grid">
            <div class="personality-stat">
              <div class="personality-stat-number">${p.favDecade}</div>
              <div class="personality-stat-label">Favourite decade by queue count</div>
            </div>
            <div class="personality-stat">
              <div class="personality-stat-number">${p.neverHeardPct}%</div>
              <div class="personality-stat-label">of your library never queued</div>
            </div>
            <div class="personality-stat">
              <div class="personality-stat-number">${p.loyaltyPct}%</div>
              <div class="personality-stat-label">of queued albums played more than once</div>
            </div>
            <div class="personality-stat">
              <div class="personality-stat-number">${p.uniqueQueued}</div>
              <div class="personality-stat-label">unique albums queued via AlbumPick</div>
            </div>
          </div>
          ${p.neglectedGenres.length ? `
          <div style="margin-top:12px;">
            <div style="font-size:10px;color:var(--text-dim);margin-bottom:6px;">Underheard genres (large in library, rarely queued):</div>
            <div class="personality-badge-row">
              ${p.neglectedGenres.map(g=>`<span class="personality-badge">${escHtml(g)}</span>`).join('')}
            </div>
          </div>` : ''}
          <div style="font-size:10px;color:var(--text-dim);margin-top:10px;font-family:var(--font-mono);">
            Most active month: ${bestMonthFmt}
          </div>
        </div>`;
        })()}
      `; // end of main return template
    }

    /** Re-render only the coverage panel body (e.g. after queuing). */
    function refreshCoveragePanel() {
      const body = document.getElementById('coverageBody');
      if (!body) return;
      body.innerHTML = buildCoverageHTML();
      attachCoverageEvents();
    }

    // ═══════════════════════════════════════════════════════════════════════
    // ── JOURNEYS HTML BUILDER ────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    function buildJourneysHTML() {
      if (!allAlbums.length) {
        return `<div style="font-size:11px;color:var(--text-dim);">Load your library first — journeys will appear here.</div>`;
      }

      const tab = state.journeyTab;

      // Discography: artists with ≥2 saved albums
      const artistMap = new Map();
      for (const a of allAlbums)
        for (const ar of (a.artists || []))
          artistMap.set(ar.id, { id: ar.id, name: ar.name, count: (artistMap.get(ar.id)?.count || 0) + 1 });
      const multiAlbumArtists = [...artistMap.values()]
        .filter(ar => ar.count >= 2)
        .sort((a, b) => b.count - a.count);

      // Genre Timeline: available genre clusters with ≥2 albums
      const clusterCounts = {};
      for (const a of allAlbums)
        for (const g of (a._genres || []))
          { const c = clusterOf(g); clusterCounts[c] = (clusterCounts[c] || 0) + 1; }
      const availClusters = GENRE_CLUSTERS.filter(c => (clusterCounts[c.id] || 0) >= 2);

      const tabs = [
        { id: 'discography', label: '🎤 Discography' },
        { id: 'timeline',    label: '⏳ Genre Timeline' },
        { id: 'era',         label: '🗓 Era Deep-Dive' },
        { id: 'web',         label: '🕸 Artist Web' },
      ];

      const tabsHTML = tabs.map(t =>
        `<button class="journey-tab${tab === t.id ? ' active' : ''}" data-journey-tab="${t.id}">${t.label}</button>`
      ).join('');

      let configHTML = '', resultsHTML = '';

      if (tab === 'discography') {
        const selId = state.journeyConfig.artistId || (multiAlbumArtists[0]?.id || '');
        configHTML = `
          <div class="journey-config">
            <select class="journey-select" id="journeyArtistSelect">
              ${multiAlbumArtists.map(ar =>
                `<option value="${ar.id}"${ar.id === selId ? ' selected' : ''}>${escHtml(ar.name)} (${ar.count})</option>`
              ).join('')}
            </select>
          </div>`;
      } else if (tab === 'timeline') {
        const selCl = state.journeyConfig.clusterId || (availClusters[0]?.id || '');
        configHTML = `
          <div class="journey-config">
            <select class="journey-select" id="journeyClusterSelect">
              ${availClusters.map(c =>
                `<option value="${c.id}"${c.id === selCl ? ' selected' : ''}>${c.icon} ${c.label}</option>`
              ).join('')}
            </select>
          </div>`;
      } else if (tab === 'era') {
        const decades = ['pre-70s','70s','80s','90s','00s','10s','20s'];
        const selDec  = state.journeyConfig.decade || '90s';
        configHTML = `
          <div class="journey-config">
            <select class="journey-select" id="journeyDecadeSelect">
              ${decades.map(d =>
                `<option value="${d}"${d === selDec ? ' selected' : ''}>${d}</option>`
              ).join('')}
            </select>
          </div>`;
      } else if (tab === 'web') {
        const selId = state.journeyConfig.artistId || (multiAlbumArtists[0]?.id || '');
        configHTML = `
          <div class="journey-config">
            <div style="font-size:10px;color:var(--text-dim);margin-bottom:8px;">Start from an artist — explores related albums in your library via Last.fm similarity.</div>
            <select class="journey-select" id="journeyWebArtistSelect">
              ${multiAlbumArtists.map(ar =>
                `<option value="${ar.id}"${ar.id === selId ? ' selected' : ''}>${escHtml(ar.name)} (${ar.count})</option>`
              ).join('')}
            </select>
          </div>`;
      }

      // Results
      if (state.journeyWorking) {
        resultsHTML = `<div class="similar-loading" style="padding:12px 0;">Building journey…</div>`;

        const items = state.journeyResults.map((a, i) => {
          const img = a.images?.[0]?.url;
          return `
            <div class="journey-album-item">

                ? `<img class="journey-album-art" src="${img}" alt="" loading="lazy">`

              <div class="journey-album-info">
                <div class="journey-album-name">${escHtml(a.name)}</div>
                <div class="journey-album-meta">${escHtml((a.artists||[]).map(x=>x.name).join(', '))} · ${releaseYear(a)}</div>
              </div>
            </div>`;
        }).join('');
        resultsHTML = `
          <div class="journey-results">${items}</div>
          <div class="journey-actions">
            <button class="journey-queue-all-btn" id="journeyQueueBtn"
              ${state.isWorking ? 'disabled' : ''}>▶ Queue All (${state.journeyResults.length} albums)</button>
          </div>`;
      }

      const loadBtnLabel = { discography: '▶ Load Discography', timeline: '▶ Build Timeline', era: '▶ Load Era', web: '▶ Build Web' }[tab] || '▶ Load';

      return `
        <div class="journey-tabs">${tabsHTML}</div>
        ${configHTML}
        <button class="journey-load-btn" id="journeyLoadBtn">${loadBtnLabel}</button>
        ${resultsHTML}`;
    }

    async function computeJourney() {
      state.journeyWorking = true;
      const body = document.getElementById('journeyBody');
      if (body) body.innerHTML = buildJourneysHTML();
      attachJourneyEvents();

      const tab = state.journeyTab;
      let results = [];

      try {
        if (tab === 'discography') {
          const artistId = state.journeyConfig.artistId;
          if (artistId) {
            results = allAlbums
              .filter(a => (a.artists || []).some(ar => ar.id === artistId))
              .sort((a, b) => releaseYear(a) - releaseYear(b));
          }
        } else if (tab === 'timeline') {
          const clusterId = state.journeyConfig.clusterId;
          if (clusterId) {
            results = allAlbums
              .filter(a => (a._genres || []).some(g => clusterOf(g) === clusterId))
              .sort((a, b) => releaseYear(a) - releaseYear(b));
          }
        } else if (tab === 'era') {
          const decade = state.journeyConfig.decade;
          if (decade) {
            results = allAlbums
              .filter(a => decadeOf(releaseYear(a)) === decade)
              .sort((a, b) => releaseYear(a) - releaseYear(b));
          }
        } else if (tab === 'web') {
          const artistId = state.journeyConfig.artistId;
          if (artistId) {
            const artistMap = new Map(allAlbums.flatMap(a => (a.artists||[]).map(ar => [ar.id, ar.name])));
            const seedName  = artistMap.get(artistId);
            const seedAlbums = allAlbums.filter(a => (a.artists||[]).some(ar => ar.id === artistId));
            // Get Last.fm similar artists for the seed
            let similar = [];
            if (seedName && getLastfmKey()) {
              const lfm = await fetchLastfmArtist(seedName);
              similar   = lfm?.similarArtists || [];
            }
            // Find library albums from similar artists
            const related = allAlbums.filter(a =>
              !(a.artists||[]).some(ar => ar.id === artistId) &&
              (a.artists||[]).some(ar => similar.includes(ar.name.toLowerCase()))
            );
            // Score by similarity to seed albums
            const scored = related.map(a => {
              const s = seedAlbums.reduce((acc, seed) => acc + computeSimilarity(seed, a), 0);
              return { album: a, score: s };
            }).sort((a, b) => b.score - a.score);
            results = [...seedAlbums.sort((a,b)=>releaseYear(a)-releaseYear(b)), ...scored.slice(0,12).map(x=>x.album)];
          }
        }
      } catch(e) { console.warn('Journey error', e); }

      state.journeyResults  = results;
      state.journeyWorking  = false;
      if (body) body.innerHTML = buildJourneysHTML();
      attachJourneyEvents();
    }

    function attachJourneyEvents() {
      document.getElementById('journeyToggle')?.addEventListener('click', () => {
        state.journeyOpen = !state.journeyOpen;
        document.getElementById('journeyArrow')?.classList.toggle('open', state.journeyOpen);
        document.getElementById('journeyBody')?.classList.toggle('open', state.journeyOpen);
        saveFiltersToSession();
      });

      document.querySelectorAll('[data-journey-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.journeyTab     = btn.dataset.journeyTab;
          state.journeyResults = [];
          state.journeyConfig  = {};
          const body = document.getElementById('journeyBody');
          if (body) body.innerHTML = buildJourneysHTML();
          attachJourneyEvents();
          saveFiltersToSession();
        });
      });

      const artistSel = document.getElementById('journeyArtistSelect') || document.getElementById('journeyWebArtistSelect');
      if (artistSel) artistSel.addEventListener('change', e => { state.journeyConfig.artistId = e.target.value; });
      document.getElementById('journeyClusterSelect')?.addEventListener('change', e => { state.journeyConfig.clusterId = e.target.value; });
      document.getElementById('journeyDecadeSelect')?.addEventListener('change',  e => { state.journeyConfig.decade    = e.target.value; });

      // Initialise config defaults from select values
      if (!state.journeyConfig.artistId) {
        const sel = document.getElementById('journeyArtistSelect') || document.getElementById('journeyWebArtistSelect');
        if (sel) state.journeyConfig.artistId = sel.value;
      }
      if (!state.journeyConfig.clusterId) {
        const sel = document.getElementById('journeyClusterSelect');
        if (sel) state.journeyConfig.clusterId = sel.value;
      }
      if (!state.journeyConfig.decade) {
        const sel = document.getElementById('journeyDecadeSelect');
        if (sel) state.journeyConfig.decade = sel.value;
      }

      document.getElementById('journeyLoadBtn')?.addEventListener('click', () => {
        if (!state.isWorking) computeJourney();
      });

      document.getElementById('journeyQueueBtn')?.addEventListener('click', async () => {
        if (state.isWorking || !state.journeyResults.length) return;
        // Load journey results into selected albums and queue them
        state.selectedAlbums = state.journeyResults;
        await queueSelected();
      });
    }

    // ── LIBRARY RADIO ────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    function startLibraryRadio() {
      if (state.radioActive) return;
      state.radioActive    = true;
      state.radioQueuedIds = [];
      state.radioIntervalId = setInterval(radioTick, 30000);
      radioTick(); // run immediately
    }

    function stopLibraryRadio() {
      state.radioActive = false;
      if (state.radioIntervalId) { clearInterval(state.radioIntervalId); state.radioIntervalId = null; }
    }

    async function radioTick() {
      if (!state.radioActive || state.isWorking || !allAlbums.length) return;
      try {
        const player = await apiGet('https://api.spotify.com/v1/me/player');
        // Queue considered low when ≤1 items remain (we can't see full queue, so use
        // "nothing in progress or track is within last 2 minutes" as proxy)
        if (!player || !player.is_playing) return;
        const remaining = (player.item?.duration_ms || 0) - (player.progress_ms || 0);
        // If <3 min left on current track, add next album
        if (remaining > 180000) return;

        const usedIds = new Set(state.radioQueuedIds);
        const pool    = applyFilters(allAlbums).filter(a => !usedIds.has(a.id));
        if (!pool.length) { stopLibraryRadio(); return; }

        // Pick most-similar album to whatever is currently playing
        let nextAlbum;
        const currentAlbumId = player.item?.album?.id;
        const currentInLib   = currentAlbumId ? allAlbums.find(a => a.id === currentAlbumId) : null;
        if (currentInLib) {
          nextAlbum = findSimilarAlbums(currentInLib, pool, 1)[0];
        }
        if (!nextAlbum) nextAlbum = weightedPickRandom(pool, 1)[0];
        if (!nextAlbum) return;

        const tracks = await getAlbumTracks(nextAlbum);
        const delay  = document.getElementById('browserModeToggle')?.checked ? DELAY_BROWSER_MS : DELAY_DESKTOP_MS;
        for (let i = 0; i < tracks.length; i++) {
          await addToQueue(tracks[i].uri);
          if (i < tracks.length - 1) await sleep(delay);
        }
        state.radioQueuedIds.push(nextAlbum.id);
        await appendHistory([nextAlbum]);
        renderHeader();
        refreshSettingsPanel();
      } catch(e) {
        console.warn('Radio tick error:', e.message);
      }
    }

          state.bookmarkFormOpen = false;

          await deleteBookmark(delId);
          if (state.activeBookmark === delId) state.activeBookmark = null;
          render();
          return;
        }
        // Activate bookmark
        const pill = e.target.closest('[data-bmid]');
        if (!pill) return;
        const bm = allBookmarks.find(b => b.id === pill.dataset.bmid);
        if (bm) applyBookmark(bm);

    async function openSimilarPanel(albumIdx) {
      if (state.openSimilarIdx === albumIdx) {
        state.openSimilarIdx = null;
        renderAlbumList(state.selectedAlbums);
        return;
      }
      state.openSimilarIdx = albumIdx;
      renderAlbumList(state.selectedAlbums);

      const targetAlbum = state.selectedAlbums[albumIdx];
      const panelEl     = document.getElementById('similarPanel_' + albumIdx);
      if (!panelEl) return;

      panelEl.innerHTML = `<div class="similar-loading">Finding similar albums…</div>`;

      // Ensure Last.fm data is loaded for this artist (lazy)
      if (getLastfmKey()) {
        for (const ar of (targetAlbum.artists || []))
          await fetchLastfmArtist(ar.name);
      }

      const pool    = allAlbums.filter(a => !state.selectedAlbums.some(s => s.id === a.id));
      const similar = findSimilarAlbums(targetAlbum, pool, 5);

      if (!similar.length) {
        panelEl.innerHTML = `<div class="similar-panel-title">More Like This</div><div style="font-size:10px;color:var(--text-dim);">No similar albums found in your library.</div>`;
        return;
      }

      const items = similar.map((a, i) => {
        const img     = a.images?.[0]?.url;
        const artists = (a.artists||[]).map(x=>x.name).join(', ');
        const score   = computeSimilarity(targetAlbum, a);
        return `
          <div class="similar-album-item" data-similar-idx="${i}">
            ${img
              ? `<img class="similar-album-art" src="${img}" alt="" loading="lazy">`
              : `<div class="similar-album-art" style="display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--surface);">🎵</div>`}
            <div class="similar-album-info">
              <div class="similar-album-name">${escHtml(a.name)}</div>
              <div class="similar-album-artist">${escHtml(artists)} · ${releaseYear(a)}</div>
            </div>
            <span class="similar-score-badge">${score}pts</span>
            <button class="similar-add-btn" data-similar-add="${a.id}" title="Add to pick">＋</button>
          </div>`;
      }).join('');

      panelEl.innerHTML = `
        <div class="similar-panel-title">More Like This</div>
        ${!getLastfmKey() ? `<div class="similar-no-lastfm">⚠ Add a Last.fm key in Settings for richer similarity.</div>` : ''}
        ${items}`;

      // Bind "add to pick" buttons
      panelEl.querySelectorAll('[data-similar-add]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id    = btn.dataset.similarAdd;
          const album = allAlbums.find(a => a.id === id);
          if (!album) return;
          state.selectedAlbums.push(album);
          state.openSimilarIdx = null;
          renderAlbumList(state.selectedAlbums);
        });
      });
    }

      // Coverage "Play now" buttons (delegated)
      attachCoverageEvents();

      // ── Decade chips: 3-state button cycling ─────────────────────────
      // neutral → included (green) → excluded (red) → neutral
      // Inspired by Roon's Focus inversion: click twice to exclude a decade.
      document.querySelectorAll('.decade-chip-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const d          = btn.dataset.decade;
          const isIncluded = state.filters.decades.includes(d);
          const isExcluded = state.filters.decadesExcluded.includes(d);

          if (!isIncluded && !isExcluded) {
            // neutral → include
            state.filters.decades.push(d);
            btn.className = 'decade-chip-btn included';
            btn.title = 'Click to exclude';
          } else if (isIncluded) {
            // include → exclude
            state.filters.decades = state.filters.decades.filter(x => x !== d);
            state.filters.decadesExcluded.push(d);
            btn.className = 'decade-chip-btn excluded';
            btn.title = 'Click to reset';

            state.filters.decadesExcluded = state.filters.decadesExcluded.filter(x => x !== d);
            btn.className = 'decade-chip-btn';
            btn.title = 'Click to include';

          minSlider.value = state.filters.minDurMin;
          document.getElementById('minDurVal').textContent = state.filters.minDurMin;
        }
        document.getElementById('maxDurVal').textContent = state.filters.maxDurMin;

        });

      document.querySelectorAll('input[name="queueHistory"]').forEach(rb => {
        rb.addEventListener('change', e => {
          state.filters.queueHistory = e.target.value;

      if (avoidRecentEl) {

    }

    /**
     * Attach event handlers for the Library Coverage panel CTA buttons.
     * Called after initial render and after refreshCoveragePanel().
     */
    function attachCoverageEvents() {
      const body = document.getElementById('coverageBody');
      if (!body) return;
      body.querySelectorAll('.btn-coverage[data-coverage]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (state.isWorking) return;
          state.coverageFilter = btn.dataset.coverage;
          await handlePick();
        });
      });

      // Queue most neglected
      document.getElementById('queueNeglectedBtn')?.addEventListener('click', async () => {
        if (state.isWorking) return;
        const neglected = getTopNeglected(3);
        if (!neglected.length) return;
        state.selectedAlbums = neglected;
        state.phase = 'picked';
        renderAlbumList(state.selectedAlbums);
        document.getElementById('albumList')?.scrollIntoView({ behavior: 'smooth', block: 'start' });

      document.getElementById('exportHistoryBtn')?.addEventListener('click', exportHistory);
      document.getElementById('importHistoryBtn')?.addEventListener('click', importHistory);
      document.getElementById('deleteAllDataBtn')?.addEventListener('click', async () => {
        if (!confirm('Delete ALL data (library cache + play history)? This cannot be undone.')) return;
        await deleteAllData();
