<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Album Discovery</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       SECTION 1: CSS Reset & Variables
       ============================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #222222;
      --bg-card: #272727;
      --bg-elevated: #2e2e2e;
      --text-primary: #f0f0f0;
      --text-secondary: #aaaaaa;
      --text-muted: #666666;
      --accent-blue: #4a90d9;
      --accent-blue-dim: rgba(74,144,217,0.15);
      --accent-warm: #d4a574;
      --border: rgba(255,255,255,0.07);
      --shadow-card: 0 8px 32px rgba(0,0,0,0.5);
      --shadow-album: 0 12px 40px rgba(0,0,0,0.7);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --nav-height: 64px;
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --transition: 0.2s ease;
    }

    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      overflow: hidden;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ============================================
       SECTION 2: Typography
       ============================================ */
    h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 600; }
    h1 { font-size: 2rem; line-height: 1.15; }
    h2 { font-size: 1.4rem; }
    h3 { font-size: 1.1rem; }
    h4 { font-size: 0.9rem; font-weight: 500; }

    .label-sm {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .text-muted { color: var(--text-secondary); }
    .text-accent { color: var(--accent-blue); }
    .text-warm { color: var(--accent-warm); }

    /* ============================================
       SECTION 3: Layout & Navigation
       ============================================ */
    .tab-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      padding-bottom: calc(var(--nav-height) + 8px);
    }

    .tab-content:not(.active) { display: none; }

    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: rgba(22,22,22,0.97);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      color: var(--text-muted);
      transition: color var(--transition);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }

    .nav-item.active { color: var(--accent-blue); }

    .nav-icon {
      width: 22px; height: 22px;
      stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    .nav-label {
      font-family: var(--font-body);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .offline-badge {
      position: fixed; top: 12px; right: 12px;
      background: rgba(220,80,60,0.9); color: #fff;
      font-size: 0.68rem; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
      z-index: 200; display: none;
    }
    .offline-badge.visible { display: block; }

    /* ============================================
       SECTION 4: Buttons
       ============================================ */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; padding: 12px 20px;
      border-radius: var(--radius-md); border: none;
      font-family: var(--font-body); font-size: 0.88rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition);
      min-height: 44px; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary { background: var(--accent-blue); color: #fff; }
    .btn-primary:hover { background: #5aa0e9; transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #363636; }
    .btn-secondary:active { transform: scale(0.97); }

    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }

    .btn-icon {
      width: 44px; height: 44px; padding: 0; border-radius: 50%;
      background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-secondary);
    }
    .btn-icon:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .btn-icon.active { color: var(--accent-warm); border-color: var(--accent-warm); }
    .btn-icon svg { width: 18px; height: 18px; }
    .btn.dimmed { opacity: 0.4; cursor: default; }
    .btn.dimmed:hover { transform: none; }

    /* ============================================
       SECTION 5: Cards & Carousels
       ============================================ */
    .album-card {
      position: relative; border-radius: var(--radius-lg); overflow: hidden;
      background: var(--bg-card); cursor: pointer; transition: transform 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .album-card:hover { transform: scale(1.02); }
    .album-card:active { transform: scale(0.98); }

    .album-card-art {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      display: block; background: var(--bg-elevated);
    }

    .album-card-info { padding: 10px 12px 12px; }

    .album-card-title {
      font-family: var(--font-heading); font-size: 0.82rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }

    .album-card-artist {
      font-size: 0.72rem; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .carousel {
      display: flex; gap: 12px; overflow-x: auto;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
      padding: 4px 16px 12px; scrollbar-width: none;
    }
    .carousel::-webkit-scrollbar { display: none; }
    .carousel .album-card { flex-shrink: 0; width: 140px; scroll-snap-align: start; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px 10px;
    }
    .section-title { font-family: var(--font-heading); font-size: 1.05rem; font-weight: 600; }
    .section-link { font-size: 0.78rem; color: var(--accent-blue); cursor: pointer; }

    .tag {
      display: inline-block; padding: 3px 8px; border-radius: 20px;
      font-size: 0.68rem; font-weight: 500;
      background: rgba(255,255,255,0.08); color: var(--text-secondary);
    }
    .tag-genre { background: var(--accent-blue-dim); color: var(--accent-blue); }

    /* ============================================
       SECTION 6: Progress & Toast
       ============================================ */
    .progress-container { padding: 32px 24px; text-align: center; }
    .progress-label { font-family: var(--font-heading); font-size: 1rem; margin-bottom: 8px; }
    .progress-sub { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 20px; }
    .progress-track { height: 3px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent-blue), #7bb8f0);
      border-radius: 2px; transition: width 0.3s ease;
    }

    .toast-container {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      background: rgba(40,40,40,0.95); border: 1px solid var(--border);
      color: var(--text-primary); padding: 10px 18px; border-radius: var(--radius-md);
      font-size: 0.82rem; backdrop-filter: blur(16px);
      animation: toastIn 0.25s ease, toastOut 0.25s ease 2.5s forwards;
      white-space: nowrap;
    }

    /* ============================================
       SECTION 7: Consolidated Slide Overlay
       ============================================ */
    .slide-overlay {
      position: fixed; inset: 0; background: var(--bg-primary);
      z-index: 150; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .slide-overlay.open { transform: translateY(0); }

    .overlay-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--text-secondary); cursor: pointer; font-size: 0.85rem;
      margin-bottom: 20px; -webkit-tap-highlight-color: transparent;
    }
    .overlay-back:hover { color: var(--text-primary); }

    .overlay-hero { position: relative; padding: 20px 20px 0; }
    .overlay-art-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
    .overlay-art {
      width: min(70vw, 300px); height: min(70vw, 300px);
      border-radius: var(--radius-xl); object-fit: cover; box-shadow: var(--shadow-album);
    }
    .overlay-meta { padding: 0 20px; }
    .overlay-title {
      font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700;
      margin-bottom: 4px; line-height: 1.2;
    }
    .overlay-artist { font-size: 1rem; color: var(--text-secondary); margin-bottom: 8px; }
    .overlay-info-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .overlay-actions { display: flex; gap: 10px; flex-wrap: wrap; padding: 16px 20px; }
    .overlay-actions .btn-primary { flex: 1; min-width: 120px; }
    .overlay-actions .btn-secondary { flex: 1; min-width: 120px; }

    .track-list { padding: 0 20px 120px; }
    .track-item { display: flex; align-items: center; gap: 14px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .track-num { font-size: 0.78rem; color: var(--text-muted); width: 20px; text-align: center; flex-shrink: 0; }
    .track-name { flex: 1; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-duration { font-size: 0.78rem; color: var(--text-muted); flex-shrink: 0; }

    /* ============================================
       SECTION 8: Screens, Forms, Settings
       ============================================ */
    .screen {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px 24px;
      background: var(--bg-primary); z-index: 200;
    }
    .screen.hidden { display: none; }
    .screen-logo { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    .screen-logo span { color: var(--accent-blue); }
    .screen-tagline { font-size: 0.9rem; color: var(--text-secondary); text-align: center; margin-bottom: 40px; max-width: 300px; }

    .form-group { width: 100%; max-width: 360px; margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.04em; }
    .form-input {
      width: 100%; padding: 12px 14px; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      color: var(--text-primary); font-family: var(--font-body); font-size: 0.9rem;
      outline: none; transition: border-color var(--transition);
    }
    .form-input:focus { border-color: var(--accent-blue); }
    .form-input::placeholder { color: var(--text-muted); }
    .form-hint { margin-top: 6px; font-size: 0.72rem; color: var(--text-muted); line-height: 1.5; }
    .form-btn { width: 100%; max-width: 360px; padding: 14px; font-size: 0.95rem; }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border); border-top-color: var(--accent-blue);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 20px;
    }

    .error-card {
      margin: 24px 16px; padding: 20px; border-radius: var(--radius-lg);
      background: rgba(220,80,60,0.1); border: 1px solid rgba(220,80,60,0.3); text-align: center;
    }
    .empty-state { text-align: center; padding: 60px 24px; color: var(--text-secondary); }
    .empty-state-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }

    .page-header { padding: 24px 20px 8px; display: flex; align-items: center; gap: 12px; }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    .profile-header { display: flex; align-items: center; gap: 16px; padding: 28px 20px 20px; }
    .profile-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; background: var(--bg-elevated); flex-shrink: 0; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
      background: var(--border); border-radius: var(--radius-lg); overflow: hidden; margin: 0 16px 24px;
    }
    .stat-cell { background: var(--bg-card); padding: 16px 12px; text-align: center; }
    .stat-value { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; }
    .stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; }

    .settings-section { padding: 0 16px 24px; }
    .settings-title {
      font-family: var(--font-heading); font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
    }
    .settings-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; background: var(--bg-card); border-radius: var(--radius-md);
      margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border); transition: background var(--transition);
    }
    .settings-item:hover { background: var(--bg-elevated); }
    .settings-item-label { font-size: 0.88rem; }
    .settings-item-value { font-size: 0.78rem; color: var(--text-muted); }

    .reauth-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 300; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .reauth-card {
      background: var(--bg-card); border-radius: var(--radius-xl); padding: 32px 28px;
      max-width: 340px; width: 100%; text-align: center; border: 1px solid var(--border);
    }

    /* ============================================
       SECTION 9: Stats
       ============================================ */
    .stats-section { padding: 0 16px 24px; }
    .stats-section-title {
      font-family: var(--font-heading); font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px;
    }
    .bar-chart { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-label { font-size: 0.75rem; color: var(--text-secondary); width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: capitalize; }
    .bar-track { flex: 1; height: 6px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .bar-value { font-size: 0.72rem; color: var(--text-muted); width: 28px; text-align: right; flex-shrink: 0; }

    .most-played-list { display: flex; flex-direction: column; gap: 10px; }
    .most-played-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px;
      background: var(--bg-card); border-radius: var(--radius-md);
      border: 1px solid var(--border); cursor: pointer; transition: background var(--transition);
    }
    .most-played-item:hover { background: var(--bg-elevated); }
    .most-played-rank { font-family: var(--font-heading); font-size: 1rem; font-weight: 700; color: var(--text-muted); width: 22px; text-align: center; flex-shrink: 0; }
    .most-played-rank.gold { color: #f0c040; }
    .most-played-rank.silver { color: #b0b8c4; }
    .most-played-rank.bronze { color: #c87d50; }
    .most-played-art { width: 42px; height: 42px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; background: var(--bg-elevated); }
    .most-played-info { flex: 1; min-width: 0; }
    .most-played-title { font-family: var(--font-heading); font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .most-played-artist { font-size: 0.72rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .most-played-count { font-family: var(--font-heading); font-size: 0.82rem; font-weight: 600; color: var(--accent-blue); flex-shrink: 0; }
    .most-played-count-label { font-size: 0.62rem; color: var(--text-muted); text-align: right; }

    .activity-month-chart { display: flex; align-items: flex-end; gap: 5px; height: 60px; margin-bottom: 6px; }
    .activity-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
    .activity-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .activity-month-label { font-size: 0.58rem; color: var(--text-muted); text-align: center; }
    .stats-empty { font-size: 0.82rem; color: var(--text-muted); font-style: italic; padding: 4px 0 8px; }

    /* ============================================
       SECTION 10: Hero, Picker, Discover
       ============================================ */
    .hero-album-art { width: min(75vw, 340px); height: min(75vw, 340px); border-radius: var(--radius-xl); object-fit: cover; box-shadow: var(--shadow-album); display: block; margin: 0 auto; }
    .hero-section { padding: 24px 20px 0; text-align: center; }
    .hero-art-wrap { position: relative; display: inline-block; margin-bottom: 20px; }
    .hero-art-wrap.spinning .hero-album-art { animation: vinylSpin 1.5s ease-in-out; }
    .hero-art-placeholder { width: min(75vw, 340px); height: min(75vw, 340px); border-radius: var(--radius-xl); background: var(--bg-elevated); margin: 0 auto; display: flex; align-items: center; justify-content: center; border: 2px dashed var(--border); }
    .hero-meta { margin-bottom: 20px; }
    .hero-title { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; line-height: 1.2; }
    .hero-artist { font-size: 1rem; color: var(--text-secondary); margin-bottom: 8px; }
    .hero-tags { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
    .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
    .hero-actions .btn-primary { flex: 1; max-width: 180px; }
    .hero-actions .btn-secondary { flex: 1; max-width: 180px; }
    .hero-icon-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }

    .count-picker { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .count-btn {
      width: 44px; height: 36px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary);
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition); -webkit-tap-highlight-color: transparent;
    }
    .count-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }

    .discover-btn {
      display: flex; align-items: center; gap: 10px; padding: 16px 32px;
      background: linear-gradient(135deg, var(--accent-blue), #3a70c0);
      border: none; border-radius: 50px; color: #fff;
      font-family: var(--font-heading); font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(74,144,217,0.35);
      -webkit-tap-highlight-color: transparent; margin: 0 auto 28px; white-space: nowrap;
    }
    .discover-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(74,144,217,0.45); }
    .discover-btn:active { transform: scale(0.97); }

    .library-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px 16px; }
    .library-filter { padding: 12px 16px 4px; }
    .filter-input {
      width: 100%; padding: 10px 14px; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      color: var(--text-primary); font-family: var(--font-body); font-size: 0.88rem; outline: none;
    }
    .filter-input:focus { border-color: var(--accent-blue); }
    .filter-input::placeholder { color: var(--text-muted); }

    /* ============================================
       SECTION 11: Genre Cards
       ============================================ */
    .genre-card {
      flex-shrink: 0; width: 160px; border-radius: var(--radius-lg);
      background: var(--bg-card); cursor: pointer; overflow: hidden;
      transition: transform 0.2s ease; scroll-snap-align: start; border: 1px solid var(--border);
    }
    .genre-card:hover { transform: scale(1.02); }
    .genre-card:active { transform: scale(0.98); }
    .genre-collage { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 100%; aspect-ratio: 1; overflow: hidden; }
    .genre-collage img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .genre-collage-placeholder { background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.2rem; }
    .genre-card-info { padding: 10px 12px 12px; }
    .genre-card-name { font-family: var(--font-heading); font-size: 0.82rem; font-weight: 600; text-transform: capitalize; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .genre-card-count { font-size: 0.7rem; color: var(--text-secondary); }
    .genre-build-progress { padding: 20px 20px 8px; }
    .genre-build-label { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 10px; }
    .genre-build-sublabel { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 10px; }
    .genre-detail-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
    .genre-detail-title { font-family: var(--font-heading); font-size: 1.6rem; font-weight: 700; text-transform: capitalize; margin-bottom: 4px; }
    .genre-detail-sub { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 16px; }
    .genre-rebuild-btn { font-size: 0.72rem; color: var(--text-muted); cursor: pointer; text-decoration: underline; background: none; border: none; font-family: var(--font-body); padding: 0; }
    .genre-rebuild-btn:hover { color: var(--text-secondary); }

    /* ============================================
       SECTION 12: Rediscovery Cards
       ============================================ */
    .rediscovery-card {
      flex-shrink: 0; width: 148px; border-radius: var(--radius-lg); overflow: hidden;
      background: var(--bg-card); cursor: pointer; transition: transform 0.2s ease;
      scroll-snap-align: start; border: 1px solid var(--border); position: relative;
    }
    .rediscovery-card:hover { transform: scale(1.02); }
    .rediscovery-card:active { transform: scale(0.98); }
    .rediscovery-card-art { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--bg-elevated); }
    .rediscovery-badge {
      position: absolute; top: 8px; left: 8px;
      background: rgba(212, 165, 116, 0.92); color: #1a1a1a;
      font-size: 0.62rem; font-weight: 700; padding: 3px 7px; border-radius: 20px;
      letter-spacing: 0.03em; backdrop-filter: blur(4px); white-space: nowrap;
    }
    .rediscovery-badge.never { background: rgba(255,255,255,0.15); color: var(--text-secondary); }
    .rediscovery-card-info { padding: 9px 11px 11px; }
    .rediscovery-card-title { font-family: var(--font-heading); font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .rediscovery-card-artist { font-size: 0.7rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .threshold-row { display: flex; gap: 6px; align-items: center; padding: 0 16px 4px; flex-wrap: wrap; }
    .threshold-btn {
      padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary);
      font-family: var(--font-body); font-size: 0.72rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition); -webkit-tap-highlight-color: transparent;
    }
    .threshold-btn.active { background: rgba(212,165,116,0.2); border-color: var(--accent-warm); color: var(--accent-warm); }

    .coming-soon-card {
      margin: 32px 20px 24px; padding: 40px 24px; border-radius: var(--radius-xl);
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-elevated) 100%);
      border: 1px solid var(--border); text-align: center;
    }
    .coming-soon-icon { font-size: 2.5rem; margin-bottom: 16px; }
    .coming-soon-title { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .coming-soon-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }

    /* ============================================
       SECTION 13: Listen Later List
       ============================================ */
    .ll-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: var(--bg-card); border-radius: var(--radius-md);
      border: 1px solid var(--border); transition: background var(--transition);
    }
    .ll-item:hover { background: var(--bg-elevated); }
    .ll-art { width: 52px; height: 52px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; background: var(--bg-elevated); cursor: pointer; }
    .ll-info { flex: 1; min-width: 0; cursor: pointer; }
    .ll-title { font-family: var(--font-heading); font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .ll-artist { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ll-date { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }
    .ll-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .ll-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .ll-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .ll-btn.danger:hover { color: #dc503c; border-color: rgba(220,80,60,0.4); }
    .ll-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* ============================================
       SECTION 14: Search
       ============================================ */
    .search-results { padding: 0 16px 24px; }
    .search-group-title {
      font-family: var(--font-heading); font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin: 16px 0 10px;
    }
    .sort-row { display: flex; gap: 6px; align-items: center; padding: 0 16px 8px; flex-wrap: wrap; }
    .sort-btn {
      padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary);
      font-family: var(--font-body); font-size: 0.72rem; font-weight: 500;
      cursor: pointer; transition: all var(--transition); -webkit-tap-highlight-color: transparent;
    }
    .sort-btn.active { background: var(--accent-blue-dim); border-color: var(--accent-blue); color: var(--accent-blue); }

    /* ============================================
       SECTION 15: Animations
       ============================================ */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; pointer-events: none; } }
    @keyframes vinylSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes cardFlipIn { 0% { opacity: 0; transform: scale(0.9) rotateY(15deg); } 100% { opacity: 1; transform: scale(1) rotateY(0deg); } }

    .fade-in { animation: fadeInUp 0.3s ease both; }
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.10s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.20s; }
    .stagger-5 { animation-delay: 0.25s; }
    .card-reveal { animation: cardFlipIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    /* ============================================
       Responsive
       ============================================ */
    @media (min-width: 768px) {
      .library-grid { grid-template-columns: repeat(3, 1fr); }
      .carousel .album-card { width: 180px; }
    }
    @media (min-width: 1024px) {
      .library-grid { grid-template-columns: repeat(4, 1fr); }
      #app { max-width: 480px; margin: 0 auto; position: relative; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="toast-container" id="toastContainer"></div>
  <div class="offline-badge" id="offlineBadge">Offline</div>

  <script>
  (function() {
    'use strict';

    const CONFIG = {
      DB_NAME: 'AlbumDiscovery',
      DB_VERSION: 2,
      SPOTIFY_AUTH_URL: 'https://accounts.spotify.com/authorize',
      SPOTIFY_TOKEN_URL: 'https://accounts.spotify.com/api/token',
      SPOTIFY_API_BASE: 'https://api.spotify.com/v1',
      SCOPES: ['user-library-read','user-read-recently-played','user-top-read','user-read-playback-state','user-modify-playback-state','user-read-currently-playing','user-read-private'].join(' '),
    };

    const _artistGenreCache = new Map();
    const _tabDirty = { home: true, discover: true, library: true, profile: true };
    function markTabDirty(t) { _tabDirty[t] = true; }
    function markAllDirty() { for (const k in _tabDirty) _tabDirty[k] = true; }

    // ── Helpers ──
    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function msToTime(ms) { const s = Math.floor(ms/1000), m = Math.floor(s/60); return `${m}:${String(s%60).padStart(2,'0')}`; }
    function safeImg(url) { if(!url)return''; try{const u=new URL(url);if(u.protocol==='https:')return url}catch(e){} return''; }

    const ICONS = {
      back: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>',
      bookmark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>',
      skip: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>',
      info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>',
      play: '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></polygon></svg>',
      x: '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></line><line x1="6" y1="6" x2="18" y2="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></line></svg>',
    };

    // ── DB ──
    const DB = (() => {
      let _db;
      async function init() {
        return new Promise((res,rej) => {
          const r = indexedDB.open(CONFIG.DB_NAME, CONFIG.DB_VERSION);
          r.onupgradeneeded = e => {
            const db = e.target.result;
            if(!db.objectStoreNames.contains('albums')) db.createObjectStore('albums',{keyPath:'id'});
            if(!db.objectStoreNames.contains('listening_log')){const ls=db.createObjectStore('listening_log',{autoIncrement:true});ls.createIndex('album_id','album_id',{unique:false});ls.createIndex('timestamp','timestamp',{unique:false});}
            if(!db.objectStoreNames.contains('listen_later')) db.createObjectStore('listen_later',{keyPath:'id'});
            if(!db.objectStoreNames.contains('settings')) db.createObjectStore('settings',{keyPath:'key'});
            if(!db.objectStoreNames.contains('genre_index')) db.createObjectStore('genre_index',{keyPath:'genre'});
          };
          r.onsuccess = e => { _db=e.target.result; res(); };
          r.onerror = e => rej(e.target.error);
        });
      }
      function tx(s,m='readonly'){return _db.transaction(s,m).objectStore(s);}
      async function getAll(s){return new Promise((r,j)=>{const q=tx(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});}
      async function get(s,k){return new Promise((r,j)=>{const q=tx(s).get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});}
      async function put(s,v){return new Promise((r,j)=>{const q=tx(s,'readwrite').put(v);q.onsuccess=()=>r();q.onerror=()=>j(q.error);});}
      async function del(s,k){return new Promise((r,j)=>{const q=tx(s,'readwrite').delete(k);q.onsuccess=()=>r();q.onerror=()=>j(q.error);});}
      async function clear(s){return new Promise((r,j)=>{const q=tx(s,'readwrite').clear();q.onsuccess=()=>r();q.onerror=()=>j(q.error);});}

      /* FIX: batch write in single transaction — no per-item Promise.all */
      async function saveAlbums(albums){return new Promise((res,rej)=>{const t=_db.transaction('albums','readwrite');const s=t.objectStore('albums');for(const a of albums)s.put(a);t.oncomplete=()=>res();t.onerror=()=>rej(t.error);t.onabort=()=>rej(t.error);});}

      async function logListening(e){await new Promise((r,j)=>{const q=_db.transaction('listening_log','readwrite').objectStore('listening_log').add({...e,timestamp:Date.now()});q.onsuccess=r;q.onerror=()=>j(q.error);});markTabDirty('profile');}
      async function getListeningLog(){return getAll('listening_log');}
      async function getListenLater(){return getAll('listen_later');}
      async function addListenLater(a){await put('listen_later',{...a,added_at:Date.now()});markTabDirty('profile');}
      async function removeListenLater(id){await del('listen_later',id);markTabDirty('profile');}
      async function isInListenLater(id){return!!(await get('listen_later',id));}
      async function getSetting(k){const r=await get('settings',k);return r?r.value:null;}
      async function setSetting(k,v){return put('settings',{key:k,value:v});}
      async function getGenreIndex(){return getAll('genre_index');}
      async function saveGenreEntry(e){return put('genre_index',e);}
      async function clearGenreIndex(){return clear('genre_index');}
      async function clearAll(){for(const s of['albums','listening_log','listen_later','settings','genre_index'])await clear(s);}

      return{init,getAlbums:()=>getAll('albums'),saveAlbums,logListening,getListeningLog,getListenLater,addListenLater,removeListenLater,isInListenLater,getSetting,setSetting,getGenreIndex,saveGenreEntry,clearGenreIndex,clearAll};
    })();

    // ── Auth (PKCE) ──
    const Auth = (() => {
      let _token=null,_expiry=null;
      function restoreSession(){try{const t=sessionStorage.getItem('ad_token'),e=sessionStorage.getItem('ad_token_expiry');if(t&&e&&Date.now()<parseInt(e,10)){_token=t;_expiry=parseInt(e,10);return true;}}catch(e){}return false;}
      function persistSession(){try{sessionStorage.setItem('ad_token',_token);sessionStorage.setItem('ad_token_expiry',String(_expiry));}catch(e){}}
      function clearSession(){_token=null;_expiry=null;try{sessionStorage.removeItem('ad_token');sessionStorage.removeItem('ad_token_expiry');sessionStorage.removeItem('ad_pkce_verifier');}catch(e){}}

      function genVerifier(){const a=new Uint8Array(64);crypto.getRandomValues(a);return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
      async function genChallenge(v){const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}

      async function parseCodeFromUrl(){
        const p=new URLSearchParams(window.location.search),code=p.get('code');
        if(!code)return false;
        const v=sessionStorage.getItem('ad_pkce_verifier');if(!v)return false;
        const cid=await DB.getSetting('client_id'),ruri=await DB.getSetting('redirect_uri');
        if(!cid||!ruri)return false;
        try{
          const r=await fetch(CONFIG.SPOTIFY_TOKEN_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:ruri,client_id:cid,code_verifier:v})});
          if(!r.ok)throw new Error('token_exchange_fail');
          const d=await r.json();_token=d.access_token;_expiry=Date.now()+(d.expires_in*1000);
          persistSession();history.replaceState(null,'',window.location.pathname);sessionStorage.removeItem('ad_pkce_verifier');return true;
        }catch(e){console.error('PKCE exchange failed:',e);return false;}
      }

      /* Legacy implicit grant fallback */
      function parseHashToken(){const h=window.location.hash.substring(1);if(!h)return false;const p=new URLSearchParams(h),t=p.get('access_token'),ei=p.get('expires_in');if(t){_token=t;_expiry=Date.now()+(parseInt(ei,10)*1000);persistSession();history.replaceState(null,'',window.location.pathname+window.location.search);return true;}return false;}

      async function login(){
        const cid=await DB.getSetting('client_id'),ruri=await DB.getSetting('redirect_uri');
        if(!cid||!ruri){showOnboarding();return;}
        const v=genVerifier();sessionStorage.setItem('ad_pkce_verifier',v);
        const ch=await genChallenge(v);
        window.location.href=`${CONFIG.SPOTIFY_AUTH_URL}?${new URLSearchParams({client_id:cid,response_type:'code',redirect_uri:ruri,scope:CONFIG.SCOPES,show_dialog:'false',code_challenge_method:'S256',code_challenge:ch})}`;
      }

      function getToken(){return _token;}
      function isLoggedIn(){return!!_token&&Date.now()<(_expiry||0);}
      function getExpiresIn(){if(!_expiry)return 0;return Math.max(0,Math.floor((_expiry-Date.now())/1000));}
      return{restoreSession,parseCodeFromUrl,parseHashToken,login,getToken,isLoggedIn,getExpiresIn,clearSession};
    })();

    // ── SpotifyAPI ──
    const SpotifyAPI = (() => {
      async function request(endpoint,opts={}){
        const token=Auth.getToken();if(!token)throw new Error('NO_TOKEN');
        const url=endpoint.startsWith('http')?endpoint:`${CONFIG.SPOTIFY_API_BASE}${endpoint}`;
        for(let i=0;i<4;i++){
          const r=await fetch(url,{...opts,headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json',...(opts.headers||{})}});
          if(r.status===401)throw new Error('TOKEN_EXPIRED');
          if(r.status===429){const ra=parseInt(r.headers.get('Retry-After')||'1',10);UI.showToast(`Rate limited, retrying in ${ra}s…`);await sleep(ra*1000);continue;}
          if(r.status===204||r.status===202)return null;
          if(!r.ok)throw new Error(`HTTP_${r.status}`);
          return r.json();
        }
        throw new Error('RATE_LIMIT_EXCEEDED');
      }
      async function fetchAllAlbums(onProgress){
        let albums=[],url='/me/albums?limit=50&offset=0',total=null;
        while(url){
          const d=await request(url);if(total===null)total=d.total;
          albums=albums.concat(d.items.map(i=>({id:i.album.id,name:i.album.name,artists:i.album.artists,release_date:i.album.release_date,total_tracks:i.album.total_tracks,images:i.album.images,album_type:i.album.album_type,cached_at:Date.now()})));
          if(onProgress)onProgress(albums.length,total);url=d.next;if(url)await sleep(200);
        }
        return albums;
      }
      async function getAlbumTracks(id){return(await request(`/albums/${id}/tracks?limit=50`)).items;}
      async function queueTrack(uri){await request(`/me/player/queue?uri=${encodeURIComponent(uri)}`,{method:'POST'});}
      async function playAlbum(uri){await request('/me/player/play',{method:'PUT',body:JSON.stringify({context_uri:uri})});}
      async function getMe(){return request('/me');}
      async function getArtist(id){return request(`/artists/${id}`);}
      return{fetchAllAlbums,getAlbumTracks,queueTrack,playAlbum,getMe,getArtist,request};
    })();

    // ── UI ──
    const UI = (() => {
      function showToast(msg,dur=3000){const c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),dur);}

      function renderAlbumCard(album,cb,extra=''){
        const img=safeImg(album.images?.[1]?.url||album.images?.[0]?.url);
        const d=document.createElement('div');d.className=`album-card fade-in ${extra}`;
        const imgEl=document.createElement('img');imgEl.className='album-card-art';imgEl.loading='lazy';imgEl.alt=album.name||'';if(img)imgEl.src=img;d.appendChild(imgEl);
        const info=document.createElement('div');info.className='album-card-info';
        const ti=document.createElement('div');ti.className='album-card-title';ti.textContent=album.name||'';
        const ar=document.createElement('div');ar.className='album-card-artist';ar.textContent=album.artists?.[0]?.name||'Unknown';
        info.appendChild(ti);info.appendChild(ar);d.appendChild(info);
        if(cb)d.addEventListener('click',()=>cb(album));return d;
      }

      function renderCarousel(albums,title,cb){
        const s=document.createElement('div');
        const h=document.createElement('div');h.className='section-header';h.innerHTML=`<span class="section-title">${escHtml(title)}</span>`;s.appendChild(h);
        const c=document.createElement('div');c.className='carousel';
        albums.forEach((a,i)=>{const card=renderAlbumCard(a,cb);card.style.animationDelay=`${i*40}ms`;c.appendChild(card);});
        s.appendChild(c);return s;
      }

      function renderAlbumDetail(album,container,onClose){
        const ov=document.createElement('div');ov.className='slide-overlay';container.appendChild(ov);
        const img=safeImg(album.images?.[0]?.url);
        const artist=album.artists?.map(a=>a.name).join(', ')||'Unknown';
        const year=album.release_date?.split('-')[0]||'';
        ov.innerHTML=`<div class="overlay-hero"><div class="overlay-back" id="detailBack">${ICONS.back} Back</div><div class="overlay-art-wrap">${img?`<img class="overlay-art" src="${escHtml(img)}" alt="${escHtml(album.name)}" loading="lazy">`:''}</div><div class="overlay-meta"><div class="overlay-title">${escHtml(album.name)}</div><div class="overlay-artist">${escHtml(artist)}</div><div class="overlay-info-row">${year?`<span class="tag">${year}</span>`:''}<span class="tag">${album.total_tracks} tracks</span>${album.album_type?`<span class="tag">${escHtml(album.album_type)}</span>`:''}</div></div></div><div class="overlay-actions" id="detailActions"><button class="btn btn-primary" id="detailPlayBtn">▶ Play Now</button><button class="btn btn-secondary" id="detailQueueBtn">+ Queue All</button><button class="btn btn-icon" id="detailSaveBtn" title="Save">${ICONS.bookmark}</button></div><div class="track-list" id="trackList"><div style="text-align:center;padding:20px;color:var(--text-muted)">Loading tracks…</div></div>`;
        requestAnimationFrame(()=>requestAnimationFrame(()=>ov.classList.add('open')));
        ov.querySelector('#detailBack').addEventListener('click',()=>{ov.classList.remove('open');setTimeout(()=>{ov.remove();if(onClose)onClose();},350);});
        DB.isInListenLater(album.id).then(saved=>{const b=ov.querySelector('#detailSaveBtn');if(saved)b.classList.add('active');b.addEventListener('click',()=>toggleListenLater(album,b));});
        ov.querySelector('#detailPlayBtn').addEventListener('click',async()=>{try{await SpotifyAPI.playAlbum(`spotify:album:${album.id}`);UI.showToast('▶ Playing…');DB.logListening({album_id:album.id,album_name:album.name,artist_name:artist,action:'played'});}catch(e){handleApiError(e);}});
        ov.querySelector('#detailQueueBtn').addEventListener('click',()=>queueAlbumTracks(album,artist,ov.querySelector('#detailActions')));

    // ── Genre Index ──
    async function buildGenreIndex(onProgress){
      const cached=await DB.getGenreIndex();if(cached.length>0){const oldest=cached.reduce((a,b)=>a.updated_at<b.updated_at?a:b);if((Date.now()-oldest.updated_at)/(864e5)<7){const m=new Map();cached.forEach(e=>m.set(e.genre,e.album_ids));return m;}}
      const albums=await DB.getAlbums();if(!albums.length)return new Map();
      const uids=[...new Set(albums.flatMap(a=>(a.artists||[]).map(ar=>ar.id)))];let f=0;
      for(const id of uids){if(!_artistGenreCache.has(id)){try{const d=await SpotifyAPI.getArtist(id);_artistGenreCache.set(id,d.genres||[]);}catch(e){_artistGenreCache.set(id,[]);}await sleep(120);}f++;if(onProgress)onProgress(f,uids.length);}
      const gm=new Map();for(const a of albums){const gs=new Set();for(const ar of(a.artists||[])){for(const g of(_artistGenreCache.get(ar.id)||[])){if(!gs.has(g)){gs.add(g);if(!gm.has(g))gm.set(g,new Set());gm.get(g).add(a.id);}}}}
      await DB.clearGenreIndex();const now=Date.now(),res=new Map();for(const[g,ids]of gm){const a=[...ids];await DB.saveGenreEntry({genre:g,album_ids:a,updated_at:now});res.set(g,a);}return res;
    }

    async function renderGenreMixes(container){
      const albums=await DB.getAlbums();if(!albums.length){container.appendChild(Object.assign(document.createElement('div'),{className:'empty-state',innerHTML:'<div class="empty-state-icon">🎵</div><h3>No albums yet</h3><p class="text-muted" style="margin-top:8px;font-size:0.85rem">Sync from Profile tab.</p>'}));return;}
      const albumMap=new Map(albums.map(a=>[a.id,a]));
      const pw=document.createElement('div');pw.className='genre-build-progress fade-in';pw.innerHTML=`<div class="label-sm" style="margin-bottom:10px">Genre Mixes</div><div class="genre-build-label" id="genreBuildLabel">Building genre index…</div><div class="genre-build-sublabel" id="genreBuildSub">Fetching artist data</div><div class="progress-track"><div class="progress-fill" id="genreBuildFill" style="width:0%"></div></div>`;container.appendChild(pw);
      let gm;try{gm=await buildGenreIndex((f,t)=>{const p=t>0?Math.round((f/t)*100):0;const l=document.getElementById('genreBuildLabel'),s=document.getElementById('genreBuildSub'),fl=document.getElementById('genreBuildFill');if(l)l.textContent='Building genre index…';if(s)s.textContent=`${f} / ${t} artists`;if(fl)fl.style.width=`${p}%`;});}catch(e){pw.innerHTML='<div class="error-card"><p style="font-size:0.85rem">Could not build genre index.</p></div>';return;}
      pw.remove();
      const genres=[...gm.entries()].filter(([,ids])=>ids.length>=3).sort((a,b)=>b[1].length-a[1].length);
      if(!genres.length){container.appendChild(Object.assign(document.createElement('div'),{className:'coming-soon-card fade-in',innerHTML:'<div class="coming-soon-icon">🎵</div><div class="coming-soon-title">No Genre Data</div><p class="coming-soon-text">Spotify doesn\'t have genre info for your artists.</p>'}));return;}
      const sh=document.createElement('div');sh.className='section-header fade-in';sh.innerHTML=`<span class="section-title">Genre Mixes</span><button class="genre-rebuild-btn" id="rebuildGenreBtn">Rebuild</button>`;container.appendChild(sh);
      sh.querySelector('#rebuildGenreBtn').addEventListener('click',async()=>{await DB.clearGenreIndex();_artistGenreCache.clear();const dp=document.getElementById('tabDiscover');if(dp)await renderDiscoverTab(dp);});
      const car=document.createElement('div');car.className='carousel';container.appendChild(car);
      genres.forEach(([genre,albumIds],i)=>{
        const card=document.createElement('div');card.className='genre-card fade-in';card.style.animationDelay=`${i*40}ms`;
        const sids=albumIds.slice(0,Math.min(12,albumIds.length));for(let j=sids.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[sids[j],sids[k]]=[sids[k],sids[j]];}
        const cas=sids.map(id=>albumMap.get(id)).filter(a=>a&&a.images?.[1]?.url).slice(0,4);
        const col=document.createElement('div');col.className='genre-collage';
        for(let c=0;c<4;c++){if(cas[c]){const im=document.createElement('img');im.src=safeImg(cas[c].images[1].url);im.alt='';im.loading='lazy';col.appendChild(im);}else{const ph=document.createElement('div');ph.className='genre-collage-placeholder';ph.textContent='♪';col.appendChild(ph);}}
        card.appendChild(col);
        /* FIX: use DOM instead of innerHTML += */
        const info=document.createElement('div');info.className='genre-card-info';
        const nm=document.createElement('div');nm.className='genre-card-name';nm.textContent=genre;
        const ct=document.createElement('div');ct.className='genre-card-count';ct.textContent=`${albumIds.length} album${albumIds.length!==1?'s':''}`;
        info.appendChild(nm);info.appendChild(ct);card.appendChild(info);
        card.addEventListener('click',()=>renderGenreDetail(genre,albumIds,albumMap));car.appendChild(card);
      });
    }

    function renderGenreDetail(genre,albumIds,albumMap){
      const appEl=document.getElementById('app'),ov=document.createElement('div');ov.className='slide-overlay';appEl.appendChild(ov);
      const ga=albumIds.map(id=>albumMap.get(id)).filter(Boolean);

    // ── Rediscovery ──
    async function getRediscoveryAlbums(td=90){
      const[albums,log]=await Promise.all([DB.getAlbums(),DB.getListeningLog()]);if(!albums.length)return[];
      const tms=td*864e5,now=Date.now(),lpm=new Map();
      for(const e of log){if(e.action==='played'||e.action==='queued'){const p=lpm.get(e.album_id)||0;if(e.timestamp>p)lpm.set(e.album_id,e.timestamp);}}
      try{const r=await SpotifyAPI.request('/me/player/recently-played?limit=50');if(r?.items)for(const i of r.items){const aid=i.track?.album?.id;if(!aid)continue;const ts=new Date(i.played_at).getTime(),p=lpm.get(aid)||0;if(ts>p)lpm.set(aid,ts);}}catch(e){}
      const res=[];for(const a of albums){const lt=lpm.get(a.id)||null;if(lt===null){res.push({album:a,lastPlayedTs:null,daysSince:null,neverPlayed:true});}else{const age=now-lt;if(age>=tms)res.push({album:a,lastPlayedTs:lt,daysSince:Math.floor(age/864e5),neverPlayed:false});}}
      res.sort((a,b)=>{if(a.neverPlayed&&b.neverPlayed)return 0;if(a.neverPlayed)return 1;if(b.neverPlayed)return-1;return b.daysSince-a.daysSince;});return res;
    }

      async function init(){
        window.addEventListener('online',()=>document.getElementById('offlineBadge')?.classList.remove('visible'));

        if(!Auth.isLoggedIn()&&!gotCode&&!gotHash&&!restored){const cid=await DB.getSetting('client_id');if(!cid){showOnboarding();return;}showLoginScreen();return;}
        buildShell();
        const albums=await DB.getAlbums();if(!albums.length){await syncLibrary(document.getElementById('app'));markAllDirty();}
        const hp=document.getElementById('tabHome');if(hp){_tabDirty.home=false;await renderHomeTab(hp);}
        const ei=Auth.getExpiresIn();if(ei>0&&ei<600)UI.showToast(`Session expires in ${Math.floor(ei/60)} min`);
      }
      return{init,switchTab};
    })();

    // ── Screens ──
    function showOnboarding(){
      document.getElementById('app').innerHTML='';const s=document.createElement('div');s.className='screen';
      s.innerHTML=`<div class="screen-logo">Album<span>.</span>Discovery</div><div class="screen-tagline">Your Spotify library, rediscovered. Roon-style.</div><div class="form-group"><label class="form-label" for="inputClientId">Spotify Client ID</label><input class="form-input" id="inputClientId" type="text" placeholder="e.g. a1b2c3d4e5f6…" autocomplete="off" spellcheck="false"><div class="form-hint">Create app at <strong>developer.spotify.com</strong> → Dashboard.<br>Set redirect URI to this page's URL.</div></div><div class="form-group"><label class="form-label" for="inputRedirectUri">Redirect URI</label><input class="form-input" id="inputRedirectUri" type="url" value="${escHtml(window.location.origin+window.location.pathname)}"><div class="form-hint">Must match exactly in Spotify Developer Dashboard.</div></div><button class="btn btn-primary form-btn" id="connectBtn">Connect to Spotify →</button><div style="margin-top:20px;font-size:0.75rem;color:var(--text-muted);text-align:center;max-width:320px;line-height:1.6;">Stored locally. No backend, no tracking. Uses PKCE auth.</div>`;
      document.getElementById('app').appendChild(s);
      s.querySelector('#connectBtn').addEventListener('click',async()=>{const cid=s.querySelector('#inputClientId').value.trim(),ruri=s.querySelector('#inputRedirectUri').value.trim();if(!cid||cid.length<10){UI.showToast('Enter a valid Client ID');return;}if(!ruri||!ruri.startsWith('http')){UI.showToast('Enter a valid Redirect URI');return;}await DB.setSetting('client_id',cid);await DB.setSetting('redirect_uri',ruri);Auth.login();});
    }
    function showLoginScreen(){
      const app=document.getElementById('app');app.innerHTML='';const s=document.createElement('div');s.className='screen';
      s.innerHTML=`<div class="screen-logo">Album<span>.</span>Discovery</div><div class="screen-tagline">Sign in to access your Spotify library.</div><button class="btn btn-primary form-btn" id="loginBtn" style="margin-top:8px">Sign in with Spotify</button><button class="btn btn-ghost form-btn" id="setupBtn" style="margin-top:10px">Change Settings</button>`;
      app.appendChild(s);s.querySelector('#loginBtn').addEventListener('click',()=>Auth.login());s.querySelector('#setupBtn').addEventListener('click',showOnboarding);
    }
    function showReAuthOverlay(){
      if(document.getElementById('reAuthOverlay'))return;const o=document.createElement('div');o.id='reAuthOverlay';o.className='reauth-overlay';
      o.innerHTML=`<div class="reauth-card"><div style="font-size:2rem;margin-bottom:12px;">🔒</div><h3 style="margin-bottom:8px;">Session Expired</h3><p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:24px;">Re-login to continue.</p><button class="btn btn-primary" style="width:100%" id="reAuthBtn">Re-login to Spotify</button></div>`;
      document.body.appendChild(o);o.querySelector('#reAuthBtn').addEventListener('click',()=>Auth.login());
    }

    App.init();
  })();
  </script>
</body>
</html>
