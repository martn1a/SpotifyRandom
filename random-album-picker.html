<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AlbumPick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #1DB954;
      --green-dark: #158a3e;
      --green-glow: rgba(29,185,84,.12);
      --bg:         #090909;
      --surface:    #111111;
      --surface2:   #181818;
      --border:     #252525;
      --border2:    #2e2e2e;
      --text:       #e8e8e8;
      --text-dim:   #5a5a5a;
      --text-mid:   #888888;
      --error:      #e84343;
      --font-h:     'Bebas Neue', sans-serif;
      --font-body:  'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--font-h);
      font-size: 26px;
      letter-spacing: 3px;
      color: var(--green);
      line-height: 1;
      user-select: none;
    }

    .logo em { color: var(--text); font-style: normal; }

    /* ── BUTTONS ─────────────────────────────────────── */
    .btn {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      padding: 10px 16px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: border-color .15s, background .15s, color .15s;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover  { border-color: var(--text-mid); }
    .btn:active { transform: scale(.98); }

    .btn-primary {
      background: var(--green);
      border-color: var(--green);
      color: #000;
      font-weight: 500;
    }
    .btn-primary:hover  { background: #1fdf64; border-color: #1fdf64; }
    .btn-primary:active { background: var(--green-dark); border-color: var(--green-dark); }
    .btn-primary:disabled {
      background: var(--green-dark);
      border-color: var(--green-dark);
      color: rgba(0,0,0,.5);
      cursor: not-allowed;
      transform: none;
    }

    .btn-ghost-danger { border-color: var(--error); color: var(--error); font-size: 11px; }
    .btn-ghost-danger:hover { background: var(--error); color: #fff; }

    /* ── MAIN ────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 18px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── GLOBAL STATUS (for boot errors shown on login screen) */
    #globalStatus {
      max-width: 480px;
      width: calc(100% - 36px);
      margin: 12px auto 0;
      border-radius: 2px;
      font-size: 12px;
      padding: 0;
      display: none;
    }
    #globalStatus.show {
      display: block;
      padding: 12px 14px;
    }
    #globalStatus.error {
      background: rgba(232,67,67,.1);
      border: 1px solid rgba(232,67,67,.3);
      color: var(--error);
    }

    /* ── LOGIN SCREEN ────────────────────────────────── */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 52px 24px 40px;
      text-align: center;
    }

    .login-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .login-title {
      font-family: var(--font-h);
      font-size: 48px;
      letter-spacing: 4px;
      color: var(--green);
      line-height: 1;
    }

    .login-sub {
      color: var(--text-mid);
      font-size: 12px;
      line-height: 1.9;
      max-width: 272px;
    }

    /* ── CARD ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    /* ── COLLAPSIBLE ─────────────────────────────────── */
    .collapse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      min-height: 48px;
    }
    .collapse-header:hover { background: var(--surface2); }

    .collapse-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-mid);
    }

    .collapse-arrow {
      color: var(--text-dim);
      font-size: 9px;
      transition: transform .2s;
    }
    .collapse-arrow.open { transform: rotate(180deg); }

    .collapse-body {
      border-top: 1px solid var(--border);
      padding: 16px;
      display: none;
    }
    .collapse-body.open { display: block; }

    /* ── FILTER CONTROLS ─────────────────────────────── */
    .filter-section { margin-bottom: 20px; }
    .filter-section:last-child { margin-bottom: 0; }

    .filter-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--green);
      margin-bottom: 10px;
      display: block;
    }

    /* Decade chips */
    .decade-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .decade-chip { position: relative; }
    .decade-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
    .decade-chip label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      transition: all .15s;
    }
    .decade-chip label:active { transform: scale(.96); }
    .decade-chip input:checked + label {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }

    /* Toggle row */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      gap: 12px;
    }
    .toggle-info { flex: 1; }
    .toggle-title { font-size: 12px; color: var(--text); }
    .toggle-sub   { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border2);
      border-radius: 13px;
      transition: background .2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: transform .2s, background .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--green); }
    .toggle-switch input:checked + .toggle-track::after {
      transform: translateX(18px);
      background: #fff;
    }

    /* Duration sliders */
    .slider-row { display: flex; flex-direction: column; gap: 10px; }
    .slider-values {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
    }
    .slider-values b { color: var(--text); font-weight: 400; }
    .range-wrap { display: flex; flex-direction: column; gap: 8px; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px; height: 26px;
      background: var(--green);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    input[type=range]::-moz-range-thumb {
      width: 26px; height: 26px;
      background: var(--green);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    /* Stats chip */
    .stats-chip {
      display: none;
      font-size: 10px;
      color: var(--text-dim);
      padding: 10px 0 0;
      text-align: center;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    .stats-chip.visible { display: block; }

    /* Genre chips */
    .genre-search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 2px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 11px;
      padding: 9px 12px;
      margin-bottom: 10px;
      outline: none;
      transition: border-color .15s;
    }
    .genre-search::placeholder { color: var(--text-dim); }
    .genre-search:focus { border-color: var(--green); }

    .genre-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .genre-count { font-size: 10px; color: var(--text-dim); }
    .genre-clear {
      font-size: 10px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      padding: 4px 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .genre-clear:hover { color: var(--text); }

    .genre-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
      padding-right: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }
    .genre-list::-webkit-scrollbar { width: 4px; }
    .genre-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .genre-chip { position: relative; }
    .genre-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
    .genre-chip label {
      display: flex;
      align-items: center;
      padding: 0 10px;
      height: 34px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      transition: all .15s;
    }
    .genre-chip label:hover  { border-color: var(--text-mid); color: var(--text); }
    .genre-chip label:active { transform: scale(.96); }
    .genre-chip input:checked + label {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }
    .genre-empty { font-size: 11px; color: var(--text-dim); }
    .genre-loading {
      font-size: 10px; color: var(--text-dim);
      display: flex; align-items: center; gap: 8px;
    }
    .genre-loading::before {
      content: '';
      display: inline-block;
      width: 10px; height: 10px;
      border: 1px solid var(--border2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ACTION ROW ──────────────────────────────────── */
    .action-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .count-selector {
      display: flex;
      border: 1px solid var(--border2);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .count-btn {
      padding: 0 13px;
      height: 52px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      border-right: 1px solid var(--border2);
      min-width: 40px;
    }
    .count-btn:last-child { border-right: none; }
    .count-btn.active { background: var(--green); color: #000; }
    .count-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .count-btn:active:not(.active) { background: var(--border2); }

    #queueBtn {
      flex: 1;
      height: 52px;
      font-size: 12px;
      letter-spacing: 1.5px;
    }

    /* ── PROGRESS ────────────────────────────────────── */
    .progress-wrap { display: none; }
    .progress-wrap.visible { display: block; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 7px;
    }
    .progress-bar-bg {
      height: 2px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width .3s ease;
      width: 0%;
    }

    /* ── STATUS ──────────────────────────────────────── */
    .status-area {
      display: none;
      padding: 13px 15px;
      border-radius: 2px;
      font-size: 12px;
      line-height: 1.7;
    }
    .status-area.success {
      display: block;
      background: var(--green-glow);
      border: 1px solid rgba(29,185,84,.3);
      color: var(--green);
    }
    .status-area.error {
      display: block;
      background: rgba(232,67,67,.08);
      border: 1px solid rgba(232,67,67,.25);
      color: var(--error);
    }

    /* ── SELECTED ALBUMS LIST ────────────────────────── */
    .section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-dim);
    }

    .album-list { display: flex; flex-direction: column; gap: 8px; }
    .album-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      animation: fadeIn .25s ease forwards;
      opacity: 0;
      position: relative;
      overflow: hidden;
      touch-action: pan-y;   /* allow vertical scroll; we handle horizontal swipe ourselves */
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── SWIPE / REROLL ─────────────────────────────────── */
    .album-item.swipe-exit {
      transition: transform .22s ease, opacity .18s ease !important;
      animation: none !important;
      transform: translateX(-110%) !important;
      opacity: 0 !important;
    }
    @keyframes slideInRight {
      from { transform: translateX(48px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    .album-item.swipe-enter {
      animation: slideInRight .22s ease forwards !important;
    }

    .reroll-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border2);
      border-radius: 50%;
      background: transparent;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, color .15s, transform .1s;
    }
    .reroll-btn:hover  { border-color: var(--green); color: var(--green); }
    .reroll-btn:active { transform: scale(.88); }

    /* ── QUEUE-SELECTED BUTTON ──────────────────────────── */
    #queueSelectedBtn {
      width: 100%;
      height: 52px;
      font-size: 12px;
      letter-spacing: 1.5px;
      margin-top: 10px;
    }

    /* ── AGE FILTER CHIPS ───────────────────────────────── */
    .age-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .age-chip { position: relative; }
    .age-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
    .age-chip label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-dim);
      transition: all .15s;
      text-align: center;
      line-height: 1.3;
      padding: 0 4px;
    }
    .age-chip label:active { transform: scale(.96); }
    .age-chip input:checked + label {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }

    /* ── HISTORY NOTE ───────────────────────────────────── */
    .history-note {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .history-note-clear {
      background: none; border: none; cursor: pointer;
      font-family: var(--font-body); font-size: 10px;
      color: var(--text-dim);
      text-decoration: underline; text-underline-offset: 3px;
      padding: 0;
    }
    .history-note-clear:hover { color: var(--text); }
    .album-num {
      font-size: 10px;
      color: var(--text-dim);
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }
    .album-art {
      width: 38px; height: 38px;
      background: var(--border);
      border-radius: 1px;
      flex-shrink: 0;
      object-fit: cover;
    }
    .album-art-placeholder {
      width: 38px; height: 38px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 1px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .album-info { flex: 1; min-width: 0; }
    .album-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .album-artist {
      font-size: 10px;
      color: var(--text-mid);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .album-meta {
      font-size: 10px;
      color: var(--text-dim);
      flex-shrink: 0;
      text-align: right;
      line-height: 1.6;
    }

    /* ── FOOTER ──────────────────────────────────────── */
    .footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
    }
    .footer-inner {
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 480px;
      margin: 0 auto;
    }
    .footer-info { flex: 1; }
    .footer-label { font-size: 11px; color: var(--text-mid); }
    .footer-sub   { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* ── MOBILE TWEAKS ───────────────────────────────── */
    @media (max-width: 360px) {
      .count-btn { padding: 0 10px; font-size: 12px; }
      .decade-grid { gap: 4px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────── -->
  <header class="header">
    <div class="logo">Album<em>Pick</em></div>
    <div id="headerActions"></div>
  </header>

  <!-- Boot-phase error (shown before main renders) -->
  <div id="globalStatus"></div>

  <!-- ── MAIN ───────────────────────────────────────── -->
  <main class="main" id="appMain"></main>

  <!-- ── FOOTER ─────────────────────────────────────── -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-info">
        <div class="footer-label">Browser client mode</div>
        <div class="footer-sub">5 s delay between tracks (avoids rate limits)</div>
      </div>
      <label class="toggle-switch" aria-label="Browser client mode">
        <input type="checkbox" id="browserModeToggle">
        <span class="toggle-track"></span>
      </label>
    </div>
  </footer>

  <script>
    'use strict';

    // ═══════════════════════════════════════════════════════════════════════
    // ── CONFIG ── Edit only these values ────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    const CLIENT_ID    = 'ed48e32b12fd4b01ad0dbdf383cb3ff6';
    // Must exactly match the URI registered in your Spotify Developer Dashboard.
    const REDIRECT_URI = 'https://martn1a.github.io/SpotifyRandom/random-album-picker.html';

    // Required scopes for reading the library and controlling playback
    const SCOPES = 'user-library-read user-read-playback-state user-modify-playback-state';

    // Delay between successive POST /me/player/queue calls.
    // Desktop client tolerates 300 ms; browser client needs ~5 s.
    const DELAY_DESKTOP_MS = 300;
    const DELAY_BROWSER_MS = 5000;

    // Album titles containing these substrings (case-insensitive) are excluded
    // when the keyword filter is active.
    const BLOCKLIST_KEYWORDS = ['instrumental', 'remix', 'edit', 'live', 'reprise', 'version'];

    // Library cache: key used in localStorage, and max age before a refresh is suggested.
    const CACHE_KEY     = 'albumpick_library_v1';
    const CACHE_MAX_AGE = 7 * 24 * 60 * 60 * 1000;   // 7 days in ms

    // Play-history cache: tracks which albums were recently queued so we can
    // exclude them when "Avoid recently played" is active.
    const HISTORY_KEY          = 'albumpick_history_v1';
    const HISTORY_MAX_AGE_DAYS = 30;   // albums queued within this window are "recent"


    // ═══════════════════════════════════════════════════════════════════════
    // ── CACHE MODULE ─────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Slim down a full Spotify album object to only the fields we need.
     * Keeps the payload small enough for localStorage (5 MB limit).
     * _genres is added after the artist-genre fetch and is preserved here.
     */
    function slimAlbum(a) {
      return {
        id:           a.id,
        name:         a.name,
        release_date: a.release_date,
        // added_at comes from the /me/albums item wrapper (not the album object itself).
        // We attach it as _added_at in fetchAllAlbums before slimming.
        _added_at:    a._added_at || null,
        artists:      (a.artists || []).map(ar => ({ id: ar.id, name: ar.name })),
        // Keep only the smallest image (index 2) for the album card thumbnail
        images:       a.images ? [a.images[2] || a.images[1] || a.images[0]].filter(Boolean) : [],
        tracks: {
          total: a.tracks?.total,
          next:  a.tracks?.next || null,
          // Only store uri + duration_ms — that's all the filter & queue need
          items: (a.tracks?.items || []).map(t => ({
            uri:         t.uri,
            duration_ms: t.duration_ms,
          })),
        },
        _genres: a._genres || [],
      };
    }

    /** Persist the full library + genre list to localStorage. */
    function saveLibraryCache() {
      try {
        const payload = JSON.stringify({
          cachedAt: Date.now(),
          genres:   allGenres,
          albums:   allAlbums.map(slimAlbum),
        });
        localStorage.setItem(CACHE_KEY, payload);
      } catch (e) {
        // Quota exceeded or private browsing — silently ignore
        console.warn('AlbumPick: could not write library cache', e);
      }
    }

    /**
     * Try to load the library from localStorage.
     * Returns true if the cache was valid and data was restored, false otherwise.
     * Callers should check `cacheAge()` to decide whether to suggest a refresh.
     */
    function loadLibraryCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return false;
        const { cachedAt, genres, albums } = JSON.parse(raw);
        if (!Array.isArray(albums) || albums.length === 0) return false;
        allAlbums = albums;
        allGenres = genres || [];

        // Fallback: if the top-level genres list is missing or empty (e.g. truncated
        // write, quota error on a previous save), reconstruct it from the per-album
        // _genres fields that were stored alongside every album entry.
        if (allGenres.length === 0 && allAlbums.length > 0) {
          const gset = new Set();
          for (const a of allAlbums)
            for (const g of (a._genres || []))
              gset.add(g);
          allGenres = [...gset].sort();
        }

        state.cachedAt = cachedAt || null;
        return true;
      } catch (e) {
        return false;
      }
    }

    /** Remove the cached library. */
    function clearLibraryCache() {
      localStorage.removeItem(CACHE_KEY);
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── HISTORY MODULE ───────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Each history entry: { id: string, name: string, queuedAt: number (ms) }
     * Stored under HISTORY_KEY in localStorage.
     * Automatically pruned to entries newer than HISTORY_MAX_AGE_DAYS on every load.
     */
    function loadHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        if (!raw) return [];
        const entries = JSON.parse(raw);
        const cutoff  = Date.now() - HISTORY_MAX_AGE_DAYS * 86400000;
        return entries.filter(e => e.queuedAt > cutoff);
      } catch (e) { return []; }
    }

    /** Append albums to the play history. Deduplicates by id. */
    function appendHistory(albums) {
      try {
        const existing = loadHistory();
        const newIds   = new Set(albums.map(a => a.id));
        const pruned   = existing.filter(e => !newIds.has(e.id));
        const updated  = [
          ...pruned,
          ...albums.map(a => ({ id: a.id, name: a.name, queuedAt: Date.now() })),
        ];
        localStorage.setItem(HISTORY_KEY, JSON.stringify(updated));
      } catch (e) {
        console.warn('AlbumPick: could not write history', e);
      }
    }

    function clearHistory() {
      localStorage.removeItem(HISTORY_KEY);
    }

    /** Returns a Set of album IDs queued within the history window. */
    function getRecentIds() {
      return new Set(loadHistory().map(e => e.id));
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── AUTH MODULE – PKCE ───────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Generate a cryptographically random URL-safe string of `len` chars. */
    function generateRandom(len = 64) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      const arr   = crypto.getRandomValues(new Uint8Array(len));
      return Array.from(arr, b => chars[b % chars.length]).join('');
    }

    /**
     * Hash the PKCE verifier with SHA-256, then base64url-encode.
     * This is the code_challenge sent to Spotify on the first leg.
     */
    async function generateChallenge(verifier) {
      const data   = new TextEncoder().encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(digest)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    /** Begin the PKCE auth flow: generate verifier → challenge → redirect. */
    async function login() {
      const verifier  = generateRandom(64);
      const challenge = await generateChallenge(verifier);
      const state     = generateRandom(16);

      localStorage.setItem('pkce_verifier', verifier);
      localStorage.setItem('pkce_state',    state);

      const params = new URLSearchParams({
        response_type:         'code',
        client_id:             CLIENT_ID,
        scope:                 SCOPES,
        redirect_uri:          REDIRECT_URI,
        state,
        code_challenge_method: 'S256',
        code_challenge:        challenge,
      });

      window.location.href = 'https://accounts.spotify.com/authorize?' + params;
    }

    /**
     * Second leg: exchange the auth code for access + refresh tokens.
     * Called once after Spotify redirects back with ?code=&state=.
     */
    async function handleCallback(code, returnedState) {
      const storedState = localStorage.getItem('pkce_state');
      if (returnedState !== storedState) throw new Error('State mismatch – possible CSRF. Please try logging in again.');

      const verifier = localStorage.getItem('pkce_verifier');

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          code,
          redirect_uri:  REDIRECT_URI,
          client_id:     CLIENT_ID,
          code_verifier: verifier,
        }),
      });

      if (!res.ok) throw new Error('Token exchange failed: ' + (await res.text()));
      storeTokens(await res.json());

      // Remove ?code=&state= from the URL so a hard-refresh doesn't re-submit
      window.history.replaceState({}, '', window.location.pathname);
    }

    /**
     * Silently refresh the access token using the stored refresh token.
     * Spotify may return a new refresh_token; if so we store it.
     * Note: Spotify's PKCE refresh tokens can expire after extended inactivity;
     * if refresh fails we clear state and ask the user to log in again.
     */
    async function refreshAccessToken() {
      const refreshToken = localStorage.getItem('spotify_refresh_token');
      if (!refreshToken) throw new Error('No refresh token – please log in.');

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'refresh_token',
          refresh_token: refreshToken,
          client_id:     CLIENT_ID,
        }),
      });

      if (!res.ok) {
        logout();
        throw new Error('Session expired – please log in again.');
      }
      storeTokens(await res.json());
    }

    /** Persist tokens; subtract 60 s from expires_in as a safety buffer. */
    function storeTokens({ access_token, refresh_token, expires_in }) {
      localStorage.setItem('spotify_access_token', access_token);
      if (refresh_token) localStorage.setItem('spotify_refresh_token', refresh_token);
      localStorage.setItem('spotify_expires_at', String(Date.now() + (expires_in - 60) * 1000));
    }

    /** Return a valid access token, refreshing if needed. */
    async function getAccessToken() {
      if (Date.now() > Number(localStorage.getItem('spotify_expires_at') || 0)) {
        await refreshAccessToken();
      }
      return localStorage.getItem('spotify_access_token');
    }

    function isLoggedIn() {
      return !!localStorage.getItem('spotify_refresh_token');
    }

    function logout() {
      ['spotify_access_token', 'spotify_refresh_token', 'spotify_expires_at',
       'pkce_verifier', 'pkce_state'].forEach(k => localStorage.removeItem(k));
      clearLibraryCache();
      allAlbums = [];
      allGenres = [];
      state.cachedAt = null;
      render();
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── SPOTIFY API MODULE ───────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Authenticated GET; throws on non-2xx. */
    async function apiGet(url) {
      const token = await getAccessToken();
      const res   = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(`Spotify API ${res.status}: ${body || res.statusText}`);
      }
      return res.json();
    }

    /**
     * Fetch every saved album from /v1/me/albums.
     * The API returns max 50 per page; we follow `next` until null.
     * `onProgress(loaded, total)` is called after each page.
     */
    async function fetchAllAlbums(onProgress) {
      const albums = [];
      let url = 'https://api.spotify.com/v1/me/albums?limit=50&market=from_token';

      while (url) {
        const data = await apiGet(url);
        for (const item of data.items) {
          const album = item.album;
          // added_at lives on the item wrapper, NOT on the album object itself.
          // Spotify's /me/albums response wraps each album in { added_at, album: {...} }.
          // We attach it before pushing so slimAlbum() can persist it.
          album._added_at = item.added_at || null;
          albums.push(album);
        }
        url = data.next;   // null on the last page
        onProgress(albums.length, data.total);
      }
      return albums;
    }

    /**
     * Batch-fetch artist objects (max 50 per request) to read their genre tags.
     * Spotify does NOT expose genres on album objects — they live on the artist.
     * After this call every album in `albums` gets a `_genres` string[] property
     * containing the union of genres from all of its artists.
     * Returns a sorted, deduplicated array of every genre found in the library.
     */
    async function fetchArtistGenres(albums, onProgress) {
      // Collect every unique artist ID referenced across the library
      const idSet = new Set();
      for (const a of albums)
        for (const ar of (a.artists || []))
          if (ar.id) idSet.add(ar.id);

      const ids = [...idSet];
      const genreMap = new Map();   // artistId → string[]
      const BATCH = 50;

      for (let i = 0; i < ids.length; i += BATCH) {
        const batch = ids.slice(i, i + BATCH);
        // GET /v1/artists?ids=id1,id2,... returns up to 50 artist objects
        const data = await apiGet(
          'https://api.spotify.com/v1/artists?ids=' + batch.join(',')
        );
        for (const artist of (data.artists || []))
          if (artist) genreMap.set(artist.id, artist.genres || []);

        onProgress(Math.min(i + BATCH, ids.length), ids.length);
      }

      // Attach a _genres field to each album and collect the global genre set
      const globalSet = new Set();
      for (const album of albums) {
        const ag = new Set();
        for (const ar of (album.artists || []))
          for (const g of (genreMap.get(ar.id) || []))
            { ag.add(g); globalSet.add(g); }
        album._genres = [...ag];
      }

      return [...globalSet].sort();
    }

    /**, including extra pages when total > 50.
     * The /me/albums response embeds up to 50 tracks inline; albums with
     * more (rare but real) require extra requests to /v1/albums/{id}/tracks.
     */
    async function getAlbumTracks(album) {
      let items = album.tracks?.items || [];
      let next  = album.tracks?.next;           // present when total > 50

      while (next) {
        // Fetch the next page of tracks for this album
        const data = await apiGet(next);
        items = items.concat(data.items);
        next  = data.next;
      }
      return items;
    }

    /**
     * Add a single track URI to the user's active playback queue.
     * Spotify returns 204 on success, 404 when no active device is found.
     * The Spotify browser client may need longer delays between calls to
     * avoid 429 rate-limiting; the footer toggle controls this.
     */
    async function addToQueue(uri) {
      const token = await getAccessToken();
      const res   = await fetch(
        `https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(uri)}`,
        { method: 'POST', headers: { Authorization: 'Bearer ' + token } }
      );
      if (res.status === 404) throw new Error('No active Spotify device found. Start playing something first, then try again.');
      if (res.status === 429) throw new Error('Rate limited by Spotify. Enable "Browser client mode" in the footer for slower (safer) queuing.');
      if (!res.ok && res.status !== 204) throw new Error(`Queue error ${res.status}`);
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));


    // ═══════════════════════════════════════════════════════════════════════
    // ── FILTER MODULE ────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Parse the 4-digit year from Spotify's "YYYY", "YYYY-MM", or "YYYY-MM-DD". */
    function releaseYear(album) {
      return parseInt((album.release_date || '').slice(0, 4), 10) || 0;
    }

    /** Map a year to its decade string, e.g. 1983 → "80s", 1965 → "pre-70s". */
    function decadeOf(year) {
      if (year < 1970) return 'pre-70s';
      const base = Math.floor(year / 10) * 10;
      return String(base).slice(2) + 's';
    }

    /**
     * Sum duration of all inline tracks in minutes.
     * Tracks beyond 50 are not included here (they're fetched lazily at queue time),
     * so the slider filter is approximate for very long albums.
     */
    function albumDurMin(album) {
      return (album.tracks?.items || []).reduce((s, t) => s + (t.duration_ms || 0), 0) / 60000;
    }

    /**
     * Apply all active filters with AND logic.
     * Returns the subset of `albums` that passes every enabled filter.
     */
    function applyFilters(albums) {
      // Pre-compute recent IDs once per call (only when filter is active).
      // getRecentIds() parses localStorage and returns a Set<string>.
      const recentIds = state.filters.avoidRecent ? getRecentIds() : null;

      return albums.filter(album => {

        // ── Decade ──────────────────────────────────────────────────────
        // If no decades selected → skip this filter (accept all).
        if (state.filters.decades.length > 0) {
          if (!state.filters.decades.includes(decadeOf(releaseYear(album)))) return false;
        }

        // ── Keyword (checked against album title) ────────────────────
        if (state.filters.excludeKeywords) {
          const low = (album.name || '').toLowerCase();
          if (BLOCKLIST_KEYWORDS.some(kw => low.includes(kw))) return false;
        }

        // ── Duration ─────────────────────────────────────────────────
        const dur = albumDurMin(album);
        if (dur < state.filters.minDurMin || dur > state.filters.maxDurMin) return false;

        // ── Genre ──────────────────────────────────────────────────────
        // If genres selected → album must have at least one matching genre.
        if (state.filters.genres.length > 0) {
          const ag = album._genres || [];
          if (!state.filters.genres.some(g => ag.includes(g))) return false;
        }

        // ── Age ("not heard in a long time") ─────────────────────────
        // minAgeMonths > 0 → only albums that were added to the library
        // at least that many months ago (i.e., potentially forgotten).
        if (state.filters.minAgeMonths > 0) {
          const addedMs  = album._added_at ? new Date(album._added_at).getTime() : 0;
          const cutoffMs = Date.now() - state.filters.minAgeMonths * 30 * 24 * 60 * 60 * 1000;
          if (addedMs > cutoffMs) return false;  // added too recently → skip
        }

        // ── Avoid recently queued ─────────────────────────────────────
        // If the album was queued within HISTORY_MAX_AGE_DAYS, exclude it.
        if (state.filters.avoidRecent && recentIds && recentIds.has(album.id)) return false;

        return true;
      });
    }

                <div class="slider-values">
                  Min: <b id="minDurVal">${state.filters.minDurMin}</b> min
                  &nbsp;·&nbsp;
                  Max: <b id="maxDurVal">${state.filters.maxDurMin}</b> min
                </div>
                <div class="range-wrap">
                  <input type="range" id="minDur" min="0" max="200" step="5"
                    value="${state.filters.minDurMin}" aria-label="Minimum duration">
                  <input type="range" id="maxDur" min="0" max="200" step="5"
                    value="${state.filters.maxDurMin}" aria-label="Maximum duration">
                </div>
              </div>
            </div>

            <div class="stats-chip ${libraryLoaded ? 'visible' : ''}" id="statsChip">
              ${libraryLoaded ? allAlbums.length + ' albums in library · ' + applyFilters(allAlbums).length + ' match current filters' : ''}
            </div>
          </div>
        </div>

        <!-- Action row -->
        <div class="action-row">
          <div class="count-selector" id="countSelector">${countBtns}</div>
          <button class="btn btn-primary" id="queueBtn"
            ${state.isWorking ? 'disabled' : ''}>${queueLabel}</button>
        </div>

        <!-- Progress -->
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-meta">
            <span id="progressText">Loading…</span>
            <span id="progressPct"></span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
        </div>

        <!-- Status -->
        <div class="status-area" id="statusArea"></div>

        <!-- Selected albums (with inline Queue button) -->
        <div id="albumList"></div>
      `;

      attachEvents();
    }

    /**
     * Build the HTML for the genre filter section.
     * – Before library loaded: placeholder hint.
     * – While fetching genres: spinner.
     * – After genres loaded: search input + scrollable chip list.
     */
    function buildGenreFilterHTML() {
      if (!allAlbums.length) {
        return `<div class="genre-empty">Load your library first — genres will appear here.</div>`;
      }
      if (state.genresLoading) {
        return `<div class="genre-loading">Fetching artist genres…</div>`;
      }
      if (!allGenres.length) {
        return `<div class="genre-empty">No genre data found for your library.</div>`;
      }

      const selectedCount = state.filters.genres.length;
      const chips = allGenres.map(g => {
        const id      = 'g_' + g.replace(/[^a-z0-9]/gi, '_');
        const checked = state.filters.genres.includes(g) ? 'checked' : '';
        return `
          <div class="genre-chip">
            <input type="checkbox" id="${id}" value="${escHtml(g)}" ${checked}>
            <label for="${id}">${escHtml(g)}</label>
          </div>`;
      }).join('');

      return `
        <input class="genre-search" type="search" id="genreSearch"
          placeholder="Search genres…" autocomplete="off" value="">
        <div class="genre-toolbar">
          <span class="genre-count" id="genreCount">
            ${allGenres.length} genre${allGenres.length !== 1 ? 's' : ''}
            ${selectedCount ? ' · ' + selectedCount + ' selected' : ''}
          </span>
          <button class="genre-clear" id="genreClear" type="button">Clear</button>
        </div>
        <div class="genre-list" id="genreList">${chips}</div>`;
    }

    /** Re-render only the genre panel contents without rebuilding the whole UI. */
    function refreshGenrePanel() {
      const section = document.getElementById('genreFilterSection');
      if (!section) return;
      section.innerHTML = buildGenreFilterHTML();
      attachGenreEvents();
    }

    function attachEvents() {
      // Filter panel collapse
      document.getElementById('filterToggle').addEventListener('click', () => {
        state.filterOpen = !state.filterOpen;
        document.getElementById('filterArrow').classList.toggle('open', state.filterOpen);
        document.getElementById('filterBody').classList.toggle('open', state.filterOpen);
      });

      // Decade checkboxes
      document.querySelectorAll('.decade-chip input').forEach(cb => {
        cb.addEventListener('change', e => {
          const v = e.target.value;
          if (e.target.checked) { if (!state.filters.decades.includes(v)) state.filters.decades.push(v); }
          else { state.filters.decades = state.filters.decades.filter(d => d !== v); }
          updateStatsChip();
        });
      });

      // Keyword filter toggle
      document.getElementById('kwFilter').addEventListener('change', e => {
        state.filters.excludeKeywords = e.target.checked;
        updateStatsChip();
      });

      // Duration sliders
      const minSlider = document.getElementById('minDur');
      const maxSlider = document.getElementById('maxDur');
      minSlider.addEventListener('input', e => {
        state.filters.minDurMin = +e.target.value;
        if (state.filters.minDurMin > state.filters.maxDurMin) {
          state.filters.maxDurMin = state.filters.minDurMin;
          maxSlider.value = state.filters.maxDurMin;
          document.getElementById('maxDurVal').textContent = state.filters.maxDurMin;
        }
        document.getElementById('minDurVal').textContent = state.filters.minDurMin;
        updateStatsChip();
      });
      maxSlider.addEventListener('input', e => {
        state.filters.maxDurMin = +e.target.value;
        if (state.filters.maxDurMin < state.filters.minDurMin) {
          state.filters.minDurMin = state.filters.maxDurMin;
          minSlider.value = state.filters.minDurMin;
          document.getElementById('minDurVal').textContent = state.filters.minDurMin;
        }
        document.getElementById('maxDurVal').textContent = state.filters.maxDurMin;
        updateStatsChip();
      });

      // Album count buttons
      document.getElementById('countSelector').addEventListener('click', e => {
        const btn = e.target.closest('.count-btn');
        if (!btn) return;
        state.albumCount = +btn.dataset.count;
        document.querySelectorAll('.count-btn').forEach(b =>
          b.classList.toggle('active', +b.dataset.count === state.albumCount));
      });

      // Main queue button → now triggers handlePick()
      document.getElementById('queueBtn').addEventListener('click', handlePick);

      // Age filter (radio group)
      document.querySelectorAll('input[name="ageFilter"]').forEach(rb => {
        rb.addEventListener('change', e => {
          state.filters.minAgeMonths = +e.target.value;
          updateStatsChip();
        });
      });

      // Avoid recently played toggle
      const avoidRecentEl = document.getElementById('avoidRecentToggle');
      if (avoidRecentEl) {
        avoidRecentEl.addEventListener('change', e => {
          state.filters.avoidRecent = e.target.checked;
          updateStatsChip();
        });
      }

      // Clear history button (may not exist if history is empty)
      document.getElementById('clearHistoryBtn')?.addEventListener('click', () => {
        clearHistory();
        render();   // re-render to remove "X albums in history" note
      });

      // Genre events (may not exist yet if library not loaded)
      attachGenreEvents();
    }

    function attachGenreEvents() {
      // Search / filter chips
      const search = document.getElementById('genreSearch');
      if (search) {
        search.addEventListener('input', e => {
          const q = e.target.value.toLowerCase();
          const countEl = document.getElementById('genreCount');
          let visible = 0;
          document.querySelectorAll('.genre-chip').forEach(chip => {
            const label = chip.querySelector('label').textContent.toLowerCase();
            const show  = label.includes(q);
            chip.style.display = show ? '' : 'none';
            if (show) visible++;
          });
          if (countEl) {
            const sel = state.filters.genres.length;
            countEl.textContent = `${visible} genre${visible !== 1 ? 's' : ''}` +
              (sel ? ` · ${sel} selected` : '');
          }
        });
      }

      // Clear selection
      const clearBtn = document.getElementById('genreClear');
      if (clearBtn) {
        clearBtn.addEventListener('click', () => {
          state.filters.genres = [];
          document.querySelectorAll('.genre-chip input').forEach(cb => cb.checked = false);
          const countEl = document.getElementById('genreCount');
          if (countEl) countEl.textContent = `${allGenres.length} genre${allGenres.length !== 1 ? 's' : ''}`;
          updateStatsChip();
        });
      }

      // Genre chip checkboxes (delegated to genre list)
      const list = document.getElementById('genreList');
      if (list) {
        list.addEventListener('change', e => {
          const cb = e.target;
          if (!cb.matches('input[type=checkbox]')) return;
          const g = cb.value;
          if (cb.checked) { if (!state.filters.genres.includes(g)) state.filters.genres.push(g); }
          else            { state.filters.genres = state.filters.genres.filter(x => x !== g); }
          const sel      = state.filters.genres.length;
          const countEl  = document.getElementById('genreCount');
          if (countEl) {
            const q       = document.getElementById('genreSearch')?.value.toLowerCase() || '';
            const visible = [...document.querySelectorAll('.genre-chip')]
              .filter(c => c.style.display !== 'none').length;
            countEl.textContent = `${visible} genre${visible !== 1 ? 's' : ''}` +
              (sel ? ` · ${sel} selected` : '');
          }
          updateStatsChip();
        });
      }
    }

    function updateStatsChip() {
      if (!allAlbums.length) return;
      const chip = document.getElementById('statsChip');
      if (!chip) return;
      chip.classList.add('visible');
      const filtered = applyFilters(allAlbums);
      const recentExcluded = state.filters.avoidRecent
        ? allAlbums.length - applyFilters(allAlbums.map(a => ({ ...a }))).length
        : 0;
      // Re-run without avoidRecent to count how many history removes
      let historyNote = '';
      if (state.filters.avoidRecent) {
        const withoutHistory = allAlbums.filter(a => {
          if (state.filters.decades.length > 0 && !state.filters.decades.includes(decadeOf(releaseYear(a)))) return false;
          if (state.filters.excludeKeywords && BLOCKLIST_KEYWORDS.some(kw => (a.name||'').toLowerCase().includes(kw))) return false;
          const dur = albumDurMin(a);
          if (dur < state.filters.minDurMin || dur > state.filters.maxDurMin) return false;
          if (state.filters.genres.length > 0 && !(a._genres||[]).some(g => state.filters.genres.includes(g))) return false;
          if (state.filters.minAgeMonths > 0 && a._added_at) {
            if (new Date(a._added_at).getTime() > Date.now() - state.filters.minAgeMonths * 30 * 86400000) return false;
          }
          return true;
        }).length;
        const excluded = withoutHistory - filtered.length;
        if (excluded > 0) historyNote = ` · ${excluded} recent excluded`;
      }
      chip.textContent = `${allAlbums.length} albums in library · ${filtered.length} match filters${historyNote}`;
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── QUEUE FLOW ───────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Phase 1: Load library (if needed) and pick random albums.
     * Does NOT queue anything — shows albums for review + reroll first.
     */
    async function handlePick() {
      if (state.isWorking) return;
      state.isWorking = true;
      state.phase = 'idle';
      clearStatus();

      try {
        // ── 1. Load library (once) ────────────────────────────────────
        if (allAlbums.length === 0) {
          showProgress('Fetching your library…', 0);
          allAlbums = await fetchAllAlbums((loaded, total) => {
            showProgress(`Fetching library… ${loaded} / ${total}`, loaded / total * 100);
          });
          const btn = document.getElementById('queueBtn');
          if (btn) btn.textContent = '🎲 Pick Albums';
          updateStatsChip();

          // ── 1b. Fetch artist genres ───────────────────────────────
          state.genresLoading = true;
          refreshGenrePanel();

          const totalArtists = new Set(
            allAlbums.flatMap(a => (a.artists || []).map(ar => ar.id))
          ).size;
          showProgress(`Fetching genres… 0 / ${totalArtists} artists`, 0);

          allGenres = await fetchArtistGenres(allAlbums, (done, total) => {
            showProgress(`Fetching genres… ${done} / ${total} artists`, done / total * 100);
          });

          state.genresLoading = false;
          refreshGenrePanel();
          updateStatsChip();

          // ── 1c. Persist to localStorage ───────────────────────────
          saveLibraryCache();
          state.cachedAt = Date.now();
          renderHeader();
        }

        // ── 2. Apply filters + pick ───────────────────────────────────
        const pool = applyFilters(allAlbums);
        if (pool.length === 0) {
          hideProgress();
          showError('No albums match the current filters. Try removing some filter constraints.');
          state.isWorking = false;
          return;
        }

        const n = Math.min(state.albumCount, pool.length);
        state.selectedAlbums = pickRandom(pool, n);
        state.phase = 'picked';

        hideProgress();
        renderAlbumList(state.selectedAlbums);

      } catch (err) {
        hideProgress();
        showError(err.message || 'An unexpected error occurred.');
      }

      state.isWorking = false;
    }

    /**
     * Phase 2: Queue the currently selected albums.
     * Called by the "Queue These Albums" button in the album list.
     */
    async function queueSelected() {
      if (state.isWorking || !state.selectedAlbums.length) return;
      state.isWorking = true;
      state.phase = 'queuing';

      // Disable the queue-selected button immediately
      const qsBtn = document.getElementById('queueSelectedBtn');
      if (qsBtn) { qsBtn.disabled = true; qsBtn.textContent = 'Queuing…'; }

      try {
        const delay = document.getElementById('browserModeToggle').checked
          ? DELAY_BROWSER_MS
          : DELAY_DESKTOP_MS;

        showProgress('Preparing tracks…', 0);
        const allTracks = [];
        for (const album of state.selectedAlbums) {
          // Fetches additional track pages for albums with > 50 tracks.
          const tracks = await getAlbumTracks(album);
          for (const t of tracks) allTracks.push({ uri: t.uri, album: album.name });
        }

        const total = allTracks.length;
        for (let i = 0; i < total; i++) {
          showProgress(
            `Queuing track ${i + 1} / ${total}  —  ${escHtml(allTracks[i].album)}`,
            (i / total) * 100
          );
          await addToQueue(allTracks[i].uri);
          if (i < total - 1) await sleep(delay);
        }

        // ── Save to play history ──────────────────────────────────────
        // Records these albums as "recently played" so "Avoid recently played"
        // can exclude them on the next pick.
        appendHistory(state.selectedAlbums);

        showProgress('Done!', 100);
        await sleep(400);
        hideProgress();
        const n = state.selectedAlbums.length;
        showSuccess(
          `✓ Added ${total} track${total !== 1 ? 's' : ''} from ` +
          `${n} album${n !== 1 ? 's' : ''} to your Spotify queue.`
        );
        state.phase = 'idle';

        // Re-enable pick button for next round
        const pickBtn = document.getElementById('queueBtn');
        if (pickBtn) pickBtn.disabled = false;
        if (qsBtn) { qsBtn.disabled = false; qsBtn.textContent = '▶ Queue These Albums'; }

      } catch (err) {
        hideProgress();
        showError(err.message || 'An unexpected error occurred.');
        if (qsBtn) { qsBtn.disabled = false; qsBtn.textContent = '▶ Queue These Albums'; }
      }

      state.isWorking = false;
    }

    /** Fisher-Yates partial shuffle: returns k unique items in random order. */
    function pickRandom(arr, k) {
      const copy = [...arr];
      for (let i = 0; i < k; i++) {
        const j = i + Math.floor(Math.random() * (copy.length - i));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy.slice(0, k);
    }

    /**
     * Replace the album at `index` in state.selectedAlbums with a new random
     * pick from the filtered pool (excluding all currently selected albums).
     * Animates the old item out and the new one in.
     */
    function rerollAlbum(index) {
      const pool     = applyFilters(allAlbums);
      const usedIds  = new Set(state.selectedAlbums.map(a => a.id));
      const candidates = pool.filter(a => !usedIds.has(a.id));

      if (candidates.length === 0) {
        // No more candidates — flash the button to indicate failure
        const btn = document.querySelector(`.reroll-btn[data-reroll="${index}"]`);
        if (btn) { btn.textContent = '✕'; setTimeout(() => btn.textContent = '↻', 800); }
        return;
      }

      const newAlbum = pickRandom(candidates, 1)[0];
      state.selectedAlbums[index] = newAlbum;

      // Animate: slide old item out, then replace DOM and slide new one in
      const itemEl = document.querySelector(`.album-item[data-idx="${index}"]`);
      if (!itemEl) { renderAlbumList(state.selectedAlbums); return; }

      itemEl.classList.add('swipe-exit');
      setTimeout(() => {
        // Update the list inner HTML for just this index
        const a       = newAlbum;
        const imgUrl  = a.images?.[0]?.url || '';
        const imgEl   = imgUrl
          ? `<img class="album-art" src="${imgUrl}" alt="" loading="lazy">`
          : `<div class="album-art-placeholder">🎵</div>`;
        const artists = (a.artists || []).map(x => x.name).join(', ');
        const dur     = albumDurMin(a).toFixed(0);
        const tracks  = a.tracks?.total || '?';
        const genres  = (a._genres || []).slice(0, 3).join(' · ');

        itemEl.outerHTML = `
          <div class="album-item swipe-enter" data-idx="${index}">
            <span class="album-num">${index + 1}</span>
            ${imgEl}
            <div class="album-info">
              <div class="album-name">${escHtml(a.name)}</div>
              <div class="album-artist">${escHtml(artists)}</div>
              ${genres ? `<div style="font-size:9px;color:var(--text-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(genres)}</div>` : ''}
            </div>
            <div class="album-meta">
              <div>${tracks} tracks</div>
              <div>${dur} min</div>
            </div>
            <button class="reroll-btn" data-reroll="${index}" title="Swap this album" aria-label="Swap album">↻</button>
          </div>`;

        // Re-attach events for the new item
        const newItemEl = document.querySelector(`.album-item[data-idx="${index}"]`);
        if (newItemEl) {
          newItemEl.querySelector('.reroll-btn')?.addEventListener('click', e => {
            if (state.isWorking) return;
            rerollAlbum(+e.currentTarget.dataset.reroll);
          });
          let startX = 0, startY = 0, dragging = false;
          newItemEl.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            dragging = true;
          }, { passive: true });
          newItemEl.addEventListener('touchmove', e => {
            if (!dragging) return;
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;
            if (Math.abs(dy) > Math.abs(dx) + 10) { dragging = false; return; }
            if (dx < 0) newItemEl.style.transform = `translateX(${dx}px)`;
          }, { passive: true });
          newItemEl.addEventListener('touchend', e => {
            if (!dragging) return;
            dragging = false;
            const dx = e.changedTouches[0].clientX - startX;
            if (dx < -60 && !state.isWorking) rerollAlbum(+newItemEl.dataset.idx);
            else newItemEl.style.transform = '';
          }, { passive: true });
        }
      }, 220);
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── UI HELPERS ───────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    function showProgress(text, pct) {
      const wrap = document.getElementById('progressWrap');
      if (!wrap) return;
      wrap.classList.add('visible');
      document.getElementById('progressText').textContent = text;
      const pctEl = document.getElementById('progressPct');
      if (pctEl && pct !== undefined) pctEl.textContent = Math.min(100, Math.round(pct)) + '%';
      const fill = document.getElementById('progressFill');
      if (fill && pct !== undefined) fill.style.width = Math.min(100, pct) + '%';
      const btn = document.getElementById('queueBtn');
      if (btn) btn.disabled = true;
    }

    function hideProgress() {
      const wrap = document.getElementById('progressWrap');
      if (wrap) wrap.classList.remove('visible');
      const btn = document.getElementById('queueBtn');
      if (btn) btn.disabled = false;
    }

    function showSuccess(msg) {
      const el = document.getElementById('statusArea');
      if (!el) return;
      el.className = 'status-area success';
      el.textContent = msg;
    }

    function showError(msg) {
      const el = document.getElementById('statusArea');
      if (el) {
        el.className = 'status-area error';
        el.textContent = msg;
      } else {
        // Fallback: use the global status div (shown on login screen)
        const gs = document.getElementById('globalStatus');
        if (gs) { gs.className = 'show error'; gs.textContent = msg; }
      }
    }

    function clearStatus() {
      const el = document.getElementById('statusArea');
      if (el) { el.className = 'status-area'; el.textContent = ''; }
      const list = document.getElementById('albumList');
      if (list) list.innerHTML = '';
    }

    function renderAlbumList(albums) {
      const list = document.getElementById('albumList');
      if (!list || !albums.length) return;

      const labelDiv = `<div class="section-label" style="margin-bottom:8px;">Selected albums · swipe left to swap</div>`;
      const items = albums.map((a, i) => {
        // slimAlbum stores only a single-entry images array (the thumbnail),
        // so always access index 0 — never 1 or 2.
        const imgUrl  = a.images?.[0]?.url || '';
        const imgEl   = imgUrl
          ? `<img class="album-art" src="${imgUrl}" alt="" loading="lazy">`
          : `<div class="album-art-placeholder">🎵</div>`;
        const artists = (a.artists || []).map(x => x.name).join(', ');
        const dur     = albumDurMin(a).toFixed(0);
        const tracks  = a.tracks?.total || '?';
        const genres  = (a._genres || []).slice(0, 3).join(' · ');

        return `
          <div class="album-item" style="animation-delay:${i * 60}ms" data-idx="${i}">
            <span class="album-num">${i + 1}</span>
            ${imgEl}
            <div class="album-info">
              <div class="album-name">${escHtml(a.name)}</div>
              <div class="album-artist">${escHtml(artists)}</div>
              ${genres ? `<div style="font-size:9px;color:var(--text-dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(genres)}</div>` : ''}
            </div>
            <div class="album-meta">
              <div>${tracks} tracks</div>
              <div>${dur} min</div>
            </div>
            <button class="reroll-btn" data-reroll="${i}" title="Swap this album" aria-label="Swap album">↻</button>
          </div>`;
      }).join('');

      const queueBtn = `
        <button class="btn btn-primary" id="queueSelectedBtn">
          ▶ Queue These Albums
        </button>`;

      list.innerHTML = labelDiv + `<div class="album-list" id="albumListInner">${items}</div>` + queueBtn;

      // ── Reroll button click ───────────────────────────────
      list.querySelectorAll('.reroll-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          if (state.isWorking) return;
          rerollAlbum(+e.currentTarget.dataset.reroll);
        });
      });

      // ── Swipe-to-reroll (touch) ───────────────────────────
      list.querySelectorAll('.album-item').forEach(item => {
        let startX = 0, startY = 0, dragging = false;
        item.addEventListener('touchstart', e => {
          startX = e.touches[0].clientX;
          startY = e.touches[0].clientY;
          dragging = true;
        }, { passive: true });
        item.addEventListener('touchmove', e => {
          if (!dragging) return;
          const dx = e.touches[0].clientX - startX;
          const dy = e.touches[0].clientY - startY;
          // If mostly vertical, let the page scroll and abort swipe detection
          if (Math.abs(dy) > Math.abs(dx) + 10) { dragging = false; return; }
          // Live feedback: translate the item as user swipes
          if (dx < 0) item.style.transform = `translateX(${dx}px)`;
        }, { passive: true });
        item.addEventListener('touchend', e => {
          if (!dragging) return;
          dragging = false;
          const dx = e.changedTouches[0].clientX - startX;
          if (dx < -60 && !state.isWorking) {
            // Crossed threshold → reroll
            rerollAlbum(+item.dataset.idx);
          } else {
            // Snap back
            item.style.transform = '';
          }
        }, { passive: true });
      });

      // ── Queue Selected button ─────────────────────────────
      document.getElementById('queueSelectedBtn').addEventListener('click', queueSelected);
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /** Human-readable cache age: "just now", "3 h ago", "2 days ago". */
    function formatAge(ms) {
      const s = Math.floor(ms / 1000);
      if (s < 60)   return 'just now';
      const m = Math.floor(s / 60);
      if (m < 60)   return `${m} min ago`;
      const h = Math.floor(m / 60);
      if (h < 24)   return `${h} h ago`;
      const d = Math.floor(h / 24);
      return `${d} day${d !== 1 ? 's' : ''} ago`;
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── BOOT ─────────────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    (async function boot() {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      const oState = params.get('state');
      const oError = params.get('error');

      if (oError) {
        // User denied authorization on Spotify's page
        window.history.replaceState({}, '', window.location.pathname);
        render();
        showError('Spotify authorization was denied: ' + oError);
        return;
      }

      if (code && oState) {
        // Returning from PKCE redirect – exchange code for tokens
        try {
          await handleCallback(code, oState);
        } catch (err) {
          render();
          showError(err.message);
          return;
        }
      }

      // Try to restore library + genres from localStorage cache
      if (isLoggedIn()) loadLibraryCache();

      render();
    })();
  </script>
</body>
</html>
