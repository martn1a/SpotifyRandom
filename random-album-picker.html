<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AlbumPick v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #1DB954;
      --green-dark: #158a3e;
      --green-glow: rgba(29,185,84,.12);
      --bg:         #090909;
      --surface:    #111111;
      --surface2:   #181818;
      --border:     #252525;
      --border2:    #2e2e2e;
      --text:       #e8e8e8;
      --text-dim:   #5a5a5a;
      --text-mid:   #888888;
      --error:      #e84343;
      --font-h:     'Bebas Neue', sans-serif;
      --font-body:  'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: var(--font-h);
      font-size: 26px;
      letter-spacing: 3px;
      color: var(--green);
      line-height: 1;
      user-select: none;
    }

    .logo em { color: var(--text); font-style: normal; }

    /* ── BUTTONS ─────────────────────────────────────── */
    .btn {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      padding: 10px 16px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: border-color .15s, background .15s, color .15s;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover  { border-color: var(--text-mid); }
    .btn:active { transform: scale(.98); }

    .btn-primary {
      background: var(--green);
      border-color: var(--green);
      color: #000;
      font-weight: 500;
    }
    .btn-primary:hover  { background: #1fdf64; border-color: #1fdf64; }
    .btn-primary:active { background: var(--green-dark); border-color: var(--green-dark); }
    .btn-primary:disabled {
      background: var(--green-dark);
      border-color: var(--green-dark);
      color: rgba(0,0,0,.5);
      cursor: not-allowed;
      transform: none;
    }

    .btn-ghost-danger { border-color: var(--error); color: var(--error); font-size: 11px; }
    .btn-ghost-danger:hover { background: var(--error); color: #fff; }

    /* ── MAIN ────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 18px;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── GLOBAL STATUS (for boot errors shown on login screen) */
    #globalStatus {
      max-width: 480px;
      width: calc(100% - 36px);
      margin: 12px auto 0;
      border-radius: 2px;
      font-size: 12px;
      padding: 0;
      display: none;
    }
    #globalStatus.show {
      display: block;
      padding: 12px 14px;
    }
    #globalStatus.error {
      background: rgba(232,67,67,.1);
      border: 1px solid rgba(232,67,67,.3);
      color: var(--error);
    }

    /* ── LOGIN SCREEN ────────────────────────────────── */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 52px 24px 40px;
      text-align: center;
    }

    .login-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .login-title {
      font-family: var(--font-h);
      font-size: 48px;
      letter-spacing: 4px;
      color: var(--green);
      line-height: 1;
    }

    .login-sub {
      color: var(--text-mid);
      font-size: 12px;
      line-height: 1.9;
      max-width: 272px;
    }

    /* ── CARD ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    /* ── COLLAPSIBLE ─────────────────────────────────── */
    .collapse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      min-height: 48px;
    }
    .collapse-header:hover { background: var(--surface2); }

    .collapse-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-mid);
    }

    .collapse-arrow {
      color: var(--text-dim);
      font-size: 9px;
      transition: transform .2s;
    }
    .collapse-arrow.open { transform: rotate(180deg); }

    .collapse-body {
      border-top: 1px solid var(--border);
      padding: 16px;
      display: none;
    }
    .collapse-body.open { display: block; }

    /* ── FILTER CONTROLS ─────────────────────────────── */
    .filter-section { margin-bottom: 20px; }
    .filter-section:last-child { margin-bottom: 0; }

    .filter-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--green);
      margin-bottom: 10px;
      display: block;
    }

    /* Decade chips */
    .decade-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .decade-chip { position: relative; }
    .decade-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
    .decade-chip label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      transition: all .15s;
    }
    .decade-chip label:active { transform: scale(.96); }
    .decade-chip input:checked + label {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }

    /* Toggle row */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      gap: 12px;
    }
    .toggle-info { flex: 1; }
    .toggle-title { font-size: 12px; color: var(--text); }
    .toggle-sub   { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border2);
      border-radius: 13px;
      transition: background .2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      background: var(--text-dim);
      border-radius: 50%;
      transition: transform .2s, background .2s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--green); }
    .toggle-switch input:checked + .toggle-track::after {
      transform: translateX(18px);
      background: #fff;
    }

    /* Duration sliders */
    .slider-row { display: flex; flex-direction: column; gap: 10px; }
    .slider-values {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
    }
    .slider-values b { color: var(--text); font-weight: 400; }
    .range-wrap { display: flex; flex-direction: column; gap: 8px; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px; height: 26px;
      background: var(--green);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    input[type=range]::-moz-range-thumb {
      width: 26px; height: 26px;
      background: var(--green);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    /* Stats chip */
    .stats-chip {
      display: none;
      font-size: 10px;
      color: var(--text-dim);
      padding: 10px 0 0;
      text-align: center;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    .stats-chip.visible { display: block; }

    /* ── GENRE LANES ─────────────────────────────────── */
    .genre-lanes { display: flex; flex-direction: column; gap: 0; }

    .genre-lane { border-bottom: 1px solid var(--border); }
    .genre-lane:last-child { border-bottom: none; }

    .genre-lane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 0 6px;
      gap: 8px;
    }
    .genre-lane-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .genre-lane-icon { font-size: 11px; opacity: .7; }
    .genre-lane-badge {
      font-size: 9px;
      padding: 1px 6px;
      background: var(--green);
      color: #000;
      border-radius: 10px;
      font-weight: 600;
      display: none;
    }
    .genre-lane-badge.visible { display: inline-block; }

    /* Horizontal scrolling chip row */
    .genre-lane-chips {
      display: flex;
      flex-direction: row;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 9px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
    }
    .genre-lane-chips::-webkit-scrollbar { display: none; }

    /* Individual genre chip (no hidden input — we use data attributes) */
    .glchip {
      display: inline-flex;
      align-items: center;
      padding: 0 11px;
      height: 32px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
      font-family: var(--font-body);
      color: var(--text-dim);
      white-space: nowrap;
      background: transparent;
      transition: border-color .12s, color .12s, background .12s, transform .1s;
      flex-shrink: 0;
      user-select: none;
    }
    .glchip:hover  { border-color: var(--text-mid); color: var(--text); }
    .glchip:active { transform: scale(.94); }
    .glchip.selected {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }

    /* Selected summary bar at top */
    .genre-selected-bar {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .genre-selected-bar.visible { display: flex; }
    .genre-selected-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 8px 0 10px;
      height: 28px;
      background: var(--green);
      color: #000;
      border-radius: 2px;
      font-size: 10px;
      font-family: var(--font-body);
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      transition: background .12s;
    }
    .genre-selected-pill:hover { background: #1fdf64; }
    .genre-selected-pill-x { font-size: 12px; opacity: .7; line-height: 1; }

    .genre-clear-all {
      font-size: 10px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
      align-self: center;
    }
    .genre-clear-all:hover { color: var(--text); }

    .genre-empty { font-size: 11px; color: var(--text-dim); }
    .genre-loading {
      font-size: 10px; color: var(--text-dim);
      display: flex; align-items: center; gap: 8px;
    }
    .genre-loading::before {
      content: '';
      display: inline-block;
      width: 10px; height: 10px;
      border: 1px solid var(--border2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ACTION ROW ──────────────────────────────────── */
    .action-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .count-selector {
      display: flex;
      border: 1px solid var(--border2);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .count-btn {
      padding: 0 13px;
      height: 52px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      border-right: 1px solid var(--border2);
      min-width: 40px;
    }
    .count-btn:last-child { border-right: none; }
    .count-btn.active { background: var(--green); color: #000; }
    .count-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .count-btn:active:not(.active) { background: var(--border2); }

    #queueBtn {
      flex: 1;
      height: 52px;
      font-size: 12px;
      letter-spacing: 1.5px;
    }

    /* ── PROGRESS ────────────────────────────────────── */
    .progress-wrap { display: none; }
    .progress-wrap.visible { display: block; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 7px;
    }
    .progress-bar-bg {
      height: 2px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width .3s ease;
      width: 0%;
    }

    /* ── STATUS ──────────────────────────────────────── */
    .status-area {
      display: none;
      padding: 13px 15px;
      border-radius: 2px;
      font-size: 12px;
      line-height: 1.7;
    }
    .status-area.success {
      display: block;
      background: var(--green-glow);
      border: 1px solid rgba(29,185,84,.3);
      color: var(--green);
    }
    .status-area.error {
      display: block;
      background: rgba(232,67,67,.08);
      border: 1px solid rgba(232,67,67,.25);
      color: var(--error);
    }

    /* ── SELECTED ALBUMS LIST ────────────────────────── */
    .section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-dim);
    }

    .album-list { display: flex; flex-direction: column; gap: 8px; }
    .album-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      animation: fadeIn .25s ease forwards;
      opacity: 0;
      position: relative;
      overflow: hidden;
      touch-action: pan-y;   /* allow vertical scroll; we handle horizontal swipe ourselves */
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── SWIPE / REROLL ─────────────────────────────────── */
    .album-item.swipe-exit {
      transition: transform .22s ease, opacity .18s ease !important;
      animation: none !important;
      transform: translateX(-110%) !important;
      opacity: 0 !important;
    }
    @keyframes slideInRight {
      from { transform: translateX(48px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    .album-item.swipe-enter {
      animation: slideInRight .22s ease forwards !important;
    }

    .reroll-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border2);
      border-radius: 50%;
      background: transparent;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color .15s, color .15s, transform .1s;
    }
    .reroll-btn:hover  { border-color: var(--green); color: var(--green); }
    .reroll-btn:active { transform: scale(.88); }

    /* ── QUEUE-SELECTED BUTTON ──────────────────────────── */
    #queueSelectedBtn {
      width: 100%;
      height: 52px;
      font-size: 12px;
      letter-spacing: 1.5px;
      margin-top: 10px;
    }

    /* ── AGE FILTER CHIPS ───────────────────────────────── */
    .age-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .age-chip { position: relative; }
    .age-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
    .age-chip label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-dim);
      transition: all .15s;
      text-align: center;
      line-height: 1.3;
      padding: 0 4px;
    }
    .age-chip label:active { transform: scale(.96); }
    .age-chip input:checked + label {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-glow);
    }

    /* ── HISTORY NOTE ───────────────────────────────────── */
    .history-note {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .history-note-clear {
      background: none; border: none; cursor: pointer;
      font-family: var(--font-body); font-size: 10px;
      color: var(--text-dim);
      text-decoration: underline; text-underline-offset: 3px;
      padding: 0;
    }
    .history-note-clear:hover { color: var(--text); }
    .album-num {
      font-size: 10px;
      color: var(--text-dim);
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }
    .album-art {
      width: 38px; height: 38px;
      background: var(--border);
      border-radius: 1px;
      flex-shrink: 0;
      object-fit: cover;
    }
    .album-art-placeholder {
      width: 38px; height: 38px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 1px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .album-info { flex: 1; min-width: 0; }
    .album-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .album-artist {
      font-size: 10px;
      color: var(--text-mid);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .album-meta {
      font-size: 10px;
      color: var(--text-dim);
      flex-shrink: 0;
      text-align: right;
      line-height: 1.6;
    }

    /* ── FOOTER ──────────────────────────────────────── */
    .footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
    }
    .footer-inner {
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 480px;
      margin: 0 auto;
    }
    .footer-info { flex: 1; }
    .footer-label { font-size: 11px; color: var(--text-mid); }
    .footer-sub   { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* ── COVERAGE PANEL ─────────────────────────────── */
    .coverage-top {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }
    .coverage-pct {
      font-family: var(--font-h);
      font-size: 36px;
      letter-spacing: 2px;
      color: var(--green);
      line-height: 1;
    }
    .coverage-pct-label {
      font-size: 10px;
      color: var(--text-dim);
    }
    .coverage-bar-bg {
      height: 4px;
      background: var(--border2);
      border-radius: 2px;
      overflow: hidden;
      margin: 10px 0 18px;
    }
    .coverage-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width .6s ease;
    }
    .coverage-stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-top: 1px solid var(--border);
      gap: 10px;
    }
    .coverage-stat-info {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .coverage-stat-icon {
      font-size: 15px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
      opacity: .7;
    }
    .coverage-stat-text { min-width: 0; }
    .coverage-stat-label {
      font-size: 12px;
      color: var(--text);
      font-weight: 500;
    }
    .coverage-stat-sub {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .btn-coverage {
      font-family: var(--font-body);
      font-size: 10px;
      font-weight: 500;
      padding: 7px 11px;
      border: 1px solid var(--border2);
      background: transparent;

    // ═══════════════════════════════════════════════════════════════════════

    const CLIENT_ID    = 'ed48e32b12fd4b01ad0dbdf383cb3ff6';

                   'tropicalia', 'cumbia', 'salsa', 'flamenco', 'afropop', 'dancehall',
                   'calypso', 'ska', 'roots reggae', 'dub reggae'] },
    ];

    /** Assign a genre string to its cluster id (returns 'other' if none match). */
    function clusterOf(genre) {
      const g = genre.toLowerCase();
      for (const cluster of GENRE_CLUSTERS) {
        if (cluster.keywords.some(kw => g.includes(kw))) return cluster.id;
      }
      return 'other';
    }

    // Library cache: key used in localStorage, and max age before a refresh is suggested.
    const CACHE_KEY     = 'albumpick_library_v1';
    const CACHE_MAX_AGE = 7 * 24 * 60 * 60 * 1000;   // 7 days in ms

    // Play-history cache: tracks which albums were recently queued so we can
    // exclude them when "Avoid recently played" is active.
    const HISTORY_KEY          = 'albumpick_history_v1';
    const HISTORY_MAX_AGE_DAYS = 30;   // albums queued within this window are "recent"


    // ═══════════════════════════════════════════════════════════════════════
    // ── CACHE MODULE ─────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Slim down a full Spotify album object to only the fields we need.
     * Keeps the payload small enough for localStorage (5 MB limit).
     * _genres is added after the artist-genre fetch and is preserved here.
     */
    function slimAlbum(a) {
      return {
        id:           a.id,
        name:         a.name,
        release_date: a.release_date,
        // added_at comes from the /me/albums item wrapper (not the album object itself).
        // We attach it as _added_at in fetchAllAlbums before slimming.
        _added_at:    a._added_at || null,
        artists:      (a.artists || []).map(ar => ({ id: ar.id, name: ar.name })),
        // Keep only the smallest image (index 2) for the album card thumbnail
        images:       a.images ? [a.images[2] || a.images[1] || a.images[0]].filter(Boolean) : [],
        tracks: {
          total: a.tracks?.total,
          next:  a.tracks?.next || null,
          // Only store uri + duration_ms — that's all the filter & queue need
          items: (a.tracks?.items || []).map(t => ({
            uri:         t.uri,
            duration_ms: t.duration_ms,
          })),
        },
        _genres: a._genres || [],
      };
    }

    /** Persist the full library + genre list to localStorage. */
    function saveLibraryCache() {
      try {
        const payload = JSON.stringify({
          cachedAt: Date.now(),
          genres:   allGenres,
          albums:   allAlbums.map(slimAlbum),
        });
        localStorage.setItem(CACHE_KEY, payload);
      } catch (e) {
        // Quota exceeded or private browsing — silently ignore
        console.warn('AlbumPick: could not write library cache', e);
      }
    }

    /**
     * Try to load the library from localStorage.
     * Returns true if the cache was valid and data was restored, false otherwise.
     * Callers should check `cacheAge()` to decide whether to suggest a refresh.
     */
    function loadLibraryCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return false;
        const { cachedAt, genres, albums } = JSON.parse(raw);
        if (!Array.isArray(albums) || albums.length === 0) return false;
        allAlbums = albums;
        allGenres = genres || [];

        // Fallback: if the top-level genres list is missing or empty (e.g. truncated
        // write, quota error on a previous save), reconstruct it from the per-album
        // _genres fields that were stored alongside every album entry.
        if (allGenres.length === 0 && allAlbums.length > 0) {
          const gset = new Set();
          for (const a of allAlbums)
            for (const g of (a._genres || []))
              gset.add(g);
          allGenres = [...gset].sort();
        }

        state.cachedAt = cachedAt || null;
        return true;
      } catch (e) {
        return false;
      }
    }

    /** Remove the cached library. */
    function clearLibraryCache() {
      localStorage.removeItem(CACHE_KEY);
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── HISTORY MODULE ───────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Each history entry: { id: string, name: string, queuedAt: number (ms) }
     * Stored under HISTORY_KEY in localStorage.
     * Automatically pruned to entries newer than HISTORY_MAX_AGE_DAYS on every load.
     */
    function loadHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        if (!raw) return [];
        const entries = JSON.parse(raw);
        const cutoff  = Date.now() - HISTORY_MAX_AGE_DAYS * 86400000;
        return entries.filter(e => e.queuedAt > cutoff);
      } catch (e) { return []; }
    }

    /** Append albums to the play history. Deduplicates by id. */
    function appendHistory(albums) {
      try {
        const existing = loadHistory();
        const newIds   = new Set(albums.map(a => a.id));
        const pruned   = existing.filter(e => !newIds.has(e.id));
        const updated  = [
          ...pruned,
          ...albums.map(a => ({ id: a.id, name: a.name, queuedAt: Date.now() })),
        ];
        localStorage.setItem(HISTORY_KEY, JSON.stringify(updated));
      } catch (e) {
        console.warn('AlbumPick: could not write history', e);
      }
    }

    function clearHistory() {
      localStorage.removeItem(HISTORY_KEY);
    }

    /** Returns a Set of album IDs queued within the history window. */
    function getRecentIds() {
      return new Set(loadHistory().map(e => e.id));
    }


    /** Returns a Map of albumId → queuedAt (ms) for all history entries. */
    function getHistoryMap() {
      try {
        return new Map(loadHistory().map(e => [e.id, e.queuedAt]));
      } catch (e) { return new Map(); }
    }

    /**
     * Compute library coverage statistics.
     * "Heard" = ever queued via AlbumPick (any time in history).
     * "Long ago" = last heard more than 6 months ago.
     * "Recent" = last heard within 6 months.
     */
    function getCoverageStats() {
      const empty = { total: 0, neverHeard: 0, longAgo: 0, recent: 0, everHeard: 0, coveragePct: 0 };
      if (!allAlbums.length) return empty;
      const historyMap = getHistoryMap();
      const now = Date.now();
      const SIX_MONTHS = 180 * 86400000;

      let neverHeard = 0, longAgo = 0, recent = 0;
      for (const album of allAlbums) {
        const lastHeard = historyMap.get(album.id);
        if (!lastHeard)                        neverHeard++;
        else if (now - lastHeard > SIX_MONTHS) longAgo++;
        else                                   recent++;
      }

      const everHeard    = allAlbums.length - neverHeard;
      const coveragePct  = Math.round((everHeard / allAlbums.length) * 100);
      return { total: allAlbums.length, neverHeard, longAgo, recent, everHeard, coveragePct };
    }

    /**
     * Weighted Fisher-Yates: albums never heard get weight 10,
     * heard >6 months ago get weight 5, heard >30 days ago get weight 2,
     * recently heard get weight 1.
     * This biases picks toward forgotten albums without excluding anything.
     */
    function weightedPickRandom(pool, n) {
      const historyMap = getHistoryMap();
      const now        = Date.now();
      const SIX_MONTHS  = 180 * 86400000;
      const THIRTY_DAYS = HISTORY_MAX_AGE_DAYS * 86400000;

      const weighted = pool.map(album => {
        const lastHeard = historyMap.get(album.id);
        let weight;
        if      (!lastHeard)                         weight = 10;  // never heard
        else if (now - lastHeard > SIX_MONTHS)       weight = 5;   // long ago
        else if (now - lastHeard > THIRTY_DAYS)      weight = 2;   // somewhat recent
        else                                         weight = 1;   // very recent
        return { album, weight };
      });

      const result = [];
      const items  = [...weighted];

      for (let i = 0; i < Math.min(n, items.length); i++) {
        let totalWeight = 0;
        for (let k = i; k < items.length; k++) totalWeight += items[k].weight;
        let rand   = Math.random() * totalWeight;
        let chosen = i;
        for (let k = i; k < items.length; k++) {
          rand -= items[k].weight;
          if (rand <= 0) { chosen = k; break; }
        }
        [items[i], items[chosen]] = [items[chosen], items[i]];
        result.push(items[i].album);
      }

      return result;
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── AUTH MODULE – PKCE ───────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Generate a cryptographically random URL-safe string of `len` chars. */
    function generateRandom(len = 64) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      const arr   = crypto.getRandomValues(new Uint8Array(len));
      return Array.from(arr, b => chars[b % chars.length]).join('');
    }

    /**
     * Hash the PKCE verifier with SHA-256, then base64url-encode.
     * This is the code_challenge sent to Spotify on the first leg.
     */
    async function generateChallenge(verifier) {
      const data   = new TextEncoder().encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(digest)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    /** Begin the PKCE auth flow: generate verifier → challenge → redirect. */
    async function login() {
      const verifier  = generateRandom(64);
      const challenge = await generateChallenge(verifier);
      const state     = generateRandom(16);

      localStorage.setItem('pkce_verifier', verifier);
      localStorage.setItem('pkce_state',    state);

      const params = new URLSearchParams({
        response_type:         'code',
        client_id:             CLIENT_ID,
        scope:                 SCOPES,
        redirect_uri:          REDIRECT_URI,
        state,
        code_challenge_method: 'S256',
        code_challenge:        challenge,
      });

      window.location.href = 'https://accounts.spotify.com/authorize?' + params;
    }

    /**
     * Second leg: exchange the auth code for access + refresh tokens.
     * Called once after Spotify redirects back with ?code=&state=.
     */
    async function handleCallback(code, returnedState) {
      const storedState = localStorage.getItem('pkce_state');
      if (returnedState !== storedState) throw new Error('State mismatch – possible CSRF. Please try logging in again.');

      const verifier = localStorage.getItem('pkce_verifier');

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          code,
          redirect_uri:  REDIRECT_URI,
          client_id:     CLIENT_ID,
          code_verifier: verifier,
        }),
      });

      if (!res.ok) throw new Error('Token exchange failed: ' + (await res.text()));
      storeTokens(await res.json());

      // Remove ?code=&state= from the URL so a hard-refresh doesn't re-submit
      window.history.replaceState({}, '', window.location.pathname);
    }

    /**
     * Silently refresh the access token using the stored refresh token.
     * Spotify may return a new refresh_token; if so we store it.
     * Note: Spotify's PKCE refresh tokens can expire after extended inactivity;
     * if refresh fails we clear state and ask the user to log in again.
     */
    async function refreshAccessToken() {
      const refreshToken = localStorage.getItem('spotify_refresh_token');
      if (!refreshToken) throw new Error('No refresh token – please log in.');

      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'refresh_token',
          refresh_token: refreshToken,
          client_id:     CLIENT_ID,
        }),
      });

      if (!res.ok) {
        logout();
        throw new Error('Session expired – please log in again.');
      }
      storeTokens(await res.json());
    }

    /** Persist tokens; subtract 60 s from expires_in as a safety buffer. */
    function storeTokens({ access_token, refresh_token, expires_in }) {
      localStorage.setItem('spotify_access_token', access_token);
      if (refresh_token) localStorage.setItem('spotify_refresh_token', refresh_token);
      localStorage.setItem('spotify_expires_at', String(Date.now() + (expires_in - 60) * 1000));
    }

    /** Return a valid access token, refreshing if needed. */
    async function getAccessToken() {
      if (Date.now() > Number(localStorage.getItem('spotify_expires_at') || 0)) {
        await refreshAccessToken();
      }
      return localStorage.getItem('spotify_access_token');
    }

    function isLoggedIn() {
      return !!localStorage.getItem('spotify_refresh_token');
    }

    function logout() {
      ['spotify_access_token', 'spotify_refresh_token', 'spotify_expires_at',
       'pkce_verifier', 'pkce_state'].forEach(k => localStorage.removeItem(k));
      clearLibraryCache();
      allAlbums = [];
      allGenres = [];
      state.cachedAt = null;
      render();
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── SPOTIFY API MODULE ───────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Authenticated GET; throws on non-2xx. */
    async function apiGet(url) {
      const token = await getAccessToken();
      const res   = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(`Spotify API ${res.status}: ${body || res.statusText}`);
      }
      return res.json();
    }

    /**
     * Fetch every saved album from /v1/me/albums.
     * The API returns max 50 per page; we follow `next` until null.
     * `onProgress(loaded, total)` is called after each page.
     */
    async function fetchAllAlbums(onProgress) {
      const albums = [];
      let url = 'https://api.spotify.com/v1/me/albums?limit=50&market=from_token';

      while (url) {
        const data = await apiGet(url);
        for (const item of data.items) {
          const album = item.album;
          // added_at lives on the item wrapper, NOT on the album object itself.
          // Spotify's /me/albums response wraps each album in { added_at, album: {...} }.
          // We attach it before pushing so slimAlbum() can persist it.
          album._added_at = item.added_at || null;
          albums.push(album);
        }
        url = data.next;   // null on the last page
        onProgress(albums.length, data.total);
      }
      return albums;
    }

    /**
     * Batch-fetch artist objects (max 50 per request) to read their genre tags.
     * Spotify does NOT expose genres on album objects — they live on the artist.
     * After this call every album in `albums` gets a `_genres` string[] property
     * containing the union of genres from all of its artists.
     * Returns a sorted, deduplicated array of every genre found in the library.
     */
    async function fetchArtistGenres(albums, onProgress) {
      // Collect every unique artist ID referenced across the library
      const idSet = new Set();
      for (const a of albums)
        for (const ar of (a.artists || []))
          if (ar.id) idSet.add(ar.id);

      const ids = [...idSet];
      const genreMap = new Map();   // artistId → string[]
      const BATCH = 50;

      for (let i = 0; i < ids.length; i += BATCH) {
        const batch = ids.slice(i, i + BATCH);
        // GET /v1/artists?ids=id1,id2,... returns up to 50 artist objects
        const data = await apiGet(
          'https://api.spotify.com/v1/artists?ids=' + batch.join(',')
        );
        for (const artist of (data.artists || []))
          if (artist) genreMap.set(artist.id, artist.genres || []);

        onProgress(Math.min(i + BATCH, ids.length), ids.length);
      }

      // Attach a _genres field to each album and collect the global genre set
      const globalSet = new Set();
      for (const album of albums) {
        const ag = new Set();
        for (const ar of (album.artists || []))
          for (const g of (genreMap.get(ar.id) || []))
            { ag.add(g); globalSet.add(g); }
        album._genres = [...ag];
      }

      return [...globalSet].sort();
    }

    /**, including extra pages when total > 50.
     * The /me/albums response embeds up to 50 tracks inline; albums with
     * more (rare but real) require extra requests to /v1/albums/{id}/tracks.
     */
    async function getAlbumTracks(album) {
      let items = album.tracks?.items || [];
      let next  = album.tracks?.next;           // present when total > 50

      while (next) {
        // Fetch the next page of tracks for this album
        const data = await apiGet(next);
        items = items.concat(data.items);
        next  = data.next;
      }
      return items;
    }

    /**
     * Add a single track URI to the user's active playback queue.
     * Spotify returns 204 on success, 404 when no active device is found.
     * The Spotify browser client may need longer delays between calls to
     * avoid 429 rate-limiting; the footer toggle controls this.
     */
    async function addToQueue(uri) {
      const token = await getAccessToken();
      const res   = await fetch(
        `https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(uri)}`,
        { method: 'POST', headers: { Authorization: 'Bearer ' + token } }
      );
      if (res.status === 404) throw new Error('No active Spotify device found. Start playing something first, then try again.');
      if (res.status === 429) throw new Error('Rate limited by Spotify. Enable "Browser client mode" in the footer for slower (safer) queuing.');
      if (!res.ok && res.status !== 204) throw new Error(`Queue error ${res.status}`);
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));


    // ═══════════════════════════════════════════════════════════════════════
    // ── FILTER MODULE ────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /** Parse the 4-digit year from Spotify's "YYYY", "YYYY-MM", or "YYYY-MM-DD". */
    function releaseYear(album) {
      return parseInt((album.release_date || '').slice(0, 4), 10) || 0;
    }

    /** Map a year to its decade string, e.g. 1983 → "80s", 1965 → "pre-70s". */
    function decadeOf(year) {
      if (year < 1970) return 'pre-70s';
      const base = Math.floor(year / 10) * 10;
      return String(base).slice(2) + 's';
    }

    /**
     * Sum duration of all inline tracks in minutes.
     * Tracks beyond 50 are not included here (they're fetched lazily at queue time),
     * so the slider filter is approximate for very long albums.
     */
    function albumDurMin(album) {
      return (album.tracks?.items || []).reduce((s, t) => s + (t.duration_ms || 0), 0) / 60000;
    }

    /**
     * Apply all active filters with AND logic.
     * Returns the subset of `albums` that passes every enabled filter.
     */
    function applyFilters(albums) {
      // Pre-compute recent IDs once per call (only when filter is active).
      // getRecentIds() parses localStorage and returns a Set<string>.
      const recentIds = state.filters.avoidRecent ? getRecentIds() : null;

      return albums.filter(album => {

        // ── Decade ──────────────────────────────────────────────────────
        // If no decades selected → skip this filter (accept all).
        if (state.filters.decades.length > 0) {
          if (!state.filters.decades.includes(decadeOf(releaseYear(album)))) return false;
        }

        // ── Keyword (checked against album title) ────────────────────
        if (state.filters.excludeKeywords) {
          const low = (album.name || '').toLowerCase();
          if (BLOCKLIST_KEYWORDS.some(kw => low.includes(kw))) return false;
        }

        // ── Duration ─────────────────────────────────────────────────
        const dur = albumDurMin(album);
        if (dur < state.filters.minDurMin || dur > state.filters.maxDurMin) return false;

        // ── Genre ──────────────────────────────────────────────────────
        // If genres selected → album must have at least one matching genre.
        if (state.filters.genres.length > 0) {
          const ag = album._genres || [];
          if (!state.filters.genres.some(g => ag.includes(g))) return false;
        }

        // ── Age ("not heard in a long time") ─────────────────────────
        // minAgeMonths > 0 → only albums that were added to the library
        // at least that many months ago (i.e., potentially forgotten).
        if (state.filters.minAgeMonths > 0) {
          const addedMs  = album._added_at ? new Date(album._added_at).getTime() : 0;
          const cutoffMs = Date.now() - state.filters.minAgeMonths * 30 * 24 * 60 * 60 * 1000;
          if (addedMs > cutoffMs) return false;  // added too recently → skip
        }

        // ── Avoid recently queued ─────────────────────────────────────
        // If the album was queued within HISTORY_MAX_AGE_DAYS, exclude it.
        if (state.filters.avoidRecent && recentIds && recentIds.has(album.id)) return false;

        return true;
      });
    }


    // ═══════════════════════════════════════════════════════════════════════
    // ── APPLICATION STATE ────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    let allAlbums = [];
    let allGenres = [];   // sorted, deduplicated genre list built after library fetch

    const state = {
      albumCount:     1,
      filterOpen:     false,
      coverageOpen:   false,    // whether Library Coverage panel is expanded
      coverageFilter: null,     // 'unheard' | 'longAgo' | null — set by coverage panel CTA
      phase:          'idle',   // 'idle' | 'picked' | 'queuing'
      isWorking:      false,
      genresLoading:  false,  // true while artist genre batch-fetch is in progress
      cachedAt:       null,   // Unix timestamp (ms) of last cache write; null = no cache loaded
      selectedAlbums: [],
      filters: {
        decades:         [],
        excludeKeywords: false,
        minDurMin:       0,
        maxDurMin:       200,
        genres:          [],  // empty = no genre filter; otherwise AND: album must match ≥1
        minAgeMonths:    0,   // 0 = off; otherwise only albums added ≥ N months ago
        avoidRecent:     false, // exclude albums queued within HISTORY_MAX_AGE_DAYS
        weightUnheard:   false, // bias random picks toward unheard/forgotten albums
      },
    };


    // ═══════════════════════════════════════════════════════════════════════
    // ── UI MODULE ────────────────────────────────────────────────────────
    // ═══════════════════════════════════════════════════════════════════════

    /**
     * Update only the header action area (cache age label + ↻ + logout).
     * Called mid-flow after saving the library cache so we don't tear down
     * the progress bar and album list that are still in use by handleQueue().
     */
    function renderHeader() {
      const actions = document.getElementById('headerActions');
      if (!actions || !isLoggedIn()) return;
      const cacheLabel = state.cachedAt !== null
        ? formatAge(Date.now() - state.cachedAt)
        : null;

      // Stufe 1: live coverage count
      const cvg = allAlbums.length ? getCoverageStats() : null;
      const coverageBadge = cvg ? `
        <span class="header-coverage" title="${cvg.everHeard} von ${cvg.total} Alben je über AlbumPick gespielt">
          <span class="header-coverage-bar">
            <span class="header-coverage-fill" style="width:${cvg.coveragePct}%"></span>
          </span>
          ${cvg.everHeard}/${cvg.total}
        </span>` : '';

      actions.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;">
          ${coverageBadge}
          ${cacheLabel ? `<span style="font-size:10px;color:var(--text-dim);">Library: ${escHtml(cacheLabel)}</span>` : ''}
          ${state.cachedAt !== null ? `<button class="btn" id="refreshBtn" style="min-height:36px;padding:6px 12px;font-size:10px;" title="Re-fetch library from Spotify">↻</button>` : ''}
          <button class="btn btn-ghost-danger" id="logoutBtn">Log out</button>
        </div>`;
      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('refreshBtn')?.addEventListener('click', async () => {
        if (state.isWorking) return;
        clearLibraryCache();
        allAlbums = [];
        allGenres = [];
        state.cachedAt = null;
        state.filters.genres = [];
        render();
        handlePick();
      });
    }

    function render() {
      const main    = document.getElementById('appMain');
      const actions = document.getElementById('headerActions');

      if (!isLoggedIn()) {
        actions.innerHTML = '';
        main.innerHTML = `
          <div class="login-screen">
            <div class="login-icon">🎵</div>

            </p>
            <button class="btn btn-primary" id="loginBtn"
              style="font-size:13px;padding:15px 36px;letter-spacing:2px;">
              Connect Spotify
            </button>
          </div>`;
        document.getElementById('loginBtn').addEventListener('click', login);
        return;
      }

      // Logged-in view
      // Compute cache age live so it stays accurate if render() is called

      const cacheLabel = state.cachedAt !== null
        ? formatAge(Date.now() - state.cachedAt)
        : null;

      // Stufe 1: live coverage count badge
      const cvg = allAlbums.length ? getCoverageStats() : null;
      const coverageBadge = cvg ? `
        <span class="header-coverage" title="${cvg.everHeard} von ${cvg.total} Alben je über AlbumPick gespielt">
          <span class="header-coverage-bar">
            <span class="header-coverage-fill" style="width:${cvg.coveragePct}%"></span>
          </span>
          ${cvg.everHeard}/${cvg.total}
        </span>` : '';

      actions.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;">
          ${coverageBadge}
          ${cacheLabel ? `<span style="font-size:10px;color:var(--text-dim);">Library: ${escHtml(cacheLabel)}</span>` : ''}
          ${state.cachedAt !== null ? `<button class="btn" id="refreshBtn" style="min-height:36px;padding:6px 12px;font-size:10px;" title="Re-fetch library from Spotify">↻</button>` : ''}

        </div>`;
      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('refreshBtn')?.addEventListener('click', async () => {
        if (state.isWorking) return;
        clearLibraryCache();
        allAlbums = [];
        allGenres = [];
        state.cachedAt = null;
        state.filters.genres = [];
        render();
        // Trigger a fresh load
        handlePick();
      });

      const decadeChips = decades.map(d => `
        <div class="decade-chip">
          <input type="checkbox" id="d_${d}" value="${d}"

      const counts = [1, 2, 5, 10, 20];
