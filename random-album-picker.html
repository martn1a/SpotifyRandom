const MIN_GENRE_ALBUMS = 5;
function buildGenreFilterHTML() {
  if (!allAlbums.length) return `<div style="font-size:11px;color:var(--text-dim);">Load library first.</div>`;
  if (randomState.genresLoading) return `<div style="font-size:10px;color:var(--text-dim);display:flex;align-items:center;gap:8px;"><span style="animation:spin .7s linear infinite;display:inline-block;width:10px;height:10px;border:1px solid var(--border2);border-top-color:var(--green);border-radius:50%;"></span>Fetching genres…</div>`;
  if (!allGenres.length) return `<div style="font-size:11px;color:var(--text-dim);">No genres found.</div>`;
  const genreAlbumCount={};
  for (const a of allAlbums) for (const g of (a._genres||[])) genreAlbumCount[g]=(genreAlbumCount[g]||0)+1;
  const sel = randomState.filters.genres;
  const clusterMap = new Map(GENRE_CLUSTERS.map(c=>[c.id,{...c,genres:[]}]));
  clusterMap.set('other',{id:'other',label:'Other',icon:'🏷',genres:[]});
  for (const g of allGenres) {
    const count=genreAlbumCount[g]||0;
    if (count>=MIN_GENRE_ALBUMS||sel.includes(g)) clusterMap.get(clusterOf(g)).genres.push(g);
  }
  const selectedBar = sel.length===0?'': `<div class="genre-selected-bar visible" id="genreSelectedBar">${sel.map(g=>`<span class="genre-selected-pill" data-remove="${escHtml(g)}">${escHtml(g)}<span class="genre-selected-pill-x" style="margin-left:4px;">×</span></span>`).join('')}<button class="genre-clear-all" id="genreClearAll">Clear all</button></div>`;
  const clusters=[...clusterMap.values()].filter(c=>c.genres.length>0);
  const lanes=clusters.map(c=>{
    const selInCluster=c.genres.filter(g=>sel.includes(g));
    const selCount=selInCluster.length;
    const allSelected=selCount===c.genres.length&&c.genres.length>0;
    const someSelected=selCount>0&&!allSelected;
    const isOpen=selCount>0;
    const allBtnClass='genre-cluster-all'+(allSelected?' all-selected':someSelected?' some-selected':'');
    const chips=c.genres.map(g=>`<button class="glchip${sel.includes(g)?' selected':''}" data-genre="${escHtml(g)}">${escHtml(g)}</button>`).join('');
    return `<div class="genre-cluster" data-cluster="${c.id}">
      <div class="genre-cluster-header">
        <div class="genre-cluster-toggle" data-cluster-toggle="${c.id}">
          <span class="genre-cluster-arrow${isOpen?' open':''}">▼</span>
          <span class="genre-cluster-icon">${c.icon}</span>
          <span class="genre-cluster-label">${c.label}</span>
          <span class="genre-cluster-badge${selCount?' visible':''}" id="badge_${c.id}">${selCount}</span>
        </div>
        <button class="${allBtnClass}" data-cluster-all="${c.id}" id="allbtn_${c.id}">${allSelected?'✓ All':'+ All'}</button>
      </div>
      <div class="genre-cluster-body${isOpen?' open':''}" id="body_${c.id}">
        <div class="genre-cluster-chips" id="lane_${c.id}">${chips}</div>
      </div>
    </div>`;
  }).join('');
  return `
    <div class="genre-search-wrap">
      <span class="genre-search-icon">⌕</span>
      <input class="genre-search" type="search" id="genreSearch" placeholder="Search genres…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="genre-search-clear" id="genreSearchClear" type="button">×</button>
    </div>
    <div id="genreSearchResults" style="display:none;"></div>
    ${selectedBar}
    <div class="genre-lanes" id="genreLanes">${lanes}</div>`;
}

function buildNeglectPanel() {
  if (!allAlbums.length) return '';
  const albumMap = new Map(allAlbums.map(a=>[a.id,a]));
  const neglected = [...allAlbums].sort((a,b) => {
    const playsA=historyCache.filter(h=>h.id===a.id).length;
    const playsB=historyCache.filter(h=>h.id===b.id).length;
    if (playsA===0&&playsB===0) return new Date(b._added_at||0)-new Date(a._added_at||0);
    if (playsA===0) return -1; if (playsB===0) return 1;
    const lastA=historyCache.filter(h=>h.id===a.id).sort((x,y)=>y.queuedAt-x.queuedAt)[0]?.queuedAt||0;
    const lastB=historyCache.filter(h=>h.id===b.id).sort((x,y)=>y.queuedAt-x.queuedAt)[0]?.queuedAt||0;
    return lastA - lastB;
  }).slice(0, NEGLECT_TOP_N);
  return `
  <div class="r-card">
    <div class="collapse-header" onclick="toggleCollapse('neglectBody','neglectArrow')">
      <span class="collapse-title">Most Neglected</span>
      <span class="collapse-arrow" id="neglectArrow">▼</span>
    </div>
    <div class="collapse-body" id="neglectBody">
      ${neglected.map(a=>{
        const img=getAlbumArt(a); const artists=(a.artists||[]).map(x=>x.name).join(', ');
        const plays=historyCache.filter(h=>h.id===a.id).length;
        const last=plays>0?historyCache.filter(h=>h.id===a.id).sort((x,y)=>y.queuedAt-x.queuedAt)[0]:null;
        const lastStr=last?`Last: ${Math.floor((Date.now()-last.queuedAt)/86400000)}d ago`:'Never played';
        return `<div class="neglect-item" onclick="openAlbumDetail('${a.id}')">
          ${img?`<img class="neglect-art" src="${img}" alt="" loading="lazy">`:`<div class="neglect-art" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;">🎵</div>`}
          <div class="neglect-info">
            <div class="neglect-name">${escHtml(a.name)}</div>
            <div class="neglect-sub">${escHtml(artists)} · ${lastStr}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

  const body = document.getElementById(bodyId);
  const arr  = document.getElementById(arrowId);

  arr?.classList.toggle('open', open);
}
function toggleSection(bodyId, arrowId) {

  const arr  = document.getElementById(arrowId);
  if (!body) return;
  const open = body.classList.toggle('open');

function updateStatsChip() {
  const chip = document.getElementById('statsChip');
  if (!chip || !allAlbums.length) return;
  chip.classList.add('visible');
  chip.textContent = `${allAlbums.length} albums · ${applyFilters(allAlbums).length} match filters`;
}

function sortAlbums(albums) {
  const arr = [...albums];
  switch (randomState.albumSort) {
    case 'year':   return arr.sort((a,b)=>releaseYear(b)-releaseYear(a));
    case 'artist': return arr.sort((a,b)=>(a.artists?.[0]?.name||'').localeCompare(b.artists?.[0]?.name||''));
    case 'added':  return arr.sort((a,b)=>new Date(b._added_at||0)-new Date(a._added_at||0));
    default: return arr.sort(()=>Math.random()-.5);
  }
}

async function handlePick() {
  if (randomState.isWorking) return;
  randomState.isWorking = true;
  document.getElementById('r-status')?.classList.remove('success','error');
  try {
    if (!allAlbums.length) {
      showProgress(true, 'Loading library…', 0);
      allAlbums = await fetchAllAlbums((loaded, total) => showProgress(true, `Loading… ${loaded}/${total}`, loaded/total*100));
      randomState.genresLoading = true;
      allGenres = await fetchArtistGenres(allAlbums, (done,total)=>showProgress(true,`Genres… ${done}/${total}`,done/total*100));
      randomState.genresLoading = false;
      await DB.saveLibrary(allAlbums, allGenres);
      showToast(`Library loaded — ${allAlbums.length} albums`, 'success');
    }
    showProgress(false);
    let pool = applyFilters(allAlbums);
    if (randomState.coverageFilter==='unheard') pool = allAlbums.filter(a=>!historyCache.some(h=>h.id===a.id));
    if (randomState.coverageFilter==='longAgo') { const now=Date.now(); pool = allAlbums.filter(a=>{ const last=historyCache.filter(h=>h.id===a.id).sort((x,y)=>y.queuedAt-x.queuedAt)[0]; return last && last.queuedAt < now-180*86400000; }); }
    randomState.coverageFilter = null;
    if (!pool.length) { showRStatus('No albums match the current filters.','error'); randomState.isWorking=false; return; }
    const picked = [];
    const usedIds = new Set();
    for (let i=0;i<randomState.albumCount&&pool.length>0;i++) {
      let a; const remaining = pool.filter(x=>!usedIds.has(x.id));
      if (!remaining.length) break;
      a = randomState.filters.weighted ? weightedPick(remaining) : remaining[Math.floor(Math.random()*remaining.length)];
      picked.push(a); usedIds.add(a.id);
    }
    randomState.selectedAlbums = picked;
    renderAlbumList(picked);
    document.getElementById('r-albumSection').style.display='';
    document.getElementById('r-albumSection').scrollIntoView({behavior:'smooth',block:'start'});
  } catch(err) { showRStatus(err.message,'error'); }
  randomState.isWorking = false;
}

function showProgress(show, label='', pct=0) {
  const wrap = document.getElementById('r-progressWrap');
  if (!wrap) return;
  if (!show) { wrap.classList.remove('visible'); return; }
  wrap.classList.add('visible');
  document.getElementById('r-progressLabel').textContent = label;
  document.getElementById('r-progressPct').textContent = Math.round(pct)+'%';
  document.getElementById('r-progressFill').style.width = pct+'%';
}

function showRStatus(msg, type) {
  const el = document.getElementById('r-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'r-status ' + type;
}

function renderAlbumList(albums) {
  const listEl = document.getElementById('r-albumList');
  if (!listEl) return;
  const sorted = sortAlbums(albums);
  listEl.innerHTML = sorted.map((a, i) => {
    const img = getAlbumArt(a);
    const artist = (a.artists||[]).map(x=>x.name).join(', ');
    const genres = (a._genres||[]).slice(0,3).join(' · ');
    const h = historyCache.find(hh=>hh.id===a.id);
    let badge = '';
    if (h) {
      const due = computeNextDue(h.queuedAt, h.playCount||1);
      const now = Date.now();
      if (due <= now) badge = `<span class="album-art-badge due-now">Due Now</span>`;
      else if (due <= now+7*86400000) badge = `<span class="album-art-badge due-soon">Due Soon</span>`;
    }
    return `<div class="album-item" data-idx="${i}" data-album-id="${a.id}">
      <span class="album-num">${i+1}</span>
      <div class="album-art-wrap">
        ${img?`<img class="album-art" src="${img}" alt="" loading="lazy">`:`<div class="album-art-placeholder">🎵</div>`}
        ${badge}
      </div>
      <div class="album-info">
        <div class="album-name">${escHtml(a.name)}</div>
        <div class="album-artist">${escHtml(artist)}</div>
        ${genres?`<div class="album-genre-tags">${escHtml(genres)}</div>`:''}
        <div class="album-added-label">${formatAddedAt(a._added_at)}</div>
      </div>
      <div class="album-actions">
        <button class="reroll-btn" data-reroll="${i}" title="Reroll">↺</button>
        <button class="more-like-btn" data-similar="${i}">Similar</button>
        <button class="radio-start-btn" data-radio="${i}">Radio</button>
      </div>
    </div>
    <div class="similar-panel" id="similar_${i}" style="display:none;"></div>`;
  }).join('');

  // Update sort chips
  document.querySelectorAll('.sort-chip[data-sort]').forEach(c => c.classList.toggle('active', c.dataset.sort===randomState.albumSort));

  attachAlbumItemEvents(listEl, sorted);
}

function attachAlbumItemEvents(listEl, albums) {
  listEl.querySelectorAll('.reroll-btn[data-reroll]').forEach(btn => btn.onclick = () => rerollAlbum(+btn.dataset.reroll));
  listEl.querySelectorAll('.more-like-btn[data-similar]').forEach(btn => btn.onclick = () => showSimilarPanel(+btn.dataset.similar, albums[+btn.dataset.similar]));
  listEl.querySelectorAll('.radio-start-btn[data-radio]').forEach(btn => btn.onclick = () => startRadio(+btn.dataset.radio, albums[+btn.dataset.radio]));

  listEl.querySelectorAll('.album-item').forEach(item => {
    let startX=0, dragging=false;
    item.addEventListener('touchstart', e=>{startX=e.touches[0].clientX;dragging=true;},{passive:true});
    item.addEventListener('touchmove', e=>{if(!dragging)return;const dx=e.touches[0].clientX-startX;if(dx<0)item.style.transform=`translateX(${dx}px)`;item.classList.toggle('swipe-ready',dx<-60);},{passive:true});
    item.addEventListener('touchend', e=>{if(!dragging)return;dragging=false;item.classList.remove('swipe-ready');const dx=e.changedTouches[0].clientX-startX;if(dx<-60&&!randomState.isWorking){rerollAlbum(+item.dataset.idx);}else{item.style.transform='';}},{passive:true});
    item.addEventListener('click', e => {
      if (e.target.closest('button')) return;
      openAlbumDetail(item.dataset.albumId);
    });
  });
}

async function rerollAlbum(idx) {
  const pool = applyFilters(allAlbums).filter(a=>!randomState.selectedAlbums.some((s,i)=>s.id===a.id&&i!==idx));
  if (!pool.length) return;
  const newAlbum = pool[Math.floor(Math.random()*pool.length)];
  const item = document.querySelector(`.album-item[data-idx="${idx}"]`);
  if (item) { item.classList.add('swipe-exit'); await sleep(250); }
  randomState.selectedAlbums[idx] = newAlbum;
  renderAlbumList(randomState.selectedAlbums);
}

async function showSimilarPanel(idx, album) {
  const panel = document.getElementById(`similar_${idx}`);
  if (!panel) return;
  if (panel.style.display !== 'none') { panel.style.display='none'; return; }
  panel.style.display=''; panel.innerHTML=`<div class="similar-panel"><div class="similar-panel-title">More Like This</div><div style="font-size:10px;color:var(--text-dim);">Loading…</div></div>`;
  const artistName = album.artists?.[0]?.name;
  if (!artistName || !getLastfmKey()) { panel.innerHTML=`<div class="similar-panel"><div class="similar-no-lastfm">No Last.fm data — set API key in settings.</div></div>`; return; }
  const lfm = await fetchLastfmArtist(artistName);
  const similar = lfm?.similarArtists || [];
  const matches = allAlbums.filter(a=>a.id!==album.id&&(a.artists||[]).some(ar=>similar.includes(ar.name.toLowerCase()))).slice(0,5);
  panel.innerHTML = `<div class="similar-panel">
    <div class="similar-panel-title">Albums by Similar Artists</div>
    ${matches.length ? matches.map(a=>{
      const img=getAlbumArt(a);
      return `<div class="similar-album-item" onclick="openAlbumDetail('${a.id}')">
        ${img?`<img class="similar-album-art" src="${img}" alt="" loading="lazy">`:`<div class="similar-album-art" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;">🎵</div>`}
        <div class="similar-album-info">
          <div class="similar-album-name">${escHtml(a.name)}</div>
          <div class="similar-album-artist">${escHtml((a.artists||[]).map(x=>x.name).join(', '))}</div>
        </div>
        <button class="similar-add-btn" data-add-similar="${a.id}">+ Add</button>
      </div>`;
    }).join('') : `<div style="font-size:10px;color:var(--text-dim);">No library matches found.</div>`}
  </div>`;
  panel.querySelectorAll('[data-add-similar]').forEach(btn => btn.onclick = e => {
    e.stopPropagation();
    const a = allAlbums.find(x=>x.id===btn.dataset.addSimilar);
    if (a && !randomState.selectedAlbums.some(x=>x.id===a.id)) {
      randomState.selectedAlbums.push(a);
      renderAlbumList(randomState.selectedAlbums);
      document.getElementById('r-albumSection').style.display='';
    }
  });
}

async function startRadio(idx, album) {
  try {
    const tracks = await getAlbumTracks(album.id);
    if (!tracks[0]?.id) throw new Error('No tracks found');
    const recs = await getRecommendations(tracks[0].id);
    const radioTracks = recs?.tracks || [];
    if (!radioTracks.length) throw new Error('No recommendations');
    showToast(`Queuing ${radioTracks.length} radio tracks…`, 'info');
    const delay = document.getElementById('browserModeToggle')?.checked ? DELAY_BROWSER_MS : DELAY_DESKTOP_MS;
    for (const t of radioTracks) { await addToQueue(t.uri); await sleep(delay); }
    showToast('Radio queued!', 'success');
  } catch(e) { showToast(e.message, 'error'); }
}

async function queueSelected() {
  if (!randomState.selectedAlbums.length) return;
  if (randomState.isWorking) return;
  randomState.isWorking = true;
  const btn = document.getElementById('r-queueSelectedBtn');
  if (btn) btn.disabled = true;
  const delay = document.getElementById('browserModeToggle')?.checked ? DELAY_BROWSER_MS : DELAY_DESKTOP_MS;
  let queued = 0;
  try {
    for (const album of randomState.selectedAlbums) {
      const tracks = await getAlbumTracks(album.id);
      if (!tracks[0]?.uri) continue;
      showProgress(true, `Queuing ${queued+1} of ${randomState.selectedAlbums.length}…`, (queued/randomState.selectedAlbums.length)*100);
      await addToQueue(tracks[0].uri);
      await DB.logPlay(album.id, 'queue');
      listeningLog.push({ album_id: album.id, action:'queue', timestamp: Date.now() });
      const existing = historyCache.find(h=>h.id===album.id);
      const newPlayCount = (existing?.playCount||0)+1;
      const entry = { id: album.id, name: album.name, queuedAt: Date.now(), playCount: newPlayCount, easeInterval: getSRInterval(newPlayCount), nextDue: computeNextDue(Date.now(), newPlayCount) };
      await DB.putHistory(entry);
      const idx = historyCache.findIndex(h=>h.id===album.id);
      if (idx>=0) historyCache[idx]=entry; else historyCache.push(entry);
      queued++;
      if (queued < randomState.selectedAlbums.length) await sleep(delay);
    }
    showProgress(false);
    showRStatus(`✓ Queued ${queued} album${queued!==1?'s':''}`, 'success');
  } catch(e) { showProgress(false); showRStatus(e.message, 'error'); }
  if (btn) btn.disabled = false;
  randomState.isWorking = false;
}

function applyPreset(name) {
  randomState.activePreset = name;
  const f = randomState.filters;
  // Reset
  f.genres=[]; f.excludeGenres=[]; f.decades={}; f.queueHistory=null; f.ageInLibrary=null; f.avoidRecent=false; f.weighted=false; f.blocklistKeywords=false;
  switch(name) {
    case 'Deep Dive':       f.queueHistory='never'; break;
    case 'New Additions':   f.ageInLibrary='<3mo'; break;
    case 'Forgotten Gems':  f.queueHistory='6mo'; break;
    case 'SR Due':          f.queueHistory='due_now'; break;
    case 'Never Heard':     f.queueHistory='never'; break;
    case 'Random Mix':      f.weighted=true; break;
  }
}

function attachRandomEvents(el) {
  // Pick button
  el.querySelector('#r-queueBtn')?.addEventListener('click', handlePick);
  // Queue selected
  el.querySelector('#r-queueSelectedBtn')?.addEventListener('click', queueSelected);
  // Count selector
  el.querySelectorAll('.count-btn[data-count]').forEach(btn => btn.addEventListener('click', () => {
    randomState.albumCount = +btn.dataset.count;
    el.querySelectorAll('.count-btn').forEach(b=>b.classList.toggle('active',+b.dataset.count===randomState.albumCount));
  }));
  // Sort chips
  el.querySelectorAll('.sort-chip[data-sort]').forEach(c => c.addEventListener('click', () => {
    randomState.albumSort = c.dataset.sort;
    el.querySelectorAll('.sort-chip[data-sort]').forEach(x=>x.classList.toggle('active',x.dataset.sort===randomState.albumSort));
    renderAlbumList(randomState.selectedAlbums);
  }));
  // Presets
  el.querySelectorAll('.preset-btn[data-preset]').forEach(btn => btn.addEventListener('click', () => {
    applyPreset(btn.dataset.preset);
    renderRandomTab(document.getElementById('tabRandom'));
  }));
  // Decades
  el.querySelectorAll('.decade-chip-btn[data-decade]').forEach(btn => btn.addEventListener('click', () => {
    const d = btn.dataset.decade;
    const cur = randomState.filters.decades[d] || 'neutral';
    const next = cur==='neutral'?'included':cur==='included'?'excluded':'neutral';
    if (next==='neutral') delete randomState.filters.decades[d]; else randomState.filters.decades[d]=next;
    btn.className='decade-chip-btn'+(next!=='neutral'?' '+next:'');
    updateStatsChip();
  }));
  // Queue History radio
  el.querySelectorAll('input[name="queueHistory"]').forEach(rb => rb.addEventListener('change', e => {
    randomState.filters.queueHistory = e.target.value || null;
    randomState.activePreset = null;
    updateStatsChip();
  }));
  // Age filter radio
  el.querySelectorAll('input[name="ageInLibrary"]').forEach(rb => rb.addEventListener('change', e => {
    randomState.filters.ageInLibrary = e.target.value || null;
    updateStatsChip();
  }));
  // Toggles
  el.querySelector('#avoidRecentToggle')?.addEventListener('change', e => { randomState.filters.avoidRecent=e.target.checked; updateStatsChip(); });
  el.querySelector('#weightedToggle')?.addEventListener('change', e => { randomState.filters.weighted=e.target.checked; });
  el.querySelector('#blocklistToggle')?.addEventListener('change', e => { randomState.filters.blocklistKeywords=e.target.checked; updateStatsChip(); });
  // Bookmarks
  el.querySelector('#bookmarkSaveBtn')?.addEventListener('click', () => {
    const form = el.querySelector('#bookmarkForm');
    form.style.display = form.style.display==='none'?'flex':'none';
    if (form.style.display==='flex') el.querySelector('#bookmarkNameInput')?.focus();
  });
  el.querySelector('#bookmarkConfirmBtn')?.addEventListener('click', () => {
    const name = el.querySelector('#bookmarkNameInput')?.value.trim();
    if (!name) return;
    randomState.bookmarks.push({ name, filters: JSON.parse(JSON.stringify(randomState.filters)), albumCount: randomState.albumCount });
    el.querySelector('#bookmarkForm').style.display='none';
    renderRandomTab(document.getElementById('tabRandom'));
  });
  el.querySelectorAll('[data-bm-load]').forEach(pill => pill.addEventListener('click', (e) => {
    if (e.target.closest('[data-bm-del]')) return;
    const i = +pill.dataset.bmLoad;
    const bm = randomState.bookmarks[i];
    if (!bm) return;
    randomState.filters = JSON.parse(JSON.stringify(bm.filters));
    randomState.albumCount = bm.albumCount;
    randomState.activeBookmark = i;
    renderRandomTab(document.getElementById('tabRandom'));
  }));
  el.querySelectorAll('[data-bm-del]').forEach(x => x.addEventListener('click', e => {
    e.stopPropagation();
    const i = +x.dataset.bmDel;
    randomState.bookmarks.splice(i,1);
    renderRandomTab(document.getElementById('tabRandom'));
  }));
  // Coverage events
  el.querySelectorAll('.btn-coverage[data-coverage]').forEach(btn => btn.addEventListener('click', () => {
    randomState.coverageFilter = btn.dataset.coverage;
    handlePick();
  }));
  // Export / Clear history
  el.querySelector('#exportHistoryBtn')?.addEventListener('click', exportHistory);
  el.querySelector('#exportHistoryBtn2')?.addEventListener('click', exportHistory);
  el.querySelector('#importHistoryBtn')?.addEventListener('click', importHistory);
  el.querySelector('#clearHistoryBtn')?.addEventListener('click', async () => {
    if (!confirm('Clear all play history?')) return;
    await DB.clearHistory(); historyCache=[];
    renderRandomTab(document.getElementById('tabRandom'));
  });
  // Last.fm settings
  el.querySelector('#saveLfmKeyBtn')?.addEventListener('click', () => {
    const k = el.querySelector('#lastfmKeyInput')?.value.trim();
    localStorage.setItem('lastfm_api_key', k);
    showToast('Last.fm key saved', 'success');
    renderRandomTab(document.getElementById('tabRandom'));
  });
  el.querySelector('#fetchLfmBtn')?.addEventListener('click', () => fetchLastfmBatch(el));
  // Genre filter events
  attachGenreEvents(el);
}

async function fetchLastfmBatch(el) {
  const key = getLastfmKey(); if (!key) return;
  const artists = [...new Set(allAlbums.flatMap(a=>(a.artists||[]).map(ar=>ar.name)))];
  const progressEl = el?.querySelector('#lfmFetchProgress');
  if (progressEl) { progressEl.style.display=''; progressEl.textContent='Starting…'; }
  for (let i=0;i<artists.length;i++) {
    if (progressEl) progressEl.textContent=`Fetching ${i+1} of ${artists.length}: ${artists[i]}`;
    await fetchLastfmArtist(artists[i]);
    await sleep(210);
  }
  // Attach tags to albums
  for (const album of allAlbums) {
    const tags=new Set();
    for (const ar of (album.artists||[])) { const d=getLastfmDataSync(ar.name); if(d) for(const t of (d.topTags||[])) tags.add(t); }
    album._lastfmTags=[...tags];
  }
  if (progressEl) progressEl.textContent=`Done — ${artists.length} artists fetched`;
  showToast('Last.fm data fetched!', 'success');
}

function attachGenreEvents(el) {
  const lanesEl  = el?.querySelector('#genreLanes');
  const searchEl = el?.querySelector('#genreSearch');
  const clearBtn = el?.querySelector('#genreSearchClear');
  const resultsEl= el?.querySelector('#genreSearchResults');
  if (!lanesEl) return;

  if (searchEl) {
    searchEl.addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      clearBtn?.classList.toggle('visible', q.length>0);
      if (!q) { resultsEl.style.display='none'; resultsEl.innerHTML=''; lanesEl.style.display=''; return; }
      const matches = allGenres.filter(g=>g.toLowerCase().includes(q));
      resultsEl.innerHTML = matches.length ? `<div class="genre-search-results">${matches.map(g=>`<button class="glchip${randomState.filters.genres.includes(g)?' selected':''}" data-genre="${escHtml(g)}">${escHtml(g)}</button>`).join('')}</div>` : `<div style="font-size:11px;color:var(--text-dim);">No matches</div>`;
      resultsEl.querySelector('.genre-search-results')?.addEventListener('click', e => { const c=e.target.closest('.glchip'); if(c) toggleGenreChip(c.dataset.genre); });
      resultsEl.style.display=''; lanesEl.style.display='none';
    });
    clearBtn?.addEventListener('click', () => { searchEl.value=''; clearBtn.classList.remove('visible'); resultsEl.style.display='none'; lanesEl.style.display=''; searchEl.focus(); });
  }

  lanesEl.addEventListener('click', e => {
    if (e.target.closest('[data-cluster-all]')) return;
    const chip = e.target.closest('.glchip');
    if (chip) { toggleGenreChip(chip.dataset.genre); return; }
    const toggle = e.target.closest('[data-cluster-toggle]');
    if (toggle) {
      const cid = toggle.dataset.clusterToggle;
      const body = document.getElementById('body_'+cid);
      const arr  = toggle.querySelector('.genre-cluster-arrow');
      if (!body) return;
      const open = body.classList.toggle('open');
      arr?.classList.toggle('open', open);
    }
  });

  lanesEl.addEventListener('click', e => {
    const btn = e.target.closest('[data-cluster-all]');
    if (!btn) return;
    const cid = btn.dataset.clusterAll;
    const lane = document.getElementById('lane_'+cid);
    if (!lane) return;
    const allChips = [...lane.querySelectorAll('.glchip')];
    const clusterGenres = allChips.map(c=>c.dataset.genre);
    const allSelected = clusterGenres.every(g=>randomState.filters.genres.includes(g));
    if (allSelected) { randomState.filters.genres=randomState.filters.genres.filter(g=>!clusterGenres.includes(g)); allChips.forEach(c=>c.classList.remove('selected')); }
    else { for (const g of clusterGenres) if (!randomState.filters.genres.includes(g)) randomState.filters.genres.push(g); allChips.forEach(c=>c.classList.add('selected')); }
    syncGenreBadgesAndBar();
    updateStatsChip();
  });

  el?.querySelector('#genreClearAll')?.addEventListener('click', clearAllGenres);
  el?.querySelector('#genreSelectedBar')?.addEventListener('click', e => {
    const pill=e.target.closest('.genre-selected-pill'); if(!pill)return;
    toggleGenreChip(pill.dataset.remove);
  });
}

function toggleGenreChip(g) {
  if (!g) return;
  const is = randomState.filters.genres.includes(g);
  if (is) randomState.filters.genres=randomState.filters.genres.filter(x=>x!==g); else randomState.filters.genres.push(g);
  document.querySelectorAll(`.glchip[data-genre="${CSS.escape(g)}"]`).forEach(c=>c.classList.toggle('selected',!is));
  syncGenreBadgesAndBar(); updateStatsChip();
}
function clearAllGenres() {
  randomState.filters.genres=[];
  document.querySelectorAll('.glchip.selected').forEach(c=>c.classList.remove('selected'));
  syncGenreBadgesAndBar(); updateStatsChip();
}
function syncGenreBadgesAndBar() {
  const sel = randomState.filters.genres;
  for (const c of [...GENRE_CLUSTERS,{id:'other'}]) {
    const badge=document.getElementById('badge_'+c.id), lane=document.getElementById('lane_'+c.id), allBtn=document.getElementById('allbtn_'+c.id);
    if (!badge||!lane) continue;
    const chips=[...lane.querySelectorAll('.glchip')];
    const selCount=chips.filter(ch=>sel.includes(ch.dataset.genre)).length;
    const allSelected=selCount===chips.length&&chips.length>0, someSelected=selCount>0&&!allSelected;
    badge.textContent=selCount; badge.classList.toggle('visible',selCount>0);
    if (allBtn) { allBtn.className='genre-cluster-all'+(allSelected?' all-selected':someSelected?' some-selected':''); allBtn.textContent=allSelected?'✓ All':'+ All'; }
  }
  let bar=document.getElementById('genreSelectedBar');
  const section=document.getElementById('genreFilterSection');
  if (!section) return;
  if (!sel.length) { bar?.remove(); return; }
  const html=`<div class="genre-selected-bar visible" id="genreSelectedBar">${sel.map(g=>`<span class="genre-selected-pill" data-remove="${escHtml(g)}">${escHtml(g)}<span class="genre-selected-pill-x" style="margin-left:4px;">×</span></span>`).join('')}<button class="genre-clear-all" id="genreClearAll">Clear all</button></div>`;
  if (bar) bar.outerHTML=html; else { const lanes=document.getElementById('genreLanes'); if(lanes) lanes.insertAdjacentHTML('beforebegin',html); }
  document.getElementById('genreClearAll')?.addEventListener('click', clearAllGenres);
  document.getElementById('genreSelectedBar')?.addEventListener('click', e=>{ const p=e.target.closest('.genre-selected-pill'); if(p) toggleGenreChip(p.dataset.remove); });
}

function exportHistory() {
  const blob=new Blob([JSON.stringify(historyCache,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`albumapp_history_${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importHistory() {
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=async e=>{
    try {
      const text=await e.target.files[0].text(); const entries=JSON.parse(text);
      for (const entry of entries) { if (entry.id&&entry.queuedAt) { await DB.putHistory(entry); if(!historyCache.some(h=>h.id===entry.id)) historyCache.push(entry); } }
      showToast(`Imported ${entries.length} entries`, 'success');
    } catch(err) { showToast('Import failed: '+err.message,'error'); }
  };
  input.click();
}

async function renderDiscover(el) {
  if (!allAlbums.length) { el.innerHTML=`<div style="padding:40px 16px;text-align:center;color:var(--text-secondary);">Sync your library first (Profile tab).</div>`; return; }
  const GENRE_COLORS = ['#4a90d9','#d4a574','#1DB954','#e84343','#9b59b6','#e67e22','#1abc9c','#e91e63','#3498db','#f39c12'];
  const genreCount={};
  for (const a of allAlbums) for (const g of (a._genres||[])) genreCount[g]=(genreCount[g]||0)+1;
  const topGenres = Object.entries(genreCount).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const genreAlbums = {};
  for (const [g] of topGenres) genreAlbums[g]=allAlbums.filter(a=>(a._genres||[]).includes(g));

  const now=Date.now();
  const played=new Map(); for(const e of listeningLog) played.set(e.album_id,(played.get(e.album_id)||[]));
  listeningLog.forEach(e=>{ if(!played.has(e.album_id)) played.set(e.album_id,[]); played.get(e.album_id).push(e.timestamp); });

  let discoverWindow=30;
  function getRediscoverAlbums(days) {
    const cutoff=now-days*86400000;
    return allAlbums.filter(a=>{ const ts=played.get(a.id)||[]; if(!ts.length) return true; return Math.max(...ts)<cutoff; }).slice(0,20);
  }

  el.innerHTML=`
    <div class="discover-section">
      <div class="section-header" style="padding:0 0 8px;"><div class="section-title">Genre Mixes</div><span class="section-link" onclick="renderDiscover(document.getElementById('tabDiscover'))">Rebuild</span></div>
      <div class="horizontal-scroll">
        ${topGenres.map(([g,count],i)=>{
          const imgs=genreAlbums[g].slice(0,4).map(a=>getAlbumArt(a));
          return `<div class="mix-card" data-genre-filter="${escHtml(g)}">
            <div class="mix-collage">${[0,1,2,3].map(j=>imgs[j]?`<img src="${imgs[j]}" alt="" loading="lazy">`:`<div class="mix-collage-placeholder"></div>`).join('')}</div>
            <div class="mix-info">
              <div class="mix-name">${escHtml(g)}</div>
              <div class="mix-count">${count} albums</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="discover-section" style="border-top:1px solid var(--border);">
      <div class="section-header" style="padding:0 0 8px;">
        <div class="section-title">Rediscover</div>
        <span style="font-size:12px;color:var(--text-secondary);">${getRediscoverAlbums(discoverWindow).length} albums</span>
      </div>
      <div class="time-chips">
        ${[30,60,90,180].map(d=>`<button class="time-chip${discoverWindow===d?' active':''}" data-window="${d}">${d}d</button>`).join('')}
      </div>
      <div class="horizontal-scroll" id="rediscoverRow">
        ${renderRediscoverRow(getRediscoverAlbums(discoverWindow), now)}
      </div>
    </div>`;

  el.querySelectorAll('.mix-card[data-genre-filter]').forEach(card => card.onclick = () => {
    switchTab('library'); setTimeout(()=>{ document.getElementById('lib-genre-'+CSS.escape(card.dataset.genreFilter))?.click(); }, 100);
  });
  el.querySelectorAll('.time-chip[data-window]').forEach(btn => btn.onclick = () => {
    discoverWindow=+btn.dataset.window;
    el.querySelectorAll('.time-chip').forEach(b=>b.classList.toggle('active',+b.dataset.window===discoverWindow));
    document.getElementById('rediscoverRow').innerHTML=renderRediscoverRow(getRediscoverAlbums(discoverWindow),now);
    document.getElementById('rediscoverRow').querySelectorAll('[data-open-album]').forEach(c=>c.onclick=()=>openAlbumDetail(c.dataset.openAlbum));
  });
  el.querySelectorAll('[data-open-album]').forEach(c=>c.onclick=()=>openAlbumDetail(c.dataset.openAlbum));
}

function renderRediscoverRow(albums, now) {
  return albums.map(a=>{
    const ts=listeningLog.filter(e=>e.album_id===a.id).map(e=>e.timestamp);
    const lastTs=ts.length?Math.max(...ts):0;
    const badge=!lastTs?'Never played':`Not heard in ${Math.floor((now-lastTs)/86400000)}d`;
    return `<div class="rediscover-card" data-open-album="${a.id}">
      <div style="position:relative;">
        <img class="rediscover-img" src="${getAlbumArt(a)}" alt="" loading="lazy">
        <div class="rediscover-badge">${badge}</div>
      </div>
      <div class="rediscover-title">${escHtml(a.name)}</div>
      <div class="rediscover-artist">${escHtml((a.artists||[]).map(x=>x.name).join(', '))}</div>
    </div>`;
  }).join('');
}

let libQuery='', libGenres=[], libSort='alpha', _trackCache={};

async function renderLibrary(el) {
  if (!allAlbums.length) { el.innerHTML=`<div style="padding:40px 16px;text-align:center;color:var(--text-secondary);">Sync your library first (Profile tab).</div>`; return; }
  const genres = [...new Set(allAlbums.flatMap(a=>a._genres||[]))].sort();

  function getFiltered() {
    let albums = allAlbums;
    if (libQuery) { const q=libQuery.toLowerCase(); albums=albums.filter(a=>(a.name||'').toLowerCase().includes(q)||(a.artists||[]).some(ar=>ar.name.toLowerCase().includes(q))||(a._genres||[]).some(g=>g.toLowerCase().includes(q))); }
    if (libGenres.length) albums=albums.filter(a=>(a._genres||[]).some(g=>libGenres.includes(g)));
    switch(libSort) {
      case 'alpha':  albums=[...albums].sort((a,b)=>a.name.localeCompare(b.name)); break;
      case 'year':   albums=[...albums].sort((a,b)=>releaseYear(b)-releaseYear(a)); break;
      case 'added':  albums=[...albums].sort((a,b)=>new Date(b._added_at||0)-new Date(a._added_at||0)); break;
      case 'played': { const pc={}; for(const e of listeningLog) pc[e.album_id]=(pc[e.album_id]||0)+1; albums=[...albums].sort((a,b)=>(pc[b.id]||0)-(pc[a.id]||0)); break; }
    }
    return albums;
  }

  function rebuildGrid() {
    const g=document.getElementById('albumGrid'); if(!g)return;
    const filtered=getFiltered();
    // Virtualise if >500
    const toShow = filtered.length > 500 ? filtered.slice(0,500) : filtered;
    g.innerHTML=toShow.map(a=>`
      <div class="grid-album-cell" data-open-album="${a.id}">
        <img class="grid-album-art" src="${getAlbumArt(a)}" alt="" loading="lazy">
        <div class="grid-album-title">${escHtml(a.name)}</div>
        <div class="grid-album-artist">${escHtml((a.artists||[]).map(x=>x.name).join(', '))}</div>
      </div>`).join('');
    g.querySelectorAll('[data-open-album]').forEach(c=>c.onclick=()=>openAlbumDetail(c.dataset.openAlbum));
    if (filtered.length>500) g.insertAdjacentHTML('afterend',`<div style="padding:12px 16px;font-size:12px;color:var(--text-muted);">Showing 500 of ${filtered.length} albums. Use search or filters to narrow down.</div>`);
  }

  el.innerHTML=`
    <div class="lib-search-wrap">
      <div class="lib-search-inner">
        <input class="lib-search" type="search" placeholder="Search albums, artists, genres…" value="${escHtml(libQuery)}" id="libSearchInput" autocomplete="off">
        <button class="lib-search-clear${libQuery?' visible':''}" id="libSearchClear">×</button>
      </div>
    </div>
    <div class="genre-chips-scroll">
      <button class="genre-chip-lib${!libGenres.length?' active':''}" data-lib-genre="">Clear</button>
      ${genres.slice(0,40).map(g=>`<button class="genre-chip-lib${libGenres.includes(g)?' active':''}" data-lib-genre="${escHtml(g)}" id="lib-genre-${CSS.escape(g)}">${escHtml(g)}</button>`).join('')}
    </div>
    <div class="sort-chips-lib">
      ${[['alpha','A–Z'],['year','Year (new→old)'],['added','Date Added'],['played','Most Played']].map(([v,l])=>`<button class="sort-chip-lib${libSort===v?' active':''}" data-lib-sort="${v}">${l}</button>`).join('')}
    </div>
    <div class="album-grid" id="albumGrid"></div>`;

  rebuildGrid();

  let searchTimer;
  el.querySelector('#libSearchInput').addEventListener('input', e => {
    clearTimeout(searchTimer); searchTimer=setTimeout(()=>{ libQuery=e.target.value; el.querySelector('#libSearchClear').classList.toggle('visible',!!libQuery); rebuildGrid(); },50);
  });
  el.querySelector('#libSearchClear').addEventListener('click', ()=>{ libQuery=''; el.querySelector('#libSearchInput').value=''; el.querySelector('#libSearchClear').classList.remove('visible'); rebuildGrid(); });
  el.querySelectorAll('[data-lib-genre]').forEach(btn=>btn.addEventListener('click',()=>{
    const g=btn.dataset.libGenre;
    if (!g) { libGenres=[]; } else { const i=libGenres.indexOf(g); if(i>=0) libGenres.splice(i,1); else libGenres.push(g); }
    el.querySelectorAll('[data-lib-genre]').forEach(b=>b.classList.toggle('active',b.dataset.libGenre===''?!libGenres.length:libGenres.includes(b.dataset.libGenre)));
    rebuildGrid();
  }));
  el.querySelectorAll('[data-lib-sort]').forEach(btn=>btn.addEventListener('click',()=>{ libSort=btn.dataset.libSort; el.querySelectorAll('[data-lib-sort]').forEach(b=>b.classList.toggle('active',b.dataset.libSort===libSort)); rebuildGrid(); }));
}

async function openAlbumDetail(albumId) {
  const album = allAlbums.find(a=>a.id===albumId);
  if (!album) return;
  const sheet = document.getElementById('detailSheet');
  const inner = document.getElementById('detailInner');
  const img = getAlbumArt(album);
  const artist = (album.artists||[]).map(a=>a.name).join(', ');
  const year = album.release_date?.slice(0,4)||'';
  const spotifyUri = album.uri||`spotify:album:${album.id}`;
  const spotifyUrl = `https://open.spotify.com/album/${album.id}`;
  const lastPlayedEntry = listeningLog.filter(e=>e.album_id===albumId).sort((a,b)=>b.timestamp-a.timestamp)[0];
  const lastPlayedStr = lastPlayedEntry ? `Last played ${Math.floor((Date.now()-lastPlayedEntry.timestamp)/86400000)} days ago` : 'Never played';

  inner.innerHTML=`
    <button class="detail-close" onclick="document.getElementById('detailSheet').classList.remove('show')">×</button>
    ${img?`<img class="detail-cover" src="${img}" alt="">`:`<div class="detail-cover" style="background:var(--bg-card);"></div>`}
    <div class="detail-body">
      <div class="detail-title">${escHtml(album.name)}</div>
      <div class="detail-artist">${escHtml(artist)}</div>
      <div class="detail-meta">${year}${album.total_tracks?' · '+album.total_tracks+' tracks':''}</div>
      <div class="detail-actions">
        <button class="btn-detail-play" onclick="window.open('${spotifyUrl}','_blank')">▶ Play on Spotify</button>
        <button class="btn-detail-queue" id="detailQueueBtn">+ Queue</button>
      </div>
      <div class="detail-last-played">${lastPlayedStr}</div>
      <div class="detail-tracklist" id="detailTracklist"><div style="padding:16px 0;color:var(--text-muted);">Loading tracks…</div></div>
    </div>`;

  sheet.classList.add('show');

  inner.querySelector('#detailQueueBtn').addEventListener('click', async () => {
    try {
      const tracks=await getAlbumTracks(albumId);
      if(!tracks[0]?.uri) throw new Error('No tracks');
      await addToQueue(tracks[0].uri);
      await DB.logPlay(albumId,'queue');
      listeningLog.push({album_id:albumId,action:'queue',timestamp:Date.now()});
      const existing=historyCache.find(h=>h.id===albumId);
      const pc=(existing?.playCount||0)+1;
      const entry={id:albumId,name:album.name,queuedAt:Date.now(),playCount:pc,easeInterval:getSRInterval(pc),nextDue:computeNextDue(Date.now(),pc)};
      await DB.putHistory(entry);
      const i=historyCache.findIndex(h=>h.id===albumId); if(i>=0) historyCache[i]=entry; else historyCache.push(entry);
      showToast('Queued: '+album.name,'success');
    } catch(err){ showToast(err.message,'error'); }
  });

  try {
    if (!_trackCache[albumId]) _trackCache[albumId]=await getAlbumTracks(albumId);
    const tracks=_trackCache[albumId];
    document.getElementById('detailTracklist').innerHTML=tracks.map((t,i)=>`
      <div class="track-item">
        <span class="track-num">${t.track_number||i+1}</span>
        <span class="track-name">${escHtml(t.name)}</span>
        <span class="track-dur">${t.duration_ms?Math.floor(t.duration_ms/60000)+':'+(Math.floor(t.duration_ms/1000)%60).toString().padStart(2,'0'):''}</span>
      </div>`).join('');
  } catch(e) { document.getElementById('detailTracklist').innerHTML=`<div style="padding:12px 0;color:var(--text-muted);">Could not load tracks.</div>`; }
}

}

async function syncLibrary() {
  const overlay = document.getElementById('syncOverlay');
  const label   = document.getElementById('syncLabel');
  const progress= document.getElementById('syncProgress');
  overlay.classList.add('show');
  try {
    label.textContent = 'Syncing library…';
    progress.textContent = '';
    allAlbums = await fetchAllAlbums((loaded, total) => { progress.textContent=`${loaded} / ${total} albums`; });
    label.textContent = 'Fetching genres…';
    allGenres = await fetchArtistGenres(allAlbums, (done, total) => { progress.textContent=`${done} / ${total} artists`; });
    await DB.saveLibrary(allAlbums, allGenres);
    _dirtyTabs = new Set(['home','discover','library','profile']);
    overlay.classList.remove('show');
    showToast(`Library synced — ${allAlbums.length} albums`, 'success');
    // Re-render current tab if needed
    const activeTabId = document.querySelector('.tab-content.active')?.id;
    if (activeTabId) renderTab(activeTabId.replace('tab','').toLowerCase());
  } catch(e) { overlay.classList.remove('show'); showToast(e.message,'error'); }
}

/* === Router & Boot === */

let _currentTab = 'home';
const TABS = ['home','random','discover','library','profile'];

function renderTab(name) {
  const el = document.getElementById('tab'+name.charAt(0).toUpperCase()+name.slice(1));
  if (!el) return;
  switch(name) {
    case 'home':    renderHome(el); break;
    case 'random':  renderRandomTab(el); break;
    case 'discover':renderDiscover(el); break;
    case 'library': renderLibrary(el); break;
    case 'profile': renderProfile(el); break;
  }
  _dirtyTabs.delete(name);
}

function switchTab(name) {
  _currentTab = name;
  TABS.forEach(t => {
    const tab = document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1));
    const nav = document.querySelector(`.nav-item[data-tab="${t}"]`);
    tab?.classList.toggle('active', t===name);
    nav?.classList.toggle('active', t===name);
  });
  if (_dirtyTabs.has(name) || name===name) renderTab(name);
}

function buildShell() {
  const app = document.getElementById('app');
  app.innerHTML = `
    ${TABS.map(t=>`<div class="tab-content" id="tab${t.charAt(0).toUpperCase()+t.slice(1)}" role="tabpanel" aria-label="${t}"></div>`).join('')}
    <nav class="bottom-nav" role="tablist">
      <button class="nav-item" data-tab="home" role="tab" aria-label="Home" onclick="switchTab('home')">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-tab="random" role="tab" aria-label="Random" onclick="switchTab('random')">
        <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        <span class="nav-label">Random</span>
      </button>
      <button class="nav-item" data-tab="discover" role="tab" aria-label="Discover" onclick="switchTab('discover')">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="nav-label">Discover</span>
      </button>
      <button class="nav-item" data-tab="library" role="tab" aria-label="Library" onclick="switchTab('library')">
        <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        <span class="nav-label">Library</span>
      </button>
      <button class="nav-item" data-tab="profile" role="tab" aria-label="Profile" onclick="switchTab('profile')">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-label">Profile</span>
      </button>
    </nav>`;
  switchTab('home');
}

function showOnboarding() {
  document.getElementById('app').innerHTML = `
    <div class="onboarding">
      <div>
        <div class="app-logo">Album<span class="dot">.</span>Discovery</div>
        <div class="tagline">Your Spotify library, rediscovered. Roon-style.</div>
      </div>
      <div class="input-group">
        <div class="field-label">Spotify Client ID</div>
        <input class="text-field" id="clientIdInput" type="text" placeholder="a1b2c3d4e5f6…" autocomplete="off" spellcheck="false">
        <div class="field-label" style="margin-top:8px;">Redirect URI</div>
        <input class="text-field" id="redirectUriInput" type="text" value="${location.origin+location.pathname}">
      </div>
      <button class="btn-primary" id="connectBtn">Connect to Spotify →</button>
      <div class="onboard-footer">Stored locally. No backend, no tracking. Uses PKCE auth.</div>
    </div>`;
  document.getElementById('connectBtn').addEventListener('click', () => {
    const cid = document.getElementById('clientIdInput').value.trim();
    const ru  = document.getElementById('redirectUriInput').value.trim();
    if (!cid) { showToast('Please enter your Spotify Client ID', 'error'); return; }
    localStorage.setItem('spotify_client_id', cid);
    localStorage.setItem('spotify_redirect_uri', ru);
    login();
  });
}

function showLoginScreen() {
  document.getElementById('app').innerHTML = `
    <div class="onboarding">
      <div>
        <div class="app-logo">Album<span class="dot">.</span>Discovery</div>
        <div class="tagline">Your Spotify library, rediscovered.</div>
      </div>
      <button class="btn-primary" id="loginBtn">Sign in with Spotify</button>
      <button class="btn-ghost" id="changeSettingsBtn">Change Settings</button>
    </div>`;
  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('changeSettingsBtn').addEventListener('click', () => { localStorage.removeItem('spotify_client_id'); boot(); });
}

async function boot() {
  await DB.init();

  const params = new URLSearchParams(location.search);
  const code   = params.get('code');
  const oState = params.get('state');
  const oError = params.get('error');

  if (oError) { history.replaceState({},'',location.pathname); showLoginScreen(); showToast('Authorization denied: '+oError,'error'); return; }

  if (code && oState) {
    if (isLoggedIn()) { history.replaceState({},'',location.pathname); }
    else {
      try { await handleCallback(code, oState); } catch(err) { history.replaceState({},'',location.pathname); showLoginScreen(); showToast(err.message,'error'); return; }
    }
  }

  if (!isLoggedIn() && !getClientId()) { showOnboarding(); return; }
  if (!isLoggedIn()) { showLoginScreen(); return; }

  // Load cached data
  try {
    const [libRow, histRows, logRows] = await Promise.all([DB.getAlbums(), DB.getHistory(), DB.getListeningLog()]);
    if (libRow) { allAlbums=libRow.albums||[]; allGenres=libRow.genres||[]; }
    historyCache = histRows || [];
    listeningLog = logRows || [];
    await primeLastfmCache();
    // Attach lastfm tags
    if (allAlbums.length && _lastfmCache.size>0) for (const a of allAlbums) {
      if (!a._lastfmTags) { const tags=new Set(); for(const ar of (a.artists||[])){ const d=getLastfmDataSync(ar.name); if(d) for(const t of (d.topTags||[])) tags.add(t); } a._lastfmTags=[...tags]; }
    }
  } catch(e) { console.warn('Boot load error:', e); }

  buildShell();

  // Auto-sync if library empty
  if (!allAlbums.length) { setTimeout(syncLibrary, 500); }
}

boot();
</script>
